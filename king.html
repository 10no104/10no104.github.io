<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EHWA Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/global.css?v=20260423-10" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
  <style>
    :root {
      --ink: #211813;
      --muted: #726355;
      --wine: #7b1f2f;
      --gold: #d4af37;
      --paper: rgba(255, 252, 247, 0.94);
      --paper-strong: rgba(255, 252, 247, 0.98);
      --line: rgba(112, 86, 58, 0.16);
      --shadow: 0 22px 48px rgba(29, 19, 12, 0.1);
      --radius-xl: 26px;
      --radius-lg: 18px;
      --radius-md: 13px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: "Noto Sans KR", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(212, 175, 55, 0.18), transparent 28%),
        radial-gradient(circle at 86% 12%, rgba(123, 31, 47, 0.12), transparent 24%),
        linear-gradient(180deg, rgba(251, 247, 241, 0.98) 0%, rgba(245, 239, 228, 0.98) 100%);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(255, 252, 247, 0.2), rgba(255, 252, 247, 0.08)),
        url("assets/pattern.webp") center / 760px auto;
      opacity: 0.16;
      pointer-events: none;
      z-index: -1;
    }

    button,
    input,
    select,
    textarea { font: inherit; }

    button { cursor: pointer; }
    a { color: inherit; text-decoration: none; }
    img { display: block; max-width: 100%; }

    .shell {
      width: min(100% - 18px, 1240px);
      margin: 0 auto;
      padding: 16px 0 44px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .logo-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 58px;
      height: 58px;
      border-radius: 999px;
      background: linear-gradient(180deg, rgba(255, 254, 250, 0.98), rgba(243, 231, 215, 0.94));
      border: 1px solid rgba(73, 53, 36, 0.12);
      box-shadow: 0 14px 28px rgba(42, 28, 18, 0.1);
      flex: none;
    }

    .logo-link img {
      width: 40px;
      height: 40px;
      object-fit: contain;
    }

    .brand-copy p {
      margin: 0 0 3px;
      color: var(--wine);
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .brand-copy h1 {
      margin: 0;
      font-size: clamp(1.36rem, 4.8vw, 2.35rem);
      letter-spacing: -0.05em;
      line-height: 1;
    }

    .pill-btn,
    .icon-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 0 14px;
      border-radius: 999px;
      border: 1px solid rgba(113, 88, 60, 0.16);
      background: rgba(255, 251, 245, 0.82);
      color: #2c2016;
      font-size: 0.92rem;
      font-weight: 800;
      white-space: nowrap;
      box-shadow: 0 10px 22px rgba(32, 20, 13, 0.05);
    }

    .pill-btn.primary,
    .icon-btn.primary {
      color: #fff;
      border-color: transparent;
      background: linear-gradient(135deg, var(--wine), #b9871f);
      box-shadow: 0 18px 30px rgba(123, 31, 47, 0.18);
    }

    .pill-btn.danger {
      color: #fff;
      border-color: transparent;
      background: linear-gradient(135deg, #8b1e2e, #c24646);
    }

    .icon-btn {
      width: 42px;
      padding: 0;
    }

    .hero {
      display: grid;
      gap: 14px;
      padding: 20px;
      border-radius: var(--radius-xl);
      background:
        linear-gradient(135deg, rgba(22, 15, 11, 0.96) 0%, rgba(37, 23, 16, 0.94) 45%, rgba(68, 24, 33, 0.92) 100%),
        url("assets/pattern.webp") center / 520px auto;
      color: #fff8f0;
      box-shadow: 0 28px 56px rgba(17, 11, 8, 0.18);
      margin-bottom: 16px;
    }

    .hero h2 {
      margin: 0;
      font-size: clamp(1.65rem, 5vw, 3rem);
      letter-spacing: -0.05em;
      line-height: 0.98;
    }

    .metric-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .metric-card {
      padding: 14px;
      border-radius: 18px;
      background: rgba(255, 250, 244, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .metric-card span,
    .metric-card strong { display: block; }

    .metric-card span {
      margin-bottom: 6px;
      color: rgba(255, 248, 240, 0.68);
      font-size: 0.82rem;
      font-weight: 700;
    }

    .metric-card strong {
      font-size: 1.35rem;
      line-height: 1.05;
    }

    .admin-tabs {
      display: flex;
      gap: 10px;
      margin: 0 0 16px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    .admin-tab {
      min-height: 46px;
      padding: 0 18px;
      border: 1px solid rgba(113, 88, 60, 0.16);
      border-radius: 999px;
      background: rgba(255, 251, 245, 0.86);
      color: #2c2016;
      font: inherit;
      font-weight: 800;
      white-space: nowrap;
      box-shadow: 0 10px 22px rgba(32, 20, 13, 0.05);
    }

    .admin-tab.is-active {
      color: #fff;
      border-color: transparent;
      background: linear-gradient(135deg, var(--wine), #b9871f);
      box-shadow: 0 18px 30px rgba(123, 31, 47, 0.18);
    }

    .admin-section { display: none; }
    .admin-section.is-active { display: block; }

    .dashboard-grid {
      display: grid;
      gap: 16px;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: var(--radius-xl);
      background:
        linear-gradient(180deg, rgba(255, 252, 247, 0.97), rgba(248, 241, 231, 0.96)),
        url("assets/pattern.webp") center / 440px auto;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 18px 18px 0;
    }

    .panel-head h3 {
      margin: 0;
      font-size: 1.16rem;
      letter-spacing: -0.03em;
    }

    .panel-head span {
      color: var(--muted);
      font-size: 0.88rem;
      font-weight: 800;
    }

    .toolbar {
      display: grid;
      gap: 12px;
      padding: 16px 18px 0;
    }

    .field-grid {
      display: grid;
      gap: 12px;
    }

    .field {
      display: grid;
      gap: 8px;
    }

    .field label {
      color: #2b1e14;
      font-size: 0.9rem;
      font-weight: 800;
    }

    input,
    select,
    textarea {
      width: 100%;
      padding: 13px 14px;
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      background: var(--paper-strong);
      color: #1f1712;
      outline: none;
      appearance: none;
      -webkit-appearance: none;
    }

    textarea {
      min-height: 112px;
      resize: vertical;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: rgba(123, 31, 47, 0.38);
      box-shadow: 0 0 0 4px rgba(123, 31, 47, 0.1);
      background: #fff;
    }

    input[type="checkbox"] {
      width: 20px;
      height: 20px;
      padding: 0;
      appearance: auto;
      -webkit-appearance: checkbox;
    }

    .segmented {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    .chip-btn {
      min-height: 40px;
      padding: 0 14px;
      border: 1px solid rgba(113, 88, 60, 0.16);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.8);
      color: #2a1d14;
      font: inherit;
      font-weight: 800;
      white-space: nowrap;
    }

    .chip-btn.is-active {
      background: linear-gradient(135deg, rgba(123, 31, 47, 0.14), rgba(212, 175, 55, 0.16));
      border-color: rgba(123, 31, 47, 0.3);
      color: #6b2230;
    }

    .status-line {
      min-height: 22px;
      color: var(--muted);
      font-size: 0.9rem;
      font-weight: 800;
    }

    .status-line.is-error { color: #a01f38; }
    .status-line.is-success { color: #2f6f38; }

    .reservation-list,
    .menu-list,
    .sort-list {
      display: grid;
      gap: 12px;
      padding: 18px;
    }

    .reservation-card,
    .menu-card,
    .sort-row {
      border: 1px solid rgba(113, 88, 60, 0.13);
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.76);
      box-shadow: 0 8px 20px rgba(32, 20, 13, 0.04);
    }

    .reservation-card {
      display: grid;
      gap: 12px;
      padding: 16px;
    }

    .reservation-top,
    .menu-card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }

    .reservation-top h4,
    .menu-title h4 {
      margin: 0 0 4px;
      font-size: 1.12rem;
      letter-spacing: -0.03em;
    }

    .reservation-top p,
    .menu-title p {
      margin: 0;
      color: var(--muted);
      font-size: 0.92rem;
      font-weight: 800;
    }

    .badge-row {
      display: inline-flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 0 10px;
      border-radius: 999px;
      background: rgba(44, 33, 22, 0.1);
      color: #4f3823;
      font-size: 0.78rem;
      font-weight: 900;
      white-space: nowrap;
    }

    .status-badge.downtown { background: rgba(123, 31, 47, 0.12); color: #792133; }
    .status-badge.uptown { background: rgba(47, 115, 187, 0.12); color: #255b94; }
    .status-badge.active { background: rgba(84, 139, 42, 0.14); color: #3d6f21; }
    .status-badge.hidden { background: rgba(120, 113, 108, 0.14); color: #5b514b; }

    .reservation-meta {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .meta-box {
      min-width: 0;
      padding: 12px;
      border-radius: 14px;
      background: rgba(248, 242, 234, 0.74);
      border: 1px solid rgba(113, 88, 60, 0.1);
    }

    .meta-box span,
    .meta-box strong { display: block; }

    .meta-box span {
      margin-bottom: 3px;
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 800;
    }

    .meta-box strong {
      overflow-wrap: anywhere;
      font-size: 0.98rem;
    }

    .reservation-notes {
      color: #3d2f24;
      font-size: 0.94rem;
      font-weight: 700;
      line-height: 1.45;
    }

    .menu-card {
      display: grid;
      gap: 14px;
      padding: 14px;
    }

    .menu-card.is-hidden { opacity: 0.66; }

    .menu-card-body {
      display: grid;
      grid-template-columns: 82px minmax(0, 1fr);
      gap: 12px;
      align-items: center;
    }

    .menu-thumb {
      width: 82px;
      height: 82px;
      border-radius: 16px;
      object-fit: cover;
      background: rgba(222, 214, 204, 0.9);
      border: 1px solid rgba(113, 88, 60, 0.12);
    }

    .menu-detail {
      display: grid;
      gap: 8px;
      min-width: 0;
    }

    .menu-detail p {
      margin: 0;
      color: var(--muted);
      font-size: 0.9rem;
      font-weight: 700;
      overflow-wrap: anywhere;
    }

    .menu-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      flex-wrap: wrap;
    }

    .sort-row {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 12px;
      padding: 12px;
    }

    .sort-handle {
      min-width: 48px;
      min-height: 48px;
      border-radius: 14px;
      border: 1px solid rgba(113, 88, 60, 0.14);
      background: rgba(255, 251, 245, 0.88);
      color: #4b3828;
      font-weight: 900;
      touch-action: none;
    }

    .sort-row-title {
      min-width: 0;
    }

    .sort-row-title strong,
    .sort-row-title span { display: block; }

    .sort-row-title strong {
      overflow-wrap: anywhere;
      font-size: 0.98rem;
    }

    .sort-row-title span {
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 800;
    }

    .sort-actions {
      display: flex;
      gap: 6px;
    }

    .empty-state {
      padding: 28px 18px;
      color: var(--muted);
      text-align: center;
      font-weight: 900;
    }

    .auth-card {
      display: grid;
      gap: 14px;
      padding: 18px;
    }

    .workspace[hidden],
    .auth-card[hidden] { display: none; }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 80;
      display: none;
      align-items: flex-end;
      justify-content: center;
      padding: 18px 10px;
      background: rgba(18, 12, 8, 0.52);
    }

    .modal-backdrop.is-open { display: flex; }

    .modal {
      width: min(100%, 940px);
      max-height: min(92vh, 980px);
      overflow: auto;
      border-radius: 24px;
      background:
        linear-gradient(180deg, rgba(255, 252, 247, 0.99), rgba(248, 241, 231, 0.98)),
        url("assets/pattern.webp") center / 440px auto;
      box-shadow: 0 32px 72px rgba(11, 7, 5, 0.32);
    }

    .modal-head {
      position: sticky;
      top: 0;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 16px 18px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 252, 247, 0.96);
      backdrop-filter: blur(8px);
    }

    .modal-head h3 {
      margin: 0;
      font-size: 1.15rem;
    }

    .modal-form {
      display: grid;
      gap: 16px;
      padding: 18px;
    }

    .form-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .toggle-field {
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 48px;
      color: #2b1e14;
      font-weight: 900;
    }

    @media (min-width: 720px) {
      .field-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .field.full { grid-column: 1 / -1; }
      .menu-card {
        grid-template-columns: minmax(0, 1fr) auto;
        align-items: center;
      }
      .menu-card-body { grid-template-columns: 96px minmax(0, 1fr); }
      .menu-thumb { width: 96px; height: 96px; }
      .reservation-meta { grid-template-columns: repeat(4, minmax(0, 1fr)); }
      .modal-backdrop { align-items: center; }
    }

    @media (min-width: 980px) {
      .dashboard-grid { grid-template-columns: 0.88fr 1.12fr; align-items: start; }
      .metric-grid { grid-template-columns: repeat(4, minmax(0, 1fr)); }
      .toolbar .field-grid { grid-template-columns: 1.2fr 0.8fr 0.8fr; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div class="brand">
        <a class="logo-link" href="./index.html" aria-label="EHWA home">
          <img src="assets/logo-dark.webp" alt="EHWA logo" />
        </a>
        <div class="brand-copy">
          <p>EHWA Admin</p>
          <h1>Operations</h1>
        </div>
      </div>
      <a class="pill-btn" href="./modify.html">Modify</a>
    </header>

    <section class="hero">
      <h2 id="todayHeading">Today</h2>
      <div class="metric-grid">
        <div class="metric-card">
          <span>Selected Day</span>
          <strong id="metricSelectedDate">-</strong>
        </div>
        <div class="metric-card">
          <span>Reservations</span>
          <strong id="metricReservations">0</strong>
        </div>
        <div class="metric-card">
          <span>Downtown</span>
          <strong id="metricDowntown">0</strong>
        </div>
        <div class="metric-card">
          <span>Uptown</span>
          <strong id="metricUptown">0</strong>
        </div>
      </div>
    </section>

    <nav class="admin-tabs" aria-label="Admin sections">
      <button class="admin-tab is-active" data-admin-tab="menu" type="button">Menu Manager</button>
      <button class="admin-tab" data-admin-tab="reservations" type="button">Reservations</button>
    </nav>

    <main class="admin-section is-active" id="menuAdminPanel">
      <section class="panel">
        <div class="panel-head">
          <h3>Menu Manager</h3>
          <span id="menuSessionLabel">Sign in required</span>
        </div>

        <div class="auth-card" id="menuAuthCard">
          <div class="field-grid">
            <div class="field">
              <label for="menuAdminEmail">Email</label>
              <input id="menuAdminEmail" type="email" autocomplete="email" placeholder="Admin email" />
            </div>
            <div class="field">
              <label for="menuAdminPassword">Password</label>
              <input id="menuAdminPassword" type="password" autocomplete="current-password" placeholder="Password" />
            </div>
          </div>
          <div class="form-actions">
            <button class="pill-btn primary" id="menuSignInBtn" type="button">Sign In</button>
          </div>
          <div class="status-line" id="menuAuthStatus">Use your Supabase admin user.</div>
        </div>

        <div class="workspace" id="menuWorkspace" hidden>
          <div class="toolbar">
            <div class="field-grid">
              <div class="field">
                <label for="menuSearchInput">Search</label>
                <input id="menuSearchInput" type="search" placeholder="Name, category, tag, ingredient" />
              </div>
              <div class="field">
                <label for="menuCategoryFilter">Category</label>
                <select id="menuCategoryFilter"></select>
              </div>
              <div class="field">
                <label for="menuBranchFilter">Branch</label>
                <select id="menuBranchFilter">
                  <option value="all">All branches</option>
                  <option value="both">Both</option>
                  <option value="downtown">Downtown</option>
                  <option value="uptown">Uptown</option>
                </select>
              </div>
            </div>
            <div class="segmented">
              <button class="chip-btn" id="menuRefreshBtn" type="button">Refresh</button>
              <button class="chip-btn" id="menuAddBtn" type="button">Add Menu</button>
              <button class="chip-btn" id="menuSortModeBtn" type="button">Sort Mode</button>
              <button class="chip-btn" id="menuSaveSortBtn" type="button" hidden>Save Sort</button>
              <button class="chip-btn" id="menuSignOutBtn" type="button">Sign Out</button>
            </div>
            <div class="status-line" id="menuStatus"></div>
          </div>
          <div class="menu-list" id="menuList"></div>
        </div>
      </section>
    </main>

    <main class="admin-section" id="reservationsAdminPanel">
      <section class="panel">
        <div class="panel-head">
          <h3>Reservations</h3>
          <span id="reservationDateLabel">Loading</span>
        </div>
        <div class="toolbar">
          <div class="segmented" id="reservationDayChips"></div>
          <div class="field-grid">
            <div class="field">
              <label for="reservationSearchInput">Search</label>
              <input id="reservationSearchInput" type="search" placeholder="Name, phone, notes" />
            </div>
            <div class="field">
              <label for="reservationBranchFilter">Branch</label>
              <select id="reservationBranchFilter">
                <option value="all">Downtown + Uptown</option>
                <option value="downtown">Downtown</option>
                <option value="uptown">Uptown</option>
              </select>
            </div>
            <div class="field">
              <label>&nbsp;</label>
              <button class="pill-btn" id="reservationRefreshBtn" type="button">Refresh Reservations</button>
            </div>
          </div>
          <div class="status-line" id="reservationStatus"></div>
        </div>
        <div class="reservation-list" id="reservationList"></div>
      </section>
    </main>
  </div>

  <div class="modal-backdrop" id="menuEditorModal" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="menuEditorTitle">
      <div class="modal-head">
        <h3 id="menuEditorTitle">Edit Menu</h3>
        <button class="icon-btn" id="menuEditorClose" type="button" aria-label="Close">X</button>
      </div>
      <form class="modal-form" id="menuEditorForm">
        <input id="menuEditId" type="hidden" />
        <div class="field-grid">
          <div class="field">
            <label for="menuEditNameKo">Korean Name</label>
            <input id="menuEditNameKo" name="name_ko" type="text" />
          </div>
          <div class="field">
            <label for="menuEditNameEn">English Name</label>
            <input id="menuEditNameEn" name="name_en" type="text" />
          </div>
          <div class="field">
            <label for="menuEditRomanizedName">Romanized Name</label>
            <input id="menuEditRomanizedName" name="romanized_name" type="text" />
          </div>
          <div class="field">
            <label for="menuEditPrice">Price</label>
            <input id="menuEditPrice" name="price" type="number" min="0" step="0.01" inputmode="decimal" />
          </div>
          <div class="field">
            <label for="menuEditCategory">Category</label>
            <input id="menuEditCategory" name="category" type="text" list="menuCategoryOptions" />
          </div>
          <div class="field">
            <label for="menuEditLabel">Label</label>
            <input id="menuEditLabel" name="label" type="text" />
          </div>
          <div class="field">
            <label for="menuEditBranch">Branch</label>
            <select id="menuEditBranch" name="branches">
              <option value="both">Both</option>
              <option value="downtown">Downtown</option>
              <option value="uptown">Uptown</option>
            </select>
          </div>
          <div class="field">
            <label for="menuEditSortOrder">Sort Order</label>
            <input id="menuEditSortOrder" name="sort_order" type="number" inputmode="numeric" />
          </div>
          <div class="field full">
            <label for="menuEditDescription">Description</label>
            <textarea id="menuEditDescription" name="description"></textarea>
          </div>
          <div class="field full">
            <label for="menuEditImageUrl">Image URL</label>
            <input id="menuEditImageUrl" name="image_url" type="url" />
          </div>
          <div class="field">
            <label for="menuEditTags">Tags</label>
            <input id="menuEditTags" name="tags" type="text" placeholder="Popular, Spicy2" />
          </div>
          <div class="field">
            <label for="menuEditIngredient">Ingredient</label>
            <input id="menuEditIngredient" name="ingredient" type="text" placeholder="Pork, Seafood" />
          </div>
          <label class="toggle-field" for="menuEditAvailable">
            <input id="menuEditAvailable" name="is_available" type="checkbox" />
            Available on menu
          </label>
        </div>
        <datalist id="menuCategoryOptions"></datalist>
        <div class="form-actions">
          <button class="pill-btn danger" id="menuDeleteBtn" type="button">Delete</button>
          <button class="pill-btn" id="menuEditorCancel" type="button">Cancel</button>
          <button class="pill-btn primary" type="submit">Save Menu</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    const SUPABASE_CONFIG = {
      url: "https://pzhzdjsjfdzbzkhnaxmc.supabase.co",
      anonKey: "sb_publishable_3Ox2JIQXVLwusT-xzIMJ4g_YXTR5q8e"
    };

    const ADMIN_SHEET_CONFIG = {
      sheetId: "1xa9OZbctYnlbaAL8lKIgmefM5hvSw0Plk01lxp5G2fc",
      sheets: [
        { name: "Downtown Reservation", label: "Downtown", key: "downtown" },
        { name: "Uptown Reservation", label: "Uptown", key: "uptown" }
      ]
    };

    const CATEGORY_ORDER = [
      "Tteokbokki",
      "Soup",
      "Pasta",
      "Pancakes",
      "Meal",
      "Main Dish",
      "Light Dish",
      "Fried-Chicken",
      "Dessert",
      "Vegan",
      "Spicy",
      "Popular",
      "Drink"
    ];

    const MENU_SELECT = [
      "id",
      "branches",
      "sort_order",
      "category",
      "label",
      "name_ko",
      "romanized_name",
      "name_en",
      "description",
      "price",
      "image_url",
      "tags",
      "ingredient",
      "is_available"
    ].join(",");

    const supabaseClient = window.supabase?.createClient(SUPABASE_CONFIG.url, SUPABASE_CONFIG.anonKey);

    const state = {
      activeTab: "menu",
      menuSession: null,
      menuItems: [],
      menuCategory: "all",
      menuBranch: "all",
      menuSearch: "",
      menuSortMode: false,
      sortable: null,
      reservations: [],
      reservationDate: formatInputDate(new Date()),
      reservationBranch: "all",
      reservationSearch: ""
    };

    const refs = {};

    function cacheRefs() {
      [
        "todayHeading",
        "metricSelectedDate",
        "metricReservations",
        "metricDowntown",
        "metricUptown",
        "menuSessionLabel",
        "menuAuthCard",
        "menuWorkspace",
        "menuAdminEmail",
        "menuAdminPassword",
        "menuSignInBtn",
        "menuSignOutBtn",
        "menuAuthStatus",
        "menuStatus",
        "menuSearchInput",
        "menuCategoryFilter",
        "menuBranchFilter",
        "menuRefreshBtn",
        "menuAddBtn",
        "menuSortModeBtn",
        "menuSaveSortBtn",
        "menuList",
        "reservationDateLabel",
        "reservationDayChips",
        "reservationSearchInput",
        "reservationBranchFilter",
        "reservationRefreshBtn",
        "reservationStatus",
        "reservationList",
        "menuEditorModal",
        "menuEditorTitle",
        "menuEditorForm",
        "menuEditorClose",
        "menuEditorCancel",
        "menuDeleteBtn"
      ].forEach((id) => {
        refs[id] = document.getElementById(id);
      });
    }

    function escapeHtml(value = "") {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function formatInputDate(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function toSafeDate(dateString = "") {
      const match = String(dateString).trim().match(/^(\d{4})-(\d{2})-(\d{2})$/);
      if (match) {
        const [, year, month, day] = match;
        return new Date(Number(year), Number(month) - 1, Number(day));
      }
      const parsed = new Date(dateString);
      return Number.isNaN(parsed.getTime()) ? null : parsed;
    }

    function formatDateLabel(value = "") {
      if (value === "all") return "All Days";
      const date = toSafeDate(value);
      if (!date) return value || "No date";
      return new Intl.DateTimeFormat("en-US", {
        weekday: "short",
        month: "short",
        day: "numeric"
      }).format(date);
    }

    function parseTimeForSort(value = "") {
      const match = String(value).trim().match(/^(\d{1,2}):(\d{2})\s*(AM|PM)$/i);
      if (!match) return Number.MAX_SAFE_INTEGER;
      let hour = Number(match[1]);
      const minute = Number(match[2]);
      const meridiem = match[3].toUpperCase();
      if (meridiem === "PM" && hour !== 12) hour += 12;
      if (meridiem === "AM" && hour === 12) hour = 0;
      return hour * 60 + minute;
    }

    function parseGuestCount(value = "") {
      const count = Number.parseInt(String(value).replace(/\D/g, ""), 10);
      return Number.isFinite(count) ? count : 0;
    }

    function getCellText(cell) {
      if (!cell) return "";
      if (typeof cell.f === "string" && cell.f.trim()) return cell.f.trim();
      return (cell.v ?? "").toString().trim();
    }

    function parseGvizText(text = "") {
      return JSON.parse(
        text.replace("/*O_o*/", "").replace("google.visualization.Query.setResponse(", "").slice(0, -2)
      );
    }

    function normalizeReservation(cells = [], index = 0, sheetConfig) {
      const values = cells.map((cell) => getCellText(cell));
      return {
        rowNumber: index + 2,
        sheetName: sheetConfig.name,
        branch: sheetConfig.label,
        branchKey: sheetConfig.key,
        timestamp: values[0] || "",
        date: values[1] || "",
        time: values[2] || "",
        people: values[3] || "",
        name: values[4] || "",
        phone: values[5] || "",
        notes: values[6] || "",
        status: values[7] || "active"
      };
    }

    async function fetchReservations() {
      setReservationStatus("Loading reservations...");
      const groups = await Promise.all(
        ADMIN_SHEET_CONFIG.sheets.map(async (sheetConfig) => {
          const url = `https://docs.google.com/spreadsheets/d/${ADMIN_SHEET_CONFIG.sheetId}/gviz/tq?sheet=${encodeURIComponent(sheetConfig.name)}&tqx=out:json`;
          const response = await fetch(url);
          if (!response.ok) throw new Error(`Failed to fetch ${sheetConfig.label}`);
          const data = parseGvizText(await response.text());
          return (data.table?.rows || [])
            .map((row) => row.c || [])
            .map((cells, index) => normalizeReservation(cells, index, sheetConfig))
            .filter((item) => item.timestamp || item.date || item.name);
        })
      );

      state.reservations = groups.flat().sort((a, b) => {
        const dateA = toSafeDate(a.date);
        const dateB = toSafeDate(b.date);
        if (dateA && dateB && dateA.getTime() !== dateB.getTime()) return dateA - dateB;
        return parseTimeForSort(a.time) - parseTimeForSort(b.time);
      });
      renderReservations();
      setReservationStatus(`Loaded ${state.reservations.length} reservations.`, "success");
    }

    function getReservationDays() {
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      const days = [];
      for (let index = 0; index < 10; index += 1) {
        const date = new Date(today);
        date.setDate(today.getDate() + index);
        days.push(formatInputDate(date));
      }
      return days;
    }

    function renderReservationDayChips() {
      const days = getReservationDays();
      refs.reservationDayChips.innerHTML = [
        ...days.map((value) => {
          const date = toSafeDate(value);
          const label = new Intl.DateTimeFormat("en-US", { weekday: "short" }).format(date);
          const day = new Intl.DateTimeFormat("en-US", { month: "short", day: "numeric" }).format(date);
          return `<button class="chip-btn ${state.reservationDate === value ? "is-active" : ""}" data-reservation-date="${value}" type="button">${label} ${day}</button>`;
        }),
        `<button class="chip-btn ${state.reservationDate === "all" ? "is-active" : ""}" data-reservation-date="all" type="button">All Days</button>`
      ].join("");
    }

    function getVisibleReservations() {
      const query = state.reservationSearch.trim().toLowerCase();
      return state.reservations.filter((item) => {
        if (item.status === "removed") return false;
        if (state.reservationDate !== "all" && item.date !== state.reservationDate) return false;
        if (state.reservationBranch !== "all" && item.branchKey !== state.reservationBranch) return false;
        if (!query) return true;
        return [item.name, item.phone, item.notes, item.time, item.people, item.branch]
          .filter(Boolean)
          .some((value) => String(value).toLowerCase().includes(query));
      });
    }

    function renderReservationMetrics(items) {
      const downtown = items.filter((item) => item.branchKey === "downtown").length;
      const uptown = items.filter((item) => item.branchKey === "uptown").length;
      refs.metricSelectedDate.textContent = formatDateLabel(state.reservationDate);
      refs.metricReservations.textContent = String(items.length);
      refs.metricDowntown.textContent = String(downtown);
      refs.metricUptown.textContent = String(uptown);
      refs.reservationDateLabel.textContent = `${formatDateLabel(state.reservationDate)} / ${state.reservationBranch === "all" ? "All branches" : state.reservationBranch}`;
    }

    function renderReservationCard(item) {
      const large = parseGuestCount(item.people) >= 8;
      return `
        <article class="reservation-card">
          <div class="reservation-top">
            <div>
              <h4>${escapeHtml(item.name || "Guest")}</h4>
              <p>${escapeHtml(formatDateLabel(item.date))} / ${escapeHtml(item.time || "-")}</p>
            </div>
            <div class="badge-row">
              <span class="status-badge ${escapeHtml(item.branchKey)}">${escapeHtml(item.branch)}</span>
              ${large ? '<span class="status-badge active">Large Party</span>' : ""}
            </div>
          </div>
          <div class="reservation-meta">
            <div class="meta-box"><span>Guests</span><strong>${escapeHtml(item.people || "-")}</strong></div>
            <div class="meta-box"><span>Phone</span><strong>${escapeHtml(item.phone || "-")}</strong></div>
            <div class="meta-box"><span>Sheet</span><strong>${escapeHtml(item.sheetName || "-")}</strong></div>
            <div class="meta-box"><span>Row</span><strong>${escapeHtml(item.rowNumber || "-")}</strong></div>
          </div>
          <div class="reservation-notes">${escapeHtml(item.notes || "No notes")}</div>
        </article>
      `;
    }

    function renderReservations() {
      renderReservationDayChips();
      const items = getVisibleReservations();
      renderReservationMetrics(items);
      refs.reservationList.innerHTML = items.length
        ? items.map(renderReservationCard).join("")
        : '<div class="empty-state">No reservations in this view.</div>';
    }

    function setReservationStatus(message = "", type = "") {
      refs.reservationStatus.textContent = message;
      refs.reservationStatus.className = `status-line${type ? ` is-${type}` : ""}`;
    }

    function getCategoryOrder(category) {
      const index = CATEGORY_ORDER.indexOf(category);
      return index === -1 ? CATEGORY_ORDER.length + 1 : index;
    }

    function getCategories() {
      const set = new Set(state.menuItems.map((item) => item.category).filter(Boolean));
      return [...set].sort((a, b) => getCategoryOrder(a) - getCategoryOrder(b) || a.localeCompare(b));
    }

    function refreshCategoryControls() {
      const current = state.menuCategory;
      const categories = getCategories();
      const options = ['<option value="all">All categories</option>']
        .concat(categories.map((category) => `<option value="${escapeHtml(category)}">${escapeHtml(category)}</option>`));
      refs.menuCategoryFilter.innerHTML = options.join("");
      refs.menuCategoryFilter.value = categories.includes(current) ? current : "all";
      state.menuCategory = refs.menuCategoryFilter.value;
      document.getElementById("menuCategoryOptions").innerHTML = categories
        .map((category) => `<option value="${escapeHtml(category)}"></option>`)
        .join("");
    }

    function compareMenuItems(a, b) {
      if ((a.sort_order ?? Number.MAX_SAFE_INTEGER) !== (b.sort_order ?? Number.MAX_SAFE_INTEGER)) {
        return (a.sort_order ?? Number.MAX_SAFE_INTEGER) - (b.sort_order ?? Number.MAX_SAFE_INTEGER);
      }
      return Number(a.id || 0) - Number(b.id || 0);
    }

    function getVisibleMenuItems() {
      const query = state.menuSearch.trim().toLowerCase();
      return state.menuItems
        .filter((item) => {
          if (state.menuCategory !== "all" && item.category !== state.menuCategory) return false;
          if (state.menuBranch !== "all" && item.branches !== state.menuBranch) return false;
          if (!query) return true;
          return [
            item.category,
            item.label,
            item.name_ko,
            item.romanized_name,
            item.name_en,
            item.description,
            item.tags,
            item.ingredient,
            item.branches
          ].filter(Boolean).some((value) => String(value).toLowerCase().includes(query));
        })
        .sort((a, b) => {
          if (state.menuCategory === "all") {
            const categoryCompare = getCategoryOrder(a.category) - getCategoryOrder(b.category) || String(a.category || "").localeCompare(String(b.category || ""));
            if (categoryCompare) return categoryCompare;
          }
          return compareMenuItems(a, b);
        });
    }

    function renderMenuCard(item) {
      return `
        <article class="menu-card ${item.is_available === false ? "is-hidden" : ""}">
          <div class="menu-card-body">
            <img class="menu-thumb" src="${escapeHtml(item.image_url || "assets/edited/ehwa.png")}" alt="${escapeHtml(item.name_en || item.name_ko || "Menu image")}" loading="lazy" />
            <div class="menu-detail">
              <div class="menu-card-top">
                <div class="menu-title">
                  <h4>${escapeHtml(item.name_ko || item.name_en || "Untitled")}</h4>
                  <p>${escapeHtml(item.name_en || item.romanized_name || "")}</p>
                </div>
                <div class="badge-row">
                  <span class="status-badge">${escapeHtml(item.category || "No category")}</span>
                  <span class="status-badge ${item.is_available === false ? "hidden" : "active"}">${item.is_available === false ? "Hidden" : "Available"}</span>
                </div>
              </div>
              <p>${escapeHtml(item.description || "No description")}</p>
              <p>${escapeHtml(item.branches || "both")} / ${escapeHtml(item.label || "No label")} / sort ${escapeHtml(item.sort_order ?? "-")} / $${escapeHtml(item.price ?? "-")}</p>
            </div>
          </div>
          <div class="menu-actions">
            <button class="pill-btn primary" data-menu-edit="${escapeHtml(item.id)}" type="button">Edit</button>
          </div>
        </article>
      `;
    }

    function renderSortRow(item) {
      return `
        <article class="sort-row" data-menu-id="${escapeHtml(item.id)}">
          <button class="sort-handle" type="button" aria-label="Drag ${escapeHtml(item.name_en || item.name_ko || "menu item")}">Drag</button>
          <div class="sort-row-title">
            <strong>${escapeHtml(item.name_ko || item.name_en || "Untitled")}</strong>
            <span>${escapeHtml(item.name_en || "")} / current ${escapeHtml(item.sort_order ?? "-")}</span>
          </div>
          <div class="sort-actions">
            <button class="icon-btn" data-sort-move="up" type="button" aria-label="Move up">Up</button>
            <button class="icon-btn" data-sort-move="down" type="button" aria-label="Move down">Dn</button>
          </div>
        </article>
      `;
    }

    function renderMenu() {
      refreshCategoryControls();
      refs.menuSortModeBtn.classList.toggle("is-active", state.menuSortMode);
      refs.menuSaveSortBtn.hidden = !state.menuSortMode;
      const items = getVisibleMenuItems();
      if (state.sortable) {
        state.sortable.destroy();
        state.sortable = null;
      }

      if (state.menuSortMode) {
        if (state.menuCategory === "all") {
          refs.menuList.innerHTML = '<div class="empty-state">Choose one category before sorting.</div>';
          return;
        }
        refs.menuList.className = "sort-list";
        refs.menuList.innerHTML = items.length
          ? items.map(renderSortRow).join("")
          : '<div class="empty-state">No menu items in this sort view.</div>';
        if (window.Sortable && items.length) {
          state.sortable = window.Sortable.create(refs.menuList, {
            handle: ".sort-handle",
            animation: 160,
            forceFallback: true,
            scroll: true,
            bubbleScroll: true,
            scrollSensitivity: 90,
            scrollSpeed: 12
          });
        }
        return;
      }

      refs.menuList.className = "menu-list";
      refs.menuList.innerHTML = items.length
        ? items.map(renderMenuCard).join("")
        : '<div class="empty-state">No menu items match this view.</div>';
    }

    function setMenuStatus(message = "", type = "") {
      refs.menuStatus.textContent = message;
      refs.menuStatus.className = `status-line${type ? ` is-${type}` : ""}`;
    }

    function setMenuAuthStatus(message = "", type = "") {
      refs.menuAuthStatus.textContent = message;
      refs.menuAuthStatus.className = `status-line${type ? ` is-${type}` : ""}`;
    }

    function updateMenuAuthView() {
      const signedIn = Boolean(state.menuSession?.access_token);
      refs.menuAuthCard.hidden = signedIn;
      refs.menuWorkspace.hidden = !signedIn;
      refs.menuSessionLabel.textContent = signedIn ? state.menuSession.user?.email || "Signed in" : "Sign in required";
    }

    async function refreshMenuSession() {
      if (!supabaseClient) {
        setMenuAuthStatus("Supabase client could not load.", "error");
        return;
      }
      const { data, error } = await supabaseClient.auth.getSession();
      if (error) {
        setMenuAuthStatus(error.message, "error");
        return;
      }
      state.menuSession = data.session;
      updateMenuAuthView();
      if (state.menuSession && !state.menuItems.length) await fetchMenuItems();
    }

    async function signInMenuAdmin() {
      if (!supabaseClient) {
        setMenuAuthStatus("Supabase client could not load.", "error");
        return;
      }
      const email = refs.menuAdminEmail.value.trim();
      const password = refs.menuAdminPassword.value;
      if (!email || !password) {
        setMenuAuthStatus("Enter email and password.", "error");
        return;
      }
      setMenuAuthStatus("Signing in...");
      const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
      if (error) {
        setMenuAuthStatus(error.message, "error");
        return;
      }
      state.menuSession = data.session;
      refs.menuAdminPassword.value = "";
      setMenuAuthStatus("Signed in.", "success");
      updateMenuAuthView();
      await fetchMenuItems();
    }

    async function signOutMenuAdmin() {
      if (!supabaseClient) return;
      await supabaseClient.auth.signOut();
      state.menuSession = null;
      state.menuItems = [];
      updateMenuAuthView();
      renderMenu();
      setMenuStatus("");
    }

    async function fetchMenuItems() {
      if (!supabaseClient) return;
      setMenuStatus("Loading menu...");
      const { data, error } = await supabaseClient
        .from("menu_items")
        .select(MENU_SELECT)
        .order("category", { ascending: true })
        .order("sort_order", { ascending: true, nullsFirst: false })
        .order("id", { ascending: true });

      if (error) {
        setMenuStatus(error.message, "error");
        return;
      }

      state.menuItems = data || [];
      renderMenu();
      setMenuStatus(`Loaded ${state.menuItems.length} menu items.`, "success");
    }

    function getMenuById(id) {
      return state.menuItems.find((item) => String(item.id) === String(id));
    }

    function openMenuEditor(item = null) {
      const isNew = !item;
      refs.menuEditorTitle.textContent = isNew ? "Add Menu" : "Edit Menu";
      refs.menuEditorForm.reset();
      refs.menuEditId = document.getElementById("menuEditId");
      refs.menuEditId.value = item?.id ?? "";
      document.getElementById("menuEditNameKo").value = item?.name_ko ?? "";
      document.getElementById("menuEditNameEn").value = item?.name_en ?? "";
      document.getElementById("menuEditRomanizedName").value = item?.romanized_name ?? "";
      document.getElementById("menuEditPrice").value = item?.price ?? "";
      document.getElementById("menuEditCategory").value = item?.category ?? (state.menuCategory !== "all" ? state.menuCategory : "");
      document.getElementById("menuEditLabel").value = item?.label ?? "";
      document.getElementById("menuEditBranch").value = item?.branches ?? "both";
      document.getElementById("menuEditSortOrder").value = item?.sort_order ?? "";
      document.getElementById("menuEditDescription").value = item?.description ?? "";
      document.getElementById("menuEditImageUrl").value = item?.image_url ?? "";
      document.getElementById("menuEditTags").value = item?.tags ?? "";
      document.getElementById("menuEditIngredient").value = item?.ingredient ?? "";
      document.getElementById("menuEditAvailable").checked = item?.is_available !== false;
      refs.menuDeleteBtn.hidden = isNew;
      refs.menuEditorModal.classList.add("is-open");
      refs.menuEditorModal.setAttribute("aria-hidden", "false");
    }

    function closeMenuEditor() {
      refs.menuEditorModal.classList.remove("is-open");
      refs.menuEditorModal.setAttribute("aria-hidden", "true");
    }

    function nullableText(value) {
      const text = String(value ?? "").trim();
      return text || null;
    }

    function nullableNumber(value, integer = false) {
      const text = String(value ?? "").trim();
      if (!text) return null;
      const parsed = integer ? Number.parseInt(text, 10) : Number.parseFloat(text);
      return Number.isFinite(parsed) ? parsed : null;
    }

    function readMenuEditorPayload() {
      return {
        name_ko: nullableText(document.getElementById("menuEditNameKo").value),
        name_en: nullableText(document.getElementById("menuEditNameEn").value),
        romanized_name: nullableText(document.getElementById("menuEditRomanizedName").value),
        price: nullableNumber(document.getElementById("menuEditPrice").value),
        category: nullableText(document.getElementById("menuEditCategory").value),
        label: nullableText(document.getElementById("menuEditLabel").value),
        branches: document.getElementById("menuEditBranch").value,
        sort_order: nullableNumber(document.getElementById("menuEditSortOrder").value, true),
        description: nullableText(document.getElementById("menuEditDescription").value),
        image_url: nullableText(document.getElementById("menuEditImageUrl").value),
        tags: nullableText(document.getElementById("menuEditTags").value),
        ingredient: nullableText(document.getElementById("menuEditIngredient").value),
        is_available: document.getElementById("menuEditAvailable").checked
      };
    }

    async function saveMenuEditor(event) {
      event.preventDefault();
      if (!supabaseClient || !state.menuSession) {
        setMenuStatus("Sign in before saving.", "error");
        return;
      }
      const id = document.getElementById("menuEditId").value;
      const payload = readMenuEditorPayload();
      if (!payload.name_ko && !payload.name_en) {
        setMenuStatus("Menu name is required.", "error");
        return;
      }
      if (!payload.category) {
        setMenuStatus("Category is required.", "error");
        return;
      }

      setMenuStatus("Saving menu...");
      const query = id
        ? supabaseClient.from("menu_items").update(payload).eq("id", id)
        : supabaseClient.from("menu_items").insert(payload);
      const { data, error } = await query.select(MENU_SELECT).single();
      if (error) {
        setMenuStatus(error.message, "error");
        return;
      }
      if (id) {
        state.menuItems = state.menuItems.map((item) => String(item.id) === String(id) ? data : item);
      } else {
        state.menuItems = [...state.menuItems, data];
      }
      closeMenuEditor();
      renderMenu();
      setMenuStatus("Menu saved.", "success");
    }

    async function deleteMenuItem() {
      const id = document.getElementById("menuEditId").value;
      if (!id || !supabaseClient || !state.menuSession) return;
      const item = getMenuById(id);
      const ok = window.confirm(`Delete ${item?.name_en || item?.name_ko || "this menu item"}?`);
      if (!ok) return;
      setMenuStatus("Deleting menu...");
      const { error } = await supabaseClient.from("menu_items").delete().eq("id", id);
      if (error) {
        setMenuStatus(error.message, "error");
        return;
      }
      state.menuItems = state.menuItems.filter((menuItem) => String(menuItem.id) !== String(id));
      closeMenuEditor();
      renderMenu();
      setMenuStatus("Menu deleted.", "success");
    }

    function moveSortRow(button, direction) {
      const row = button.closest(".sort-row");
      if (!row) return;
      if (direction === "up" && row.previousElementSibling) {
        row.parentElement.insertBefore(row, row.previousElementSibling);
      }
      if (direction === "down" && row.nextElementSibling) {
        row.parentElement.insertBefore(row.nextElementSibling, row);
      }
    }

    function getSortBaseForCategory(category) {
      const categories = getCategories();
      const index = Math.max(categories.indexOf(category), 0);
      return (index + 1) * 1000;
    }

    async function saveSortOrder() {
      if (!supabaseClient || !state.menuSession) {
        setMenuStatus("Sign in before saving sort.", "error");
        return;
      }
      if (state.menuCategory === "all") {
        setMenuStatus("Choose a category before saving sort.", "error");
        return;
      }
      const rows = [...refs.menuList.querySelectorAll(".sort-row")];
      if (!rows.length) return;
      const base = getSortBaseForCategory(state.menuCategory);
      const updates = rows.map((row, index) => ({
        id: row.dataset.menuId,
        sort_order: base + (index + 1) * 10
      }));
      setMenuStatus("Saving sort order...");
      const results = await Promise.all(
        updates.map((item) => supabaseClient
          .from("menu_items")
          .update({ sort_order: item.sort_order })
          .eq("id", item.id)
          .select(MENU_SELECT)
          .single())
      );
      const failed = results.find((result) => result.error);
      if (failed) {
        setMenuStatus(failed.error.message, "error");
        return;
      }
      const byId = new Map(results.map((result) => [String(result.data.id), result.data]));
      state.menuItems = state.menuItems.map((item) => byId.get(String(item.id)) || item);
      renderMenu();
      setMenuStatus("Sort order saved.", "success");
    }

    function setActiveTab(tabName) {
      state.activeTab = tabName;
      document.querySelectorAll("[data-admin-tab]").forEach((button) => {
        button.classList.toggle("is-active", button.dataset.adminTab === tabName);
      });
      document.getElementById("menuAdminPanel").classList.toggle("is-active", tabName === "menu");
      document.getElementById("reservationsAdminPanel").classList.toggle("is-active", tabName === "reservations");
      if (tabName === "menu") void refreshMenuSession();
      if (tabName === "reservations" && !state.reservations.length) void fetchReservations();
    }

    function bindEvents() {
      document.querySelectorAll("[data-admin-tab]").forEach((button) => {
        button.addEventListener("click", () => setActiveTab(button.dataset.adminTab || "menu"));
      });

      refs.menuSignInBtn.addEventListener("click", () => void signInMenuAdmin());
      refs.menuAdminPassword.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
          event.preventDefault();
          void signInMenuAdmin();
        }
      });
      refs.menuSignOutBtn.addEventListener("click", () => void signOutMenuAdmin());
      refs.menuRefreshBtn.addEventListener("click", () => void fetchMenuItems());
      refs.menuAddBtn.addEventListener("click", () => openMenuEditor());
      refs.menuSortModeBtn.addEventListener("click", () => {
        state.menuSortMode = !state.menuSortMode;
        renderMenu();
      });
      refs.menuSaveSortBtn.addEventListener("click", () => void saveSortOrder());
      refs.menuSearchInput.addEventListener("input", (event) => {
        state.menuSearch = event.target.value;
        renderMenu();
      });
      refs.menuCategoryFilter.addEventListener("change", (event) => {
        state.menuCategory = event.target.value;
        renderMenu();
      });
      refs.menuBranchFilter.addEventListener("change", (event) => {
        state.menuBranch = event.target.value;
        renderMenu();
      });
      refs.menuList.addEventListener("click", (event) => {
        const editButton = event.target.closest("[data-menu-edit]");
        if (editButton) {
          openMenuEditor(getMenuById(editButton.dataset.menuEdit));
          return;
        }
        const moveButton = event.target.closest("[data-sort-move]");
        if (moveButton) moveSortRow(moveButton, moveButton.dataset.sortMove);
      });
      refs.menuEditorForm.addEventListener("submit", (event) => void saveMenuEditor(event));
      refs.menuDeleteBtn.addEventListener("click", () => void deleteMenuItem());
      refs.menuEditorClose.addEventListener("click", closeMenuEditor);
      refs.menuEditorCancel.addEventListener("click", closeMenuEditor);
      refs.menuEditorModal.addEventListener("click", (event) => {
        if (event.target === refs.menuEditorModal) closeMenuEditor();
      });

      refs.reservationDayChips.addEventListener("click", (event) => {
        const button = event.target.closest("[data-reservation-date]");
        if (!button) return;
        state.reservationDate = button.dataset.reservationDate;
        renderReservations();
      });
      refs.reservationSearchInput.addEventListener("input", (event) => {
        state.reservationSearch = event.target.value;
        renderReservations();
      });
      refs.reservationBranchFilter.addEventListener("change", (event) => {
        state.reservationBranch = event.target.value;
        renderReservations();
      });
      refs.reservationRefreshBtn.addEventListener("click", () => void fetchReservations());

      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape" && refs.menuEditorModal.classList.contains("is-open")) {
          closeMenuEditor();
        }
      });
    }

    function bootstrap() {
      cacheRefs();
      refs.todayHeading.textContent = new Intl.DateTimeFormat("en-US", {
        weekday: "long",
        month: "long",
        day: "numeric",
        year: "numeric"
      }).format(new Date());
      bindEvents();
      renderReservationDayChips();
      renderReservationMetrics([]);
      updateMenuAuthView();
      if (supabaseClient) {
        supabaseClient.auth.onAuthStateChange((_event, session) => {
          state.menuSession = session;
          updateMenuAuthView();
        });
        void refreshMenuSession();
      } else {
        setMenuAuthStatus("Supabase client could not load.", "error");
      }
      void fetchReservations();
    }

    bootstrap();
  </script>
</body>
</html>
