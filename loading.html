<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#f5efe4" />
  <title>EHWA | Menu Loading</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&family=Noto+Serif+KR:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/loading.css" />
</head>
<body class="loading-page">
  <main class="loading-shell" aria-label="EHWA 메뉴 로딩">
    <section class="loading-card">
      <div class="brand-mark" aria-label="EHWA 로고">
        <img src="assets/logo-dark.webp" alt="EHWA" />
      </div>

      <article class="promo-card" aria-live="polite">
        <p class="promo-card__title" data-promo-title>술 시키면 기본안주로 이거 줍니다</p>
      </article>

      <div class="loading-status" aria-label="메뉴를 불러오는 중">
        <span class="loading-status__dots" aria-hidden="true"><i></i><i></i><i></i></span>
      </div>
      <div class="progress-track" aria-hidden="true"><span class="progress-bar"></span></div>
    </section>
  </main>

  <script>
    (() => {
      const promos = [
        {
          title: "술 시키면 기본안주로 이거 줍니다"
        },
        {
          title: "QR로 해당 지역 노래를 바꿀 수 있습니다"
        }
      ];

      const promo = promos[Math.floor(Math.random() * promos.length)];
      document.querySelector("[data-promo-title]").textContent = promo.title;
    })();
  </script>
</body>
</html>
