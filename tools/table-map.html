<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EHWA Table Map Prototype</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --ink: #221713;
      --muted: #78695d;
      --wine: #7b1f2f;
      --gold: #d4af37;
      --paper: #fff9ef;
      --line: rgba(101, 78, 55, 0.16);
      --shadow: 0 24px 56px rgba(25, 15, 10, 0.18);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: #fff5e8;
      font-family: "Noto Sans KR", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 12% 10%, rgba(212, 175, 55, 0.16), transparent 30%),
        radial-gradient(circle at 86% 18%, rgba(123, 31, 47, 0.22), transparent 28%),
        linear-gradient(180deg, #120d0a 0%, #21140f 54%, #2b1711 100%);
    }

    button {
      font: inherit;
    }

    .shell {
      width: min(100% - 24px, 1180px);
      margin: 0 auto;
      padding: 22px 0 44px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
    }

    .brand {
      min-width: 0;
    }

    .brand span {
      display: block;
      margin-bottom: 4px;
      color: #e4bd68;
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .brand h1 {
      margin: 0;
      font-size: clamp(1.65rem, 4vw, 2.7rem);
      letter-spacing: 0;
      line-height: 1;
    }

    .branch-switch {
      display: inline-grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 4px;
      padding: 4px;
      border: 1px solid rgba(255, 235, 198, 0.22);
      border-radius: 999px;
      background: rgba(255, 248, 238, 0.1);
    }

    .branch-switch button {
      min-height: 38px;
      padding: 0 14px;
      border: 0;
      border-radius: 999px;
      color: rgba(255, 247, 235, 0.78);
      background: transparent;
      font-weight: 800;
      cursor: pointer;
    }

    .branch-switch button.is-active {
      color: #2b180f;
      background: linear-gradient(135deg, #f2d894, #fff7df);
      box-shadow: 0 10px 22px rgba(0, 0, 0, 0.18);
    }

    .workspace {
      display: grid;
      gap: 16px;
    }

    .map-panel,
    .side-panel {
      border: 1px solid rgba(255, 230, 188, 0.16);
      border-radius: 24px;
      background:
        linear-gradient(180deg, rgba(255, 251, 244, 0.98), rgba(247, 238, 226, 0.98));
      color: var(--ink);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 18px 18px 12px;
      border-bottom: 1px solid var(--line);
    }

    .panel-head h2,
    .panel-head h3 {
      margin: 0;
      font-size: 1.08rem;
      letter-spacing: 0;
    }

    .panel-head span {
      color: var(--muted);
      font-size: 0.84rem;
      font-weight: 700;
    }

    .floor-wrap {
      padding: 16px;
      overflow: auto;
      -webkit-overflow-scrolling: touch;
    }

    .floor {
      position: relative;
      width: min(100%, 900px);
      min-width: 680px;
      aspect-ratio: 9 / 6;
      margin: 0 auto;
      border: 2px solid rgba(86, 62, 42, 0.22);
      border-radius: 18px;
      background:
        linear-gradient(90deg, rgba(82, 62, 40, 0.08) 1px, transparent 1px),
        linear-gradient(180deg, rgba(82, 62, 40, 0.08) 1px, transparent 1px),
        linear-gradient(180deg, #fffaf2, #f3e6d4);
      background-size: 36px 36px, 36px 36px, auto;
      touch-action: none;
      user-select: none;
    }

    .zone {
      position: absolute;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px dashed rgba(83, 62, 42, 0.22);
      border-radius: 14px;
      color: rgba(63, 44, 30, 0.52);
      font-size: 0.72rem;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      pointer-events: none;
    }

    .zone.bar { left: 3%; top: 6%; width: 16%; height: 88%; }
    .zone.entry { right: 3%; bottom: 5%; width: 18%; height: 18%; }
    .zone.window { left: 24%; top: 5%; width: 48%; height: 12%; }

    .table {
      position: absolute;
      display: grid;
      place-items: center;
      width: var(--w);
      height: var(--h);
      left: var(--x);
      top: var(--y);
      border: 2px solid rgba(69, 48, 32, 0.18);
      border-radius: 12px;
      color: #2b1a11;
      background: linear-gradient(180deg, #ffffff, #ead9c4);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.8),
        0 12px 22px rgba(58, 38, 21, 0.12);
      font-size: clamp(0.74rem, 1.2vw, 0.98rem);
      font-weight: 900;
      cursor: pointer;
      transition: transform 0.12s ease, border-color 0.12s ease, background 0.12s ease, box-shadow 0.12s ease;
    }

    .table.round {
      border-radius: 999px;
    }

    .table.booth {
      border-radius: 18px;
      background: linear-gradient(180deg, #fff7e5, #e7c47a);
    }

    .table.is-selected {
      z-index: 4;
      border-color: rgba(123, 31, 47, 0.82);
      background: linear-gradient(135deg, #7b1f2f, #c7982d);
      color: #fffaf0;
      box-shadow: 0 18px 30px rgba(123, 31, 47, 0.28);
      transform: translateY(-2px);
    }

    .table.is-drag-hit:not(.is-selected) {
      border-color: rgba(212, 175, 55, 0.86);
      background: linear-gradient(180deg, #fff5d1, #efcf78);
    }

    .table small {
      display: block;
      margin-top: 2px;
      font-size: 0.62rem;
      font-weight: 800;
      opacity: 0.68;
    }

    .selection-box {
      position: absolute;
      z-index: 3;
      display: none;
      border: 2px solid rgba(123, 31, 47, 0.72);
      border-radius: 10px;
      background: rgba(123, 31, 47, 0.12);
      pointer-events: none;
    }

    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      padding: 0 18px 18px;
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 700;
    }

    .legend span {
      display: inline-flex;
      align-items: center;
      gap: 7px;
    }

    .legend span::before {
      content: "";
      width: 14px;
      height: 14px;
      border-radius: 4px;
      border: 1px solid rgba(69, 48, 32, 0.2);
      background: #fff;
    }

    .legend .selected::before {
      border-color: #7b1f2f;
      background: linear-gradient(135deg, #7b1f2f, #c7982d);
    }

    .side-panel {
      display: grid;
      align-content: start;
    }

    .selection-summary {
      display: grid;
      gap: 14px;
      padding: 18px;
    }

    .summary-box {
      display: grid;
      gap: 8px;
      padding: 15px;
      border: 1px solid rgba(113, 88, 60, 0.13);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.62);
    }

    .summary-box span {
      color: var(--muted);
      font-size: 0.72rem;
      font-weight: 900;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .summary-box strong {
      font-size: 1.6rem;
      line-height: 1;
    }

    .selected-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      min-height: 40px;
    }

    .selected-chip {
      display: inline-flex;
      align-items: center;
      min-height: 36px;
      padding: 0 12px;
      border-radius: 999px;
      color: #fffaf0;
      background: linear-gradient(135deg, var(--wine), #b9871f);
      font-size: 0.9rem;
      font-weight: 800;
    }

    .empty {
      color: var(--muted);
      font-size: 0.92rem;
      font-weight: 700;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .action {
      min-height: 44px;
      border: 0;
      border-radius: 14px;
      font-weight: 800;
      cursor: pointer;
    }

    .action.primary {
      color: #fff;
      background: linear-gradient(135deg, var(--wine), #b9871f);
    }

    .action.light {
      color: #342216;
      border: 1px solid rgba(113, 88, 60, 0.12);
      background: rgba(255, 255, 255, 0.76);
    }

    .payload {
      margin: 0;
      padding: 14px;
      border-radius: 14px;
      color: #3b2a1e;
      background: rgba(255, 255, 255, 0.68);
      border: 1px solid rgba(113, 88, 60, 0.12);
      overflow: auto;
      font-size: 0.82rem;
      line-height: 1.55;
      white-space: pre-wrap;
    }

    @media (max-width: 720px) {
      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .branch-switch {
        width: 100%;
      }

      .floor-wrap {
        padding: 12px;
      }

      .floor {
        min-width: 620px;
      }
    }

    @media (min-width: 980px) {
      .workspace {
        grid-template-columns: minmax(0, 1fr) 320px;
        align-items: start;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div class="brand">
        <span>Reservation Tool Prototype</span>
        <h1>Table Map</h1>
      </div>
      <div class="branch-switch" aria-label="Choose branch">
        <button class="is-active" type="button" data-branch="uptown">Uptown</button>
        <button type="button" data-branch="downtown">Downtown</button>
      </div>
    </header>

    <main class="workspace">
      <section class="map-panel">
        <div class="panel-head">
          <div>
            <h2 id="mapTitle">Uptown Floor</h2>
            <span>Click tables, or drag across the floor to select a group.</span>
          </div>
          <span id="tableCount">0 tables</span>
        </div>
        <div class="floor-wrap">
          <div class="floor" id="floorMap" aria-label="Table map">
            <div class="zone bar">Bar</div>
            <div class="zone window">Window</div>
            <div class="zone entry">Entry</div>
            <div class="selection-box" id="selectionBox"></div>
          </div>
        </div>
        <div class="legend">
          <span>Available</span>
          <span class="selected">Selected</span>
        </div>
      </section>

      <aside class="side-panel">
        <div class="panel-head">
          <h3>Selection</h3>
          <span id="selectionCount">0 selected</span>
        </div>
        <div class="selection-summary">
          <div class="summary-box">
            <span>Tables</span>
            <strong id="selectedNames">-</strong>
          </div>
          <div class="summary-box">
            <span>Seats</span>
            <strong id="selectedSeats">0</strong>
          </div>
          <div class="selected-list" id="selectedList">
            <div class="empty">No tables selected</div>
          </div>
          <div class="actions">
            <button class="action light" id="clearSelection" type="button">Clear</button>
            <button class="action primary" id="mockAssign" type="button">Mock Assign</button>
          </div>
          <pre class="payload" id="payloadPreview">tables: []</pre>
        </div>
      </aside>
    </main>
  </div>

  <script>
    const maps = {
      uptown: [
        { id: "B1", seats: 2, x: 5, y: 14, w: 10, h: 9, shape: "booth" },
        { id: "B2", seats: 2, x: 5, y: 29, w: 10, h: 9, shape: "booth" },
        { id: "B3", seats: 2, x: 5, y: 44, w: 10, h: 9, shape: "booth" },
        { id: "B4", seats: 2, x: 5, y: 59, w: 10, h: 9, shape: "booth" },
        { id: "T1", seats: 4, x: 25, y: 23, w: 11, h: 11, shape: "round" },
        { id: "T2", seats: 4, x: 42, y: 23, w: 11, h: 11, shape: "round" },
        { id: "T3", seats: 4, x: 59, y: 23, w: 11, h: 11, shape: "round" },
        { id: "T4", seats: 4, x: 25, y: 46, w: 12, h: 10 },
        { id: "T5", seats: 4, x: 44, y: 46, w: 12, h: 10 },
        { id: "T6", seats: 6, x: 63, y: 44, w: 15, h: 12 },
        { id: "P1", seats: 6, x: 27, y: 72, w: 16, h: 11 },
        { id: "P2", seats: 8, x: 52, y: 70, w: 19, h: 12 }
      ],
      downtown: [
        { id: "A1", seats: 2, x: 6, y: 16, w: 10, h: 9, shape: "booth" },
        { id: "A2", seats: 2, x: 6, y: 31, w: 10, h: 9, shape: "booth" },
        { id: "A3", seats: 2, x: 6, y: 46, w: 10, h: 9, shape: "booth" },
        { id: "T1", seats: 4, x: 25, y: 18, w: 12, h: 10 },
        { id: "T2", seats: 4, x: 43, y: 18, w: 12, h: 10 },
        { id: "T3", seats: 4, x: 61, y: 18, w: 12, h: 10 },
        { id: "T4", seats: 4, x: 25, y: 41, w: 11, h: 11, shape: "round" },
        { id: "T5", seats: 4, x: 43, y: 41, w: 11, h: 11, shape: "round" },
        { id: "T6", seats: 4, x: 61, y: 41, w: 11, h: 11, shape: "round" },
        { id: "G1", seats: 8, x: 28, y: 70, w: 20, h: 12 },
        { id: "G2", seats: 10, x: 56, y: 68, w: 23, h: 13 }
      ]
    };

    const state = {
      branch: "uptown",
      selected: new Set(),
      drag: null
    };

    const floorMap = document.getElementById("floorMap");
    const selectionBox = document.getElementById("selectionBox");
    const tableCount = document.getElementById("tableCount");
    const mapTitle = document.getElementById("mapTitle");
    const selectionCount = document.getElementById("selectionCount");
    const selectedNames = document.getElementById("selectedNames");
    const selectedSeats = document.getElementById("selectedSeats");
    const selectedList = document.getElementById("selectedList");
    const payloadPreview = document.getElementById("payloadPreview");

    function getTables() {
      return maps[state.branch] || [];
    }

    function renderMap() {
      floorMap.querySelectorAll(".table").forEach((node) => node.remove());
      getTables().forEach((table) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = `table ${table.shape || ""}`.trim();
        button.dataset.tableId = table.id;
        button.style.setProperty("--x", `${table.x}%`);
        button.style.setProperty("--y", `${table.y}%`);
        button.style.setProperty("--w", `${table.w}%`);
        button.style.setProperty("--h", `${table.h}%`);
        button.innerHTML = `${table.id}<small>${table.seats} seats</small>`;
        button.addEventListener("click", (event) => {
          if (state.drag?.moved) return;
          event.stopPropagation();
          toggleTable(table.id);
        });
        floorMap.appendChild(button);
      });
      mapTitle.textContent = `${state.branch === "uptown" ? "Uptown" : "Downtown"} Floor`;
      tableCount.textContent = `${getTables().length} tables`;
      renderSelection();
    }

    function renderSelection() {
      const tables = getTables();
      const selectedTables = tables.filter((table) => state.selected.has(table.id));
      const selectedIds = selectedTables.map((table) => table.id);
      const seats = selectedTables.reduce((total, table) => total + table.seats, 0);

      document.querySelectorAll(".table").forEach((node) => {
        node.classList.toggle("is-selected", state.selected.has(node.dataset.tableId));
      });

      selectionCount.textContent = `${selectedTables.length} selected`;
      selectedNames.textContent = selectedIds.length ? selectedIds.join(", ") : "-";
      selectedSeats.textContent = String(seats);
      selectedList.innerHTML = selectedIds.length
        ? selectedIds.map((id) => `<span class="selected-chip">${id}</span>`).join("")
        : '<div class="empty">No tables selected</div>';
      payloadPreview.textContent = JSON.stringify({
        branch: state.branch,
        tables: selectedIds,
        seats
      }, null, 2);
    }

    function toggleTable(id) {
      if (state.selected.has(id)) {
        state.selected.delete(id);
      } else {
        state.selected.add(id);
      }
      renderSelection();
    }

    function floorPoint(event) {
      const rect = floorMap.getBoundingClientRect();
      return {
        x: event.clientX - rect.left,
        y: event.clientY - rect.top
      };
    }

    function normalizeBox(start, current) {
      const left = Math.min(start.x, current.x);
      const top = Math.min(start.y, current.y);
      const width = Math.abs(current.x - start.x);
      const height = Math.abs(current.y - start.y);
      return { left, top, width, height, right: left + width, bottom: top + height };
    }

    function intersects(a, b) {
      return a.left < b.right && a.right > b.left && a.top < b.bottom && a.bottom > b.top;
    }

    function updateDragHits(box) {
      const floorRect = floorMap.getBoundingClientRect();
      document.querySelectorAll(".table").forEach((node) => {
        const rect = node.getBoundingClientRect();
        const localRect = {
          left: rect.left - floorRect.left,
          top: rect.top - floorRect.top,
          right: rect.right - floorRect.left,
          bottom: rect.bottom - floorRect.top
        };
        node.classList.toggle("is-drag-hit", intersects(box, localRect));
      });
    }

    floorMap.addEventListener("pointerdown", (event) => {
      if (event.target.closest(".table")) return;
      floorMap.setPointerCapture(event.pointerId);
      const start = floorPoint(event);
      state.drag = { start, current: start, moved: false };
      selectionBox.style.display = "block";
      selectionBox.style.left = `${start.x}px`;
      selectionBox.style.top = `${start.y}px`;
      selectionBox.style.width = "0px";
      selectionBox.style.height = "0px";
    });

    floorMap.addEventListener("pointermove", (event) => {
      if (!state.drag) return;
      const current = floorPoint(event);
      const box = normalizeBox(state.drag.start, current);
      state.drag.current = current;
      state.drag.moved = box.width > 6 || box.height > 6;
      selectionBox.style.left = `${box.left}px`;
      selectionBox.style.top = `${box.top}px`;
      selectionBox.style.width = `${box.width}px`;
      selectionBox.style.height = `${box.height}px`;
      updateDragHits(box);
    });

    floorMap.addEventListener("pointerup", () => {
      if (!state.drag) return;
      const box = normalizeBox(state.drag.start, state.drag.current);
      if (state.drag.moved) {
        document.querySelectorAll(".table.is-drag-hit").forEach((node) => {
          state.selected.add(node.dataset.tableId);
        });
      }
      document.querySelectorAll(".table.is-drag-hit").forEach((node) => {
        node.classList.remove("is-drag-hit");
      });
      selectionBox.style.display = "none";
      state.drag = null;
      renderSelection();
    });

    floorMap.addEventListener("pointercancel", () => {
      document.querySelectorAll(".table.is-drag-hit").forEach((node) => {
        node.classList.remove("is-drag-hit");
      });
      selectionBox.style.display = "none";
      state.drag = null;
    });

    document.querySelectorAll("[data-branch]").forEach((button) => {
      button.addEventListener("click", () => {
        state.branch = button.dataset.branch;
        state.selected.clear();
        document.querySelectorAll("[data-branch]").forEach((item) => {
          item.classList.toggle("is-active", item === button);
        });
        renderMap();
      });
    });

    document.getElementById("clearSelection").addEventListener("click", () => {
      state.selected.clear();
      renderSelection();
    });

    document.getElementById("mockAssign").addEventListener("click", () => {
      payloadPreview.animate(
        [
          { transform: "scale(1)", backgroundColor: "rgba(255, 255, 255, 0.68)" },
          { transform: "scale(1.018)", backgroundColor: "rgba(255, 232, 166, 0.72)" },
          { transform: "scale(1)", backgroundColor: "rgba(255, 255, 255, 0.68)" }
        ],
        { duration: 420, easing: "ease-out" }
      );
    });

    renderMap();
  </script>
</body>
</html>
