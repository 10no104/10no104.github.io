<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Menu Downtown</title>
    <link rel="stylesheet" href="../../css/global.css" />
  <link rel="stylesheet" href="../../css/layout.css" />
  <link rel="stylesheet" href="../../css/components.css" />
</head>
<body class="menu-page">
  <main class="wrap">
    <section class="tabs" aria-label="Categories" id="tabs"></section>
    <section class="subtabs-wrap hidden" id="subtabsWrap">
      <p class="subtabs-context" id="subtabsContext"></p>
      <section class="subtabs" aria-label="Subcategories" id="subtabs"></section>
    </section>
    <section class="menu-list menu-grid" id="menuList"></section>
  </main>
  <button class="to-top" id="toTopBtn" type="button" aria-label="Back to top">↑ Top</button>

  <script>
    /**
     * [Google Sheet 컬럼 순서]
     * category | label | nameKo | nameEn | description | price | imageUrl | tags
     *
     * tags 예시:
     * 🌶️ Spicy|red, 🌱 Vegan|green, ⭐ Popular|yellow, 🐟 Seafood|blue
     */
    const SHEET_CONFIG = {
      sheetId: "1xa9OZbctYnlbaAL8lKIgmefM5hvSw0Plk01lxp5G2fc",
      gid: "0"
    };

    const SAMPLE_MENU = [
      {
        category: "Appetizers",
        label: "Fried",
        nameKo: "매콤 콜리플라워",
        nameEn: "Spicy Fried Cauliflower",
        description: "Crispy fried cauliflower tossed in a spicy sauce.",
        price: "$12",
        imageUrl: "https://images.unsplash.com/photo-1562967914-608f82629710?auto=format&fit=crop&w=500&q=80",
        tags: [
          { label: "🌶️ Spicy", color: "red" },
          { label: "🌱 Vegan", color: "green" },
          { label: "⭐ Popular", color: "yellow" }
        ]
      },
      {
        category: "Mains",
        label: "Stir-fried",
        nameKo: "해물김치 볶음밥",
        nameEn: "Seafood Kimchi Fried Rice",
        description: "Fried rice stir-fried with seafood and spicy kimchi.",
        price: "$15",
        imageUrl: "https://images.unsplash.com/photo-1512058564366-18510be2db19?auto=format&fit=crop&w=500&q=80",
        tags: [
          { label: "🌶️ Spicy", color: "red" },
          { label: "🐟 Seafood", color: "blue" },
          { label: "⭐ Popular", color: "yellow" }
        ]
      },
      {
        category: "Mains",
        label: "Fried",
        nameKo: "달콤매콤 치킨",
        nameEn: "Sweet & Spicy Korean Chicken",
        description: "Crispy chicken pieces coated in a sweet and spicy glaze.",
        price: "$9",
        imageUrl: "https://images.unsplash.com/photo-1516684732162-798a0062be99?auto=format&fit=crop&w=500&q=80",
        tags: [
          { label: "🌶️ Spicy", color: "red" },
          { label: "⭐ Popular", color: "blue" }
        ]
      }
    ];

    let allMenus = [];
    let selectedCategory = "All";
    let selectedSubcategory = "All";
    let selectedDietaryTags = new Set();
    let veganSelectionMode = "blank";

    function escapeHtml(text = "") {
      return text
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function getTagKey(label = "") {
      const normalized = String(label).trim().toLowerCase();
      if (!normalized) return "tag";
      if (/^spicy\d*$/.test(normalized)) return "spicy";
      if (normalized.includes("vegan")) return "vegan";
      if (normalized.includes("popular")) return "popular";
      if (normalized.includes("seafood")) return "seafood";
      if (normalized.includes("sweet")) return "sweet";
      if (normalized.includes("chicken")) return "chicken";
      if (normalized.includes("beef")) return "beef";
      if (normalized.includes("pork")) return "pork";
      return normalized;
    }

    function getSpicyLevel(label = "") {
      const normalized = String(label).trim().toLowerCase();
      const match = normalized.match(/^spicy(\d*)$/);
      if (!match) return null;
      return Math.max(1, Number(match[1] || "1"));
    }

    function renderTagLabel(label = "") {
      const raw = String(label).trim();
      if (!raw) return "Tag";

      const spicyLevel = getSpicyLevel(raw);
      if (spicyLevel) return "🌶️".repeat(spicyLevel);
      if (/[\u{1F300}-\u{1FAFF}\u2600-\u27BF]/u.test(raw)) return raw;

      const tagKey = getTagKey(raw);
      const emojiMap = {
        spicy: "🌶️",
        vegan: "🌱",
        popular: "⭐",
        seafood: "🐟",
        sweet: "🍯",
        chicken: "🍗",
        beef: "🥩",
        pork: "🐷"
      };

      const emoji = emojiMap[tagKey];
      return emoji ? `${emoji} ${raw}` : raw;
    }

    function parseTags(raw = "") {
      return String(raw)
        .split(",")
        .map((part) => part.trim())
        .filter(Boolean)
        .map((chunk) => {
          const [label, color] = chunk.split("|").map((v) => v && v.trim());
          return {
            key: getTagKey(label || "Tag"),
            label: renderTagLabel(label || "Tag"),
            color: color || "gray"
          };
        });
    }

    function withTagEmoji(label = "") {
      const raw = String(label).trim();
      if (!raw) return "🏷️ Tag";
      if (/[\u{1F300}-\u{1FAFF}\u2600-\u27BF]/u.test(raw)) return raw;

      const normalized = raw.toLowerCase();
      const emojiMap = [
        { keyword: "spicy", emoji: "🌶️" },
        { keyword: "vegan", emoji: "🌱" },
        { keyword: "popular", emoji: "⭐" },
        { keyword: "seafood", emoji: "🐟" },
        { keyword: "sweet", emoji: "🍯" },
        { keyword: "chicken", emoji: "🍗" },
        { keyword: "beef", emoji: "🥩" },
        { keyword: "pork", emoji: "🐷" }
      ];

      const matched = emojiMap.find((item) => normalized.includes(item.keyword));
      if (matched) return `${matched.emoji} ${raw}`;
      return `🏷️ ${raw}`;
    }

    function mapSheetRows(rows = []) {
      return rows
        .map((row) => row.c || [])
        .map((c) => c.map((cell) => (cell?.v ?? "").toString().trim()))
        .filter((cells) => cells.some(Boolean))
        .map((cells) => ({
          category: cells[0] || "Uncategorized",
          label: cells[1] || "",
          nameKo: cells[2] || "",
          nameEn: cells[3] || "",
          description: cells[4] || "",
          price: cells[5] || "",
          imageUrl: cells[6] || "",
          tags: parseTags(cells[7] || "")
        }));
    }

    function getSubcategoriesByCategory(menuItems, category) {
      if (category === "All" || category === "Vegan 🌱" || category === "Spicy 🌶️" || category === "Popular ⭐") return [];

      const categoryMenus = menuItems.filter((item) => item.category === category);
      const options = categoryMenus
        .map((item) => String(item.label || "").trim())
        .filter(Boolean);

      return [...new Set(options)];
    }

    async function fetchMenusFromGoogleSheet() {
      const { sheetId, gid } = SHEET_CONFIG;
      if (!sheetId) return SAMPLE_MENU;

      const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?gid=${gid}&tqx=out:json`;
      const res = await fetch(url);
      if (!res.ok) throw new Error("Failed to fetch Google Sheet");

      const text = await res.text();
      const jsonText = text
        .replace("/*O_o*/", "")
        .replace("google.visualization.Query.setResponse(", "")
        .slice(0, -2);

      const data = JSON.parse(jsonText);
      return mapSheetRows(data.table?.rows || []);
    }

    function formatPrice(value = "") {
      if (!value) return "";
      const v = String(value).trim();
      if (v.startsWith("$")) return v;
      return `$${v}`;
    }

    function getCategories(menuItems) {
      const unique = [...new Set(menuItems.map((item) => item.category).filter(Boolean))];
      const base = ["All", ...unique];
      if (!base.includes("Vegan 🌱")) base.push("Vegan 🌱");
      if (!base.includes("Spicy 🌶️")) base.push("Spicy 🌶️");
      if (!base.includes("Popular ⭐")) base.push("Popular ⭐");
      return base;
    }

    function renderTabs() {
      const tabsEl = document.getElementById("tabs");
      const categories = getCategories(allMenus);

      tabsEl.innerHTML = categories
        .map((category) => {
          const activeClass = category === selectedCategory ? "active" : "";
          return `<button class="tab ${activeClass}" data-category="${escapeHtml(category)}" type="button">${escapeHtml(category)}</button>`;
        })
        .join("");

      tabsEl.querySelectorAll(".tab").forEach((tabButton) => {
        tabButton.addEventListener("click", () => {
          selectedCategory = tabButton.dataset.category || "All";
          selectedSubcategory = "All";
          selectedDietaryTags = new Set();
          veganSelectionMode = "blank";
          renderTabs();
          renderSubtabs();
          renderMenu();
        });
      });
    }

    function renderSubtabs() {
      const subtabsEl = document.getElementById("subtabs");
      const subtabsWrapEl = document.getElementById("subtabsWrap");
      const subtabsContextEl = document.getElementById("subtabsContext");
      const subcategories = getSubcategoriesByCategory(allMenus, selectedCategory);

      if (!subcategories.length) {
        subtabsEl.innerHTML = "";
        subtabsWrapEl.classList.add("hidden");
        subtabsContextEl.textContent = "";
        return;
      }

      subtabsWrapEl.classList.remove("hidden");
      subtabsContextEl.textContent = selectedCategory;

      const allOptions = ["All", ...subcategories];
      subtabsEl.innerHTML = allOptions
        .map((sub) => {
          const activeClass = sub === selectedSubcategory ? "active" : "";
          return `<button class="subtab ${activeClass}" data-subcategory="${escapeHtml(sub)}" type="button">${escapeHtml(sub)}</button>`;
        })
        .join("");

      subtabsEl.querySelectorAll(".subtab").forEach((button) => {
        button.addEventListener("click", () => {
          selectedSubcategory = button.dataset.subcategory || "All";
          renderSubtabs();
          renderMenu();
        });
      });
    }

    function filterMenus(menuItems) {
      let filtered = menuItems;

      if (selectedCategory === "Vegan 🌱") {
        filtered = menuItems.filter((item) =>
          item.tags.some((tag) => tag.key === "vegan")
        );
      } else if (selectedCategory === "Spicy 🌶️") {
        filtered = menuItems.filter((item) =>
          item.tags.some((tag) => tag.key === "spicy")
        );
      } else if (selectedCategory === "Popular ⭐") {
        filtered = menuItems.filter((item) =>
          item.tags.some((tag) => tag.key === "popular")
        );
      } else if (selectedCategory !== "All") {
        filtered = menuItems.filter((item) => item.category === selectedCategory);
      }

      if (selectedSubcategory !== "All") {
        filtered = filtered.filter((item) =>
          String(item.label || "").toLowerCase() === selectedSubcategory.toLowerCase()
        );
      }

      return filtered;
    }

    function setupToTopButton() {
      const toTopBtn = document.getElementById("toTopBtn");
      if (!toTopBtn) return;

      window.addEventListener("scroll", () => {
        toTopBtn.classList.toggle("show", window.scrollY > 380);
      }, { passive: true });

      toTopBtn.addEventListener("click", () => {
        window.scrollTo({ top: 0, behavior: "smooth" });
      });
    }

    function renderMenu() {
      const menuListEl = document.getElementById("menuList");
      const filtered = filterMenus(allMenus);

      if (!filtered.length) {
        menuListEl.innerHTML = `<div class="empty">No menu items found in this category.</div>`;
        return;
      }

      menuListEl.innerHTML = filtered
        .map((item) => {
          const tagsHtml = item.tags
            .map((tag) => `<span class="menu-tag ${escapeHtml(tag.color)}">${escapeHtml(tag.label)}</span>`)
            .join("");

          const tagsSection = tagsHtml ? `<div class="menu-meta">${tagsHtml}</div>` : "";

          return `
            <article class="menu-card">
              <img class="menu-image" src="${escapeHtml(item.imageUrl)}" alt="${escapeHtml(item.nameEn || item.nameKo)}" />
              <div class="menu-content">
                <p class="menu-title name-ko">${escapeHtml(item.nameKo)}</p>
                <p class="menu-title menu-title-alt name-en">${escapeHtml(item.nameEn)}</p>
                <p class="menu-desc desc">${escapeHtml(item.description)}</p>
                ${tagsSection}
              </div>
              <div class="menu-price price">${escapeHtml(formatPrice(item.price))}</div>
            </article>
          `;
        })
        .join("");
    }

    function normalizeDietaryTag(value = "") {
      return String(value).trim().toLowerCase();
    }

    function parseDietaryTagList(raw = "") {
      return String(raw)
        .split(",")
        .map((part) => String(part).trim())
        .filter(Boolean);
    }

    function formatDietaryTag(tag = "") {
      const raw = String(tag).trim();
      if (!raw) return "";
      return raw.charAt(0).toUpperCase() + raw.slice(1);
    }

    function isDietaryCategory(category = "") {
      const normalized = String(category).toLowerCase();
      return normalized.includes("vegan");
    }

    function getDietaryTagsForItem(item) {
      const values = Array.isArray(item.dietaryTags) ? item.dietaryTags : parseDietaryTagList(item.ingredient || "");
      return values
        .map((tag) => normalizeDietaryTag(tag))
        .filter((tag, index, arr) => tag && arr.indexOf(tag) === index);
    }

    function mapSheetRows(rows = []) {
      return rows
        .map((row) => row.c || [])
        .map((c) => c.map((cell) => (cell?.v ?? "").toString().trim()))
        .filter((cells) => cells.some(Boolean))
        .map((cells) => ({
          category: cells[0] || "Uncategorized",
          label: cells[1] || "",
          nameKo: cells[2] || "",
          nameEn: cells[3] || "",
          description: cells[4] || "",
          price: cells[5] || "",
          imageUrl: cells[6] || "",
          tags: parseTags(cells[7] || ""),
          ingredient: cells[8] || "",
          dietaryTags: parseDietaryTagList(cells[8] || "")
        }));
    }

    function getCategories(menuItems) {
      const unique = [...new Set(menuItems.map((item) => item.category).filter(Boolean))];
      const base = ["All", ...unique];
      if (!base.includes("Vegan 🌱")) base.push("Vegan 🌱");
      if (!base.includes("Spicy 🌶️")) base.push("Spicy 🌶️");
      if (!base.includes("Popular ⭐")) base.push("Popular ⭐");
      return base;
    }

    function getSubcategoryValue(item) {
      return String(item.label || "").trim();
    }

    function filterBySelectedCategory(menuItems, category) {
      const normalizedCategory = String(category || "").toLowerCase();

      if (normalizedCategory.includes("vegan")) {
        return menuItems.filter((item) => getDietaryTagsForItem(item).length > 0);
      }

      if (normalizedCategory.includes("spicy")) {
        return menuItems.filter((item) =>
          item.tags.some((tag) => tag.key === "spicy")
        );
      }

      if (normalizedCategory.includes("popular")) {
        return menuItems.filter((item) =>
          item.tags.some((tag) => tag.key === "popular")
        );
      }

      if (category === "All") return menuItems;

      return menuItems.filter((item) => item.category === category);
    }

    function getSubcategoriesByCategory(menuItems, category) {
      if (category === "All") return [];

      const scopedMenus = filterBySelectedCategory(menuItems, category);
      const normalizedCategory = String(category || "").toLowerCase();

      if (normalizedCategory.includes("spicy") || normalizedCategory.includes("popular")) {
        return [];
      }

      if (normalizedCategory.includes("vegan")) {
        const options = scopedMenus
          .flatMap((item) => getDietaryTagsForItem(item))
          .map((tag) => String(tag).trim())
          .filter(Boolean);

        const unique = [...new Set(options)];
        const priority = ["Ask Server", "Vegetarian"];
        const prioritySet = new Set(priority.map((item) => item.toLowerCase()));
        const orderedPriority = priority.filter((item) =>
          unique.some((value) => value.toLowerCase() === item.toLowerCase())
        );
        const rest = unique
          .filter((value) => !prioritySet.has(value.toLowerCase()))
          .sort((a, b) => a.localeCompare(b));

        return [...orderedPriority, ...rest];
      }

      const options = scopedMenus
        .map((item) => getSubcategoryValue(item))
        .filter(Boolean);

      return [...new Set(options)];
    }

    function filterMenus(menuItems) {
      let filtered = filterBySelectedCategory(menuItems, selectedCategory);

      if (String(selectedCategory || "").toLowerCase().includes("vegan")) {
        if (selectedDietaryTags.size) {
          filtered = filtered.filter((item) => {
            const dietaryTags = getDietaryTagsForItem(item);
            if (!dietaryTags.length) return false;
            return dietaryTags.every((tag) => selectedDietaryTags.has(tag));
          });
        }

        return filtered;
      }

      if (selectedSubcategory !== "All") {
        filtered = filtered.filter((item) =>
          getSubcategoryValue(item).toLowerCase() === selectedSubcategory.toLowerCase()
        );
      }

      return filtered;
    }

    function renderSubtabs() {
      const subtabsEl = document.getElementById("subtabs");
      const subtabsWrapEl = document.getElementById("subtabsWrap");
      const subtabsContextEl = document.getElementById("subtabsContext");
      const subcategories = getSubcategoriesByCategory(allMenus, selectedCategory);
      const isVeganCategory = String(selectedCategory || "").toLowerCase().includes("vegan");

      if (!subcategories.length) {
        subtabsEl.innerHTML = "";
        subtabsWrapEl.classList.add("hidden");
        subtabsContextEl.textContent = "";
        return;
      }

      subtabsWrapEl.classList.remove("hidden");
      subtabsContextEl.textContent = isVeganCategory ? "Vegan Options" : selectedCategory;

      const options = isVeganCategory ? subcategories : ["All", ...subcategories];
      subtabsEl.innerHTML = options
        .map((sub) => {
          const value = isVeganCategory ? normalizeDietaryTag(sub) : sub;
          const activeClass = isVeganCategory
            ? (selectedDietaryTags.has(value) ? "active" : "")
            : (sub === selectedSubcategory ? "active" : "");
          return `<button class="subtab ${activeClass}" data-subcategory="${escapeHtml(value)}" type="button">${escapeHtml(sub)}</button>`;
        })
        .join("");

      subtabsEl.querySelectorAll(".subtab").forEach((button) => {
        button.addEventListener("click", () => {
          const value = button.dataset.subcategory || "";

          if (isVeganCategory) {
            if (!value) return;
            if (selectedDietaryTags.has(value)) {
              selectedDietaryTags.delete(value);
            } else {
              selectedDietaryTags.add(value);
            }
          } else {
            selectedSubcategory = value || "All";
          }

          renderSubtabs();
          renderMenu();
        });
      });
    }

    async function bootstrap() {
      try {
        allMenus = await fetchMenusFromGoogleSheet();
      } catch (error) {
        console.error(error);
        allMenus = SAMPLE_MENU;
      }

      renderTabs();
      renderSubtabs();
      renderMenu();
      setupToTopButton();
    }

    bootstrap();
  </script>
</body>
</html>
