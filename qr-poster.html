<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EHWA QR Poster</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js" defer></script>
  <style>
    :root {
      --bg: #120907;
      --bg-deep: #090504;
      --red-stroke: rgba(99, 29, 24, 0.92);
      --gold: #c99a47;
      --gold-soft: rgba(201, 154, 71, 0.5);
      --ivory: #f4eadc;
      --paper: #fbf4e7;
      --paper-shadow: rgba(63, 39, 19, 0.16);
      --brand-mark-width: clamp(30px, 7vw, 44px);
      --brand-title-size: clamp(0.95rem, 3vw, 1.35rem);
      --poster-output-width: 60mm;
      --poster-output-height: 120mm;
      --poster-preview-width: min(42vw, 300px, calc((100vh - 56px) * 0.5));
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: block;
      background:
        radial-gradient(circle at top, #1d0f0d 0%, #0b0605 45%, #050303 100%);
      color: #fff6ea;
      font-family: "Noto Sans KR", system-ui, sans-serif;
    }

    .print-controls {
      width: min(94vw, 1120px);
      margin: 24px auto 0;
      padding: 20px 22px;
      border: 1px solid rgba(201, 154, 71, 0.55);
      background: linear-gradient(145deg, rgba(45, 22, 18, 0.96), rgba(12, 7, 6, 0.98));
      box-shadow: 0 18px 44px rgba(0, 0, 0, 0.34), inset 0 0 0 1px rgba(255, 232, 188, 0.06);
    }

    .print-controls-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 18px;
    }

    .print-controls-title {
      margin: 0;
      color: var(--ivory);
      font-size: 1.08rem;
      font-weight: 700;
      letter-spacing: 0.08em;
    }

    .print-controls-note {
      margin: 5px 0 0;
      color: rgba(244, 234, 220, 0.66);
      font-size: 0.72rem;
      line-height: 1.55;
    }

    .size-summary {
      display: grid;
      grid-template-columns: minmax(120px, 1fr);
      gap: 8px;
      min-width: 120px;
    }

    .size-card {
      display: grid;
      gap: 3px;
      padding: 8px 10px;
      border: 1px solid rgba(201, 154, 71, 0.38);
      background: rgba(7, 4, 3, 0.34);
    }

    .size-card-label {
      color: rgba(244, 234, 220, 0.58);
      font-size: 0.58rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .size-card-value {
      color: var(--gold);
      font-size: 0.76rem;
      font-weight: 800;
      letter-spacing: 0.04em;
      white-space: nowrap;
    }

    .control-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
      margin-bottom: 18px;
    }

    .control-panel {
      min-width: 0;
      padding: 14px;
      border: 1px solid rgba(201, 154, 71, 0.28);
    }

    .control-panel-title {
      margin: 0 0 10px;
      color: var(--gold);
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .copy-actions {
      display: grid;
      gap: 8px;
    }

    .copy-button {
      min-height: 38px;
      border: 1px solid rgba(201, 154, 71, 0.68);
      border-radius: 2px;
      background: rgba(201, 154, 71, 0.1);
      color: var(--ivory);
      font: inherit;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: background 160ms ease, border-color 160ms ease, transform 160ms ease;
    }

    .copy-button:hover {
      border-color: var(--gold);
      background: rgba(201, 154, 71, 0.2);
    }

    .copy-button:active {
      transform: translateY(1px);
    }

    .copy-button:disabled {
      cursor: wait;
      opacity: 0.58;
    }

    .copy-status {
      min-height: 2.8em;
      margin: 10px 0 0;
      color: rgba(244, 234, 220, 0.62);
      font-size: 0.65rem;
      line-height: 1.45;
    }

    .copy-status[data-state="success"] {
      color: #e4bf75;
    }

    .copy-status[data-state="error"] {
      color: #e99b8c;
    }

    .text-settings {
      display: grid;
      gap: 8px;
    }

    .text-setting-row {
      display: grid;
      grid-template-columns: 72px minmax(0, 1fr);
      align-items: center;
      gap: 10px;
    }

    .text-setting-row span {
      color: rgba(244, 234, 220, 0.72);
      font-size: 0.7rem;
    }

    .text-setting-row input {
      width: 100%;
      min-width: 0;
      border: 1px solid rgba(244, 234, 220, 0.18);
      border-radius: 2px;
      padding: 8px 9px;
      background: rgba(7, 4, 3, 0.64);
      color: var(--ivory);
      font: inherit;
      font-size: 0.72rem;
      outline: none;
    }

    .text-setting-row input:focus {
      border-color: rgba(201, 154, 71, 0.82);
      box-shadow: 0 0 0 2px rgba(201, 154, 71, 0.12);
    }

    .poster-stage {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 24px;
      padding: 28px;
      overflow-x: auto;
    }

    .poster-frame {
      position: relative;
      width: var(--poster-preview-width);
      aspect-ratio: 1 / 2;
      padding: 4px 2px;
      border: 1px solid rgba(201, 154, 71, 0.6);
      background: linear-gradient(145deg, rgba(39, 20, 16, 0.94), rgba(9, 5, 4, 0.98));
      box-shadow: 0 24px 72px rgba(0, 0, 0, 0.52), inset 0 0 0 1px rgba(255, 232, 188, 0.08);
    }

    .poster-frame::before {
      content: "";
      position: absolute;
      inset: 4px;
      border: 1px solid rgba(201, 154, 71, 0.22);
      pointer-events: none;
    }

    .poster {
      position: relative;
      width: 100%;
      height: 100%;
      container-type: inline-size;
      overflow: hidden;
      isolation: isolate;
      background:
        radial-gradient(circle at 50% 38%, rgba(96, 21, 18, 0.26), transparent 26%),
        radial-gradient(circle at 72% 72%, rgba(92, 12, 18, 0.18), transparent 22%),
        linear-gradient(180deg, #140b09 0%, #100807 48%, #120707 100%);
      box-shadow: 0 3.6cqw 9.6cqw rgba(0, 0, 0, 0.36);
      --brand-mark-width: clamp(20px, 10.5cqw, 34px);
      --brand-title-size: clamp(0.7rem, 5.3cqw, 1.05rem);
    }

    .poster--front {
      background:
        radial-gradient(ellipse at 50% 7%, rgba(220, 72, 45, 0.44), rgba(132, 24, 32, 0.16) 36%, transparent 62%),
        radial-gradient(circle at 10% 0%, rgba(126, 19, 31, 0.58), transparent 36%),
        linear-gradient(180deg, #50141b 0%, #2a0d12 22%, #110807 54%, #120707 100%);
    }

    .poster::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        url("assets/pattern.webp") center top / 82% auto repeat;
      opacity: 0.36;
      mix-blend-mode: screen;
      filter: saturate(1.2) brightness(0.84) sepia(0.3);
      z-index: -3;
    }

    .poster--front::before {
      inset: 0 0 auto;
      height: 67%;
      mask-image: linear-gradient(180deg, #000 0 70%, transparent 100%);
      -webkit-mask-image: linear-gradient(180deg, #000 0 70%, transparent 100%);
    }

    .poster::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 50% 35%, transparent 0 28%, rgba(0, 0, 0, 0.18) 58%, rgba(0, 0, 0, 0.44) 100%),
        linear-gradient(180deg, rgba(0, 0, 0, 0.16), transparent 24%, transparent 72%, rgba(0, 0, 0, 0.36)),
        linear-gradient(90deg, rgba(0, 0, 0, 0.16), transparent 18%, transparent 84%, rgba(0, 0, 0, 0.14));
      pointer-events: none;
      z-index: 9;
    }

    .poster-shadow {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 22% 80%, rgba(128, 24, 40, 0.18), transparent 22%),
        radial-gradient(circle at 80% 64%, rgba(104, 10, 18, 0.12), transparent 20%);
      z-index: 0;
    }

    .brand {
      position: absolute;
      top: 2.4%;
      left: 50%;
      transform: translateX(-50%);
      display: grid;
      justify-items: center;
      gap: 0;
      width: 84%;
      z-index: 13;
      text-align: center;
    }

    .brand-mark {
      width: var(--brand-mark-width);
      height: auto;
      filter: drop-shadow(0 3cqw 5.4cqw rgba(0, 0, 0, 0.34));
    }

    .brand-name {
      margin-top: 0.9cqw;
      color: var(--ivory);
      font-family: "Pretendard", "Noto Sans KR", system-ui, sans-serif;
      font-size: var(--brand-title-size);
      line-height: 0.95;
      letter-spacing: 0.22em;
      font-weight: 500;
      text-shadow: 0 1.8cqw 5.4cqw rgba(0, 0, 0, 0.36);
    }

    .brand-location {
      margin-top: 0.6cqw;
      color: rgba(244, 234, 220, 0.7);
      font-size: clamp(0.38rem, 2.8cqw, 0.58rem);
      font-weight: 600;
      letter-spacing: 0.14em;
      line-height: 0.82;
    }

    .qr-wrap {
      position: absolute;
      top: 16.8%;
      left: 50%;
      width: 80%;
      transform: translateX(-50%);
      z-index: 13;
    }

    .qr-frame {
      position: relative;
      padding: 3.5%;
      background:
        linear-gradient(180deg, rgba(21, 13, 10, 0.72), rgba(15, 10, 8, 0.84));
      border: 0.3cqw solid rgba(199, 155, 66, 0.74);
      box-shadow:
        inset 0 0 0 0.3cqw rgba(199, 155, 66, 0.2),
        0 6cqw 12cqw rgba(0, 0, 0, 0.24);
    }

    .qr-frame::before,
    .qr-frame::after {
      content: "";
      position: absolute;
      inset: -2.7cqw;
      border: 0.3cqw solid rgba(199, 155, 66, 0.8);
      clip-path: polygon(
        0 0, 12% 0, 12% 2.4cqw, 2.4cqw 2.4cqw, 2.4cqw 12%, 0 12%,
        0 88%, 2.4cqw 88%, 2.4cqw calc(100% - 2.4cqw), 12% calc(100% - 2.4cqw), 12% 100%, 0 100%,
        88% 100%, 88% calc(100% - 2.4cqw), calc(100% - 2.4cqw) calc(100% - 2.4cqw), calc(100% - 2.4cqw) 88%, 100% 88%,
        100% 12%, calc(100% - 2.4cqw) 12%, calc(100% - 2.4cqw) 2.4cqw, 88% 2.4cqw, 88% 0, 100% 0
      );
      pointer-events: none;
    }

    .qr-frame::after {
      inset: -4.5cqw;
      opacity: 0.5;
    }

    .qr-paper {
      position: relative;
      display: grid;
      place-items: center;
      aspect-ratio: 1;
      padding: 4%;
      background:
        radial-gradient(circle at 50% 42%, rgba(255, 255, 255, 0.78), rgba(250, 243, 228, 0.92)),
        linear-gradient(180deg, rgba(255, 250, 242, 0.96), rgba(250, 241, 225, 0.96)),
        url("assets/@UnSiBcGoZXjyPzA.webp") center / cover;
      box-shadow:
        inset 0 0 0 0.3cqw rgba(73, 49, 24, 0.08),
        0 0 5.4cqw rgba(255, 246, 232, 0.1);
    }

    .qr-paper img {
      position: relative;
      z-index: 1;
    }

    .qr-paper img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
      image-rendering: pixelated;
      filter: contrast(1.02);
    }

    .caption {
      position: absolute;
      top: 59.2%;
      left: 50%;
      transform: translateX(-50%);
      display: grid;
      justify-items: center;
      gap: 0;
      color: var(--gold);
      text-align: center;
      z-index: 13;
    }

    .caption-title {
      display: flex;
      align-items: center;
      gap: 2.4cqw;
      white-space: nowrap;
      font-family: "Noto Sans KR", system-ui, sans-serif;
      font-size: clamp(0.42rem, 3.47cqw, 0.72rem);
      line-height: 1.2;
      font-weight: 700;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      text-shadow: 0 0.9cqw 3cqw rgba(0, 0, 0, 0.34);
    }

    .caption-title::before,
    .caption-title::after {
      content: "";
      width: 9cqw;
      height: 1.8cqw;
      background:
        linear-gradient(90deg, transparent, var(--gold-soft)),
        linear-gradient(90deg, transparent, transparent 42%, var(--gold) 42%, var(--gold) 58%, transparent 58%);
      mask:
        linear-gradient(90deg, transparent 0 12%, #000 12% 88%, transparent 88%),
        radial-gradient(circle at 18% 50%, #000 0 1.2cqw, transparent 1.5cqw),
        radial-gradient(circle at 82% 50%, #000 0 1.2cqw, transparent 1.5cqw);
      mask-composite: add;
      opacity: 0.95;
    }

    .caption-title::after {
      transform: scaleX(-1);
    }

    .cloud-band {
      position: absolute;
      left: -10%;
      bottom: 7%;
      width: 120%;
      height: 18%;
      object-fit: cover;
      object-position: center 48%;
      opacity: 0.2;
      filter: brightness(0.58) saturate(0.74) sepia(0.26) drop-shadow(0 0.9cqw 1.8cqw rgba(0, 0, 0, 0.38));
      mix-blend-mode: screen;
      mask-image: linear-gradient(180deg, transparent, #000 18%, #000 82%, transparent);
      pointer-events: none;
      z-index: 2;
    }

    .gwanghwamun-scene {
      position: absolute;
      left: -10%;
      bottom: 1.5%;
      width: 120%;
      height: 29%;
      object-fit: cover;
      object-position: center 57%;
      opacity: 0.9;
      filter: grayscale(0.03) sepia(0.5) saturate(1.36) brightness(1.02) contrast(1.12);
      mix-blend-mode: screen;
      mask-image: linear-gradient(180deg, transparent 0%, transparent 14%, #000 32%, #000 82%, transparent 100%);
      pointer-events: none;
      z-index: 10;
    }

    .petal-drift {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 14;
    }

    .petal-drift span {
      position: absolute;
      display: block;
      width: 3.6cqw;
      height: 6cqw;
      border-radius: 100% 0 100% 0;
      background: linear-gradient(135deg, #d04a72, #8e1746);
      box-shadow: 0 3px 8px rgba(0, 0, 0, 0.24);
      opacity: 0.72;
    }

    .petal-drift .petal-six {
      top: 62%;
      left: 50%;
      transform: rotate(64deg) scale(0.58);
      opacity: 0.58;
    }

    .petal-drift .petal-ten {
      top: 67%;
      left: 10%;
      transform: rotate(52deg) scale(0.46);
      opacity: 0.46;
    }

    .petal-drift .petal-eleven {
      top: 64%;
      left: 30%;
      transform: rotate(-58deg) scale(0.48);
      opacity: 0.52;
    }

    .petal-drift .petal-twelve {
      top: 70.5%;
      left: 46%;
      transform: rotate(31deg) scale(0.56);
      opacity: 0.58;
    }

    .petal-drift .petal-one {
      top: 13.2%;
      left: 3.5%;
      transform: rotate(28deg) scale(0.58);
      opacity: 0.58;
    }

    .petal-drift .petal-two {
      top: 14.2%;
      right: 3.5%;
      transform: rotate(-34deg) scale(0.54);
      opacity: 0.54;
    }

    .petal-drift .petal-three {
      top: 11.5%;
      left: 7%;
      transform: rotate(46deg) scale(0.38);
      opacity: 0.44;
    }

    .ground {
      position: absolute;
      left: -4%;
      right: 0;
      bottom: -9%;
      height: 34%;
      background:
        radial-gradient(circle at 22% 38%, rgba(255, 255, 255, 0.05), transparent 18%),
        radial-gradient(circle at 43% 20%, rgba(255, 255, 255, 0.02), transparent 16%),
        linear-gradient(180deg, rgba(17, 11, 10, 0), rgba(12, 7, 7, 0.72) 42%, rgba(5, 3, 3, 0.95));
      z-index: 1;
    }

    .woman {
      position: absolute;
      left: auto;
      right: 1.5%;
      bottom: 1%;
      width: 43%;
      filter: drop-shadow(-5.4cqw 6.6cqw 9cqw rgba(0, 0, 0, 0.4));
      z-index: 12;
    }

    .poster--back {
      background:
        radial-gradient(circle at 50% 28%, rgba(112, 28, 24, 0.22), transparent 30%),
        linear-gradient(180deg, #160b09 0%, #100706 52%, #0c0505 100%);
    }

    .poster--back::before {
      inset: 0;
      opacity: 0.38;
      background: var(--gold);
      -webkit-mask-image: url("assets/pattern.webp");
      mask-image: url("assets/pattern.webp");
      -webkit-mask-position: center top;
      mask-position: center top;
      -webkit-mask-size: 82% auto;
      mask-size: 82% auto;
      -webkit-mask-repeat: repeat;
      mask-repeat: repeat;
      -webkit-mask-mode: alpha;
      mask-mode: alpha;
      filter: none;
    }

    .back-heading {
      position: absolute;
      top: 2.4%;
      left: 50%;
      transform: translateX(-50%);
      display: grid;
      justify-items: center;
      gap: 0;
      width: 84%;
      text-align: center;
      z-index: 13;
    }

    .back-heading .brand-mark {
      display: block;
      margin: 0;
    }

    .back-kicker {
      margin-top: 1.8cqw;
      color: var(--gold);
      font-size: clamp(0.42rem, 3.47cqw, 0.72rem);
      font-weight: 700;
      letter-spacing: 0.28em;
      text-transform: uppercase;
    }

    .back-qr-grid {
      position: absolute;
      top: 21.5%;
      left: 22%;
      width: 56%;
      display: grid;
      grid-template-columns: 1fr;
      gap: 3.5%;
      z-index: 13;
    }

    .back-qr-card {
      position: relative;
      padding: 5%;
      background: rgba(17, 10, 8, 0.72);
      border: 0.3cqw solid rgba(199, 155, 66, 0.68);
      box-shadow: inset 0 0 0 0.3cqw rgba(199, 155, 66, 0.16), 0 4.2cqw 8.4cqw rgba(0, 0, 0, 0.24);
    }

    .back-qr-card::before {
      content: "";
      position: absolute;
      inset: 1.5cqw;
      border: 0.3cqw solid rgba(199, 155, 66, 0.28);
      pointer-events: none;
    }

    .back-qr-label {
      margin-bottom: 4%;
      color: var(--gold);
      font-size: clamp(0.42rem, 3.86cqw, 0.8rem);
      font-weight: 700;
      letter-spacing: 0.2em;
      text-align: center;
      text-transform: uppercase;
    }

    .back-qr-paper {
      padding: 5%;
    }

    .back-petals {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: fill;
      opacity: 0.24;
      mix-blend-mode: screen;
      pointer-events: none;
      z-index: 8;
    }

    .back-footer {
      position: absolute;
      right: 9%;
      bottom: 6%;
      left: 9%;
      z-index: 13;
      color: rgba(244, 234, 220, 0.9);
      font-size: clamp(0.52rem, 3.8cqw, 0.78rem);
      font-weight: 600;
      letter-spacing: 0.045em;
      line-height: 1.45;
      text-align: center;
      text-shadow: 0 0.7cqw 2.4cqw rgba(0, 0, 0, 0.42);
    }

    .back-footer::before {
      content: "";
      display: block;
      width: 42%;
      height: 0.3cqw;
      margin: 0 auto 1.6cqw;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      opacity: 0.72;
    }

    @media (max-width: 720px) {
      body {
        background: #0a0504;
      }

      .poster-stage {
        align-items: flex-start;
        justify-content: flex-start;
        gap: 14px;
        padding: 16px;
      }

      .poster-frame {
        width: min(46vw, 300px, calc((100vh - 48px) * 0.5));
        padding: 4px 2px;
      }

      .poster {
        width: 100%;
      }

      .print-controls {
        margin-top: 16px;
        padding: 16px;
      }

      .print-controls-header {
        display: block;
      }

      .size-summary {
        grid-template-columns: minmax(120px, 1fr);
        margin-top: 12px;
      }

      .control-grid {
        grid-template-columns: 1fr;
        gap: 12px;
      }

      .qr-wrap {
        top: 16.8%;
        width: 80%;
      }

      .caption {
        top: 59.2%;
      }

      .caption-title {
        gap: 1.8cqw;
        font-size: 3.47cqw;
        letter-spacing: 0.22em;
      }

      .caption-title::before,
      .caption-title::after {
        width: 6cqw;
      }

      .woman {
        width: 43%;
        left: auto;
        right: 1.5%;
      }

      .back-qr-grid {
        top: 24.5%;
        left: 22%;
        width: 56%;
        gap: 3.5%;
      }

      .back-heading {
        top: 1.2%;
      }

      .brand {
        top: 1.2%;
      }

      .back-kicker {
        margin-top: 1.8cqw;
        font-size: 2.8cqw;
      }

      .back-footer {
        bottom: 5.8%;
        font-size: 3.8cqw;
      }
    }
  </style>
</head>
<body>
  <section class="print-controls" aria-label="Poster controls">
    <div class="print-controls-header">
      <div>
        <h1 class="print-controls-title">POSTER CONTROL</h1>
        <p class="print-controls-note">앞면과 뒷면을 각각 이미지로 복사하고, 지점명과 멘트를 바로 수정할 수 있습니다.</p>
      </div>
      <div class="size-summary" aria-label="Poster size information">
        <div class="size-card">
          <span class="size-card-label">Poster</span>
          <strong class="size-card-value">6 × 12 cm</strong>
        </div>
      </div>
    </div>

    <div class="control-grid">
      <div class="control-panel">
        <h2 class="control-panel-title">Copy Image</h2>
        <div class="copy-actions">
          <button class="copy-button" id="copyFrontButton" type="button">앞면 이미지 복사</button>
          <button class="copy-button" id="copyBackButton" type="button">뒷면 이미지 복사</button>
        </div>
        <p class="copy-status" id="copyStatus" aria-live="polite">버튼을 누르면 포스터 이미지가 클립보드에 복사됩니다.</p>
      </div>

      <div class="control-panel">
        <h2 class="control-panel-title">Text</h2>
        <div class="text-settings">
          <label class="text-setting-row">
            <span>지점</span>
            <input id="locationInput" type="text" value="Downtown" maxlength="32" autocomplete="off" />
          </label>
          <label class="text-setting-row">
            <span>앞면 멘트</span>
            <input id="frontMessageInput" type="text" value="View Menu" maxlength="40" autocomplete="off" />
          </label>
          <label class="text-setting-row">
            <span>뒷면 멘트</span>
            <input id="backMessageInput" type="text" value="Keep in touch with us" maxlength="48" autocomplete="off" />
          </label>
        </div>
      </div>

    </div>
  </section>

  <div class="poster-stage">
    <div class="poster-frame" data-side="front">
      <main class="poster poster--front" data-side="front" aria-label="EHWA QR poster front">
        <div class="poster-shadow" aria-hidden="true"></div>
        <div class="petal-drift" aria-hidden="true">
          <span class="petal-one"></span>
          <span class="petal-two"></span>
          <span class="petal-three"></span>
          <span class="petal-six"></span>
          <span class="petal-ten"></span>
          <span class="petal-eleven"></span>
          <span class="petal-twelve"></span>
        </div>
        <div class="brand">
          <img class="brand-mark" src="assets/cropped-logo-white.webp" alt="EHWA" />
          <div class="brand-name">EHWA</div>
          <div class="brand-location">Downtown</div>
        </div>

        <section class="qr-wrap" aria-label="Front QR code">
          <div class="qr-frame">
            <div class="qr-paper" id="qrPaper" data-qr-slot="front" aria-label="Menu QR code">
            </div>
          </div>
        </section>

        <div class="caption">
          <div class="caption-title">View Menu</div>
        </div>

        <img class="gwanghwamun-scene" src="assets/gwanghwamun-still.png" alt="" />
        <img class="cloud-band" src="assets/clouds.webp" alt="" />
        <div class="ground" aria-hidden="true"></div>
        <img class="woman" src="assets/woman-578x1024.webp" alt="" />
      </main>
    </div>

    <div class="poster-frame" data-side="back">
      <main class="poster poster--back" data-side="back" aria-label="EHWA QR poster back">
        <div class="poster-shadow" aria-hidden="true"></div>
        <img class="back-petals" src="assets/flower.webp" alt="" />
        <div class="back-heading">
          <img class="brand-mark" src="assets/cropped-logo-white.webp" alt="EHWA" />
          <div class="brand-name">EHWA</div>
          <div class="brand-location">Downtown</div>
          <div class="back-kicker">Keep in touch with us</div>
        </div>

        <section class="back-qr-grid" aria-label="Back QR codes">
          <div class="back-qr-card">
            <div class="back-qr-label">Reservation</div>
            <div class="qr-paper back-qr-paper" id="qrPaperBackOne" data-qr-slot="backMenu" aria-label="Reservation QR code">
            </div>
          </div>
          <div class="back-qr-card">
            <div class="back-qr-label">Music Request</div>
            <div class="qr-paper back-qr-paper" id="qrPaperBackTwo" data-qr-slot="backStory" aria-label="Music request QR code">
            </div>
          </div>
        </section>

        <div class="back-footer">We look forward to welcoming you.</div>
        <div class="ground" aria-hidden="true"></div>
      </main>
    </div>
  </div>

  <script>
    (function () {
      const params = new URLSearchParams(window.location.search);
      const copyButtons = {
        front: document.getElementById("copyFrontButton"),
        back: document.getElementById("copyBackButton")
      };
      const copyStatus = document.getElementById("copyStatus");

      const slots = {
        front: {
          paperId: "qrPaper",
          source: params.get("qr") || ""
        },
        backMenu: {
          paperId: "qrPaperBackOne",
          source: params.get("qr2") || ""
        },
        backStory: {
          paperId: "qrPaperBackTwo",
          source: params.get("qr3") || ""
        }
      };

      function renderQr(paper, slot) {
        if (!paper) return;

        paper.querySelectorAll("img").forEach(function (image) {
          image.remove();
        });

        if (!slot.source) return;

        const image = new Image();
        image.alt = "EHWA QR code";
        image.decoding = "async";
        image.src = slot.source;
        paper.appendChild(image);
      }

      function syncText(inputId, selector) {
        const input = document.getElementById(inputId);
        if (!input) return;

        const update = function () {
          document.querySelectorAll(selector).forEach(function (element) {
            element.textContent = input.value;
          });
        };

        input.addEventListener("input", update);
        update();
      }

      function setCopyStatus(message, state) {
        if (!copyStatus) return;
        copyStatus.textContent = message;
        copyStatus.dataset.state = state || "";
      }

      function makeAbsoluteImageSources(root) {
        root.querySelectorAll("img").forEach(function (image) {
          const source = image.getAttribute("src");
          if (!source || source.startsWith("data:") || source.startsWith("blob:")) return;

          try {
            image.setAttribute("src", new URL(source, document.baseURI).href);
          } catch (error) {
            // Keep the original source if the browser cannot resolve it.
          }
        });
      }

      function makeAbsoluteCssUrls(css) {
        return css.replace(/url\(\s*(["']?)([^"')]+)\1\s*\)/g, function (match, quote, source) {
          if (/^(data:|blob:|https?:|file:|#)/i.test(source)) return match;

          try {
            return "url(" + quote + new URL(source, document.baseURI).href + quote + ")";
          } catch (error) {
            return match;
          }
        });
      }

      function blobToDataUrl(blob) {
        return new Promise(function (resolve, reject) {
          const reader = new FileReader();
          reader.addEventListener("load", function () {
            resolve(typeof reader.result === "string" ? reader.result : "");
          });
          reader.addEventListener("error", reject);
          reader.readAsDataURL(blob);
        });
      }

      async function resourceToDataUrl(source) {
        const response = await fetch(new URL(source, document.baseURI).href, {
          credentials: "same-origin"
        });
        if (!response.ok) throw new Error("Asset request failed");
        return blobToDataUrl(await response.blob());
      }

      async function inlineImageSources(root) {
        await Promise.all(Array.from(root.querySelectorAll("img")).map(async function (image) {
          const source = image.getAttribute("src");
          if (!source || /^(data:|blob:)/i.test(source)) return;

          try {
            image.setAttribute("src", await resourceToDataUrl(source));
          } catch (error) {
            // Keep the absolute source as a fallback for same-origin assets.
          }
        }));
      }

      async function inlineCssUrls(css) {
        const pattern = /url\(\s*(["']?)([^"')]+)\1\s*\)/g;
        const sources = Array.from(css.matchAll(pattern))
          .map(function (match) { return match[2].trim(); })
          .filter(function (source, index, all) {
            return source && !/^(data:|blob:|#)/i.test(source) && all.indexOf(source) === index;
          });
        const replacements = new Map();

        await Promise.all(sources.map(async function (source) {
          try {
            replacements.set(source, await resourceToDataUrl(source));
          } catch (error) {
            // Keep the absolute URL if an asset blocks cross-origin fetching.
          }
        }));

        return css.replace(pattern, function (match, quote, source) {
          const replacement = replacements.get(source.trim());
          return replacement ? "url(" + quote + replacement + quote + ")" : match;
        });
      }

      async function canvasFromPosterSvg(side) {
        const source = document.querySelector('.poster-frame[data-side="' + side + '"]');
        if (!source) throw new Error("Poster not found");

        if (document.fonts && document.fonts.ready) {
          await document.fonts.ready;
        }

        await Promise.all(Array.from(source.querySelectorAll("img")).map(function (image) {
          if (image.complete) {
            return image.decode ? image.decode().catch(function () {}) : Promise.resolve();
          }

          return new Promise(function (resolve) {
            image.addEventListener("load", resolve, { once: true });
            image.addEventListener("error", resolve, { once: true });
          });
        }));

        const rect = source.getBoundingClientRect();
        const scale = 3;
        const width = Math.max(1, Math.round(rect.width));
        const height = Math.max(1, Math.round(rect.height));
        const clone = source.cloneNode(true);
        clone.style.width = width + "px";
        clone.style.height = height + "px";
        clone.querySelectorAll("[id]").forEach(function (element) {
          element.removeAttribute("id");
        });
        makeAbsoluteImageSources(clone);
        await inlineImageSources(clone);

        const cssText = makeAbsoluteCssUrls(Array.from(document.querySelectorAll("style"))
          .map(function (style) { return style.textContent || ""; })
          .join("\n")
          .replace(/]]>/g, "]]]]><![CDATA[>"));
        const css = await inlineCssUrls(cssText);
        const markup = new XMLSerializer().serializeToString(clone);
        const svg = [
          '<svg xmlns="http://www.w3.org/2000/svg" width="', width * scale,
          '" height="', height * scale, '" viewBox="0 0 ', width, ' ', height, '">',
          '<style><![CDATA[', css, ']]></style>',
          '<foreignObject x="0" y="0" width="', width, '" height="', height, '">',
          '<div xmlns="http://www.w3.org/1999/xhtml" style="width:', width, 'px;height:', height, 'px;">',
          markup,
          "</div></foreignObject></svg>"
        ].join("");
        const svgUrl = URL.createObjectURL(new Blob([svg], { type: "image/svg+xml" }));

        return new Promise(function (resolve, reject) {
          const image = new Image();
          image.decoding = "async";
          image.onload = function () {
            const canvas = document.createElement("canvas");
            canvas.width = width * scale;
            canvas.height = height * scale;
            const context = canvas.getContext("2d");

            try {
              context.drawImage(image, 0, 0, canvas.width, canvas.height);
              URL.revokeObjectURL(svgUrl);
              resolve(canvas);
            } catch (error) {
              URL.revokeObjectURL(svgUrl);
              reject(error);
            }
          };
          image.onerror = function () {
            URL.revokeObjectURL(svgUrl);
            reject(new Error("Poster image render failed"));
          };
          image.src = svgUrl;
        });
      }

      async function canvasFromPoster(side) {
        const source = document.querySelector('.poster-frame[data-side="' + side + '"]');
        if (!source) throw new Error("Poster not found");

        if (typeof window.html2canvas === "function") {
          return window.html2canvas(source, {
            allowTaint: false,
            backgroundColor: null,
            imageTimeout: 15000,
            logging: false,
            scale: 3,
            useCORS: true,
            onclone: function (clonedDocument) {
              const clonedSource = clonedDocument.querySelector('.poster-frame[data-side="' + side + '"]');
              if (!clonedSource) return;

              clonedSource.querySelectorAll(".qr-paper").forEach(function (paper) {
                paper.style.background = "#fbf4e7";
                paper.style.backgroundImage = "none";
              });
            }
          });
        }

        return canvasFromPosterSvg(side);
      }

      function canvasBlob(canvas) {
        return new Promise(function (resolve, reject) {
          try {
            canvas.toBlob(function (blob) {
              if (blob) {
                resolve(blob);
              } else {
                reject(new Error("PNG conversion failed"));
              }
            }, "image/png");
          } catch (error) {
            reject(error);
          }
        });
      }

      async function copyPoster(side) {
        const button = copyButtons[side];
        if (!button) return;

        if (!navigator.clipboard || !window.ClipboardItem) {
          setCopyStatus("이미지 복사는 HTTPS 또는 localhost에서 지원됩니다.", "error");
          return;
        }

        button.disabled = true;
        const originalLabel = button.textContent;
        button.textContent = "이미지 준비 중...";
        setCopyStatus(side === "front" ? "앞면 이미지를 준비하고 있습니다." : "뒷면 이미지를 준비하고 있습니다.", "");

        try {
          const blob = await canvasBlob(await canvasFromPoster(side));
          await navigator.clipboard.write([new ClipboardItem({ "image/png": blob })]);
          setCopyStatus(side === "front" ? "앞면 이미지가 클립보드에 복사되었습니다." : "뒷면 이미지가 클립보드에 복사되었습니다.", "success");
        } catch (error) {
          const message = error && error.name === "NotAllowedError"
            ? "복사 권한이 차단되었습니다. 주소창의 클립보드 권한을 허용해주세요."
            : "이미지를 변환하지 못했습니다. HTTPS 또는 localhost에서 다시 시도해주세요.";
          setCopyStatus(message, "error");
        } finally {
          button.disabled = false;
          button.textContent = originalLabel;
        }
      }

      Object.values(slots).forEach(function (slot) {
        renderQr(document.getElementById(slot.paperId), slot);
      });

      if (copyButtons.front) {
        copyButtons.front.addEventListener("click", function () {
          copyPoster("front");
        });
      }

      if (copyButtons.back) {
        copyButtons.back.addEventListener("click", function () {
          copyPoster("back");
        });
      }

      syncText("locationInput", ".brand-location");
      syncText("frontMessageInput", ".caption-title");
      syncText("backMessageInput", ".back-kicker");
    }());
  </script>
</body>
</html>
