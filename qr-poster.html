<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EHWA QR Poster</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #120907;
      --bg-deep: #090504;
      --red-stroke: rgba(99, 29, 24, 0.92);
      --gold: #c99a47;
      --gold-soft: rgba(201, 154, 71, 0.5);
      --ivory: #f4eadc;
      --paper: #fbf4e7;
      --paper-shadow: rgba(63, 39, 19, 0.16);
      --brand-mark-width: clamp(30px, 7vw, 44px);
      --brand-title-size: clamp(0.95rem, 3vw, 1.35rem);
      --poster-output-width: 60mm;
      --poster-output-height: 120mm;
      --qr-output-size: 40mm;
      --poster-preview-width: min(42vw, 300px, calc((100vh - 56px) * 0.5));
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: block;
      background:
        radial-gradient(circle at top, #1d0f0d 0%, #0b0605 45%, #050303 100%);
      color: #fff6ea;
      font-family: "Noto Sans KR", system-ui, sans-serif;
    }

    .print-controls {
      width: min(94vw, 1120px);
      margin: 24px auto 0;
      padding: 20px 22px;
      border: 1px solid rgba(201, 154, 71, 0.55);
      background: linear-gradient(145deg, rgba(45, 22, 18, 0.96), rgba(12, 7, 6, 0.98));
      box-shadow: 0 18px 44px rgba(0, 0, 0, 0.34), inset 0 0 0 1px rgba(255, 232, 188, 0.06);
    }

    .print-controls-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 18px;
    }

    .print-controls-title {
      margin: 0;
      color: var(--ivory);
      font-size: 1.08rem;
      font-weight: 700;
      letter-spacing: 0.08em;
    }

    .print-controls-note {
      margin: 5px 0 0;
      color: rgba(244, 234, 220, 0.66);
      font-size: 0.72rem;
      line-height: 1.55;
    }

    .print-capacity {
      flex: 0 0 auto;
      padding: 7px 10px;
      border: 1px solid rgba(201, 154, 71, 0.42);
      color: var(--gold);
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .print-controls-grid {
      display: grid;
      grid-template-columns: minmax(170px, 0.72fr) minmax(320px, 1.28fr);
      gap: 18px;
    }

    .print-controls fieldset {
      min-width: 0;
      margin: 0;
      padding: 14px;
      border: 1px solid rgba(201, 154, 71, 0.28);
    }

    .print-controls legend,
    .qr-settings-title {
      padding: 0 6px;
      color: var(--gold);
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .side-picker {
      display: grid;
      gap: 8px;
    }

    .side-choice {
      display: flex;
      align-items: center;
      gap: 9px;
      min-height: 38px;
      padding: 0 10px;
      border: 1px solid rgba(244, 234, 220, 0.12);
      color: var(--ivory);
      font-size: 0.8rem;
      cursor: pointer;
    }

    .side-choice:has(input:checked) {
      border-color: rgba(201, 154, 71, 0.72);
      background: rgba(201, 154, 71, 0.12);
    }

    .side-choice input {
      accent-color: var(--gold);
    }

    .qr-settings-wrap {
      min-width: 0;
    }

    .qr-settings[hidden] {
      display: none;
    }

    .qr-settings-title {
      display: block;
      margin: 0 0 10px;
      padding: 0;
    }

    .qr-setting-row {
      display: grid;
      grid-template-columns: 92px minmax(0, 1fr);
      align-items: center;
      gap: 10px;
      margin-top: 8px;
    }

    .qr-setting-row label {
      color: rgba(244, 234, 220, 0.72);
      font-size: 0.7rem;
    }

    .qr-setting-row input {
      width: 100%;
      min-width: 0;
      border: 1px solid rgba(244, 234, 220, 0.18);
      border-radius: 2px;
      padding: 8px 9px;
      background: rgba(7, 4, 3, 0.64);
      color: var(--ivory);
      font: inherit;
      font-size: 0.72rem;
      outline: none;
    }

    .qr-setting-row input:focus {
      border-color: rgba(201, 154, 71, 0.82);
      box-shadow: 0 0 0 2px rgba(201, 154, 71, 0.12);
    }

    .qr-setting-row input[type="file"] {
      padding: 5px;
      color: rgba(244, 234, 220, 0.66);
    }

    .qr-setting-row input[type="file"]::file-selector-button {
      margin-right: 8px;
      border: 1px solid rgba(201, 154, 71, 0.5);
      padding: 5px 8px;
      background: rgba(201, 154, 71, 0.12);
      color: var(--gold);
      font: inherit;
      cursor: pointer;
    }

    .poster-stage {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 24px;
      padding: 28px;
      overflow-x: auto;
    }

    .poster-frame {
      position: relative;
      width: var(--poster-preview-width);
      aspect-ratio: 1 / 2;
      padding: 4px 2px;
      border: 1px solid rgba(201, 154, 71, 0.6);
      background: linear-gradient(145deg, rgba(39, 20, 16, 0.94), rgba(9, 5, 4, 0.98));
      box-shadow: 0 24px 72px rgba(0, 0, 0, 0.52), inset 0 0 0 1px rgba(255, 232, 188, 0.08);
    }

    .poster-frame::before {
      content: "";
      position: absolute;
      inset: 4px;
      border: 1px solid rgba(201, 154, 71, 0.22);
      pointer-events: none;
    }

    .poster {
      position: relative;
      width: 100%;
      height: 100%;
      container-type: inline-size;
      overflow: hidden;
      isolation: isolate;
      background:
        radial-gradient(circle at 50% 38%, rgba(96, 21, 18, 0.26), transparent 26%),
        radial-gradient(circle at 72% 72%, rgba(92, 12, 18, 0.18), transparent 22%),
        linear-gradient(180deg, #140b09 0%, #100807 48%, #120707 100%);
      box-shadow: 0 3.6cqw 9.6cqw rgba(0, 0, 0, 0.36);
      --brand-mark-width: clamp(20px, 10.5cqw, 34px);
      --brand-title-size: clamp(0.7rem, 5.3cqw, 1.05rem);
    }

    .poster--front {
      background:
        radial-gradient(ellipse at 50% 7%, rgba(220, 72, 45, 0.44), rgba(132, 24, 32, 0.16) 36%, transparent 62%),
        radial-gradient(circle at 10% 0%, rgba(126, 19, 31, 0.58), transparent 36%),
        linear-gradient(180deg, #50141b 0%, #2a0d12 22%, #110807 54%, #120707 100%);
    }

    .poster::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        url("assets/pattern.webp") center top / 82% auto repeat;
      opacity: 0.36;
      mix-blend-mode: screen;
      filter: saturate(1.2) brightness(0.84) sepia(0.3);
      z-index: -3;
    }

    .poster--front::before {
      inset: 0 0 auto;
      height: 67%;
      mask-image: linear-gradient(180deg, #000 0 70%, transparent 100%);
      -webkit-mask-image: linear-gradient(180deg, #000 0 70%, transparent 100%);
    }

    .poster::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 50% 35%, transparent 0 28%, rgba(0, 0, 0, 0.18) 58%, rgba(0, 0, 0, 0.44) 100%),
        linear-gradient(180deg, rgba(0, 0, 0, 0.16), transparent 24%, transparent 72%, rgba(0, 0, 0, 0.36)),
        linear-gradient(90deg, rgba(0, 0, 0, 0.16), transparent 18%, transparent 84%, rgba(0, 0, 0, 0.14));
      pointer-events: none;
      z-index: 9;
    }

    .poster-shadow {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 22% 80%, rgba(128, 24, 40, 0.18), transparent 22%),
        radial-gradient(circle at 80% 64%, rgba(104, 10, 18, 0.12), transparent 20%);
      z-index: 0;
    }

    .brand {
      position: absolute;
      top: 2.4%;
      left: 50%;
      transform: translateX(-50%);
      display: grid;
      justify-items: center;
      gap: 0;
      width: 84%;
      z-index: 13;
      text-align: center;
    }

    .brand-mark {
      width: var(--brand-mark-width);
      height: auto;
      filter: drop-shadow(0 3cqw 5.4cqw rgba(0, 0, 0, 0.34));
    }

    .brand-name {
      margin-top: 0.9cqw;
      color: var(--ivory);
      font-family: "Pretendard", "Noto Sans KR", system-ui, sans-serif;
      font-size: var(--brand-title-size);
      line-height: 0.95;
      letter-spacing: 0.22em;
      font-weight: 500;
      text-shadow: 0 1.8cqw 5.4cqw rgba(0, 0, 0, 0.36);
    }

    .brand-location {
      margin-top: 0.6cqw;
      color: rgba(244, 234, 220, 0.7);
      font-size: clamp(0.38rem, 2.8cqw, 0.58rem);
      font-weight: 600;
      letter-spacing: 0.14em;
      line-height: 0.82;
    }

    .qr-wrap {
      position: absolute;
      top: 16.8%;
      left: 50%;
      width: 80%;
      transform: translateX(-50%);
      z-index: 13;
    }

    .qr-frame {
      position: relative;
      padding: 3.5%;
      background:
        linear-gradient(180deg, rgba(21, 13, 10, 0.72), rgba(15, 10, 8, 0.84));
      border: 0.3cqw solid rgba(199, 155, 66, 0.74);
      box-shadow:
        inset 0 0 0 0.3cqw rgba(199, 155, 66, 0.2),
        0 6cqw 12cqw rgba(0, 0, 0, 0.24);
    }

    .qr-frame::before,
    .qr-frame::after {
      content: "";
      position: absolute;
      inset: -2.7cqw;
      border: 0.3cqw solid rgba(199, 155, 66, 0.8);
      clip-path: polygon(
        0 0, 12% 0, 12% 2.4cqw, 2.4cqw 2.4cqw, 2.4cqw 12%, 0 12%,
        0 88%, 2.4cqw 88%, 2.4cqw calc(100% - 2.4cqw), 12% calc(100% - 2.4cqw), 12% 100%, 0 100%,
        88% 100%, 88% calc(100% - 2.4cqw), calc(100% - 2.4cqw) calc(100% - 2.4cqw), calc(100% - 2.4cqw) 88%, 100% 88%,
        100% 12%, calc(100% - 2.4cqw) 12%, calc(100% - 2.4cqw) 2.4cqw, 88% 2.4cqw, 88% 0, 100% 0
      );
      pointer-events: none;
    }

    .qr-frame::after {
      inset: -4.5cqw;
      opacity: 0.5;
    }

    .qr-paper {
      position: relative;
      display: grid;
      place-items: center;
      aspect-ratio: 1;
      padding: 4%;
      background:
        radial-gradient(circle at 50% 42%, rgba(255, 255, 255, 0.78), rgba(250, 243, 228, 0.92)),
        linear-gradient(180deg, rgba(255, 250, 242, 0.96), rgba(250, 241, 225, 0.96)),
        url("assets/@UnSiBcGoZXjyPzA.webp") center / cover;
      box-shadow:
        inset 0 0 0 0.3cqw rgba(73, 49, 24, 0.08),
        0 0 5.4cqw rgba(255, 246, 232, 0.1);
    }

    .qr-paper img {
      position: relative;
      z-index: 1;
    }

    .qr-center-number {
      position: absolute;
      top: 50%;
      left: 50%;
      z-index: 2;
      display: grid;
      place-items: center;
      min-width: 19%;
      min-height: 19%;
      max-width: 38%;
      padding: 0.2em 0.35em;
      transform: translate(-50%, -50%);
      border: 0.3cqw solid rgba(55, 35, 18, 0.18);
      border-radius: 999px;
      background: rgba(251, 244, 231, 0.97);
      color: #26160f;
      font-family: "Pretendard", "Noto Sans KR", system-ui, sans-serif;
      font-size: clamp(0.42rem, 3.95cqw, 0.82rem);
      font-weight: 800;
      line-height: 1;
      white-space: nowrap;
      box-shadow: 0 0.3cqw 1.2cqw rgba(38, 22, 15, 0.18);
      pointer-events: none;
    }

    .qr-center-number[hidden] {
      display: none;
    }

    .qr-paper img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
      image-rendering: pixelated;
      filter: contrast(1.02);
    }

    .caption {
      position: absolute;
      top: 59.2%;
      left: 50%;
      transform: translateX(-50%);
      display: grid;
      justify-items: center;
      gap: 0;
      color: var(--gold);
      text-align: center;
      z-index: 13;
    }

    .caption-title {
      display: flex;
      align-items: center;
      gap: 2.4cqw;
      white-space: nowrap;
      font-family: "Noto Sans KR", system-ui, sans-serif;
      font-size: clamp(0.42rem, 3.47cqw, 0.72rem);
      line-height: 1.2;
      font-weight: 700;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      text-shadow: 0 0.9cqw 3cqw rgba(0, 0, 0, 0.34);
    }

    .caption-title::before,
    .caption-title::after {
      content: "";
      width: 9cqw;
      height: 1.8cqw;
      background:
        linear-gradient(90deg, transparent, var(--gold-soft)),
        linear-gradient(90deg, transparent, transparent 42%, var(--gold) 42%, var(--gold) 58%, transparent 58%);
      mask:
        linear-gradient(90deg, transparent 0 12%, #000 12% 88%, transparent 88%),
        radial-gradient(circle at 18% 50%, #000 0 1.2cqw, transparent 1.5cqw),
        radial-gradient(circle at 82% 50%, #000 0 1.2cqw, transparent 1.5cqw);
      mask-composite: add;
      opacity: 0.95;
    }

    .caption-title::after {
      transform: scaleX(-1);
    }

    .cloud-band {
      position: absolute;
      left: -10%;
      bottom: 7%;
      width: 120%;
      height: 18%;
      object-fit: cover;
      object-position: center 48%;
      opacity: 0.2;
      filter: brightness(0.58) saturate(0.74) sepia(0.26) drop-shadow(0 0.9cqw 1.8cqw rgba(0, 0, 0, 0.38));
      mix-blend-mode: screen;
      mask-image: linear-gradient(180deg, transparent, #000 18%, #000 82%, transparent);
      pointer-events: none;
      z-index: 2;
    }

    .gwanghwamun-scene {
      position: absolute;
      left: -10%;
      bottom: 1.5%;
      width: 120%;
      height: 29%;
      object-fit: cover;
      object-position: center 57%;
      opacity: 0.9;
      filter: grayscale(0.03) sepia(0.5) saturate(1.36) brightness(1.02) contrast(1.12);
      mix-blend-mode: screen;
      mask-image: linear-gradient(180deg, transparent 0%, transparent 14%, #000 32%, #000 82%, transparent 100%);
      pointer-events: none;
      z-index: 10;
    }

    .petal-drift {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 14;
    }

    .petal-drift span {
      position: absolute;
      display: block;
      width: 3.6cqw;
      height: 6cqw;
      border-radius: 100% 0 100% 0;
      background: linear-gradient(135deg, #d04a72, #8e1746);
      box-shadow: 0 3px 8px rgba(0, 0, 0, 0.24);
      opacity: 0.72;
    }

    .petal-drift .petal-six {
      top: 62%;
      left: 50%;
      transform: rotate(64deg) scale(0.58);
      opacity: 0.58;
    }

    .petal-drift .petal-ten {
      top: 67%;
      left: 10%;
      transform: rotate(52deg) scale(0.46);
      opacity: 0.46;
    }

    .petal-drift .petal-eleven {
      top: 64%;
      left: 30%;
      transform: rotate(-58deg) scale(0.48);
      opacity: 0.52;
    }

    .petal-drift .petal-twelve {
      top: 70.5%;
      left: 46%;
      transform: rotate(31deg) scale(0.56);
      opacity: 0.58;
    }

    .petal-drift .petal-one {
      top: 13.2%;
      left: 3.5%;
      transform: rotate(28deg) scale(0.58);
      opacity: 0.58;
    }

    .petal-drift .petal-two {
      top: 14.2%;
      right: 3.5%;
      transform: rotate(-34deg) scale(0.54);
      opacity: 0.54;
    }

    .petal-drift .petal-three {
      top: 11.5%;
      left: 7%;
      transform: rotate(46deg) scale(0.38);
      opacity: 0.44;
    }

    .ground {
      position: absolute;
      left: -4%;
      right: 0;
      bottom: -9%;
      height: 34%;
      background:
        radial-gradient(circle at 22% 38%, rgba(255, 255, 255, 0.05), transparent 18%),
        radial-gradient(circle at 43% 20%, rgba(255, 255, 255, 0.02), transparent 16%),
        linear-gradient(180deg, rgba(17, 11, 10, 0), rgba(12, 7, 7, 0.72) 42%, rgba(5, 3, 3, 0.95));
      z-index: 1;
    }

    .woman {
      position: absolute;
      left: auto;
      right: 1.5%;
      bottom: 1%;
      width: 43%;
      filter: drop-shadow(-5.4cqw 6.6cqw 9cqw rgba(0, 0, 0, 0.4));
      z-index: 12;
    }

    .poster--back {
      background:
        radial-gradient(circle at 50% 28%, rgba(112, 28, 24, 0.22), transparent 30%),
        linear-gradient(180deg, #160b09 0%, #100706 52%, #0c0505 100%);
    }

    .poster--back::before {
      inset: 0;
      opacity: 0.48;
      background: var(--gold);
      -webkit-mask-image: url("assets/pattern.webp");
      mask-image: url("assets/pattern.webp");
      -webkit-mask-position: center top;
      mask-position: center top;
      -webkit-mask-size: 82% auto;
      mask-size: 82% auto;
      -webkit-mask-repeat: repeat;
      mask-repeat: repeat;
      -webkit-mask-mode: alpha;
      mask-mode: alpha;
      filter: none;
    }

    .back-heading {
      position: absolute;
      top: 2.4%;
      left: 50%;
      transform: translateX(-50%);
      display: grid;
      justify-items: center;
      gap: 0;
      width: 84%;
      text-align: center;
      z-index: 13;
    }

    .back-heading .brand-mark {
      display: block;
      margin: 0;
    }

    .back-kicker {
      margin-top: 1.8cqw;
      color: var(--gold);
      font-size: clamp(0.42rem, 3.47cqw, 0.72rem);
      font-weight: 700;
      letter-spacing: 0.28em;
      text-transform: uppercase;
    }

    .back-qr-grid {
      position: absolute;
      top: 25.5%;
      left: 22%;
      width: 56%;
      display: grid;
      grid-template-columns: 1fr;
      gap: 3.5%;
      z-index: 13;
    }

    .back-qr-card {
      position: relative;
      padding: 5%;
      background: rgba(17, 10, 8, 0.72);
      border: 0.3cqw solid rgba(199, 155, 66, 0.68);
      box-shadow: inset 0 0 0 0.3cqw rgba(199, 155, 66, 0.16), 0 4.2cqw 8.4cqw rgba(0, 0, 0, 0.24);
    }

    .back-qr-card::before {
      content: "";
      position: absolute;
      inset: 1.5cqw;
      border: 0.3cqw solid rgba(199, 155, 66, 0.28);
      pointer-events: none;
    }

    .back-qr-label {
      margin-bottom: 4%;
      color: var(--gold);
      font-size: clamp(0.42rem, 3.86cqw, 0.8rem);
      font-weight: 700;
      letter-spacing: 0.2em;
      text-align: center;
      text-transform: uppercase;
    }

    .back-qr-paper {
      padding: 5%;
    }

    .back-petals {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: fill;
      opacity: 0.24;
      mix-blend-mode: screen;
      pointer-events: none;
      z-index: 8;
    }

    @media (max-width: 720px) {
      body {
        background: #0a0504;
      }

      .poster-stage {
        align-items: flex-start;
        justify-content: flex-start;
        gap: 14px;
        padding: 16px;
      }

      .poster-frame {
        width: min(46vw, 300px, calc((100vh - 48px) * 0.5));
        padding: 4px 2px;
      }

      .poster {
        width: 100%;
      }

      .print-controls {
        margin-top: 16px;
        padding: 16px;
      }

      .print-controls-header {
        display: block;
      }

      .print-capacity {
        display: inline-block;
        margin-top: 12px;
      }

      .print-controls-grid {
        grid-template-columns: 1fr;
        gap: 12px;
      }

      .qr-wrap {
        top: 16.8%;
        width: 80%;
      }

      .caption {
        top: 59.2%;
      }

      .caption-title {
        gap: 1.8cqw;
        font-size: 3.47cqw;
        letter-spacing: 0.22em;
      }

      .caption-title::before,
      .caption-title::after {
        width: 6cqw;
      }

      .woman {
        width: 43%;
        left: auto;
        right: 1.5%;
      }

      .back-qr-grid {
        top: 29.5%;
        left: 22%;
        width: 56%;
        gap: 3.5%;
      }

      .back-heading {
        top: 1.2%;
      }

      .brand {
        top: 1.2%;
      }

      .back-kicker {
        margin-top: 1.8cqw;
        font-size: 2.8cqw;
      }
    }
  </style>
</head>
<body>
  <section class="print-controls" aria-label="Poster settings">
    <div class="print-controls-header">
      <div>
        <h1 class="print-controls-title">POSTER SETTINGS</h1>
        <p class="print-controls-note">CSS 포스터 기준 크기는 금색 테두리 포함 6×12cm이며, 앞면 QR은 약 4×4cm입니다.</p>
      </div>
      <div class="print-capacity">6×12 CM · QR ≈ 4×4 CM</div>
    </div>

    <div class="print-controls-grid">
      <fieldset>
        <legend>Edit side</legend>
        <div class="side-picker">
          <label class="side-choice">
            <input type="radio" name="printSide" value="front" checked />
            <span>앞면 QR 설정</span>
          </label>
          <label class="side-choice">
            <input type="radio" name="printSide" value="back" />
            <span>뒷면 QR 설정</span>
          </label>
        </div>
      </fieldset>

      <div class="qr-settings-wrap">
        <div class="qr-settings" data-side-settings="front">
          <span class="qr-settings-title">Front QR</span>
          <div class="qr-setting-row">
            <label for="qrFrontUrl">이미지 주소</label>
            <input id="qrFrontUrl" type="url" placeholder="QR 이미지 URL 또는 data URL" autocomplete="off" />
          </div>
          <div class="qr-setting-row">
            <label for="qrFrontFile">이미지 파일</label>
            <input id="qrFrontFile" type="file" accept="image/*" />
          </div>
          <div class="qr-setting-row">
            <label for="qrFrontNumber">중앙 숫자</label>
            <input id="qrFrontNumber" type="text" inputmode="numeric" maxlength="3" placeholder="예: 01" autocomplete="off" />
          </div>
        </div>

        <div class="qr-settings" data-side-settings="back" hidden>
          <span class="qr-settings-title">Back QR</span>
          <div class="qr-setting-row">
            <label for="qrBackMenuUrl">예약 주소</label>
            <input id="qrBackMenuUrl" type="url" placeholder="예약 QR 이미지 URL" autocomplete="off" />
          </div>
          <div class="qr-setting-row">
            <label for="qrBackMenuFile">예약 파일</label>
            <input id="qrBackMenuFile" type="file" accept="image/*" />
          </div>
          <div class="qr-setting-row">
            <label for="qrBackMenuNumber">예약 숫자</label>
            <input id="qrBackMenuNumber" type="text" inputmode="numeric" maxlength="3" placeholder="예: 01" autocomplete="off" />
          </div>
          <div class="qr-setting-row">
            <label for="qrBackStoryUrl">선곡 주소</label>
            <input id="qrBackStoryUrl" type="url" placeholder="선곡 요청 QR 이미지 URL" autocomplete="off" />
          </div>
          <div class="qr-setting-row">
            <label for="qrBackStoryFile">선곡 파일</label>
            <input id="qrBackStoryFile" type="file" accept="image/*" />
          </div>
          <div class="qr-setting-row">
            <label for="qrBackStoryNumber">선곡 숫자</label>
            <input id="qrBackStoryNumber" type="text" inputmode="numeric" maxlength="3" placeholder="예: 02" autocomplete="off" />
          </div>
        </div>
      </div>
    </div>

  </section>

  <div class="poster-stage">
    <div class="poster-frame" data-side="front">
      <main class="poster poster--front" data-side="front" aria-label="EHWA QR poster front">
        <div class="poster-shadow" aria-hidden="true"></div>
        <div class="petal-drift" aria-hidden="true">
          <span class="petal-one"></span>
          <span class="petal-two"></span>
          <span class="petal-three"></span>
          <span class="petal-six"></span>
          <span class="petal-ten"></span>
          <span class="petal-eleven"></span>
          <span class="petal-twelve"></span>
        </div>
        <div class="brand">
          <img class="brand-mark" src="assets/cropped-logo-white.webp" alt="EHWA" />
          <div class="brand-name">EHWA</div>
          <div class="brand-location">Downtown</div>
        </div>

        <section class="qr-wrap" aria-label="Front QR code">
          <div class="qr-frame">
            <div class="qr-paper" id="qrPaper" data-qr-slot="front" aria-label="Menu QR code">
              <span class="qr-center-number" aria-hidden="true" hidden></span>
            </div>
          </div>
        </section>

        <div class="caption">
          <div class="caption-title">View Menu</div>
        </div>

        <img class="gwanghwamun-scene" src="assets/gwanghwamun-still.png" alt="" />
        <img class="cloud-band" src="assets/clouds.webp" alt="" />
        <div class="ground" aria-hidden="true"></div>
        <img class="woman" src="assets/woman-578x1024.webp" alt="" />
      </main>
    </div>

    <div class="poster-frame" data-side="back">
      <main class="poster poster--back" data-side="back" aria-label="EHWA QR poster back">
        <div class="poster-shadow" aria-hidden="true"></div>
        <img class="back-petals" src="assets/flower.webp" alt="" />
        <div class="back-heading">
          <img class="brand-mark" src="assets/cropped-logo-white.webp" alt="EHWA" />
          <div class="brand-name">EHWA</div>
          <div class="brand-location">Downtown</div>
          <div class="back-kicker">Keep in touch with us</div>
        </div>

        <section class="back-qr-grid" aria-label="Back QR codes">
          <div class="back-qr-card">
            <div class="back-qr-label">Reservation</div>
            <div class="qr-paper back-qr-paper" id="qrPaperBackOne" data-qr-slot="backMenu" aria-label="Reservation QR code">
              <span class="qr-center-number" aria-hidden="true" hidden></span>
            </div>
          </div>
          <div class="back-qr-card">
            <div class="back-qr-label">Music Request</div>
            <div class="qr-paper back-qr-paper" id="qrPaperBackTwo" data-qr-slot="backStory" aria-label="Music request QR code">
              <span class="qr-center-number" aria-hidden="true" hidden></span>
            </div>
          </div>
        </section>

        <div class="ground" aria-hidden="true"></div>
      </main>
    </div>
  </div>

  <script>
    (function () {
      const params = new URLSearchParams(window.location.search);
      const sideSettings = Array.from(document.querySelectorAll("[data-side-settings]"));
      const sideInputs = Array.from(document.querySelectorAll('input[name="printSide"]'));
      let selectedSide = "front";

      const slots = {
        front: {
          paperId: "qrPaper",
          urlId: "qrFrontUrl",
          fileId: "qrFrontFile",
          numberId: "qrFrontNumber",
          source: params.get("qr") || "",
          number: params.get("qrNumber") || ""
        },
        backMenu: {
          paperId: "qrPaperBackOne",
          urlId: "qrBackMenuUrl",
          fileId: "qrBackMenuFile",
          numberId: "qrBackMenuNumber",
          source: params.get("qr2") || "",
          number: params.get("qr2Number") || ""
        },
        backStory: {
          paperId: "qrPaperBackTwo",
          urlId: "qrBackStoryUrl",
          fileId: "qrBackStoryFile",
          numberId: "qrBackStoryNumber",
          source: params.get("qr3") || "",
          number: params.get("qr3Number") || ""
        }
      };

      function renderQr(paper, slot) {
        if (!paper) return;

        paper.querySelectorAll("img").forEach(function (image) {
          image.remove();
        });

        const number = paper.querySelector(".qr-center-number");
        if (number) {
          number.textContent = slot.number;
          number.hidden = !slot.number;
        }

        if (!slot.source) return;

        const image = new Image();
        image.alt = "EHWA QR code";
        image.decoding = "async";
        image.src = slot.source;
        paper.insertBefore(image, paper.querySelector(".qr-center-number"));
      }

      function updateSlot(slot) {
        renderQr(document.getElementById(slot.paperId), slot);
      }

      function showSelectedSettings() {
        sideSettings.forEach(function (settings) {
          settings.hidden = settings.dataset.sideSettings !== selectedSide;
        });
      }

      function bindSlot(slot) {
        const urlInput = document.getElementById(slot.urlId);
        const fileInput = document.getElementById(slot.fileId);
        const numberInput = document.getElementById(slot.numberId);

        if (urlInput) {
          urlInput.value = slot.source.startsWith("data:") ? "" : slot.source;
          urlInput.addEventListener("input", function () {
            slot.source = urlInput.value.trim();
            if (fileInput) fileInput.value = "";
            updateSlot(slot);
          });
        }

        if (fileInput) {
          fileInput.addEventListener("change", function () {
            const file = fileInput.files && fileInput.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.addEventListener("load", function () {
              slot.source = typeof reader.result === "string" ? reader.result : "";
              if (urlInput) urlInput.value = "";
              updateSlot(slot);
            });
            reader.readAsDataURL(file);
          });
        }

        if (numberInput) {
          numberInput.value = slot.number;
          numberInput.addEventListener("input", function () {
            slot.number = numberInput.value.replace(/[^0-9]/g, "").slice(0, 3);
            numberInput.value = slot.number;
            updateSlot(slot);
          });
        }

        updateSlot(slot);
      }

      Object.values(slots).forEach(bindSlot);

      sideInputs.forEach(function (input) {
        input.addEventListener("change", function () {
          if (!input.checked) return;
          selectedSide = input.value;
          showSelectedSettings();
        });
      });

      showSelectedSettings();
    }());
  </script>
</body>
</html>
