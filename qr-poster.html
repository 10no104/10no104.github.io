<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EHWA QR Poster</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #120907;
      --bg-deep: #090504;
      --red-stroke: rgba(99, 29, 24, 0.92);
      --gold: #c99a47;
      --gold-soft: rgba(201, 154, 71, 0.5);
      --ivory: #f4eadc;
      --paper: #fbf4e7;
      --paper-shadow: rgba(63, 39, 19, 0.16);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: block;
      background:
        radial-gradient(circle at top, #1d0f0d 0%, #0b0605 45%, #050303 100%);
      color: #fff6ea;
      font-family: "Noto Sans KR", system-ui, sans-serif;
    }

    .poster-stage {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 24px;
      padding: 28px;
      overflow-x: auto;
    }

    .poster-frame {
      position: relative;
      padding: 10px;
      border: 1px solid rgba(201, 154, 71, 0.6);
      background: linear-gradient(145deg, rgba(39, 20, 16, 0.94), rgba(9, 5, 4, 0.98));
      box-shadow: 0 24px 72px rgba(0, 0, 0, 0.52), inset 0 0 0 1px rgba(255, 232, 188, 0.08);
    }

    .poster-frame::before {
      content: "";
      position: absolute;
      inset: 4px;
      border: 1px solid rgba(201, 154, 71, 0.22);
      pointer-events: none;
    }

    .poster {
      position: relative;
      width: min(38vw, 400px, calc((100vh - 56px) * 0.5));
      aspect-ratio: 1 / 2;
      overflow: hidden;
      isolation: isolate;
      background:
        radial-gradient(circle at 50% 38%, rgba(96, 21, 18, 0.26), transparent 26%),
        radial-gradient(circle at 72% 72%, rgba(92, 12, 18, 0.18), transparent 22%),
        linear-gradient(180deg, #140b09 0%, #100807 48%, #120707 100%);
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.36);
    }

    .poster::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        url("assets/pattern.webp") center top / 82% auto repeat;
      opacity: 0.36;
      mix-blend-mode: screen;
      filter: saturate(1.2) brightness(0.84) sepia(0.3);
      z-index: -3;
    }

    .poster--front::before {
      inset: 0 0 auto;
      height: 67%;
      mask-image: linear-gradient(180deg, #000 0 70%, transparent 100%);
      -webkit-mask-image: linear-gradient(180deg, #000 0 70%, transparent 100%);
    }

    .poster::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 50% 35%, transparent 0 28%, rgba(0, 0, 0, 0.18) 58%, rgba(0, 0, 0, 0.44) 100%),
        linear-gradient(180deg, rgba(0, 0, 0, 0.16), transparent 24%, transparent 72%, rgba(0, 0, 0, 0.36)),
        linear-gradient(90deg, rgba(0, 0, 0, 0.16), transparent 18%, transparent 84%, rgba(0, 0, 0, 0.14));
      pointer-events: none;
      z-index: 9;
    }

    .poster-shadow {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 22% 80%, rgba(128, 24, 40, 0.18), transparent 22%),
        radial-gradient(circle at 80% 64%, rgba(104, 10, 18, 0.12), transparent 20%);
      z-index: 0;
    }

    .brand {
      position: absolute;
      top: 3.8%;
      left: 50%;
      transform: translateX(-50%);
      display: grid;
      justify-items: center;
      gap: 0;
      width: 84%;
      z-index: 13;
      text-align: center;
    }

    .brand-mark {
      width: clamp(34px, 8vw, 50px);
      height: auto;
      filter: drop-shadow(0 10px 18px rgba(0, 0, 0, 0.34));
    }

    .brand-name {
      margin-top: 4px;
      color: var(--ivory);
      font-family: "Pretendard", "Noto Sans KR", system-ui, sans-serif;
      font-size: clamp(1.05rem, 3.4vw, 1.55rem);
      line-height: 0.95;
      letter-spacing: 0.22em;
      font-weight: 500;
      text-shadow: 0 6px 18px rgba(0, 0, 0, 0.36);
    }

    .qr-wrap {
      position: absolute;
      top: 21.4%;
      left: 50%;
      width: 58%;
      transform: translateX(-50%);
      z-index: 13;
    }

    .qr-frame {
      position: relative;
      padding: 5.8%;
      background:
        linear-gradient(180deg, rgba(21, 13, 10, 0.72), rgba(15, 10, 8, 0.84));
      border: 1px solid rgba(199, 155, 66, 0.74);
      box-shadow:
        inset 0 0 0 1px rgba(199, 155, 66, 0.2),
        0 20px 40px rgba(0, 0, 0, 0.24);
    }

    .qr-frame::before,
    .qr-frame::after {
      content: "";
      position: absolute;
      inset: -12px;
      border: 1px solid rgba(199, 155, 66, 0.8);
      clip-path: polygon(
        0 0, 12% 0, 12% 8px, 8px 8px, 8px 12%, 0 12%,
        0 88%, 8px 88%, 8px calc(100% - 8px), 12% calc(100% - 8px), 12% 100%, 0 100%,
        88% 100%, 88% calc(100% - 8px), calc(100% - 8px) calc(100% - 8px), calc(100% - 8px) 88%, 100% 88%,
        100% 12%, calc(100% - 8px) 12%, calc(100% - 8px) 8px, 88% 8px, 88% 0, 100% 0
      );
      pointer-events: none;
    }

    .qr-frame::after {
      inset: -20px;
      opacity: 0.58;
    }

    .qr-paper {
      position: relative;
      display: grid;
      place-items: center;
      aspect-ratio: 1;
      padding: 6%;
      background:
        radial-gradient(circle at 50% 42%, rgba(255, 255, 255, 0.78), rgba(250, 243, 228, 0.92)),
        linear-gradient(180deg, rgba(255, 250, 242, 0.96), rgba(250, 241, 225, 0.96)),
        url("assets/@UnSiBcGoZXjyPzA.webp") center / cover;
      box-shadow:
        inset 0 0 0 1px rgba(73, 49, 24, 0.08),
        0 0 18px rgba(255, 246, 232, 0.1);
    }

    .qr-paper img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
      image-rendering: pixelated;
      filter: contrast(1.02);
    }

    .qr-placeholder {
      width: 100%;
      height: 100%;
      display: grid;
      place-items: center;
      padding: 12%;
      border: 2px dashed rgba(77, 52, 28, 0.26);
      color: rgba(77, 52, 28, 0.72);
      text-align: center;
      font-size: clamp(1rem, 2vw, 1.35rem);
      font-weight: 800;
      line-height: 1.5;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.18), rgba(255, 255, 255, 0.02)),
        rgba(255, 255, 255, 0.28);
    }

    .caption {
      position: absolute;
      top: 54.8%;
      left: 50%;
      transform: translateX(-50%);
      display: grid;
      justify-items: center;
      gap: 0;
      color: var(--gold);
      text-align: center;
      z-index: 13;
    }

    .caption-title {
      display: flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
      font-family: "Noto Sans KR", system-ui, sans-serif;
      font-size: clamp(0.52rem, 1.55vw, 0.72rem);
      line-height: 1.2;
      font-weight: 700;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      text-shadow: 0 3px 10px rgba(0, 0, 0, 0.34);
    }

    .caption-title::before,
    .caption-title::after {
      content: "";
      width: 30px;
      height: 6px;
      background:
        linear-gradient(90deg, transparent, var(--gold-soft)),
        linear-gradient(90deg, transparent, transparent 42%, var(--gold) 42%, var(--gold) 58%, transparent 58%);
      mask:
        linear-gradient(90deg, transparent 0 12%, #000 12% 88%, transparent 88%),
        radial-gradient(circle at 18% 50%, #000 0 4px, transparent 5px),
        radial-gradient(circle at 82% 50%, #000 0 4px, transparent 5px);
      mask-composite: add;
      opacity: 0.95;
    }

    .caption-title::after {
      transform: scaleX(-1);
    }

    .cloud-band {
      position: absolute;
      left: -16%;
      bottom: 12%;
      width: 132%;
      height: 15%;
      object-fit: cover;
      object-position: center 48%;
      opacity: 0.2;
      filter: brightness(0.58) saturate(0.74) sepia(0.26) drop-shadow(0 3px 6px rgba(0, 0, 0, 0.38));
      mix-blend-mode: screen;
      mask-image: linear-gradient(180deg, transparent, #000 18%, #000 82%, transparent);
      pointer-events: none;
      z-index: 2;
    }

    .gwanghwamun-scene {
      position: absolute;
      left: -8%;
      bottom: 5%;
      width: 120%;
      height: 28%;
      object-fit: cover;
      object-position: center 58%;
      opacity: 0.58;
      filter: grayscale(0.12) sepia(0.76) saturate(1.12) brightness(0.78) contrast(1.1);
      mix-blend-mode: screen;
      mask-image: linear-gradient(180deg, transparent 0%, transparent 14%, #000 32%, #000 82%, transparent 100%);
      pointer-events: none;
      z-index: 10;
    }

    .petal-drift {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 14;
    }

    .petal-drift span {
      position: absolute;
      display: block;
      width: 12px;
      height: 20px;
      border-radius: 100% 0 100% 0;
      background: linear-gradient(135deg, #d04a72, #8e1746);
      box-shadow: 0 3px 8px rgba(0, 0, 0, 0.24);
      opacity: 0.72;
    }

    .petal-drift .petal-one {
      top: 17%;
      right: 14%;
      transform: rotate(28deg) scale(0.9);
    }

    .petal-drift .petal-two {
      top: 34%;
      left: 12%;
      transform: rotate(-34deg) scale(0.75);
    }

    .petal-drift .petal-three {
      top: 48%;
      left: auto;
      right: 12%;
      transform: rotate(46deg) scale(0.78);
    }

    .petal-drift .petal-four {
      top: 76%;
      left: 20%;
      transform: rotate(-18deg) scale(0.7);
    }

    .petal-drift .petal-five {
      top: 87%;
      right: 43%;
      transform: rotate(22deg) scale(0.64);
    }

    .petal-drift .petal-six {
      top: 62%;
      left: 58%;
      transform: rotate(64deg) scale(0.58);
      opacity: 0.58;
    }

    .petal-drift .petal-seven {
      top: 79%;
      right: 68%;
      transform: rotate(-42deg) scale(0.52);
      opacity: 0.54;
    }

    .ground {
      position: absolute;
      left: -4%;
      right: 0;
      bottom: -9%;
      height: 34%;
      background:
        radial-gradient(circle at 22% 38%, rgba(255, 255, 255, 0.05), transparent 18%),
        radial-gradient(circle at 43% 20%, rgba(255, 255, 255, 0.02), transparent 16%),
        linear-gradient(180deg, rgba(17, 11, 10, 0), rgba(12, 7, 7, 0.72) 42%, rgba(5, 3, 3, 0.95));
      z-index: 1;
    }

    .woman {
      position: absolute;
      left: auto;
      right: -4%;
      bottom: 0;
      width: 54%;
      filter: drop-shadow(-18px 22px 30px rgba(0, 0, 0, 0.4));
      z-index: 12;
    }

    .poster--back {
      background:
        radial-gradient(circle at 50% 28%, rgba(112, 28, 24, 0.22), transparent 30%),
        linear-gradient(180deg, #160b09 0%, #100706 52%, #0c0505 100%);
    }

    .poster--back::before {
      inset: 0;
      opacity: 0.22;
    }

    .back-heading {
      position: absolute;
      top: 4.8%;
      left: 50%;
      transform: translateX(-50%);
      width: 84%;
      text-align: center;
      z-index: 13;
    }

    .back-heading .brand-mark {
      width: clamp(34px, 8vw, 50px);
    }

    .back-heading .brand-name {
      margin-top: 4px;
      font-size: clamp(1.05rem, 3.4vw, 1.55rem);
    }

    .back-kicker {
      margin-top: 8px;
      color: var(--gold);
      font-size: clamp(0.52rem, 1.55vw, 0.72rem);
      font-weight: 700;
      letter-spacing: 0.28em;
      text-transform: uppercase;
    }

    .back-qr-grid {
      position: absolute;
      top: 25.5%;
      left: 22%;
      width: 56%;
      display: grid;
      grid-template-columns: 1fr;
      gap: 3.5%;
      z-index: 13;
    }

    .back-qr-card {
      position: relative;
      padding: 5%;
      background: rgba(17, 10, 8, 0.72);
      border: 1px solid rgba(199, 155, 66, 0.68);
      box-shadow: inset 0 0 0 1px rgba(199, 155, 66, 0.16), 0 14px 28px rgba(0, 0, 0, 0.24);
    }

    .back-qr-card::before {
      content: "";
      position: absolute;
      inset: 5px;
      border: 1px solid rgba(199, 155, 66, 0.28);
      pointer-events: none;
    }

    .back-qr-label {
      margin-bottom: 4%;
      color: var(--gold);
      font-size: clamp(0.52rem, 1.7vw, 0.8rem);
      font-weight: 700;
      letter-spacing: 0.2em;
      text-align: center;
      text-transform: uppercase;
    }

    .back-qr-paper {
      padding: 5%;
    }

    .back-qr-paper .qr-placeholder {
      padding: 8%;
      font-size: clamp(0.48rem, 1.5vw, 0.72rem);
      line-height: 1.35;
    }

    .back-note {
      position: absolute;
      top: 59.5%;
      left: 11%;
      width: 78%;
      color: var(--ivory);
      text-align: center;
      z-index: 7;
    }

    .back-note-title {
      color: var(--gold);
      font-family: "Pretendard", "Noto Sans KR", system-ui, sans-serif;
      font-size: clamp(0.9rem, 2.8vw, 1.3rem);
      font-weight: 700;
      letter-spacing: 0.25em;
      text-transform: uppercase;
    }

    .back-note-copy {
      margin-top: 9px;
      color: rgba(244, 234, 220, 0.68);
      font-size: clamp(0.52rem, 1.55vw, 0.72rem);
      letter-spacing: 0.08em;
      line-height: 1.6;
    }

    .back-petals {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: fill;
      opacity: 0.24;
      mix-blend-mode: screen;
      pointer-events: none;
      z-index: 8;
    }

    @page {
      size: 80mm 160mm;
      margin: 0;
    }

    @media print {
      body {
        min-height: auto;
        background: transparent;
      }

      .poster-frame {
        padding: 0;
        border: 0;
        background: transparent;
        box-shadow: none;
      }

      .poster-stage {
        display: block;
        min-height: auto;
        padding: 0;
      }

      .poster-frame + .poster-frame {
        page-break-before: always;
      }

      .poster {
        width: 80mm;
        height: 160mm;
        box-shadow: none;
      }
    }

    @media (max-width: 720px) {
      body {
        background: #0a0504;
      }

      .poster-stage {
        align-items: flex-start;
        justify-content: flex-start;
        gap: 14px;
        padding: 16px;
      }

      .poster-frame {
        padding: 8px;
      }

      .poster {
        width: min(42vw, 320px, calc((100vh - 48px) * 0.5));
      }

      .qr-wrap {
        top: 22.3%;
        width: 60%;
      }

      .caption {
        top: 55.3%;
      }

      .caption-title {
        gap: 6px;
        font-size: 0.52rem;
        letter-spacing: 0.24em;
      }

      .caption-title::before,
      .caption-title::after {
        width: 20px;
      }

      .woman {
        width: 56%;
        left: auto;
        right: -7%;
      }

      .back-qr-grid {
        top: 29.5%;
        left: 22%;
        width: 56%;
        gap: 3.5%;
      }

      .back-note {
        top: 61%;
      }

      .back-heading {
        top: 5.5%;
      }

      .brand {
        top: 1.2%;
      }

      .back-kicker {
        margin-top: 8px;
        font-size: 0.46rem;
      }
    }
  </style>
</head>
<body>
  <div class="poster-stage">
    <div class="poster-frame">
      <main class="poster poster--front" aria-label="EHWA QR poster front">
        <div class="poster-shadow" aria-hidden="true"></div>
        <div class="petal-drift" aria-hidden="true">
          <span class="petal-one"></span>
          <span class="petal-two"></span>
          <span class="petal-three"></span>
          <span class="petal-four"></span>
          <span class="petal-five"></span>
          <span class="petal-six"></span>
          <span class="petal-seven"></span>
        </div>
        <div class="brand">
          <img class="brand-mark" src="assets/cropped-logo-white.webp" alt="EHWA" />
          <div class="brand-name">EHWA</div>
        </div>

        <section class="qr-wrap" aria-label="Front QR code">
          <div class="qr-frame">
            <div class="qr-paper" id="qrPaper">
              <div class="qr-placeholder" id="qrPlaceholder">QR image<br />assets/qr-code.png<br />or ?qr=...</div>
            </div>
          </div>
        </section>

        <div class="caption">
          <div class="caption-title">Scan Me</div>
        </div>

        <img class="gwanghwamun-scene" src="assets/gwanghwamun-still.png" alt="" />
        <img class="cloud-band" src="assets/clouds.webp" alt="" />
        <div class="ground" aria-hidden="true"></div>
        <img class="woman" src="assets/woman-578x1024.webp" alt="" />
      </main>
    </div>

    <div class="poster-frame">
      <main class="poster poster--back" aria-label="EHWA QR poster back">
        <div class="poster-shadow" aria-hidden="true"></div>
        <img class="back-petals" src="assets/flower.webp" alt="" />
        <div class="back-heading">
          <img class="brand-mark" src="assets/cropped-logo-white.webp" alt="EHWA" />
          <div class="brand-name">EHWA</div>
          <div class="back-kicker">Keep in touch with us</div>
        </div>

        <section class="back-qr-grid" aria-label="Back QR codes">
          <div class="back-qr-card">
            <div class="back-qr-label">Menu</div>
            <div class="qr-paper back-qr-paper" id="qrPaperBackOne">
              <div class="qr-placeholder" id="qrPlaceholderBackOne">QR 01<br />?qr=...</div>
            </div>
          </div>
          <div class="back-qr-card">
            <div class="back-qr-label">Story</div>
            <div class="qr-paper back-qr-paper" id="qrPaperBackTwo">
              <div class="qr-placeholder" id="qrPlaceholderBackTwo">QR 02<br />?qr2=...</div>
            </div>
          </div>
        </section>

        <div class="ground" aria-hidden="true"></div>
      </main>
    </div>
  </div>

  <script>
    (function () {
      const params = new URLSearchParams(window.location.search);
      const qrSources = [
        ["qrPaper", "qrPlaceholder", params.get("qr") || "assets/qr-code.png"],
        ["qrPaperBackOne", "qrPlaceholderBackOne", params.get("qr2") || "assets/qr-code-2.png"],
        ["qrPaperBackTwo", "qrPlaceholderBackTwo", params.get("qr3") || "assets/qr-code-3.png"]
      ];

      function loadQr(paperId, placeholderId, src) {
        const paper = document.getElementById(paperId);
        const placeholder = document.getElementById(placeholderId);
        const image = new Image();

        image.alt = "EHWA QR code";
        image.decoding = "async";

        image.onload = function () {
          placeholder.remove();
          paper.appendChild(image);
        };

        image.onerror = function () {
          placeholder.hidden = false;
        };

        image.src = src;
      }

      qrSources.forEach(function (source) {
        loadQr(source[0], source[1], source[2]);
      });
    }());
  </script>
</body>
</html>
