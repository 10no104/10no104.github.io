<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EHWA QR Poster</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --ink: #120d0a;
      --brown: #1d130f;
      --wine: #5f1424;
      --gold: #d4af37;
      --paper: #fff7e9;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #0d0907;
      color: #fff7e9;
      font-family: "Noto Sans KR", system-ui, sans-serif;
    }

    .poster {
      position: relative;
      width: min(100vw, 900px);
      aspect-ratio: 4 / 5;
      overflow: hidden;
      isolation: isolate;
      background:
        radial-gradient(circle at 80% 74%, rgba(123, 31, 47, 0.34), transparent 34%),
        radial-gradient(circle at 18% 8%, rgba(212, 175, 55, 0.08), transparent 26%),
        linear-gradient(180deg, #0f0b09 0%, #18100d 48%, #20110f 100%);
    }

    .poster::before {
      content: "";
      position: absolute;
      inset: -3%;
      background: url("assets/pattern.webp") center / 62% auto repeat;
      opacity: 0.34;
      mix-blend-mode: screen;
      filter: saturate(0.75) brightness(0.72);
      z-index: -3;
    }

    .poster::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(90deg, rgba(0, 0, 0, 0.28), transparent 25%, transparent 76%, rgba(0, 0, 0, 0.24)),
        linear-gradient(180deg, rgba(0, 0, 0, 0.16), transparent 38%, rgba(0, 0, 0, 0.4));
      pointer-events: none;
      z-index: 6;
    }

    .brand {
      position: absolute;
      top: 6.2%;
      left: 50%;
      transform: translateX(-50%);
      display: grid;
      justify-items: center;
      gap: 12px;
      z-index: 5;
    }

    .brand img {
      width: clamp(80px, 13vw, 126px);
      height: auto;
      filter: drop-shadow(0 10px 22px rgba(0, 0, 0, 0.38));
    }

    .qr-wrap {
      position: absolute;
      top: 22.8%;
      left: 50%;
      width: 49%;
      transform: translateX(-50%);
      z-index: 4;
    }

    .qr-frame {
      position: relative;
      padding: 5.2%;
      background: rgba(12, 8, 7, 0.68);
      border: 1px solid rgba(212, 175, 55, 0.64);
      box-shadow:
        0 26px 46px rgba(0, 0, 0, 0.34),
        inset 0 0 0 1px rgba(212, 175, 55, 0.28);
    }

    .qr-frame::before,
    .qr-frame::after {
      content: "";
      position: absolute;
      inset: -10px;
      border: 1px solid rgba(212, 175, 55, 0.58);
      clip-path: polygon(
        0 0, 22% 0, 22% 2px, 2px 2px, 2px 22%, 0 22%,
        0 78%, 2px 78%, 2px calc(100% - 2px), 22% calc(100% - 2px), 22% 100%, 0 100%,
        78% 100%, 78% calc(100% - 2px), calc(100% - 2px) calc(100% - 2px), calc(100% - 2px) 78%, 100% 78%,
        100% 22%, calc(100% - 2px) 22%, calc(100% - 2px) 2px, 78% 2px, 78% 0, 100% 0
      );
      pointer-events: none;
    }

    .qr-frame::after {
      inset: -18px;
      opacity: 0.42;
    }

    .qr-paper {
      display: grid;
      place-items: center;
      aspect-ratio: 1;
      padding: 7.5%;
      background:
        linear-gradient(180deg, rgba(255, 252, 246, 0.96), rgba(251, 239, 219, 0.96)),
        url("assets/pattern.webp") center / 92% auto;
      box-shadow: inset 0 0 0 1px rgba(57, 33, 15, 0.08);
    }

    .qr-paper img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
      image-rendering: pixelated;
    }

    .qr-placeholder {
      width: 100%;
      aspect-ratio: 1;
      display: grid;
      place-items: center;
      padding: 12%;
      color: rgba(44, 31, 20, 0.62);
      border: 2px dashed rgba(44, 31, 20, 0.28);
      text-align: center;
      font-weight: 800;
      line-height: 1.45;
    }

    .caption {
      position: absolute;
      top: 66.8%;
      left: 50%;
      transform: translateX(-50%);
      display: grid;
      justify-items: center;
      gap: 8px;
      color: #d8b263;
      text-align: center;
      z-index: 5;
    }

    .caption-title {
      display: flex;
      align-items: center;
      gap: 16px;
      font-size: clamp(1.3rem, 3.6vw, 2.08rem);
      font-weight: 700;
      letter-spacing: 0.34em;
      text-transform: uppercase;
      line-height: 1;
    }

    .caption-title::before,
    .caption-title::after {
      content: "";
      width: 56px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(212, 175, 55, 0.82));
    }

    .caption-title::after {
      background: linear-gradient(90deg, rgba(212, 175, 55, 0.82), transparent);
    }

    .caption-subtitle {
      margin: 0;
      color: rgba(233, 205, 153, 0.9);
      font-size: clamp(0.82rem, 1.8vw, 1.08rem);
      letter-spacing: 0.08em;
    }

    .mountain {
      position: absolute;
      left: -10%;
      bottom: -2%;
      width: 58%;
      opacity: 0.62;
      filter: brightness(0.53) contrast(1.14) sepia(0.22);
      mix-blend-mode: screen;
      z-index: 1;
    }

    .woman {
      position: absolute;
      right: -12%;
      bottom: -10%;
      width: 47%;
      filter: drop-shadow(-22px 28px 36px rgba(0, 0, 0, 0.34));
      z-index: 5;
    }

    .branch {
      position: absolute;
      top: 0.5%;
      right: -4%;
      width: 37%;
      height: 21%;
      opacity: 0.72;
      z-index: 2;
      pointer-events: none;
    }

    .branch svg {
      width: 100%;
      height: 100%;
      overflow: visible;
      filter: drop-shadow(0 8px 12px rgba(0, 0, 0, 0.26));
    }

    .petal {
      position: absolute;
      width: 4.6%;
      opacity: 0.76;
      filter: saturate(0.85) brightness(0.82);
      z-index: 3;
    }

    .petal.p1 { top: 8%; right: 13%; transform: rotate(22deg) scale(0.7); }
    .petal.p2 { top: 21%; left: 15%; transform: rotate(18deg) scale(0.62); }
    .petal.p3 { top: 34%; right: 7%; transform: rotate(-18deg) scale(0.6); }
    .petal.p4 { top: 46%; left: 11%; transform: rotate(-16deg) scale(0.66); }
    .petal.p5 { bottom: 10%; left: 44%; transform: rotate(9deg) scale(0.58); }

    @media (max-width: 720px) {
      .poster {
        width: 100vw;
      }

      .qr-wrap {
        width: 55%;
      }
    }
  </style>
</head>
<body>
  <main class="poster" aria-label="EHWA QR poster">
    <div class="brand">
      <img src="assets/logo-white.webp" alt="EHWA" />
    </div>

    <div class="branch" aria-hidden="true">
      <svg viewBox="0 0 360 190" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M368 25C301 41 258 54 205 83C155 111 111 113 42 101" stroke="#342018" stroke-width="9" stroke-linecap="round"/>
        <path d="M236 66C210 42 198 26 186 5" stroke="#2a1913" stroke-width="5" stroke-linecap="round"/>
        <path d="M184 93C151 78 133 62 116 34" stroke="#2b1b15" stroke-width="5" stroke-linecap="round"/>
        <path d="M291 43C266 24 250 12 230 -3" stroke="#2c1b14" stroke-width="5" stroke-linecap="round"/>
        <g fill="#e6c8b9" opacity="0.88">
          <circle cx="214" cy="79" r="10"/><circle cx="224" cy="71" r="8"/><circle cx="204" cy="68" r="7"/><circle cx="209" cy="91" r="7"/>
          <circle cx="124" cy="99" r="8"/><circle cx="134" cy="94" r="7"/><circle cx="116" cy="89" r="6"/>
          <circle cx="277" cy="49" r="9"/><circle cx="287" cy="43" r="7"/><circle cx="268" cy="39" r="7"/>
          <circle cx="184" cy="15" r="7"/><circle cx="195" cy="12" r="6"/>
        </g>
        <g fill="#b75f66" opacity="0.54">
          <circle cx="216" cy="79" r="4"/><circle cx="126" cy="99" r="3"/><circle cx="278" cy="49" r="4"/><circle cx="185" cy="15" r="3"/>
        </g>
      </svg>
    </div>

    <section class="qr-wrap" aria-label="QR code">
      <div class="qr-frame">
        <div class="qr-paper" id="qrPaper">
          <div class="qr-placeholder" id="qrPlaceholder">QR image<br />assets/qr-code.png<br />or ?qr=...</div>
        </div>
      </div>
    </section>

    <div class="caption">
      <div class="caption-title">Scan Me</div>
      <p class="caption-subtitle">메뉴와 다양한 정보를 확인해보세요</p>
    </div>

    <img class="mountain" src="assets/background수묵.webp" alt="" />
    <img class="woman" src="assets/woman.webp" alt="" />
    <img class="petal p1" src="assets/flower.webp" alt="" />
    <img class="petal p2" src="assets/flower.webp" alt="" />
    <img class="petal p3" src="assets/flower.webp" alt="" />
    <img class="petal p4" src="assets/flower.webp" alt="" />
    <img class="petal p5" src="assets/flower.webp" alt="" />
  </main>

  <script>
    (function () {
      const params = new URLSearchParams(window.location.search);
      const qrSrc = params.get("qr") || "assets/qr-code.png";
      const image = new Image();
      image.alt = "EHWA QR code";
      image.onload = function () {
        const paper = document.getElementById("qrPaper");
        paper.textContent = "";
        paper.appendChild(image);
      };
      image.src = qrSrc;
    }());
  </script>
</body>
</html>
