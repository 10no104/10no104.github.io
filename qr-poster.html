<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EHWA QR Poster</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #120907;
      --bg-deep: #090504;
      --red-stroke: rgba(99, 29, 24, 0.92);
      --gold: #c99a47;
      --gold-soft: rgba(201, 154, 71, 0.5);
      --ivory: #f4eadc;
      --paper: #fbf4e7;
      --paper-shadow: rgba(63, 39, 19, 0.16);
      --brand-mark-width: clamp(30px, 7vw, 44px);
      --brand-title-size: clamp(0.95rem, 3vw, 1.35rem);
      --poster-preview-width: min(38vw, 250px, calc((100vh - 56px) * 0.5));
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: block;
      background:
        radial-gradient(circle at top, #1d0f0d 0%, #0b0605 45%, #050303 100%);
      color: #fff6ea;
      font-family: "Noto Sans KR", system-ui, sans-serif;
    }

    .print-controls {
      width: min(94vw, 1120px);
      margin: 24px auto 0;
      padding: 20px 22px;
      border: 1px solid rgba(201, 154, 71, 0.55);
      background: linear-gradient(145deg, rgba(45, 22, 18, 0.96), rgba(12, 7, 6, 0.98));
      box-shadow: 0 18px 44px rgba(0, 0, 0, 0.34), inset 0 0 0 1px rgba(255, 232, 188, 0.06);
    }

    .print-controls-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 18px;
    }

    .print-controls-title {
      margin: 0;
      color: var(--ivory);
      font-size: 1.08rem;
      font-weight: 700;
      letter-spacing: 0.08em;
    }

    .print-controls-note {
      margin: 5px 0 0;
      color: rgba(244, 234, 220, 0.66);
      font-size: 0.72rem;
      line-height: 1.55;
    }

    .print-capacity {
      flex: 0 0 auto;
      padding: 7px 10px;
      border: 1px solid rgba(201, 154, 71, 0.42);
      color: var(--gold);
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .print-controls-grid {
      display: grid;
      grid-template-columns: minmax(170px, 0.72fr) minmax(320px, 1.28fr);
      gap: 18px;
    }

    .print-controls fieldset {
      min-width: 0;
      margin: 0;
      padding: 14px;
      border: 1px solid rgba(201, 154, 71, 0.28);
    }

    .print-controls legend,
    .qr-settings-title {
      padding: 0 6px;
      color: var(--gold);
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .side-picker {
      display: grid;
      gap: 8px;
    }

    .side-choice {
      display: flex;
      align-items: center;
      gap: 9px;
      min-height: 38px;
      padding: 0 10px;
      border: 1px solid rgba(244, 234, 220, 0.12);
      color: var(--ivory);
      font-size: 0.8rem;
      cursor: pointer;
    }

    .side-choice:has(input:checked) {
      border-color: rgba(201, 154, 71, 0.72);
      background: rgba(201, 154, 71, 0.12);
    }

    .side-choice input {
      accent-color: var(--gold);
    }

    .qr-settings-wrap {
      min-width: 0;
    }

    .qr-settings[hidden] {
      display: none;
    }

    .qr-settings-title {
      display: block;
      margin: 0 0 10px;
      padding: 0;
    }

    .qr-setting-row {
      display: grid;
      grid-template-columns: 92px minmax(0, 1fr);
      align-items: center;
      gap: 10px;
      margin-top: 8px;
    }

    .qr-setting-row label {
      color: rgba(244, 234, 220, 0.72);
      font-size: 0.7rem;
    }

    .qr-setting-row input {
      width: 100%;
      min-width: 0;
      border: 1px solid rgba(244, 234, 220, 0.18);
      border-radius: 2px;
      padding: 8px 9px;
      background: rgba(7, 4, 3, 0.64);
      color: var(--ivory);
      font: inherit;
      font-size: 0.72rem;
      outline: none;
    }

    .qr-setting-row input:focus {
      border-color: rgba(201, 154, 71, 0.82);
      box-shadow: 0 0 0 2px rgba(201, 154, 71, 0.12);
    }

    .qr-setting-row input[type="file"] {
      padding: 5px;
      color: rgba(244, 234, 220, 0.66);
    }

    .qr-setting-row input[type="file"]::file-selector-button {
      margin-right: 8px;
      border: 1px solid rgba(201, 154, 71, 0.5);
      padding: 5px 8px;
      background: rgba(201, 154, 71, 0.12);
      color: var(--gold);
      font: inherit;
      cursor: pointer;
    }

    .print-actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-top: 18px;
    }

    .print-status {
      color: rgba(244, 234, 220, 0.62);
      font-size: 0.7rem;
      line-height: 1.4;
    }

    .print-button {
      border: 1px solid rgba(226, 183, 94, 0.9);
      padding: 10px 18px;
      background: linear-gradient(180deg, #d9aa57, #a9762c);
      color: #1a0c08;
      font: inherit;
      font-size: 0.76rem;
      font-weight: 800;
      letter-spacing: 0.1em;
      cursor: pointer;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.24);
    }

    .print-button:hover {
      filter: brightness(1.08);
    }

    .print-button:disabled {
      cursor: wait;
      filter: saturate(0.55);
      opacity: 0.66;
    }

    .print-preview-label {
      width: min(94vw, 1120px);
      margin: 18px auto 8px;
      color: rgba(244, 234, 220, 0.68);
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .print-sheet {
      position: relative;
      width: min(94vw, 1120px);
      aspect-ratio: 297 / 210;
      margin: 0 auto 22px;
      overflow: hidden;
      border: 1px solid rgba(201, 154, 71, 0.46);
      background: #f5eee2;
      box-shadow: 0 18px 46px rgba(0, 0, 0, 0.36);
    }

    .print-sheet::after {
      content: "";
      display: none;
      position: absolute;
      inset: 0;
      place-items: center;
      background: rgba(245, 238, 226, 0.94);
      color: #6f4a24;
      font-size: clamp(0.72rem, 1.4vw, 0.95rem);
      font-weight: 700;
      letter-spacing: 0.08em;
      text-align: center;
      z-index: 2;
    }

    .print-sheet.is-capturing::after {
      content: "CSS 완성본을 이미지로 캡처하는 중…";
      display: grid;
    }

    .print-sheet.is-capture-error::after {
      content: "이미지 캡처 실패 · 위 버튼으로 다시 시도해 주세요";
      display: grid;
      color: #8b2f26;
    }

    .print-sheet-grid {
      display: grid;
      grid-template-columns: repeat(5, 16.835%);
      grid-template-rows: repeat(2, 47.619%);
      column-gap: 0.67%;
      row-gap: 0.95%;
      align-content: center;
      justify-content: center;
      width: 100%;
      height: 100%;
    }

    .print-copy {
      display: block;
      width: 100%;
      height: 100%;
      min-width: 0;
      padding: 0;
      border: 0;
      background: transparent;
      box-shadow: none;
      object-fit: fill;
    }

    .print-sheet-grid .print-copy {
      aspect-ratio: 1 / 2;
    }

    .poster-stage {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 24px;
      padding: 28px;
      overflow-x: auto;
    }

    .poster-frame {
      position: relative;
      width: var(--poster-preview-width);
      aspect-ratio: 1 / 2;
      padding: 4px 2px;
      border: 1px solid rgba(201, 154, 71, 0.6);
      background: linear-gradient(145deg, rgba(39, 20, 16, 0.94), rgba(9, 5, 4, 0.98));
      box-shadow: 0 24px 72px rgba(0, 0, 0, 0.52), inset 0 0 0 1px rgba(255, 232, 188, 0.08);
    }

    .poster-frame::before {
      content: "";
      position: absolute;
      inset: 4px;
      border: 1px solid rgba(201, 154, 71, 0.22);
      pointer-events: none;
    }

    .poster {
      position: relative;
      width: 100%;
      height: 100%;
      container-type: inline-size;
      overflow: hidden;
      isolation: isolate;
      background:
        radial-gradient(circle at 50% 38%, rgba(96, 21, 18, 0.26), transparent 26%),
        radial-gradient(circle at 72% 72%, rgba(92, 12, 18, 0.18), transparent 22%),
        linear-gradient(180deg, #140b09 0%, #100807 48%, #120707 100%);
      box-shadow: 0 3.6cqw 9.6cqw rgba(0, 0, 0, 0.36);
      --brand-mark-width: clamp(20px, 10.5cqw, 34px);
      --brand-title-size: clamp(0.7rem, 5.3cqw, 1.05rem);
    }

    .poster--front {
      background:
        radial-gradient(ellipse at 50% 7%, rgba(220, 72, 45, 0.44), rgba(132, 24, 32, 0.16) 36%, transparent 62%),
        radial-gradient(circle at 10% 0%, rgba(126, 19, 31, 0.58), transparent 36%),
        linear-gradient(180deg, #50141b 0%, #2a0d12 22%, #110807 54%, #120707 100%);
    }

    .poster::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        url("assets/pattern.webp") center top / 82% auto repeat;
      opacity: 0.36;
      mix-blend-mode: screen;
      filter: saturate(1.2) brightness(0.84) sepia(0.3);
      z-index: -3;
    }

    .poster--front::before {
      inset: 0 0 auto;
      height: 67%;
      mask-image: linear-gradient(180deg, #000 0 70%, transparent 100%);
      -webkit-mask-image: linear-gradient(180deg, #000 0 70%, transparent 100%);
    }

    .poster::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 50% 35%, transparent 0 28%, rgba(0, 0, 0, 0.18) 58%, rgba(0, 0, 0, 0.44) 100%),
        linear-gradient(180deg, rgba(0, 0, 0, 0.16), transparent 24%, transparent 72%, rgba(0, 0, 0, 0.36)),
        linear-gradient(90deg, rgba(0, 0, 0, 0.16), transparent 18%, transparent 84%, rgba(0, 0, 0, 0.14));
      pointer-events: none;
      z-index: 9;
    }

    .poster-shadow {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 22% 80%, rgba(128, 24, 40, 0.18), transparent 22%),
        radial-gradient(circle at 80% 64%, rgba(104, 10, 18, 0.12), transparent 20%);
      z-index: 0;
    }

    .brand {
      position: absolute;
      top: 2.4%;
      left: 50%;
      transform: translateX(-50%);
      display: grid;
      justify-items: center;
      gap: 0;
      width: 84%;
      z-index: 13;
      text-align: center;
    }

    .brand-mark {
      width: var(--brand-mark-width);
      height: auto;
      filter: drop-shadow(0 3cqw 5.4cqw rgba(0, 0, 0, 0.34));
    }

    .brand-name {
      margin-top: 0.9cqw;
      color: var(--ivory);
      font-family: "Pretendard", "Noto Sans KR", system-ui, sans-serif;
      font-size: var(--brand-title-size);
      line-height: 0.95;
      letter-spacing: 0.22em;
      font-weight: 500;
      text-shadow: 0 1.8cqw 5.4cqw rgba(0, 0, 0, 0.36);
    }

    .brand-location {
      margin-top: 0.6cqw;
      color: rgba(244, 234, 220, 0.7);
      font-size: clamp(0.38rem, 2.8cqw, 0.58rem);
      font-weight: 600;
      letter-spacing: 0.14em;
      line-height: 0.82;
    }

    .qr-wrap {
      position: absolute;
      top: 16.8%;
      left: 50%;
      width: 80%;
      transform: translateX(-50%);
      z-index: 13;
    }

    .qr-frame {
      position: relative;
      padding: 3.5%;
      background:
        linear-gradient(180deg, rgba(21, 13, 10, 0.72), rgba(15, 10, 8, 0.84));
      border: 0.3cqw solid rgba(199, 155, 66, 0.74);
      box-shadow:
        inset 0 0 0 0.3cqw rgba(199, 155, 66, 0.2),
        0 6cqw 12cqw rgba(0, 0, 0, 0.24);
    }

    .qr-frame::before,
    .qr-frame::after {
      content: "";
      position: absolute;
      inset: -2.7cqw;
      border: 0.3cqw solid rgba(199, 155, 66, 0.8);
      clip-path: polygon(
        0 0, 12% 0, 12% 2.4cqw, 2.4cqw 2.4cqw, 2.4cqw 12%, 0 12%,
        0 88%, 2.4cqw 88%, 2.4cqw calc(100% - 2.4cqw), 12% calc(100% - 2.4cqw), 12% 100%, 0 100%,
        88% 100%, 88% calc(100% - 2.4cqw), calc(100% - 2.4cqw) calc(100% - 2.4cqw), calc(100% - 2.4cqw) 88%, 100% 88%,
        100% 12%, calc(100% - 2.4cqw) 12%, calc(100% - 2.4cqw) 2.4cqw, 88% 2.4cqw, 88% 0, 100% 0
      );
      pointer-events: none;
    }

    .qr-frame::after {
      inset: -4.5cqw;
      opacity: 0.5;
    }

    .qr-paper {
      position: relative;
      display: grid;
      place-items: center;
      aspect-ratio: 1;
      padding: 4%;
      background:
        radial-gradient(circle at 50% 42%, rgba(255, 255, 255, 0.78), rgba(250, 243, 228, 0.92)),
        linear-gradient(180deg, rgba(255, 250, 242, 0.96), rgba(250, 241, 225, 0.96)),
        url("assets/@UnSiBcGoZXjyPzA.webp") center / cover;
      box-shadow:
        inset 0 0 0 0.3cqw rgba(73, 49, 24, 0.08),
        0 0 5.4cqw rgba(255, 246, 232, 0.1);
    }

    .qr-paper img {
      position: relative;
      z-index: 1;
    }

    .qr-center-number {
      position: absolute;
      top: 50%;
      left: 50%;
      z-index: 2;
      display: grid;
      place-items: center;
      min-width: 19%;
      min-height: 19%;
      max-width: 38%;
      padding: 0.2em 0.35em;
      transform: translate(-50%, -50%);
      border: 0.3cqw solid rgba(55, 35, 18, 0.18);
      border-radius: 999px;
      background: rgba(251, 244, 231, 0.97);
      color: #26160f;
      font-family: "Pretendard", "Noto Sans KR", system-ui, sans-serif;
      font-size: clamp(0.42rem, 3.95cqw, 0.82rem);
      font-weight: 800;
      line-height: 1;
      white-space: nowrap;
      box-shadow: 0 0.3cqw 1.2cqw rgba(38, 22, 15, 0.18);
      pointer-events: none;
    }

    .qr-center-number[hidden] {
      display: none;
    }

    .qr-paper img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
      image-rendering: pixelated;
      filter: contrast(1.02);
    }

    .caption {
      position: absolute;
      top: 59.2%;
      left: 50%;
      transform: translateX(-50%);
      display: grid;
      justify-items: center;
      gap: 0;
      color: var(--gold);
      text-align: center;
      z-index: 13;
    }

    .caption-title {
      display: flex;
      align-items: center;
      gap: 2.4cqw;
      white-space: nowrap;
      font-family: "Noto Sans KR", system-ui, sans-serif;
      font-size: clamp(0.42rem, 3.47cqw, 0.72rem);
      line-height: 1.2;
      font-weight: 700;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      text-shadow: 0 0.9cqw 3cqw rgba(0, 0, 0, 0.34);
    }

    .caption-title::before,
    .caption-title::after {
      content: "";
      width: 9cqw;
      height: 1.8cqw;
      background:
        linear-gradient(90deg, transparent, var(--gold-soft)),
        linear-gradient(90deg, transparent, transparent 42%, var(--gold) 42%, var(--gold) 58%, transparent 58%);
      mask:
        linear-gradient(90deg, transparent 0 12%, #000 12% 88%, transparent 88%),
        radial-gradient(circle at 18% 50%, #000 0 1.2cqw, transparent 1.5cqw),
        radial-gradient(circle at 82% 50%, #000 0 1.2cqw, transparent 1.5cqw);
      mask-composite: add;
      opacity: 0.95;
    }

    .caption-title::after {
      transform: scaleX(-1);
    }

    .cloud-band {
      position: absolute;
      left: -10%;
      bottom: 7%;
      width: 120%;
      height: 18%;
      object-fit: cover;
      object-position: center 48%;
      opacity: 0.2;
      filter: brightness(0.58) saturate(0.74) sepia(0.26) drop-shadow(0 0.9cqw 1.8cqw rgba(0, 0, 0, 0.38));
      mix-blend-mode: screen;
      mask-image: linear-gradient(180deg, transparent, #000 18%, #000 82%, transparent);
      pointer-events: none;
      z-index: 2;
    }

    .gwanghwamun-scene {
      position: absolute;
      left: -10%;
      bottom: 1.5%;
      width: 120%;
      height: 29%;
      object-fit: cover;
      object-position: center 57%;
      opacity: 0.9;
      filter: grayscale(0.03) sepia(0.5) saturate(1.36) brightness(1.02) contrast(1.12);
      mix-blend-mode: screen;
      mask-image: linear-gradient(180deg, transparent 0%, transparent 14%, #000 32%, #000 82%, transparent 100%);
      pointer-events: none;
      z-index: 10;
    }

    .petal-drift {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 14;
    }

    .petal-drift span {
      position: absolute;
      display: block;
      width: 3.6cqw;
      height: 6cqw;
      border-radius: 100% 0 100% 0;
      background: linear-gradient(135deg, #d04a72, #8e1746);
      box-shadow: 0 3px 8px rgba(0, 0, 0, 0.24);
      opacity: 0.72;
    }

    .petal-drift .petal-one {
      top: 17%;
      right: 14%;
      transform: rotate(28deg) scale(0.9);
    }

    .petal-drift .petal-two {
      top: 34%;
      left: 12%;
      transform: rotate(-34deg) scale(0.75);
    }

    .petal-drift .petal-three {
      top: 48%;
      left: auto;
      right: 12%;
      transform: rotate(46deg) scale(0.78);
    }

    .petal-drift .petal-four {
      top: 76%;
      left: 20%;
      transform: rotate(-18deg) scale(0.7);
    }

    .petal-drift .petal-five {
      top: 87%;
      right: 43%;
      transform: rotate(22deg) scale(0.64);
    }

    .petal-drift .petal-six {
      top: 62%;
      left: 58%;
      transform: rotate(64deg) scale(0.58);
      opacity: 0.58;
    }

    .petal-drift .petal-seven {
      top: 79%;
      right: 68%;
      transform: rotate(-42deg) scale(0.52);
      opacity: 0.54;
    }

    .petal-drift .petal-eight {
      top: 25%;
      left: 7%;
      transform: rotate(18deg) scale(0.42);
      opacity: 0.48;
    }

    .petal-drift .petal-nine {
      top: 44%;
      right: 6%;
      transform: rotate(-26deg) scale(0.5);
      opacity: 0.5;
    }

    .petal-drift .petal-ten {
      top: 67%;
      left: 10%;
      transform: rotate(52deg) scale(0.46);
      opacity: 0.46;
    }

    .ground {
      position: absolute;
      left: -4%;
      right: 0;
      bottom: -9%;
      height: 34%;
      background:
        radial-gradient(circle at 22% 38%, rgba(255, 255, 255, 0.05), transparent 18%),
        radial-gradient(circle at 43% 20%, rgba(255, 255, 255, 0.02), transparent 16%),
        linear-gradient(180deg, rgba(17, 11, 10, 0), rgba(12, 7, 7, 0.72) 42%, rgba(5, 3, 3, 0.95));
      z-index: 1;
    }

    .woman {
      position: absolute;
      left: auto;
      right: 1.5%;
      bottom: 1%;
      width: 43%;
      filter: drop-shadow(-5.4cqw 6.6cqw 9cqw rgba(0, 0, 0, 0.4));
      z-index: 12;
    }

    .poster--back {
      background:
        radial-gradient(circle at 50% 28%, rgba(112, 28, 24, 0.22), transparent 30%),
        linear-gradient(180deg, #160b09 0%, #100706 52%, #0c0505 100%);
    }

    .poster--back::before {
      inset: 0;
      opacity: 0.22;
    }

    .back-heading {
      position: absolute;
      top: 3.8%;
      left: 50%;
      transform: translateX(-50%);
      display: grid;
      justify-items: center;
      gap: 0;
      width: 84%;
      text-align: center;
      z-index: 13;
    }

    .back-heading .brand-mark {
      display: block;
      margin: 0;
    }

    .back-kicker {
      margin-top: 1.8cqw;
      color: var(--gold);
      font-size: clamp(0.42rem, 3.47cqw, 0.72rem);
      font-weight: 700;
      letter-spacing: 0.28em;
      text-transform: uppercase;
    }

    .back-qr-grid {
      position: absolute;
      top: 25.5%;
      left: 22%;
      width: 56%;
      display: grid;
      grid-template-columns: 1fr;
      gap: 3.5%;
      z-index: 13;
    }

    .back-qr-card {
      position: relative;
      padding: 5%;
      background: rgba(17, 10, 8, 0.72);
      border: 0.3cqw solid rgba(199, 155, 66, 0.68);
      box-shadow: inset 0 0 0 0.3cqw rgba(199, 155, 66, 0.16), 0 4.2cqw 8.4cqw rgba(0, 0, 0, 0.24);
    }

    .back-qr-card::before {
      content: "";
      position: absolute;
      inset: 1.5cqw;
      border: 0.3cqw solid rgba(199, 155, 66, 0.28);
      pointer-events: none;
    }

    .back-qr-label {
      margin-bottom: 4%;
      color: var(--gold);
      font-size: clamp(0.42rem, 3.86cqw, 0.8rem);
      font-weight: 700;
      letter-spacing: 0.2em;
      text-align: center;
      text-transform: uppercase;
    }

    .back-qr-paper {
      padding: 5%;
    }

    .back-petals {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: fill;
      opacity: 0.24;
      mix-blend-mode: screen;
      pointer-events: none;
      z-index: 8;
    }

    @page {
      size: A4 landscape;
      margin: 0;
    }

    @media print {
      body {
        min-height: auto;
        background: #fff;
      }

      .print-controls,
      .print-preview-label,
      .poster-stage {
        display: none !important;
      }

      .print-sheet {
        display: block;
        width: 297mm;
        height: 210mm;
        margin: 0;
        border: 0;
        box-shadow: none;
        background: #fff;
      }

      .print-sheet-grid {
        grid-template-columns: repeat(5, 50mm);
        grid-template-rows: repeat(2, 100mm);
        column-gap: 2mm;
        row-gap: 2mm;
        width: 297mm;
        height: 210mm;
      }

      .print-copy {
        width: 50mm;
        height: 100mm;
        padding: 0;
        border: 0;
        background: transparent;
        box-shadow: none;
      }
    }

    @media (max-width: 720px) {
      body {
        background: #0a0504;
      }

      .poster-stage {
        align-items: flex-start;
        justify-content: flex-start;
        gap: 14px;
        padding: 16px;
      }

      .poster-frame {
        width: min(42vw, 250px, calc((100vh - 48px) * 0.5));
        padding: 4px 2px;
      }

      .poster {
        width: 100%;
      }

      .print-controls {
        margin-top: 16px;
        padding: 16px;
      }

      .print-controls-header {
        display: block;
      }

      .print-capacity {
        display: inline-block;
        margin-top: 12px;
      }

      .print-controls-grid {
        grid-template-columns: 1fr;
        gap: 12px;
      }

      .print-actions {
        align-items: flex-start;
        flex-direction: column;
      }

      .print-button {
        width: 100%;
      }

      .print-sheet {
        width: 94vw;
      }

      .qr-wrap {
        top: 16.8%;
        width: 80%;
      }

      .caption {
        top: 59.2%;
      }

      .caption-title {
        gap: 1.8cqw;
        font-size: 3.47cqw;
        letter-spacing: 0.22em;
      }

      .caption-title::before,
      .caption-title::after {
        width: 6cqw;
      }

      .woman {
        width: 43%;
        left: auto;
        right: 1.5%;
      }

      .back-qr-grid {
        top: 29.5%;
        left: 22%;
        width: 56%;
        gap: 3.5%;
      }

      .back-heading {
        top: 1.2%;
      }

      .brand {
        top: 1.2%;
      }

      .back-kicker {
        margin-top: 1.8cqw;
        font-size: 2.8cqw;
      }
    }
  </style>
</head>
<body>
  <section class="print-controls" aria-label="A4 print settings">
    <div class="print-controls-header">
      <div>
        <h1 class="print-controls-title">A4 PRINT SETUP</h1>
        <p class="print-controls-note">하단 CSS 완성본을 고해상도 이미지로 캡처해 A4 가로 용지에 10장 배치합니다. 금색 테두리 포함 정확히 5×10cm이며, 앞면 QR은 3×3cm 이상입니다.</p>
      </div>
      <div class="print-capacity">A4 LANDSCAPE · 10 COPIES</div>
    </div>

    <div class="print-controls-grid">
      <fieldset>
        <legend>Print side</legend>
        <div class="side-picker">
          <label class="side-choice">
            <input type="radio" name="printSide" value="front" checked />
            <span>앞면만 인쇄</span>
          </label>
          <label class="side-choice">
            <input type="radio" name="printSide" value="back" />
            <span>뒷면만 인쇄</span>
          </label>
        </div>
      </fieldset>

      <div class="qr-settings-wrap">
        <div class="qr-settings" data-side-settings="front">
          <span class="qr-settings-title">Front QR</span>
          <div class="qr-setting-row">
            <label for="qrFrontUrl">이미지 주소</label>
            <input id="qrFrontUrl" type="url" placeholder="QR 이미지 URL 또는 data URL" autocomplete="off" />
          </div>
          <div class="qr-setting-row">
            <label for="qrFrontFile">이미지 파일</label>
            <input id="qrFrontFile" type="file" accept="image/*" />
          </div>
          <div class="qr-setting-row">
            <label for="qrFrontNumber">중앙 숫자</label>
            <input id="qrFrontNumber" type="text" inputmode="numeric" maxlength="3" placeholder="예: 01" autocomplete="off" />
          </div>
        </div>

        <div class="qr-settings" data-side-settings="back" hidden>
          <span class="qr-settings-title">Back QR</span>
          <div class="qr-setting-row">
            <label for="qrBackMenuUrl">Menu 주소</label>
            <input id="qrBackMenuUrl" type="url" placeholder="Menu QR 이미지 URL" autocomplete="off" />
          </div>
          <div class="qr-setting-row">
            <label for="qrBackMenuFile">Menu 파일</label>
            <input id="qrBackMenuFile" type="file" accept="image/*" />
          </div>
          <div class="qr-setting-row">
            <label for="qrBackMenuNumber">Menu 숫자</label>
            <input id="qrBackMenuNumber" type="text" inputmode="numeric" maxlength="3" placeholder="예: 01" autocomplete="off" />
          </div>
          <div class="qr-setting-row">
            <label for="qrBackStoryUrl">Story 주소</label>
            <input id="qrBackStoryUrl" type="url" placeholder="Story QR 이미지 URL" autocomplete="off" />
          </div>
          <div class="qr-setting-row">
            <label for="qrBackStoryFile">Story 파일</label>
            <input id="qrBackStoryFile" type="file" accept="image/*" />
          </div>
          <div class="qr-setting-row">
            <label for="qrBackStoryNumber">Story 숫자</label>
            <input id="qrBackStoryNumber" type="text" inputmode="numeric" maxlength="3" placeholder="예: 02" autocomplete="off" />
          </div>
        </div>
      </div>
    </div>

    <div class="print-actions">
      <div class="print-status" id="printStatus">하단 CSS 완성본을 캡처해 A4 미리보기를 준비합니다.</div>
      <button class="print-button" id="printButton" type="button">A4 인쇄 미리보기</button>
    </div>
  </section>

  <div class="print-preview-label">A4 preview</div>
  <section class="print-sheet" id="printSheet" aria-label="A4 print preview">
    <div class="print-sheet-grid" id="printSheetGrid"></div>
  </section>

  <div class="poster-stage">
    <div class="poster-frame" data-side="front">
      <main class="poster poster--front" data-side="front" aria-label="EHWA QR poster front">
        <div class="poster-shadow" aria-hidden="true"></div>
        <div class="petal-drift" aria-hidden="true">
          <span class="petal-one"></span>
          <span class="petal-two"></span>
          <span class="petal-three"></span>
          <span class="petal-four"></span>
          <span class="petal-five"></span>
          <span class="petal-six"></span>
          <span class="petal-seven"></span>
          <span class="petal-eight"></span>
          <span class="petal-nine"></span>
          <span class="petal-ten"></span>
        </div>
        <div class="brand">
          <img class="brand-mark" src="assets/cropped-logo-white.webp" alt="EHWA" />
          <div class="brand-name">EHWA</div>
          <div class="brand-location">Downtown</div>
        </div>

        <section class="qr-wrap" aria-label="Front QR code">
          <div class="qr-frame">
            <div class="qr-paper" id="qrPaper" data-qr-slot="front" aria-label="Menu QR code">
              <span class="qr-center-number" aria-hidden="true" hidden></span>
            </div>
          </div>
        </section>

        <div class="caption">
          <div class="caption-title">View Menu</div>
        </div>

        <img class="gwanghwamun-scene" src="assets/gwanghwamun-still.png" alt="" />
        <img class="cloud-band" src="assets/clouds.webp" alt="" />
        <div class="ground" aria-hidden="true"></div>
        <img class="woman" src="assets/woman-578x1024.webp" alt="" />
      </main>
    </div>

    <div class="poster-frame" data-side="back">
      <main class="poster poster--back" data-side="back" aria-label="EHWA QR poster back">
        <div class="poster-shadow" aria-hidden="true"></div>
        <img class="back-petals" src="assets/flower.webp" alt="" />
        <div class="back-heading">
          <img class="brand-mark" src="assets/cropped-logo-white.webp" alt="EHWA" />
          <div class="brand-name">EHWA</div>
          <div class="brand-location">Downtown</div>
          <div class="back-kicker">Keep in touch with us</div>
        </div>

        <section class="back-qr-grid" aria-label="Back QR codes">
          <div class="back-qr-card">
            <div class="back-qr-label">Menu</div>
            <div class="qr-paper back-qr-paper" id="qrPaperBackOne" data-qr-slot="backMenu" aria-label="Menu QR code">
              <span class="qr-center-number" aria-hidden="true" hidden></span>
            </div>
          </div>
          <div class="back-qr-card">
            <div class="back-qr-label">Story</div>
            <div class="qr-paper back-qr-paper" id="qrPaperBackTwo" data-qr-slot="backStory" aria-label="Story QR code">
              <span class="qr-center-number" aria-hidden="true" hidden></span>
            </div>
          </div>
        </section>

        <div class="ground" aria-hidden="true"></div>
      </main>
    </div>
  </div>

  <script src="assets/html2canvas.min.js"></script>
  <script>
    (function () {
      const params = new URLSearchParams(window.location.search);
      if (params.get("capture") === "front") {
        document.documentElement.classList.add("poster-capture-front");
      }
      const printSheetGrid = document.getElementById("printSheetGrid");
      const printSheet = document.getElementById("printSheet");
      const printStatus = document.getElementById("printStatus");
      const printButton = document.getElementById("printButton");
      const sideSettings = Array.from(document.querySelectorAll("[data-side-settings]"));
      const sideInputs = Array.from(document.querySelectorAll('input[name="printSide"]'));
      let selectedSide = "front";
      let renderedSide = "";
      let captureRequest = 0;
      let captureTimer = 0;

      const slots = {
        front: {
          paperId: "qrPaper",
          urlId: "qrFrontUrl",
          fileId: "qrFrontFile",
          numberId: "qrFrontNumber",
          source: params.get("qr") || "",
          number: params.get("qrNumber") || ""
        },
        backMenu: {
          paperId: "qrPaperBackOne",
          urlId: "qrBackMenuUrl",
          fileId: "qrBackMenuFile",
          numberId: "qrBackMenuNumber",
          source: params.get("qr2") || "",
          number: params.get("qr2Number") || ""
        },
        backStory: {
          paperId: "qrPaperBackTwo",
          urlId: "qrBackStoryUrl",
          fileId: "qrBackStoryFile",
          numberId: "qrBackStoryNumber",
          source: params.get("qr3") || "",
          number: params.get("qr3Number") || ""
        }
      };

      function renderQr(paper, slot) {
        if (!paper) return;

        paper.querySelectorAll("img").forEach(function (image) {
          image.remove();
        });

        const number = paper.querySelector(".qr-center-number");
        if (number) {
          number.textContent = slot.number;
          number.hidden = !slot.number;
        }

        if (!slot.source) return;

        const image = new Image();
        image.alt = "EHWA QR code";
        image.decoding = "async";
        image.src = slot.source;
        paper.insertBefore(image, paper.querySelector(".qr-center-number"));
      }

      function updateSlot(slot) {
        renderQr(document.getElementById(slot.paperId), slot);
      }

      function waitForArtwork(frame) {
        const images = Array.from(frame.querySelectorAll("img"));
        const imageTasks = images.map(function (image) {
          if (image.complete) {
            return image.naturalWidth > 0 && typeof image.decode === "function"
              ? image.decode().catch(function () {})
              : Promise.resolve();
          }

          return new Promise(function (resolve) {
            image.addEventListener("load", resolve, { once: true });
            image.addEventListener("error", resolve, { once: true });
          });
        });

        if (document.fonts && document.fonts.ready) {
          imageTasks.push(Promise.race([
            document.fonts.ready,
            new Promise(function (resolve) { window.setTimeout(resolve, 2000); })
          ]));
        }

        return Promise.all(imageTasks);
      }

      async function captureArtwork(side) {
        const frame = document.querySelector('.poster-stage .poster-frame[data-side="' + side + '"]');
        if (!frame) throw new Error("완성본을 찾을 수 없습니다.");
        if (typeof window.html2canvas !== "function") throw new Error("캡처 모듈을 불러오지 못했습니다.");

        await waitForArtwork(frame);
        const frameWidth = frame.getBoundingClientRect().width;
        const captureScale = Math.max(4, 1000 / Math.max(frameWidth, 1));

        const canvas = await window.html2canvas(frame, {
          backgroundColor: null,
          scale: captureScale,
          useCORS: true,
          allowTaint: false,
          logging: false,
          imageTimeout: 15000,
          removeContainer: true
        });

        return canvas.toDataURL("image/png");
      }

      function paintPrintSheet(dataUrl, side) {
        const fragment = document.createDocumentFragment();
        const copies = [];
        const sideName = side === "front" ? "앞면" : "뒷면";

        for (let index = 0; index < 10; index += 1) {
          const copy = new Image();
          copy.className = "print-copy";
          copy.src = dataUrl;
          copy.alt = sideName + " 포스터 " + (index + 1);
          copy.decoding = "sync";
          fragment.appendChild(copy);
          copies.push(copy);
        }

        printSheetGrid.replaceChildren(fragment);
        return Promise.all(copies.map(function (copy) {
          return typeof copy.decode === "function" ? copy.decode().catch(function () {}) : Promise.resolve();
        }));
      }

      async function buildPrintSheet() {
        if (!printSheetGrid || !printSheet) return false;

        const request = ++captureRequest;
        const side = selectedSide;
        const sideName = side === "front" ? "앞면" : "뒷면";
        if (renderedSide !== side) printSheetGrid.replaceChildren();
        printSheet.classList.remove("is-capture-error");
        printSheet.classList.add("is-capturing");
        printStatus.textContent = sideName + " CSS 완성본을 고해상도로 캡처하는 중입니다…";
        printButton.disabled = true;

        try {
          const dataUrl = await captureArtwork(side);
          if (request !== captureRequest || side !== selectedSide) return false;

          await paintPrintSheet(dataUrl, side);
          renderedSide = side;
          printSheet.classList.remove("is-capturing", "is-capture-error");
          printStatus.textContent = sideName + " 완성본 캡처 10장이 A4에 배치되었습니다. 외곽 금색 테두리 포함 5×10cm입니다.";
          return true;
        } catch (error) {
          if (request !== captureRequest) return false;
          console.error(error);
          printSheet.classList.remove("is-capturing");
          printSheet.classList.add("is-capture-error");
          const reason = error && error.message ? " (" + error.message + ")" : "";
          printStatus.textContent = "CSS 완성본 이미지 캡처에 실패했습니다" + reason + ". A4 인쇄 미리보기 버튼으로 다시 시도해 주세요.";
          return false;
        } finally {
          if (request === captureRequest) printButton.disabled = false;
        }
      }

      function queuePrintSheet() {
        window.clearTimeout(captureTimer);
        captureRequest += 1;
        captureTimer = window.setTimeout(buildPrintSheet, 160);
      }

      function showSelectedSettings() {
        sideSettings.forEach(function (settings) {
          settings.hidden = settings.dataset.sideSettings !== selectedSide;
        });
        window.clearTimeout(captureTimer);
        buildPrintSheet();
      }

      function bindSlot(slot) {
        const urlInput = document.getElementById(slot.urlId);
        const fileInput = document.getElementById(slot.fileId);
        const numberInput = document.getElementById(slot.numberId);

        if (urlInput) {
          urlInput.value = slot.source.startsWith("data:") ? "" : slot.source;
          urlInput.addEventListener("input", function () {
            slot.source = urlInput.value.trim();
            if (fileInput) fileInput.value = "";
            updateSlot(slot);
            queuePrintSheet();
          });
        }

        if (fileInput) {
          fileInput.addEventListener("change", function () {
            const file = fileInput.files && fileInput.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.addEventListener("load", function () {
              slot.source = typeof reader.result === "string" ? reader.result : "";
              if (urlInput) urlInput.value = "";
              updateSlot(slot);
              queuePrintSheet();
            });
            reader.readAsDataURL(file);
          });
        }

        if (numberInput) {
          numberInput.value = slot.number;
          numberInput.addEventListener("input", function () {
            slot.number = numberInput.value.replace(/[^0-9]/g, "").slice(0, 3);
            numberInput.value = slot.number;
            updateSlot(slot);
            queuePrintSheet();
          });
        }

        updateSlot(slot);
      }

      Object.values(slots).forEach(bindSlot);

      sideInputs.forEach(function (input) {
        input.addEventListener("change", function () {
          if (!input.checked) return;
          selectedSide = input.value;
          showSelectedSettings();
        });
      });

      printButton.addEventListener("click", async function () {
        window.clearTimeout(captureTimer);
        const ready = await buildPrintSheet();
        if (ready) window.print();
      });

      showSelectedSettings();
    }());
  </script>
</body>
</html>
