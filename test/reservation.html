<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reserve | EHWA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/global.css?v=20260423-6" />
  <style>
    :root {
      --ink: #201712;
      --muted: #74665b;
      --wine: #7b1f2f;
      --gold: #d4af37;
      --line: rgba(255, 255, 255, 0.12);
      --paper-line: rgba(113, 88, 60, 0.18);
      --shadow: 0 30px 64px rgba(17, 11, 8, 0.24);
      --radius-xl: 28px;
      --radius-lg: 20px;
      --radius-md: 15px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: "Noto Sans KR", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        linear-gradient(180deg, rgba(14, 10, 8, 0.62), rgba(14, 10, 8, 0.68)),
        url("../assets/background수묵.webp") center top / cover no-repeat,
        linear-gradient(180deg, #171210 0%, #0f0c0a 100%);
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at top left, rgba(212, 175, 55, 0.14), transparent 28%),
        radial-gradient(circle at 88% 14%, rgba(123, 31, 47, 0.16), transparent 24%),
        url("../assets/pattern.webp") center / 760px auto;
      opacity: 0.18;
      pointer-events: none;
      z-index: -2;
    }

    body::after {
      content: "";
      position: fixed;
      inset: auto -80px -120px auto;
      width: 340px;
      height: 340px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(212, 175, 55, 0.18), transparent 72%);
      filter: blur(18px);
      pointer-events: none;
      z-index: -1;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .shell {
      width: min(100% - 18px, 760px);
      margin: 0 auto;
      padding: 18px 0 40px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .logo-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 62px;
      height: 62px;
      border-radius: 999px;
      background: linear-gradient(180deg, rgba(255, 254, 250, 0.98), rgba(243, 231, 215, 0.94));
      border: 1px solid rgba(255, 255, 255, 0.24);
      box-shadow: 0 14px 28px rgba(0, 0, 0, 0.16);
      flex: none;
    }

    .logo-link img {
      width: 42px;
      height: 42px;
      object-fit: contain;
    }

    .brand h1 {
      margin: 0;
      color: #fff8f0;
      font-size: clamp(1.45rem, 6vw, 2.2rem);
      letter-spacing: -0.05em;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 0 14px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(255, 250, 243, 0.08);
      backdrop-filter: blur(10px);
      color: #fff7ef;
      font-size: 0.92rem;
      font-weight: 700;
      white-space: nowrap;
    }

    .booking-card {
      position: relative;
      border: 1px solid var(--line);
      border-radius: var(--radius-xl);
      background:
        linear-gradient(135deg, rgba(22, 15, 11, 0.96) 0%, rgba(37, 23, 16, 0.94) 45%, rgba(68, 24, 33, 0.92) 100%),
        url("../assets/pattern.webp") center / 520px auto;
      box-shadow: var(--shadow);
      overflow: hidden;
      backdrop-filter: blur(8px);
    }

    .booking-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at top left, rgba(212, 175, 55, 0.16), transparent 30%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.02), rgba(255, 255, 255, 0)),
        url("../assets/pattern.webp") center / 460px auto;
      opacity: 0.24;
      pointer-events: none;
    }

    .booking-form {
      position: relative;
      z-index: 1;
      display: grid;
      gap: 16px;
      padding: 18px;
    }

    .field-grid {
      display: grid;
      gap: 14px;
    }

    .field {
      display: grid;
      gap: 8px;
    }

    label {
      font-size: 0.92rem;
      font-weight: 700;
      color: rgba(255, 248, 240, 0.92);
    }

    input,
    textarea {
      width: 100%;
      padding: 14px 15px;
      border: 1px solid var(--paper-line);
      border-radius: var(--radius-md);
      background: rgba(255, 252, 247, 0.97);
      color: #1f1712;
      font: inherit;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
      appearance: none;
      -webkit-appearance: none;
    }

    input:focus,
    textarea:focus,
    .picker-trigger:focus {
      border-color: rgba(123, 31, 47, 0.38);
      box-shadow: 0 0 0 4px rgba(123, 31, 47, 0.1);
      background: #fff;
    }

    input::placeholder,
    textarea::placeholder {
      color: #897a6d;
    }

    textarea {
      min-height: 120px;
      resize: vertical;
    }

    .picker-trigger {
      width: 100%;
      min-height: 53px;
      padding: 14px 15px;
      border: 1px solid var(--paper-line);
      border-radius: var(--radius-md);
      background: rgba(255, 252, 247, 0.97);
      color: #1f1712;
      font: inherit;
      text-align: left;
      cursor: pointer;
      outline: none;
      position: relative;
    }

    .picker-trigger::after {
      content: "";
      position: absolute;
      right: 16px;
      top: 50%;
      width: 10px;
      height: 10px;
      border-right: 2px solid rgba(60, 44, 30, 0.7);
      border-bottom: 2px solid rgba(60, 44, 30, 0.7);
      transform: translateY(-60%) rotate(45deg);
      pointer-events: none;
    }

    .date-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .date-chip {
      width: 100%;
      min-height: 68px;
      padding: 10px 8px;
      border-radius: 18px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(255, 252, 247, 0.96);
      color: #1f1712;
      font: inherit;
      cursor: pointer;
      text-align: center;
      transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease;
    }

    .date-chip span,
    .date-chip strong {
      display: block;
    }

    .date-chip span {
      margin-bottom: 4px;
      color: #7f7063;
      font-size: 0.76rem;
      text-transform: uppercase;
    }

    .date-chip strong {
      font-size: 0.94rem;
    }

    .date-chip.is-active {
      border-color: rgba(123, 31, 47, 0.38);
      background: rgba(123, 31, 47, 0.08);
      box-shadow: 0 12px 22px rgba(17, 11, 8, 0.08);
      transform: translateY(-1px);
    }

    .date-chip.more-chip {
      background: rgba(255, 248, 240, 0.12);
      color: #fff8f0;
      border-color: rgba(255, 255, 255, 0.14);
    }

    .date-chip.more-chip span,
    .date-chip.more-chip strong {
      color: inherit;
    }

    .submit-btn {
      width: 100%;
      border: 0;
      cursor: pointer;
      min-height: 54px;
      padding: 0 20px;
      border-radius: 999px;
      color: #fff;
      background: linear-gradient(135deg, var(--wine), #b9871f);
      font: inherit;
      font-weight: 800;
      box-shadow: 0 18px 30px rgba(123, 31, 47, 0.22);
      transition: transform 0.2s ease, opacity 0.2s ease;
    }

    .submit-btn:hover {
      transform: translateY(-1px);
      opacity: 0.97;
    }

    .modal-backdrop,
    .sheet-backdrop {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      background: rgba(18, 12, 9, 0.56);
      backdrop-filter: blur(6px);
      z-index: 100;
    }

    .modal-backdrop.is-open {
      display: flex;
    }

    .sheet-backdrop.is-open {
      display: block;
    }

    .modal {
      width: min(100%, 420px);
      padding: 24px;
      border-radius: 24px;
      background:
        linear-gradient(180deg, rgba(255, 252, 247, 0.98), rgba(247, 239, 228, 0.98)),
        url("../assets/pattern.webp") center / 400px auto;
      border: 1px solid rgba(108, 85, 58, 0.14);
      box-shadow: 0 28px 54px rgba(18, 12, 9, 0.2);
    }

    .modal h2 {
      margin: 0 0 10px;
      font-size: 1.4rem;
      letter-spacing: -0.04em;
    }

    .modal p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.6;
    }

    .modal-btn {
      width: 100%;
      border: 0;
      cursor: pointer;
      min-height: 46px;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--wine), #b9871f);
      color: #fff;
      font: inherit;
      font-weight: 800;
    }

    .sheet-backdrop {
      z-index: 110;
    }

    .picker-sheet {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      margin: 0 auto;
      width: min(100%, 760px);
      max-height: min(72vh, 520px);
      border-radius: 24px 24px 0 0;
      background:
        linear-gradient(180deg, rgba(255, 252, 247, 0.98), rgba(247, 239, 228, 0.98)),
        url("../assets/pattern.webp") center / 420px auto;
      box-shadow: 0 -16px 48px rgba(17, 11, 8, 0.22);
      overflow: hidden;
    }

    .sheet-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 18px 18px 12px;
    }

    .sheet-header h2 {
      margin: 0;
      font-size: 1.2rem;
      letter-spacing: -0.04em;
    }

    .sheet-close {
      border: 0;
      background: transparent;
      color: var(--muted);
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }

    .sheet-options {
      display: grid;
      gap: 10px;
      padding: 0 18px 18px;
      max-height: calc(min(72vh, 520px) - 72px);
      overflow: auto;
      -webkit-overflow-scrolling: touch;
    }

    .sheet-option {
      width: 100%;
      min-height: 54px;
      padding: 0 16px;
      border-radius: 16px;
      border: 1px solid rgba(113, 88, 60, 0.14);
      background: rgba(255, 255, 255, 0.76);
      color: var(--ink);
      font: inherit;
      font-weight: 700;
      text-align: left;
      cursor: pointer;
    }

    .sheet-option.is-active {
      border-color: rgba(123, 31, 47, 0.34);
      background: rgba(123, 31, 47, 0.08);
    }

    .sheet-option.is-custom {
      border-style: dashed;
      border-color: rgba(123, 31, 47, 0.28);
      background: linear-gradient(135deg, rgba(123, 31, 47, 0.08), rgba(212, 175, 55, 0.08));
      color: #6b2230;
    }

    .custom-guest-box {
      display: none;
      gap: 10px;
      padding: 0 18px 18px;
    }

    .custom-guest-box.is-open {
      display: grid;
    }

    .custom-guest-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .custom-guest-btn {
      min-height: 46px;
      border-radius: 14px;
      border: 0;
      cursor: pointer;
      font: inherit;
      font-weight: 700;
    }

    .custom-guest-btn.cancel {
      background: rgba(109, 96, 85, 0.12);
      color: #65564a;
    }

    .custom-guest-btn.apply {
      background: linear-gradient(135deg, var(--wine), #b9871f);
      color: #fff;
    }

    @media (min-width: 720px) {
      .shell {
        width: min(100% - 28px, 960px);
        padding-top: 24px;
      }

      .logo-link {
        width: 72px;
        height: 72px;
      }

      .logo-link img {
        width: 50px;
        height: 50px;
      }

      .booking-form {
        padding: 26px;
      }

      .field-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .field.full {
        grid-column: 1 / -1;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div class="brand">
        <a class="logo-link" href="../index.html" aria-label="EHWA home">
          <img src="../assets/logo-dark.webp" alt="EHWA logo" />
        </a>
        <h1>Reservation</h1>
      </div>
      <a class="back-link" href="./index.html">Menu</a>
    </header>

    <section class="booking-card">
      <form class="booking-form" id="reservationForm" method="POST" action="https://script.google.com/macros/s/AKfycbxS_ru2I7ySfJeH4kD3hd1wPiHerJW3Iiujn95evZuFiyLNrJUo-_H6rKngdxt0EeBFVw/exec" target="reservationSubmitFrame">
        <div class="field-grid">
          <div class="field full">
            <label for="date">Date</label>
            <div class="date-grid" id="dateGrid"></div>
            <input id="date" name="date" type="hidden" required />
          </div>

          <div class="field">
            <label for="timeDisplay">Time</label>
            <button class="picker-trigger" id="timeDisplay" type="button" data-picker="time">6:00 PM</button>
            <input id="time" name="time" type="hidden" value="6:00 PM" />
          </div>

          <div class="field">
            <label for="peopleDisplay">Guests</label>
            <button class="picker-trigger" id="peopleDisplay" type="button" data-picker="people">4 guests</button>
            <input id="people" name="people" type="hidden" value="4 guests" required />
          </div>

          <div class="field">
            <label for="name">Name</label>
            <input id="name" name="name" type="text" placeholder="Your name" required />
          </div>

          <div class="field">
            <label for="phone">Phone</label>
            <input id="phone" name="phone" type="tel" inputmode="numeric" autocomplete="tel" placeholder="Phone number" required />
          </div>

          <div class="field full">
            <label for="notes">Notes</label>
            <textarea id="notes" name="notes" placeholder="Add any request or occasion."></textarea>
          </div>
        </div>

        <button class="submit-btn" type="submit">Request Reservation</button>
      </form>
    </section>
  </div>

  <iframe name="reservationSubmitFrame" hidden></iframe>

  <div class="modal-backdrop" id="reservationModal" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="reservationModalTitle">
      <h2 id="reservationModalTitle">Reservation request sent</h2>
      <p>Your request has been submitted. We will contact you using the phone number you provided.</p>
      <button class="modal-btn" type="button" id="reservationModalClose">Close</button>
    </div>
  </div>

  <div class="sheet-backdrop" id="pickerSheet" aria-hidden="true">
    <div class="picker-sheet" role="dialog" aria-modal="true" aria-labelledby="pickerTitle">
      <div class="sheet-header">
        <h2 id="pickerTitle">Select</h2>
        <button class="sheet-close" id="pickerClose" type="button">Close</button>
      </div>
      <div class="sheet-options" id="pickerOptions"></div>
      <div class="custom-guest-box" id="customGuestBox">
        <input id="customGuestInput" type="number" inputmode="numeric" min="2" placeholder="Enter guest count" />
        <div class="custom-guest-actions">
          <button class="custom-guest-btn cancel" id="customGuestCancel" type="button">Cancel</button>
          <button class="custom-guest-btn apply" id="customGuestApply" type="button">Apply</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    (function () {
      const form = document.getElementById("reservationForm");
      const dateInput = document.getElementById("date");
      const dateGrid = document.getElementById("dateGrid");
      const timeInput = document.getElementById("time");
      const peopleInput = document.getElementById("people");
      const timeDisplay = document.getElementById("timeDisplay");
      const peopleDisplay = document.getElementById("peopleDisplay");

      const modal = document.getElementById("reservationModal");
      const modalClose = document.getElementById("reservationModalClose");

      const sheet = document.getElementById("pickerSheet");
      const sheetTitle = document.getElementById("pickerTitle");
      const sheetOptions = document.getElementById("pickerOptions");
      const sheetClose = document.getElementById("pickerClose");
      const customGuestBox = document.getElementById("customGuestBox");
      const customGuestInput = document.getElementById("customGuestInput");
      const customGuestCancel = document.getElementById("customGuestCancel");
      const customGuestApply = document.getElementById("customGuestApply");

      const pickerConfig = {
        time: {
          title: "Select time",
          input: timeInput,
          display: timeDisplay,
          options: [
            "6:00 PM",
            "6:30 PM",
            "7:00 PM",
            "7:30 PM",
            "8:00 PM",
            "8:30 PM",
            "9:00 PM",
            "9:30 PM",
            "10:00 PM",
            "10:30 PM",
            "11:00 PM",
            "11:30 PM",
            "12:00 AM",
            "12:30 AM",
            "1:00 AM"
          ]
        },
        people: {
          title: "Select guests",
          input: peopleInput,
          display: peopleDisplay,
          options: [
            "2 guests",
            "3 guests",
            "4 guests",
            "5 guests",
            "6 guests",
            "7 guests",
            "8 guests",
            "Custom"
          ]
        },
        date: {
          title: "Select date"
        }
      };

      const pad = (num) => String(num).padStart(2, "0");
      const formatInputDate = (date) => `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())}`;
      const formatDisplayDate = (value) => {
        if (!value) return "Not selected";
        const date = new Date(value + "T00:00:00");
        if (Number.isNaN(date.getTime())) return value;
        return new Intl.DateTimeFormat("en-US", {
          weekday: "short",
          month: "short",
          day: "numeric"
        }).format(date);
      };

      const dateOptions = [];
      const start = new Date();
      start.setDate(start.getDate() + 1);
      for (let i = 0; i < 10; i += 1) {
        const optionDate = new Date(start);
        optionDate.setDate(start.getDate() + i);
        dateOptions.push(formatInputDate(optionDate));
      }

      const renderDateGrid = () => {
        dateGrid.innerHTML = "";

        dateOptions.slice(0, 5).forEach((value) => {
          const date = new Date(value + "T00:00:00");
          const button = document.createElement("button");
          button.type = "button";
          button.className = "date-chip";
          button.innerHTML = `<span>${new Intl.DateTimeFormat("en-US", { weekday: "short" }).format(date)}</span><strong>${new Intl.DateTimeFormat("en-US", { month: "short", day: "numeric" }).format(date)}</strong>`;
          button.addEventListener("click", () => {
            dateInput.value = value;
            syncDateState();
          });
          dateGrid.appendChild(button);
        });

        const moreButton = document.createElement("button");
        moreButton.type = "button";
        moreButton.className = "date-chip more-chip";
        moreButton.innerHTML = "<span>More</span><strong>Choose</strong>";
        moreButton.addEventListener("click", () => {
          openSheet("date");
        });
        dateGrid.appendChild(moreButton);
      };

      const syncDateState = () => {
        dateGrid.querySelectorAll(".date-chip").forEach((chip, index) => {
          if (chip.classList.contains("more-chip")) return;
          chip.classList.toggle("is-active", dateOptions[index] === dateInput.value);
        });
      };

      const openModal = () => {
        modal.classList.add("is-open");
        modal.setAttribute("aria-hidden", "false");
      };

      const closeModal = () => {
        modal.classList.remove("is-open");
        modal.setAttribute("aria-hidden", "true");
      };

      const closeSheet = () => {
        sheet.classList.remove("is-open");
        sheet.setAttribute("aria-hidden", "true");
        sheetOptions.innerHTML = "";
        customGuestBox.classList.remove("is-open");
        customGuestInput.value = "";
      };

      const selectOption = (key, value) => {
        if (key === "people" && value === "Custom") {
          customGuestBox.classList.add("is-open");
          window.setTimeout(() => {
            customGuestInput.focus();
          }, 30);
          return;
        }

        if (key === "date") {
          dateInput.value = value;
          syncDateState();
          closeSheet();
          return;
        }

        const config = pickerConfig[key];
        config.input.value = value;
        config.display.textContent = value;
        closeSheet();
      };

      const openSheet = (key) => {
        const config = pickerConfig[key];
        if (!config) return;

        sheetTitle.textContent = config.title;
        sheetOptions.innerHTML = "";
        customGuestBox.classList.remove("is-open");

        const options = key === "date" ? dateOptions : config.options;

        options.forEach((option) => {
          const button = document.createElement("button");
          button.type = "button";
          button.className = "sheet-option";
          if (key === "people" && option === "Custom") {
            button.classList.add("is-custom");
          }
          button.textContent = key === "date" ? formatDisplayDate(option) : option;
          if ((key === "date" && dateInput.value === option) || (key !== "date" && config.input.value === option)) {
            button.classList.add("is-active");
          }
          button.addEventListener("click", () => {
            selectOption(key, option);
          });
          sheetOptions.appendChild(button);
        });

        sheet.classList.add("is-open");
        sheet.setAttribute("aria-hidden", "false");
      };

      document.querySelectorAll("[data-picker]").forEach((button) => {
        button.addEventListener("click", () => {
          openSheet(button.getAttribute("data-picker"));
        });
      });

      customGuestCancel.addEventListener("click", () => {
        customGuestBox.classList.remove("is-open");
        customGuestInput.value = "";
      });

      customGuestApply.addEventListener("click", () => {
        const count = Number.parseInt(customGuestInput.value, 10);
        if (!Number.isFinite(count) || count < 2) {
          customGuestInput.focus();
          return;
        }
        const value = `${count} guests`;
        peopleInput.value = value;
        peopleDisplay.textContent = value;
        closeSheet();
      });

      form.addEventListener("submit", () => {
        window.setTimeout(openModal, 250);
      });

      modalClose.addEventListener("click", closeModal);
      modal.addEventListener("click", (event) => {
        if (event.target === modal) {
          closeModal();
        }
      });

      sheetClose.addEventListener("click", closeSheet);
      sheet.addEventListener("click", (event) => {
        if (event.target === sheet) {
          closeSheet();
        }
      });

      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape") {
          if (sheet.classList.contains("is-open")) {
            closeSheet();
          } else if (modal.classList.contains("is-open")) {
            closeModal();
          }
        }
      });

      dateInput.value = dateOptions[0];
      renderDateGrid();
      syncDateState();
    })();
  </script>
</body>
</html>
