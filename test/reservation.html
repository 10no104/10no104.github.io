<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reservation Connect Test</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f6f3ee;
      color: #1f1813;
    }
    .wrap {
      width: min(560px, calc(100% - 32px));
      margin: 48px auto;
      padding: 28px;
      border-radius: 20px;
      background: #fff;
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.08);
    }
    h1 {
      margin: 0 0 8px;
      font-size: 1.8rem;
    }
    p {
      margin: 0 0 20px;
      color: #5e544b;
    }
    .field {
      margin-bottom: 14px;
    }
    label {
      display: block;
      margin-bottom: 6px;
      font-weight: 700;
    }
    input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #d8cfc4;
      border-radius: 12px;
      font: inherit;
    }
    button {
      width: 100%;
      margin-top: 8px;
      padding: 14px 16px;
      border: 0;
      border-radius: 999px;
      background: #7b1f2f;
      color: #fff;
      font: inherit;
      font-weight: 800;
      cursor: pointer;
    }
    .status {
      margin-top: 14px;
      padding: 12px 14px;
      border-radius: 12px;
      background: #f4ead0;
      color: #6d5313;
      font-weight: 700;
    }
    .status.success {
      background: #e3f4e8;
      color: #23623b;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>Apps Script 연결 테스트</h1>
    <p>시트에 한 줄 추가되는지만 확인하는 최소 테스트 페이지입니다.</p>

    <form id="testForm">
      <div class="field">
        <label for="name">이름</label>
        <input id="name" name="name" type="text" value="홍길동" required />
      </div>

      <div class="field">
        <label for="phone">연락처</label>
        <input id="phone" name="phone" type="text" value="010-1234-5678" required />
      </div>

      <div class="field">
        <label for="date">날짜</label>
        <input id="date" name="date" type="date" required />
      </div>

      <button type="submit">전송 테스트</button>
    </form>

    <div class="status" id="status">아직 전송 안 함</div>
  </main>

  <iframe name="submitFrame" hidden></iframe>

  <script>
    (function () {
      const scriptUrl = "https://script.google.com/macros/s/AKfycbxS_ru2I7ySfJeH4kD3hd1wPiHerJW3liujn95evZuFiyLNrJUo_-H6rKngdxt0EeBFVw/exec";
      const form = document.getElementById("testForm");
      const status = document.getElementById("status");
      const dateInput = document.getElementById("date");

      const today = new Date();
      today.setDate(today.getDate() + 1);
      const pad = (num) => String(num).padStart(2, "0");
      dateInput.value = `${today.getFullYear()}-${pad(today.getMonth() + 1)}-${pad(today.getDate())}`;

      form.addEventListener("submit", (event) => {
        event.preventDefault();

        const payload = {
          name: document.getElementById("name").value,
          phone: document.getElementById("phone").value,
          date: document.getElementById("date").value
        };

        const submitForm = document.createElement("form");
        submitForm.method = "POST";
        submitForm.action = scriptUrl;
        submitForm.target = "submitFrame";
        submitForm.style.display = "none";

        Object.entries(payload).forEach(([key, value]) => {
          const input = document.createElement("input");
          input.type = "hidden";
          input.name = key;
          input.value = value;
          submitForm.appendChild(input);
        });

        document.body.appendChild(submitForm);
        submitForm.submit();
        submitForm.remove();

        status.textContent = "전송 요청 보냄. 시트에 새 줄 들어갔는지 확인하세요.";
        status.classList.add("success");
      });
    })();
  </script>
</body>
</html>
