<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reserve | EHWA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/global.css?v=20260423-4" />
  <style>
    :root {
      --bg: #f5efe4;
      --paper: rgba(255, 251, 245, 0.94);
      --ink: #1f1712;
      --muted: #6d6055;
      --wine: #7b1f2f;
      --gold: #d4af37;
      --line: rgba(109, 86, 59, 0.16);
      --shadow: 0 24px 54px rgba(35, 23, 16, 0.12);
      --radius-xl: 28px;
      --radius-lg: 20px;
      --radius-md: 15px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(212, 175, 55, 0.18), transparent 28%),
        radial-gradient(circle at 86% 12%, rgba(123, 31, 47, 0.12), transparent 24%),
        linear-gradient(180deg, rgba(251, 247, 241, 0.98) 0%, rgba(245, 239, 228, 0.98) 100%);
      font-family: "Noto Sans KR", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(255, 252, 247, 0.18), rgba(255, 252, 247, 0.06)),
        url("../assets/pattern.webp") center / 720px auto;
      opacity: 0.12;
      pointer-events: none;
      z-index: -2;
    }

    body::after {
      content: "";
      position: fixed;
      right: -110px;
      bottom: -110px;
      width: 340px;
      height: 340px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(212, 175, 55, 0.16), transparent 72%);
      filter: blur(14px);
      pointer-events: none;
      z-index: -1;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .shell {
      width: min(100% - 18px, 760px);
      margin: 0 auto;
      padding: 16px 0 40px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .logo-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 62px;
      height: 62px;
      border-radius: 999px;
      background: linear-gradient(180deg, #fffdf9 0%, #f2e7d8 100%);
      border: 1px solid rgba(73, 53, 36, 0.12);
      box-shadow: 0 14px 28px rgba(42, 28, 18, 0.1);
      flex: none;
    }

    .logo-link img {
      width: 42px;
      height: 42px;
      object-fit: contain;
    }

    .brand h1 {
      margin: 0;
      font-size: clamp(1.45rem, 6vw, 2.2rem);
      letter-spacing: -0.05em;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 0 14px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255, 251, 245, 0.72);
      box-shadow: 0 10px 22px rgba(32, 20, 13, 0.05);
      font-size: 0.92rem;
      font-weight: 700;
      white-space: nowrap;
    }

    .booking-card {
      border: 1px solid var(--line);
      border-radius: var(--radius-xl);
      background:
        linear-gradient(180deg, rgba(255, 252, 247, 0.96), rgba(249, 243, 233, 0.96)),
        url("../assets/pattern.webp") center / 440px auto;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .booking-summary {
      padding: 18px;
      background: linear-gradient(180deg, rgba(31, 20, 14, 0.98), rgba(69, 27, 36, 0.96));
      color: #fff8f0;
    }

    .summary-title {
      margin: 0 0 14px;
      font-size: 0.88rem;
      font-weight: 800;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(241, 201, 100, 0.94);
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .summary-item {
      padding: 12px 14px;
      border-radius: 16px;
      background: rgba(255, 250, 244, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .summary-item span,
    .summary-item strong {
      display: block;
    }

    .summary-item span {
      margin-bottom: 4px;
      color: rgba(255, 248, 240, 0.66);
      font-size: 0.8rem;
    }

    .summary-item strong {
      font-size: 1rem;
      line-height: 1.3;
    }

    .booking-form {
      display: grid;
      gap: 16px;
      padding: 18px;
    }

    .field-grid {
      display: grid;
      gap: 14px;
    }

    .field {
      display: grid;
      gap: 8px;
    }

    label {
      font-size: 0.92rem;
      font-weight: 700;
    }

    input,
    select,
    textarea {
      width: 100%;
      padding: 14px 15px;
      border: 1px solid rgba(113, 88, 60, 0.18);
      border-radius: var(--radius-md);
      background: rgba(255, 255, 255, 0.8);
      color: var(--ink);
      font: inherit;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: rgba(123, 31, 47, 0.38);
      box-shadow: 0 0 0 4px rgba(123, 31, 47, 0.1);
      background: #fff;
    }

    textarea {
      min-height: 120px;
      resize: vertical;
    }

    .submit-btn {
      width: 100%;
      border: 0;
      cursor: pointer;
      min-height: 54px;
      padding: 0 20px;
      border-radius: 999px;
      color: #fff;
      background: linear-gradient(135deg, var(--wine), #b9871f);
      font: inherit;
      font-weight: 800;
      box-shadow: 0 18px 30px rgba(123, 31, 47, 0.22);
      transition: transform 0.2s ease, opacity 0.2s ease;
    }

    .submit-btn:hover {
      transform: translateY(-1px);
      opacity: 0.97;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      background: rgba(18, 12, 9, 0.56);
      backdrop-filter: blur(6px);
      z-index: 100;
    }

    .modal-backdrop.is-open {
      display: flex;
    }

    .modal {
      width: min(100%, 420px);
      padding: 24px;
      border-radius: 24px;
      background:
        linear-gradient(180deg, rgba(255, 252, 247, 0.98), rgba(247, 239, 228, 0.98)),
        url("../assets/pattern.webp") center / 400px auto;
      border: 1px solid rgba(108, 85, 58, 0.14);
      box-shadow: 0 28px 54px rgba(18, 12, 9, 0.2);
    }

    .modal h2 {
      margin: 0 0 10px;
      font-size: 1.4rem;
      letter-spacing: -0.04em;
    }

    .modal p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.6;
    }

    .modal-btn {
      width: 100%;
      border: 0;
      cursor: pointer;
      min-height: 46px;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--wine), #b9871f);
      color: #fff;
      font: inherit;
      font-weight: 800;
    }

    @media (min-width: 720px) {
      .shell {
        width: min(100% - 28px, 960px);
        padding-top: 24px;
      }

      .logo-link {
        width: 72px;
        height: 72px;
      }

      .logo-link img {
        width: 50px;
        height: 50px;
      }

      .booking-card {
        display: grid;
        grid-template-columns: minmax(300px, 0.92fr) minmax(0, 1.08fr);
      }

      .booking-summary {
        padding: 24px;
      }

      .summary-grid {
        grid-template-columns: 1fr;
      }

      .booking-form {
        padding: 24px;
      }

      .field-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .field.full {
        grid-column: 1 / -1;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div class="brand">
        <a class="logo-link" href="../index.html" aria-label="EHWA home">
          <img src="../assets/logo-dark.webp" alt="EHWA logo" />
        </a>
        <h1>Reservation</h1>
      </div>
      <a class="back-link" href="./index.html">Menu</a>
    </header>

    <section class="booking-card">
      <div class="booking-summary">
        <p class="summary-title">Booking Overview</p>
        <div class="summary-grid">
          <div class="summary-item">
            <span>Date</span>
            <strong id="summaryDate">Not set</strong>
          </div>
          <div class="summary-item">
            <span>Time</span>
            <strong id="summaryTime">6:00 PM</strong>
          </div>
          <div class="summary-item">
            <span>Guests</span>
            <strong id="summaryPeople">4 guests</strong>
          </div>
          <div class="summary-item">
            <span>Name</span>
            <strong id="summaryName">Hong Gil-dong</strong>
          </div>
          <div class="summary-item">
            <span>Phone</span>
            <strong id="summaryPhone">010-1234-5678</strong>
          </div>
          <div class="summary-item">
            <span>Notes</span>
            <strong id="summaryNotes">Window seat if available.</strong>
          </div>
        </div>
      </div>

      <form class="booking-form" id="reservationForm" method="POST" action="https://script.google.com/macros/s/AKfycbxS_ru2I7ySfJeH4kD3hd1wPiHerJW3Iiujn95evZuFiyLNrJUo-_H6rKngdxt0EeBFVw/exec" target="reservationSubmitFrame">
        <div class="field-grid">
          <div class="field">
            <label for="date">Date</label>
            <input id="date" name="date" type="date" required />
          </div>
          <div class="field">
            <label for="time">Time</label>
            <select id="time" name="time">
              <option value="5:30 PM">5:30 PM</option>
              <option value="6:00 PM" selected>6:00 PM</option>
              <option value="6:30 PM">6:30 PM</option>
              <option value="7:00 PM">7:00 PM</option>
              <option value="7:30 PM">7:30 PM</option>
              <option value="8:00 PM">8:00 PM</option>
              <option value="8:30 PM">8:30 PM</option>
            </select>
          </div>
          <div class="field">
            <label for="people">Guests</label>
            <select id="people" name="people">
              <option value="2 guests">2 guests</option>
              <option value="3 guests">3 guests</option>
              <option value="4 guests" selected>4 guests</option>
              <option value="5 guests">5 guests</option>
              <option value="6 guests">6 guests</option>
              <option value="8 guests">8 guests</option>
            </select>
          </div>
          <div class="field">
            <label for="name">Name</label>
            <input id="name" name="name" type="text" value="Hong Gil-dong" required />
          </div>
          <div class="field">
            <label for="phone">Phone</label>
            <input id="phone" name="phone" type="text" value="010-1234-5678" required />
          </div>
          <div class="field full">
            <label for="notes">Notes</label>
            <textarea id="notes" name="notes" placeholder="Add any request or occasion.">Window seat if available.</textarea>
          </div>
        </div>

        <button class="submit-btn" type="submit">Request Reservation</button>
      </form>
    </section>
  </div>

  <iframe name="reservationSubmitFrame" hidden></iframe>

  <div class="modal-backdrop" id="reservationModal" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="reservationModalTitle">
      <h2 id="reservationModalTitle">Reservation request sent</h2>
      <p>Your request has been submitted. We will contact you using the phone number you provided.</p>
      <button class="modal-btn" type="button" id="reservationModalClose">Close</button>
    </div>
  </div>

  <script>
    (function () {
      const form = document.getElementById("reservationForm");
      const dateInput = document.getElementById("date");
      const timeInput = document.getElementById("time");
      const peopleInput = document.getElementById("people");
      const nameInput = document.getElementById("name");
      const phoneInput = document.getElementById("phone");
      const notesInput = document.getElementById("notes");

      const summaryDate = document.getElementById("summaryDate");
      const summaryTime = document.getElementById("summaryTime");
      const summaryPeople = document.getElementById("summaryPeople");
      const summaryName = document.getElementById("summaryName");
      const summaryPhone = document.getElementById("summaryPhone");
      const summaryNotes = document.getElementById("summaryNotes");

      const modal = document.getElementById("reservationModal");
      const modalClose = document.getElementById("reservationModalClose");

      const pad = (num) => String(num).padStart(2, "0");
      const tomorrow = new Date();
      tomorrow.setDate(tomorrow.getDate() + 1);
      dateInput.value = `${tomorrow.getFullYear()}-${pad(tomorrow.getMonth() + 1)}-${pad(tomorrow.getDate())}`;

      const formatDate = (value) => {
        if (!value) return "Not set";
        const date = new Date(value + "T00:00:00");
        if (Number.isNaN(date.getTime())) return value;
        return new Intl.DateTimeFormat("en-US", {
          month: "short",
          day: "numeric",
          year: "numeric"
        }).format(date);
      };

      const syncSummary = () => {
        summaryDate.textContent = formatDate(dateInput.value);
        summaryTime.textContent = timeInput.value || "-";
        summaryPeople.textContent = peopleInput.value || "-";
        summaryName.textContent = nameInput.value || "-";
        summaryPhone.textContent = phoneInput.value || "-";
        summaryNotes.textContent = notesInput.value || "No notes";
      };

      const openModal = () => {
        modal.classList.add("is-open");
        modal.setAttribute("aria-hidden", "false");
      };

      const closeModal = () => {
        modal.classList.remove("is-open");
        modal.setAttribute("aria-hidden", "true");
      };

      [dateInput, timeInput, peopleInput, nameInput, phoneInput, notesInput].forEach((input) => {
        input.addEventListener("input", syncSummary);
        input.addEventListener("change", syncSummary);
      });

      form.addEventListener("submit", () => {
        window.setTimeout(openModal, 250);
      });

      modalClose.addEventListener("click", closeModal);
      modal.addEventListener("click", (event) => {
        if (event.target === modal) {
          closeModal();
        }
      });

      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape" && modal.classList.contains("is-open")) {
          closeModal();
        }
      });

      syncSummary();
    })();
  </script>
</body>
</html>
