<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Menu Test</title>
  <style>
    :root {
      --bg: #ececef;
      --card: #f8f8fa;
      --text: #242633;
      --muted: #4d5160;
      --shadow: 0 2px 10px rgba(0, 0, 0, 0.08);
      --blue: #2f73bb;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Pretendard", "Noto Sans KR", system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .wrap {
      width: min(960px, 92vw);
      margin: 54px auto 100px;
    }

    .tabs {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .tab {
      border-radius: 999px;
      padding: 14px 34px;
      border: 1px solid #d3d5db;
      background: #f2f2f4;
      color: #454958;
      font-size: 22px;
      font-weight: 600;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.08);
      cursor: pointer;
      user-select: none;
    }

    .tab.active {
      background: var(--blue);
      color: #fff;
      border-color: #2a67a8;
    }

    .menu-list {
      display: block;
    }

    .subtabs {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      min-height: 44px;
    }

    .subtabs-wrap {
      position: sticky;
      top: 10px;
      z-index: 25;
      background: rgba(236, 236, 239, 0.95);
      border: 1px solid #d6d8df;
      border-radius: 16px;
      padding: 10px 12px;
      margin-bottom: 16px;
      backdrop-filter: blur(3px);
    }

    .subtabs-wrap.hidden {
      display: none;
    }

    .subtabs-context {
      font-size: 15px;
      font-weight: 800;
      color: #2f73bb;
      margin: 0 0 8px;
      letter-spacing: 0.2px;
    }

    .subtab {
      border-radius: 999px;
      border: 1px solid #d3d5db;
      background: #fff;
      color: #454958;
      padding: 8px 16px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }

    .subtab.active {
      background: #2f73bb;
      color: #fff;
      border-color: #2a67a8;
    }

    .to-top {
      position: fixed;
      right: 16px;
      bottom: 18px;
      z-index: 40;
      border: none;
      border-radius: 999px;
      background: #2f73bb;
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      padding: 12px 14px;
      box-shadow: var(--shadow);
      cursor: pointer;
      opacity: 0;
      transform: translateY(10px);
      pointer-events: none;
      transition: opacity 0.2s ease, transform 0.2s ease;
    }

    .to-top.show {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    .card {
      display: grid;
      grid-template-columns: 230px minmax(0, 1fr) auto;
      gap: 24px;
      align-items: center;
      background: var(--card);
      border-radius: 34px;
      box-shadow: var(--shadow);
      padding: 28px;
      margin-bottom: 22px;
      border: 1px solid #dbdde2;
    }

    .thumb {
      width: 230px;
      height: 230px;
      border-radius: 30px;
      object-fit: cover;
      display: block;
      background: #d8d8df;
    }

    .name-ko {
      margin: 0;
      font-size: 48px;
      line-height: 1.12;
      letter-spacing: -0.4px;
      font-weight: 700;
    }

    .name-en {
      margin: 10px 0 16px;
      font-size: 32px;
      line-height: 1.15;
      font-weight: 700;
    }

    .desc {
      margin: 0 0 16px;
      color: var(--muted);
      font-size: 26px;
      line-height: 1.4;
      max-width: 700px;
    }

    .tags {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 999px;
      padding: 7px 16px;
      font-size: 18px;
      font-weight: 700;
      color: #fff;
      line-height: 1;
    }

    .tag.red { background: #e13a31; }
    .tag.green { background: #6ea42e; }
    .tag.yellow { background: #d8a32a; }
    .tag.blue { background: #2f73bb; }
    .tag.gray { background: #7b8090; }

    .price {
      font-size: 62px;
      font-weight: 800;
      line-height: 1;
      padding-left: 16px;
      white-space: nowrap;
    }

    .empty {
      padding: 40px;
      text-align: center;
      color: var(--muted);
      font-size: 22px;
    }

    @media (max-width: 980px) {
      .card {
        grid-template-columns: 160px 1fr auto;
        border-radius: 24px;
      }

      .thumb { width: 160px; height: 160px; border-radius: 20px; }
      .name-ko { font-size: 30px; }
      .name-en { font-size: 28px; }
      .desc { font-size: 24px; }
      .price { font-size: 52px; }
    }

    @media (max-width: 720px) {
      .tab { font-size: 18px; padding: 10px 20px; }
      .card {
        grid-template-columns: 1fr;
        gap: 16px;
      }
      .thumb { width: 100%; height: 220px; }
      .price {
        padding-left: 0;
        font-size: 40px;
      }
      .name-ko { font-size: 26px; }
      .name-en { font-size: 24px; }
      .desc { font-size: 20px; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="tabs" aria-label="Categories" id="tabs"></section>
    <section class="subtabs-wrap hidden" id="subtabsWrap">
      <p class="subtabs-context" id="subtabsContext"></p>
      <section class="subtabs" aria-label="Subcategories" id="subtabs"></section>
    </section>
    <section class="menu-list" id="menuList"></section>
  </main>
  <button class="to-top" id="toTopBtn" type="button" aria-label="Back to top">↑ Top</button>

  <script>
    /**
     * [Google Sheet 컬럼 순서]
     * category | label | nameKo | nameEn | description | price | imageUrl | tags | tagSubLabels
     *
     * tags 예시:
     * 🌶️ Spicy|red, 🌱 Vegan|green, ⭐ Popular|yellow, 🐟 Seafood|blue
     *
     * tagSubLabels 예시:
     * Vegan:Dairy-free|Seafood-free; Spicy:Mild|Extra Hot; Popular:Best Seller
     */
    const SHEET_CONFIG = {
      sheetId: "1xa9OZbctYnlbaAL8lKIgmefM5hvSw0Plk01lxp5G2fc",
      gid: "1100419696"
    };

    const SAMPLE_MENU = [
      {
        category: "Appetizers",
        label: "Fried",
        nameKo: "매콤 콜리플라워",
        nameEn: "Spicy Fried Cauliflower",
        description: "Crispy fried cauliflower tossed in a spicy sauce.",
        price: "$12",
        imageUrl: "https://images.unsplash.com/photo-1562967914-608f82629710?auto=format&fit=crop&w=500&q=80",
        tags: [
          { label: "🌶️ Spicy", color: "red" },
          { label: "🌱 Vegan", color: "green" },
          { label: "⭐ Popular", color: "yellow" }
        ],
        tagSubLabels: {
          vegan: ["Dairy-free", "Seafood-free"],
          spicy: ["Medium"],
          popular: ["Best Seller"]
        }
      },
      {
        category: "Mains",
        label: "Stir-fried",
        nameKo: "해물김치 볶음밥",
        nameEn: "Seafood Kimchi Fried Rice",
        description: "Fried rice stir-fried with seafood and spicy kimchi.",
        price: "$15",
        imageUrl: "https://images.unsplash.com/photo-1512058564366-18510be2db19?auto=format&fit=crop&w=500&q=80",
        tags: [
          { label: "🌶️ Spicy", color: "red" },
          { label: "🐟 Seafood", color: "blue" },
          { label: "⭐ Popular", color: "yellow" }
        ],
        tagSubLabels: {
          spicy: ["Hot"],
          popular: ["Chef Pick"]
        }
      },
      {
        category: "Mains",
        label: "Fried",
        nameKo: "달콤매콤 치킨",
        nameEn: "Sweet & Spicy Korean Chicken",
        description: "Crispy chicken pieces coated in a sweet and spicy glaze.",
        price: "$9",
        imageUrl: "https://images.unsplash.com/photo-1516684732162-798a0062be99?auto=format&fit=crop&w=500&q=80",
        tags: [
          { label: "🌶️ Spicy", color: "red" },
          { label: "⭐ Popular", color: "blue" }
        ],
        tagSubLabels: {
          spicy: ["Extra Hot"],
          popular: ["New Menu"]
        }
      }
    ];

    let allMenus = [];
    let selectedCategory = "All";
    let selectedSubcategory = "All";
    const SPECIAL_TAG_CATEGORIES = {
      "Vegan 🌱": "vegan",
      "Spicy 🌶️": "spicy",
      "Popular ⭐": "popular"
    };

    function escapeHtml(text = "") {
      return text
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function parseTags(raw = "") {
      return String(raw)
        .split(",")
        .map((part) => part.trim())
        .filter(Boolean)
        .map((chunk) => {
          const [label, color] = chunk.split("|").map((v) => v && v.trim());
          return {
            label: withTagEmoji(label || "Tag"),
            color: color || "gray"
          };
        });
    }

    function parseTagSubLabels(raw = "") {
      return String(raw)
        .split(";")
        .map((part) => part.trim())
        .filter(Boolean)
        .reduce((acc, chunk) => {
          const [tagName, labelsRaw = ""] = chunk.split(":");
          const key = String(tagName || "").trim().toLowerCase();
          if (!key) return acc;

          const labels = labelsRaw
            .split("|")
            .map((label) => label.trim())
            .filter(Boolean);

          if (labels.length) acc[key] = [...new Set(labels)];
          return acc;
        }, {});
    }

    function withTagEmoji(label = "") {
      const raw = String(label).trim();
      if (!raw) return "🏷️ Tag";
      if (/[\u{1F300}-\u{1FAFF}\u2600-\u27BF]/u.test(raw)) return raw;

      const normalized = raw.toLowerCase();
      const emojiMap = [
        { keyword: "spicy", emoji: "🌶️" },
        { keyword: "vegan", emoji: "🌱" },
        { keyword: "popular", emoji: "⭐" },
        { keyword: "seafood", emoji: "🐟" },
        { keyword: "sweet", emoji: "🍯" },
        { keyword: "chicken", emoji: "🍗" },
        { keyword: "beef", emoji: "🥩" },
        { keyword: "pork", emoji: "🐷" }
      ];

      const matched = emojiMap.find((item) => normalized.includes(item.keyword));
      if (matched) return `${matched.emoji} ${raw}`;
      return `🏷️ ${raw}`;
    }

    function mapSheetRows(rows = []) {
      return rows
        .map((row) => row.c || [])
        .map((c) => c.map((cell) => (cell?.v ?? "").toString().trim()))
        .filter((cells) => cells.some(Boolean))
        .map((cells) => ({
          category: cells[0] || "Uncategorized",
          label: cells[1] || "",
          nameKo: cells[2] || "",
          nameEn: cells[3] || "",
          description: cells[4] || "",
          price: cells[5] || "",
          imageUrl: cells[6] || "",
          tags: parseTags(cells[7] || ""),
          tagSubLabels: parseTagSubLabels(cells[8] || "")
        }));
    }

    function getSpecialCategoryKey(category) {
      return SPECIAL_TAG_CATEGORIES[category] || "";
    }

    function getSubcategoriesByCategory(menuItems, category) {
      if (category === "All") return [];

      const specialCategoryKey = getSpecialCategoryKey(category);
      if (specialCategoryKey) {
        const options = menuItems
          .filter((item) =>
            item.tags.some((tag) => tag.label.toLowerCase().includes(specialCategoryKey))
          )
          .flatMap((item) => item.tagSubLabels?.[specialCategoryKey] || [])
          .map((value) => String(value).trim())
          .filter(Boolean);

        return [...new Set(options)];
      }

      const categoryMenus = menuItems.filter((item) => item.category === category);
      const options = categoryMenus
        .map((item) => String(item.label || "").trim())
        .filter(Boolean);

      return [...new Set(options)];
    }

    async function fetchMenusFromGoogleSheet() {
      const { sheetId, gid } = SHEET_CONFIG;
      if (!sheetId) return SAMPLE_MENU;

      const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?gid=${gid}&tqx=out:json`;
      const res = await fetch(url);
      if (!res.ok) throw new Error("Failed to fetch Google Sheet");

      const text = await res.text();
      const jsonText = text
        .replace("/*O_o*/", "")
        .replace("google.visualization.Query.setResponse(", "")
        .slice(0, -2);

      const data = JSON.parse(jsonText);
      return mapSheetRows(data.table?.rows || []);
    }

    function formatPrice(value = "") {
      if (!value) return "";
      const v = String(value).trim();
      if (v.startsWith("$")) return v;
      return `$${v}`;
    }

    function getCategories(menuItems) {
      const unique = [...new Set(menuItems.map((item) => item.category).filter(Boolean))];
      const base = ["All", ...unique];
      if (!base.includes("Vegan 🌱")) base.push("Vegan 🌱");
      if (!base.includes("Spicy 🌶️")) base.push("Spicy 🌶️");
      if (!base.includes("Popular ⭐")) base.push("Popular ⭐");
      return base;
    }

    function renderTabs() {
      const tabsEl = document.getElementById("tabs");
      const categories = getCategories(allMenus);

      tabsEl.innerHTML = categories
        .map((category) => {
          const activeClass = category === selectedCategory ? "active" : "";
          return `<button class="tab ${activeClass}" data-category="${escapeHtml(category)}" type="button">${escapeHtml(category)}</button>`;
        })
        .join("");

      tabsEl.querySelectorAll(".tab").forEach((tabButton) => {
        tabButton.addEventListener("click", () => {
          selectedCategory = tabButton.dataset.category || "All";
          selectedSubcategory = "All";
          renderTabs();
          renderSubtabs();
          renderMenu();
        });
      });
    }

    function renderSubtabs() {
      const subtabsEl = document.getElementById("subtabs");
      const subtabsWrapEl = document.getElementById("subtabsWrap");
      const subtabsContextEl = document.getElementById("subtabsContext");
      const subcategories = getSubcategoriesByCategory(allMenus, selectedCategory);

      if (!subcategories.length) {
        subtabsEl.innerHTML = "";
        subtabsWrapEl.classList.add("hidden");
        subtabsContextEl.textContent = "";
        return;
      }

      subtabsWrapEl.classList.remove("hidden");
      subtabsContextEl.textContent = selectedCategory;

      const allOptions = ["All", ...subcategories];
      subtabsEl.innerHTML = allOptions
        .map((sub) => {
          const activeClass = sub === selectedSubcategory ? "active" : "";
          return `<button class="subtab ${activeClass}" data-subcategory="${escapeHtml(sub)}" type="button">${escapeHtml(sub)}</button>`;
        })
        .join("");

      subtabsEl.querySelectorAll(".subtab").forEach((button) => {
        button.addEventListener("click", () => {
          selectedSubcategory = button.dataset.subcategory || "All";
          renderSubtabs();
          renderMenu();
        });
      });
    }

    function filterMenus(menuItems) {
      let filtered = menuItems;
      const specialCategoryKey = getSpecialCategoryKey(selectedCategory);

      if (specialCategoryKey) {
        filtered = menuItems.filter((item) =>
          item.tags.some((tag) => tag.label.toLowerCase().includes(specialCategoryKey))
        );
      } else if (selectedCategory !== "All") {
        filtered = menuItems.filter((item) => item.category === selectedCategory);
      }

      if (selectedSubcategory !== "All") {
        if (specialCategoryKey) {
          filtered = filtered.filter((item) =>
            (item.tagSubLabels?.[specialCategoryKey] || [])
              .some((sub) => sub.toLowerCase() === selectedSubcategory.toLowerCase())
          );
        } else {
          filtered = filtered.filter((item) =>
            String(item.label || "").toLowerCase() === selectedSubcategory.toLowerCase()
          );
        }
      }

      return filtered;
    }

    function setupToTopButton() {
      const toTopBtn = document.getElementById("toTopBtn");
      if (!toTopBtn) return;

      window.addEventListener("scroll", () => {
        toTopBtn.classList.toggle("show", window.scrollY > 380);
      }, { passive: true });

      toTopBtn.addEventListener("click", () => {
        window.scrollTo({ top: 0, behavior: "smooth" });
      });
    }

    function renderMenu() {
      const menuListEl = document.getElementById("menuList");
      const filtered = filterMenus(allMenus);

      if (!filtered.length) {
        menuListEl.innerHTML = `<div class="empty">No menu items found in this category.</div>`;
        return;
      }

      menuListEl.innerHTML = filtered
        .map((item) => {
          const tagsHtml = item.tags
            .map((tag) => `<span class="tag ${escapeHtml(tag.color)}">${escapeHtml(tag.label)}</span>`)
            .join("");

          return `
            <article class="card">
              <img class="thumb" src="${escapeHtml(item.imageUrl)}" alt="${escapeHtml(item.nameEn || item.nameKo)}" />
              <div>
                <p class="name-ko">${escapeHtml(item.nameKo)}</p>
                <p class="name-en">${escapeHtml(item.nameEn)}</p>
                <p class="desc">${escapeHtml(item.description)}</p>
                <div class="tags">${tagsHtml}</div>
              </div>
              <div class="price">${escapeHtml(formatPrice(item.price))}</div>
            </article>
          `;
        })
        .join("");
    }

    async function bootstrap() {
      try {
        allMenus = await fetchMenusFromGoogleSheet();
      } catch (error) {
        console.error(error);
        allMenus = SAMPLE_MENU;
      }

      renderTabs();
      renderSubtabs();
      renderMenu();
      setupToTopButton();
    }

    bootstrap();
  </script>
</body>
</html>
