  <style>
    :root {
      --menu-bg-cream: #f5efe4;
      --menu-bg-paper: rgba(255, 251, 244, 0.86);
      --menu-bg-ink: #211813;
      --menu-bg-gold: rgba(212, 175, 55, 0.2);
      --menu-shell-shadow: 0 18px 40px rgba(30, 21, 16, 0.12);
    }

    body.menu-page {
      position: relative;
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(212, 175, 55, 0.18), transparent 28%),
        radial-gradient(circle at 85% 12%, rgba(90, 17, 34, 0.12), transparent 22%),
        linear-gradient(180deg, rgba(251, 247, 241, 0.96) 0%, rgba(245, 239, 228, 0.98) 100%);
      color: var(--menu-bg-ink);
      overflow-x: hidden;
    }

    body.menu-page::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(17, 12, 10, 0.48), rgba(17, 12, 10, 0.12)),
        url("../assets/background수묵.webp") center top / cover no-repeat;
      opacity: 0.14;
      pointer-events: none;
      z-index: -2;
    }

    body.menu-page::after {
      content: "";
      position: fixed;
      inset: auto -8vw -10vh auto;
      width: min(42vw, 460px);
      height: min(42vw, 460px);
      border-radius: 50%;
      background:
        radial-gradient(circle, rgba(212, 175, 55, 0.18) 0%, rgba(212, 175, 55, 0.04) 48%, transparent 72%);
      filter: blur(10px);
      pointer-events: none;
      z-index: -1;
    }

    .menu-page .wrap {
      position: relative;
      margin-top: 22px;
      padding: 18px 0 28px;
    }

    .menu-page .wrap::before {
      content: "";
      position: absolute;
      inset: -10px -18px -18px;
      border-radius: 36px;
      background:
        linear-gradient(180deg, rgba(255, 251, 244, 0.76), rgba(255, 249, 240, 0.58)),
        url("../assets/pattern.webp") center / 520px auto;
      opacity: 0.28;
      box-shadow: 0 24px 60px rgba(34, 24, 17, 0.08);
      pointer-events: none;
      z-index: -1;
    }

    .menu-sticky-shell {
      position: relative;
      padding: 18px 0 8px;
      background: linear-gradient(to bottom, rgba(249, 245, 238, 0.82), rgba(249, 245, 238, 0.4));
      backdrop-filter: none;
      transition: padding 0.24s ease, background 0.24s ease, backdrop-filter 0.24s ease, box-shadow 0.24s ease;
    }

    .menu-sticky-spacer {
      height: 0;
    }

    .menu-sticky-inner {
      width: min(960px, 92vw);
      margin: 0 auto;
      display: grid;
      gap: 16px;
      padding: 14px 16px;
      border-radius: 22px;
      background:
        linear-gradient(180deg, rgba(255, 252, 247, 0.94), rgba(251, 246, 238, 0.88)),
        url("../assets/pattern.webp") center / 440px auto;
      border: 1px solid rgba(120, 103, 77, 0.14);
      box-shadow: var(--menu-shell-shadow);
      transition: gap 0.24s ease;
    }

    .menu-homebar {
      display: flex;
      align-items: center;
      justify-content: flex-start;
    }

    .menu-sticky-shell .tabs,
    .menu-sticky-shell .subtabs-wrap {
      margin-bottom: 0;
    }

    .menu-sticky-shell .subtabs-wrap {
      position: static !important;
      top: auto !important;
      margin-bottom: 0;
    }

    .menu-page .wrap {
      margin-top: 16px;
    }

    .menu-page.is-scrolled .menu-sticky-shell {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 60;
      padding: 10px 0 12px;
      background: linear-gradient(to bottom, rgba(244, 240, 233, 0.88), rgba(244, 240, 233, 0.54));
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 24px rgba(28, 35, 48, 0.08);
    }

    .menu-page.is-scrolled .menu-sticky-spacer {
      height: var(--menu-sticky-height, 0px);
    }

    .menu-page.is-scrolled .menu-sticky-inner {
      gap: 12px;

      .menu-page.is-scrolled .menu-sticky-shell {

      .menu-page.is-scrolled .menu-sticky-inner {
        display: flex;

      .menu-page.is-scrolled .menu-homebar {

      .menu-page.is-scrolled .menu-home-link {

      .menu-page.is-scrolled .menu-sticky-shell .tabs {

      .menu-page.is-scrolled .menu-sticky-shell .subtabs-wrap {

  <script>
    /**
     * [Google Sheet 컬럼 순서]
     * category | label | nameKo | nameEn | description | price | imageUrl | tags
     *
     * tags 예시:
     * 🌶️ Spicy|red, 🌱 Vegan|green, ⭐ Popular|yellow, 🐟 Seafood|blue
     */
    const SHEET_CONFIG = {
      sheetId: "1xa9OZbctYnlbaAL8lKIgmefM5hvSw0Plk01lxp5G2fc",
      gid: "1100419696"
    };

    const SAMPLE_MENU = [
      {
        category: "Appetizers",
        label: "Fried",
        nameKo: "매콤 콜리플라워",
        nameEn: "Spicy Fried Cauliflower",
        description: "Crispy fried cauliflower tossed in a spicy sauce.",
        price: "$12",
        imageUrl: "https://images.unsplash.com/photo-1562967914-608f82629710?auto=format&fit=crop&w=500&q=80",
        tags: [
          { label: "🌶️ Spicy", color: "red" },

          { label: "⭐ Popular", color: "yellow" }
        ]
      },
      {
        category: "Mains",
        label: "Stir-fried",
        nameKo: "해물김치 볶음밥",
        nameEn: "Seafood Kimchi Fried Rice",
        description: "Fried rice stir-fried with seafood and spicy kimchi.",
        price: "$15",
        imageUrl: "https://images.unsplash.com/photo-1512058564366-18510be2db19?auto=format&fit=crop&w=500&q=80",
        tags: [
          { label: "🌶️ Spicy", color: "red" },
          { label: "🐟 Seafood", color: "blue" },
          { label: "⭐ Popular", color: "yellow" }
        ]
      },
      {
        category: "Mains",
        label: "Fried",
        nameKo: "달콤매콤 치킨",
        nameEn: "Sweet & Spicy Korean Chicken",
        description: "Crispy chicken pieces coated in a sweet and spicy glaze.",
        price: "$9",
        imageUrl: "https://images.unsplash.com/photo-1516684732162-798a0062be99?auto=format&fit=crop&w=500&q=80",
        tags: [
          { label: "🌶️ Spicy", color: "red" },
          { label: "⭐ Popular", color: "blue" }
        ]
      }
    ];

    let allMenus = [];
    let selectedCategory = "All";
    let selectedSubcategory = "All";
    let selectedDietaryTags = new Set();
    let syncStickyHeaderMetrics = () => {};

    function escapeHtml(text = "") {
      return text
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function getTagKey(label = "") {
      const normalized = String(label).trim().toLowerCase();
      if (!normalized) return "tag";
      if (/^spicy\d*$/.test(normalized)) return "spicy";
      if (normalized.includes("vegan")) return "vegan";
      if (normalized.includes("ask server")) return "ask-server";
      if (normalized.includes("popular")) return "popular";
      if (normalized.includes("seafood")) return "seafood";
      if (normalized.includes("sweet")) return "sweet";
      if (normalized.includes("chicken")) return "chicken";
      if (normalized.includes("beef")) return "beef";
      if (normalized.includes("pork")) return "pork";
      return normalized;
    }

    function getSpicyLevel(label = "") {
      const normalized = String(label).trim().toLowerCase();
      const match = normalized.match(/^spicy(\d*)$/);
      if (!match) return null;
      return Math.max(1, Number(match[1] || "1"));
    }

    function renderTagLabel(label = "") {
      const raw = String(label).trim();
      if (!raw) return "Tag";

      const spicyLevel = getSpicyLevel(raw);
      if (spicyLevel) return "🌶️".repeat(spicyLevel);
      if (/[\u{1F300}-\u{1FAFF}\u2600-\u27BF]/u.test(raw)) return raw;

      const tagKey = getTagKey(raw);
      const emojiMap = {
        spicy: "🌶️",
        vegan: "🌱",
        "ask-server": "🌱",
        popular: "⭐",
        seafood: "🐟",
        sweet: "🍯",
        chicken: "🍗",
        beef: "🥩",
        pork: "🐷"
      };

      const emoji = emojiMap[tagKey];
      return emoji ? `${emoji} ${raw}` : raw;
    }

    function parseTags(raw = "") {
      return String(raw)
        .split(",")
        .map((part) => part.trim())
        .filter(Boolean)
        .map((chunk) => {
          const [label, color] = chunk.split("|").map((v) => v && v.trim());
          const key = getTagKey(label || "Tag");
          const resolvedColor = key === "spicy"
            ? "chili"
            : (color || (key === "ask-server" ? "green" : "gray"));
          return {
            key,
            label: renderTagLabel(label || "Tag"),
            color: resolvedColor
          };
        });
    }

    function withTagEmoji(label = "") {
      const raw = String(label).trim();
      if (!raw) return "🏷️ Tag";
      if (/[\u{1F300}-\u{1FAFF}\u2600-\u27BF]/u.test(raw)) return raw;

      const normalized = raw.toLowerCase();
      const emojiMap = [
        { keyword: "spicy", emoji: "🌶️" },
        { keyword: "vegan", emoji: "🌱" },
        { keyword: "ask server", emoji: "🌱" },
        { keyword: "popular", emoji: "⭐" },
        { keyword: "seafood", emoji: "🐟" },
        { keyword: "sweet", emoji: "🍯" },
        { keyword: "chicken", emoji: "🍗" },
        { keyword: "beef", emoji: "🥩" },
        { keyword: "pork", emoji: "🐷" }
      ];

      const matched = emojiMap.find((item) => normalized.includes(item.keyword));
      if (matched) return `${matched.emoji} ${raw}`;
      return `🏷️ ${raw}`;
    }

    function mapSheetRows(rows = []) {
      return rows
        .map((row) => row.c || [])
        .map((c) => c.map((cell) => (cell?.v ?? "").toString().trim()))
        .filter((cells) => cells.some(Boolean))
        .map((cells) => ({
          category: cells[0] || "Uncategorized",
          label: cells[1] || "",
          nameKo: cells[2] || "",
          nameEn: cells[3] || "",
          description: cells[4] || "",
          price: cells[5] || "",
          imageUrl: cells[6] || "",
          tags: parseTags(cells[7] || "")
        }));
    }

    function getSubcategoriesByCategory(menuItems, category) {
      if (category === "All" || category === "Vegan 🌱" || category === "Spicy 🌶️" || category === "Popular ⭐") return [];

      const categoryMenus = menuItems.filter((item) => item.category === category);
      const options = categoryMenus
        .map((item) => String(item.label || "").trim())
        .filter(Boolean);

      return [...new Set(options)];
    }

    async function fetchMenusFromGoogleSheet() {
      const { sheetId, gid } = SHEET_CONFIG;
      if (!sheetId) return SAMPLE_MENU;

      const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?gid=${gid}&tqx=out:json`;
      const res = await fetch(url);
      if (!res.ok) throw new Error("Failed to fetch Google Sheet");

      const text = await res.text();
      const jsonText = text
        .replace("/*O_o*/", "")
        .replace("google.visualization.Query.setResponse(", "")
        .slice(0, -2);

      const data = JSON.parse(jsonText);
      return mapSheetRows(data.table?.rows || []);
    }

    function formatPrice(value = "") {
      if (!value) return "";
      const v = String(value).trim();
      if (v.startsWith("$")) return v;
      return `$${v}`;
    }

    function isDrinkCategory(category = "") {
      return String(category).trim().toLowerCase().includes("drink");
    }

    function prioritizeDrinkCategory(categories = []) {
      const drinkCategories = categories.filter((category) => isDrinkCategory(category));
      const otherCategories = categories.filter((category) => !isDrinkCategory(category));
      return [...drinkCategories, ...otherCategories];
    }

    function getCategories(menuItems) {
      const unique = [...new Set(menuItems.map((item) => item.category).filter(Boolean))];
      const base = ["All", ...unique];
      if (!base.includes("Vegan 🌱")) base.push("Vegan 🌱");
      if (!base.includes("Spicy 🌶️")) base.push("Spicy 🌶️");
      if (!base.includes("Popular ⭐")) base.push("Popular ⭐");
      return base;
    }

    function renderTabs() {
      const tabsEl = document.getElementById("tabs");
      const categories = prioritizeDrinkCategory(getCategories(allMenus));

      tabsEl.innerHTML = categories
        .map((category) => {
          const activeClass = category === selectedCategory ? "active" : "";
          const drinkClass = isDrinkCategory(category) ? "tab-drink" : "";
          return `<button class="tab ${drinkClass} ${activeClass}" data-category="${escapeHtml(category)}" type="button">${escapeHtml(category)}</button>`;
        })
        .join("");

      tabsEl.querySelectorAll(".tab").forEach((tabButton) => {
        tabButton.addEventListener("click", () => {
          selectedCategory = tabButton.dataset.category || "All";
          selectedSubcategory = "All";
          selectedDietaryTags = new Set();
          renderTabs();
          renderDietaryFilters();
          renderSubtabs();
          renderMenu();
        });
      });
    }

    function renderSubtabs() {
      const subtabsEl = document.getElementById("subtabs");
      const subtabsWrapEl = document.getElementById("subtabsWrap");
      const subtabsContextEl = document.getElementById("subtabsContext");
      const subcategories = getSubcategoriesByCategory(allMenus, selectedCategory);

      if (!subcategories.length) {
        subtabsEl.innerHTML = "";
        subtabsWrapEl.classList.add("hidden");
        subtabsContextEl.textContent = "";
        return;
      }

      subtabsWrapEl.classList.remove("hidden");
      subtabsContextEl.textContent = selectedCategory;

      const allOptions = ["All", ...subcategories];
      subtabsEl.innerHTML = allOptions
        .map((sub) => {
          const activeClass = sub === selectedSubcategory ? "active" : "";
          return `<button class="subtab ${activeClass}" data-subcategory="${escapeHtml(sub)}" type="button">${escapeHtml(sub)}</button>`;
        })
        .join("");

      subtabsEl.querySelectorAll(".subtab").forEach((button) => {
        button.addEventListener("click", () => {
          selectedSubcategory = button.dataset.subcategory || "All";
          renderSubtabs();
          renderMenu();
        });
      });
    }

    function filterMenus(menuItems) {
      let filtered = menuItems;

      if (selectedCategory === "Vegan 🌱") {
        filtered = menuItems.filter((item) =>
          item.tags.some((tag) => tag.key === "vegan")
        );
      } else if (selectedCategory === "Spicy 🌶️") {
        filtered = menuItems.filter((item) =>
          item.tags.some((tag) => tag.key === "spicy")
        );
      } else if (selectedCategory === "Popular ⭐") {
        filtered = menuItems.filter((item) =>
          item.tags.some((tag) => tag.key === "popular")
        );
      } else if (selectedCategory !== "All") {
        filtered = menuItems.filter((item) => item.category === selectedCategory);
      }

      if (selectedSubcategory !== "All") {
        filtered = filtered.filter((item) =>
          String(item.label || "").toLowerCase() === selectedSubcategory.toLowerCase()
        );
      }

      return filtered;
    }

    function filterBySelectedCategory(menuItems, category) {
      if (category === "Vegan ðŸŒ±") {
        return menuItems.filter((item) =>
          item.tags.some((tag) => tag.key === "vegan")
        );
      }

      if (category === "Spicy ðŸŒ¶ï¸") {
        return menuItems.filter((item) =>
          item.tags.some((tag) => tag.key === "spicy")
        );
      }

      if (category === "Popular â­") {
        return menuItems.filter((item) =>
          item.tags.some((tag) => tag.key === "popular")
        );
      }

      if (category === "All") return menuItems;

      return menuItems.filter((item) => item.category === category);
    }

    function getSubcategoriesByCategory(menuItems, category) {
      const scopedMenus = filterBySelectedCategory(menuItems, category);
      const options = scopedMenus
        .map((item) => String(item.label || "").trim())
        .filter(Boolean);

      return [...new Set(options)];
    }

    function filterMenus(menuItems) {
      let filtered = filterBySelectedCategory(menuItems, selectedCategory);

      if (selectedSubcategory !== "All") {
        filtered = filtered.filter((item) =>
          String(item.label || "").toLowerCase() === selectedSubcategory.toLowerCase()
        );
      }

      return filtered;
    }

    function filterBySelectedCategory(menuItems, category) {
      const normalizedCategory = String(category || "").toLowerCase();

      if (normalizedCategory.includes("vegan")) {
        return menuItems.filter((item) =>
          item.tags.some((tag) => tag.key === "vegan")
        );
      }

      if (normalizedCategory.includes("spicy")) {
        return menuItems.filter((item) =>
          item.tags.some((tag) => tag.key === "spicy")
        );
      }

      if (normalizedCategory.includes("popular")) {
        return menuItems.filter((item) =>
          item.tags.some((tag) => tag.key === "popular")
        );
      }

      if (category === "All") return menuItems;

      return menuItems.filter((item) => item.category === category);
    }

    function getSubcategoriesByCategory(menuItems, category) {
      const scopedMenus = filterBySelectedCategory(menuItems, category);
      const options = scopedMenus
        .map((item) => String(item.label || "").trim())
        .filter(Boolean);

      return [...new Set(options)];
    }

    function filterMenus(menuItems) {
      let filtered = filterBySelectedCategory(menuItems, selectedCategory);

      if (selectedSubcategory !== "All") {
        filtered = filtered.filter((item) =>
          String(item.label || "").toLowerCase() === selectedSubcategory.toLowerCase()
        );
      }

      return filtered;
    }

    function setupToTopButton() {
      const toTopBtn = document.getElementById("toTopBtn");
      if (!toTopBtn) return;

      window.addEventListener("scroll", () => {
        toTopBtn.classList.toggle("show", window.scrollY > 380);
      }, { passive: true });

      toTopBtn.addEventListener("click", () => {
        window.scrollTo({ top: 0, behavior: "smooth" });
      });
    }

    function setupStickyHeaderState() {
      const page = document.body;
      const stickyShell = document.querySelector(".menu-sticky-shell");
      if (!page || !stickyShell) return;
      const mobileQuery = window.matchMedia("(max-width: 640px)");

      const syncHeaderHeight = () => {
        document.documentElement.style.setProperty("--menu-sticky-height", `${stickyShell.offsetHeight}px`);
      };

      const syncStickyState = () => {
        const threshold = mobileQuery.matches
          ? Math.max(88, stickyShell.offsetHeight - 24)
          : 16;

        page.classList.toggle("is-scrolled", window.scrollY > threshold);
        syncHeaderHeight();
      };

      syncStickyHeaderMetrics = syncHeaderHeight;
      syncHeaderHeight();
      syncStickyState();
      window.addEventListener("scroll", syncStickyState, { passive: true });
      window.addEventListener("resize", syncStickyState);
      if (typeof mobileQuery.addEventListener === "function") {
        mobileQuery.addEventListener("change", syncStickyState);
      }
    }

    function renderMenu() {
      const menuListEl = document.getElementById("menuList");
      const filtered = filterMenus(allMenus);

      if (!filtered.length) {
        menuListEl.innerHTML = `<div class="empty">No menu items found in this category.</div>`;
        return;
      }

      menuListEl.innerHTML = filtered
        .map((item) => {
          const tagsHtml = item.tags
            .map((tag) => `<span class="menu-tag ${escapeHtml(tag.color)}">${escapeHtml(tag.label)}</span>`)
            .join("");

          const tagsSection = tagsHtml ? `<div class="menu-meta">${tagsHtml}</div>` : "";

          return `
            <article class="menu-card">
              <img class="menu-image" src="${escapeHtml(item.imageUrl)}" alt="${escapeHtml(item.nameEn || item.nameKo)}" />
              <div class="menu-content">
                <p class="menu-title name-ko">${escapeHtml(item.nameKo)}</p>
                <p class="menu-title menu-title-alt name-en">${escapeHtml(item.nameEn)}</p>
                <p class="menu-desc desc">${escapeHtml(item.description)}</p>
                ${tagsSection}
              </div>
              <div class="menu-price price">${escapeHtml(formatPrice(item.price))}</div>
            </article>
          `;
        })
        .join("");
    }

    function mapSheetRows(rows = []) {
      return rows
        .map((row) => row.c || [])
        .map((c) => c.map((cell) => (cell?.v ?? "").toString().trim()))
        .filter((cells) => cells.some(Boolean))
        .map((cells) => ({
          category: cells[0] || "Uncategorized",
          label: cells[1] || "",
          nameKo: cells[2] || "",
          nameEn: cells[3] || "",
          description: cells[4] || "",
          price: cells[5] || "",
          imageUrl: cells[6] || "",
          tags: parseTags(cells[7] || ""),
          ingredient: cells[8] || ""
        }));
    }

    function getSubcategoryValue(item) {
      return String(item.ingredient || item.label || "").trim();
    }

    function filterBySelectedCategory(menuItems, category) {
      const normalizedCategory = String(category || "").toLowerCase();

      if (normalizedCategory.includes("vegan")) {
        return menuItems.filter((item) =>
          item.tags.some((tag) => tag.key === "vegan")
        );
      }

      if (normalizedCategory.includes("spicy")) {
        return menuItems.filter((item) =>
          item.tags.some((tag) => tag.key === "spicy")
        );
      }

      if (normalizedCategory.includes("popular")) {
        return menuItems.filter((item) =>
          item.tags.some((tag) => tag.key === "popular")
        );
      }

      if (category === "All") return menuItems;

      return menuItems.filter((item) => item.category === category);
    }

    function getSubcategoriesByCategory(menuItems, category) {
      if (category === "All") return [];

      const scopedMenus = filterBySelectedCategory(menuItems, category);
      const options = scopedMenus
        .map((item) => getSubcategoryValue(item))
        .filter(Boolean);

      return [...new Set(options)];
    }

    function filterMenus(menuItems) {
      let filtered = filterBySelectedCategory(menuItems, selectedCategory);

      if (selectedSubcategory !== "All") {
        filtered = filtered.filter((item) =>
          getSubcategoryValue(item).toLowerCase() === selectedSubcategory.toLowerCase()
        );
      }

      return filtered;
    }

    function normalizeDietaryTag(value = "") {
      return String(value).trim().toLowerCase();
    }

    function parseDietaryTagList(raw = "") {
      return String(raw)
        .split(",")
        .map((part) => String(part).trim())
        .filter(Boolean);
    }

    function formatDietaryTag(tag = "") {
      const raw = String(tag).trim();
      if (!raw) return "";
      return raw.charAt(0).toUpperCase() + raw.slice(1);
    }

    function isDietaryCategory(category = "") {
      const normalized = String(category).toLowerCase();
      return normalized.includes("vegan");
    }

    function getDietaryTagsForItem(item) {
      const values = Array.isArray(item.dietaryTags) ? item.dietaryTags : [];
      return values
        .map((tag) => normalizeDietaryTag(tag))
        .filter((tag, index, arr) => tag && arr.indexOf(tag) === index);
    }

    function mapSheetRows(rows = []) {
      return rows
        .map((row) => row.c || [])
        .map((c) => c.map((cell) => (cell?.v ?? "").toString().trim()))
        .filter((cells) => cells.some(Boolean))
        .map((cells) => ({
          category: cells[0] || "Uncategorized",
          label: cells[1] || "",
          nameKo: cells[2] || "",
          nameEn: cells[3] || "",
          description: cells[4] || "",
          price: cells[5] || "",
          imageUrl: cells[6] || "",
          tags: parseTags(cells[7] || ""),
          ingredient: cells[8] || "",
          dietaryTags: parseDietaryTagList(cells[8] || "")
        }));
    }

    function getCategories(menuItems) {
      const unique = [...new Set(menuItems.map((item) => item.category).filter(Boolean))];
      const base = ["All", ...unique];
      if (!base.includes("Vegan 🌱")) base.push("Vegan 🌱");
      if (!base.includes("Spicy 🌶️")) base.push("Spicy 🌶️");
      if (!base.includes("Popular ⭐")) base.push("Popular ⭐");
      return base;
    }

    function getSubcategoryValue(item) {
      return String(item.label || "").trim();
    }

    function filterBySelectedCategory(menuItems, category) {
      const normalizedCategory = String(category || "").toLowerCase();

      if (normalizedCategory.includes("vegan")) {
        return menuItems.filter((item) =>
          item.tags.some((tag) => tag.key === "vegan")
        );
      }

      if (normalizedCategory.includes("spicy")) {
        return menuItems.filter((item) =>
          item.tags.some((tag) => tag.key === "spicy")
        );
      }

      if (normalizedCategory.includes("popular")) {
        return menuItems.filter((item) =>
          item.tags.some((tag) => tag.key === "popular")
        );
      }

      if (category === "All") return menuItems;

      return menuItems.filter((item) => item.category === category);
    }

    function getSubcategoriesByCategory(menuItems, category) {
      if (category === "All") return [];

      const scopedMenus = filterBySelectedCategory(menuItems, category);

      if (isDietaryCategory(category)) {
        const options = scopedMenus
          .flatMap((item) => Array.isArray(item.dietaryTags) ? item.dietaryTags : [])
          .map((tag) => String(tag).trim())
          .filter(Boolean);

        return ["All", ...new Set(options)];
      }

      const options = scopedMenus
        .map((item) => getSubcategoryValue(item))
        .filter(Boolean);

      return [...new Set(options)];
    }

    function filterMenus(menuItems) {
      let filtered = filterBySelectedCategory(menuItems, selectedCategory);

      if (isDietaryCategory(selectedCategory)) {
        if (veganSelectionMode === "blank") {
          filtered = filtered.filter((item) => !getDietaryTagsForItem(item).length);
        } else if (selectedDietaryTags.size) {
          filtered = filtered.filter((item) => {
            const dietaryTags = getDietaryTagsForItem(item);
            return [...selectedDietaryTags].every((tag) => dietaryTags.includes(tag));
          });
        }

        return filtered;
      }

      if (selectedSubcategory !== "All") {
        filtered = filtered.filter((item) =>
          getSubcategoryValue(item).toLowerCase() === selectedSubcategory.toLowerCase()
        );
      }

      return filtered;
    }

    function renderSubtabs() {
      const subtabsEl = document.getElementById("subtabs");
      const subtabsWrapEl = document.getElementById("subtabsWrap");
      const subtabsContextEl = document.getElementById("subtabsContext");
      const subcategories = getSubcategoriesByCategory(allMenus, selectedCategory);

      if (!subcategories.length) {
        subtabsEl.innerHTML = "";
        subtabsWrapEl.classList.add("hidden");
        subtabsContextEl.textContent = "";
        return;
      }

      subtabsWrapEl.classList.remove("hidden");
      subtabsContextEl.textContent = selectedCategory;

      subtabsEl.innerHTML = subcategories
        .map((sub) => {
          const value = isDietaryCategory(selectedCategory) ? normalizeDietaryTag(sub) : sub;
          const isAll = value === "all";
          const isActive = isDietaryCategory(selectedCategory)
            ? (isAll ? veganSelectionMode === "blank" : veganSelectionMode === "tags" && selectedDietaryTags.has(value))
            : sub === selectedSubcategory;
          const activeClass = isActive ? "active" : "";
          const label = isDietaryCategory(selectedCategory) && !isAll ? formatDietaryTag(sub) : sub;
          return `<button class="subtab ${activeClass}" data-subcategory="${escapeHtml(value)}" type="button">${escapeHtml(label)}</button>`;
        })
        .join("");

      subtabsEl.querySelectorAll(".subtab").forEach((button) => {
        button.addEventListener("click", () => {
          const value = button.dataset.subcategory || "All";

          if (isDietaryCategory(selectedCategory)) {
            if (value === "all") {
              selectedDietaryTags = new Set();
              veganSelectionMode = "blank";
            } else if (selectedDietaryTags.has(value)) {
              selectedDietaryTags.delete(value);
              veganSelectionMode = selectedDietaryTags.size ? "tags" : "blank";
            } else {
              veganSelectionMode = "tags";
              selectedDietaryTags.add(value);
            }
          } else {
            selectedSubcategory = value || "All";
          }

          renderSubtabs();
          renderMenu();
        });
      });
    }

    function renderMenu() {
      const menuListEl = document.getElementById("menuList");
      const filtered = filterMenus(allMenus);

      if (!filtered.length) {
        menuListEl.innerHTML = `<div class="empty">No menu items found in this category.</div>`;
        return;
      }

      menuListEl.innerHTML = filtered
        .map((item) => {
          const displayTags = [...item.tags.filter((tag) => tag.key !== "vegan"), ...getIngredientBadges(item)];
          const tagsHtml = displayTags
            .map((tag) => `<span class="menu-tag ${escapeHtml(tag.color)}">${escapeHtml(tag.label)}</span>`)
            .join("");

          const tagsSection = tagsHtml ? `<div class="menu-meta">${tagsHtml}</div>` : "";

          return `
            <article class="menu-card">
              <img class="menu-image" src="${escapeHtml(item.imageUrl)}" alt="${escapeHtml(item.nameEn || item.nameKo)}" />
              <div class="menu-content">
                <p class="menu-title name-ko">${escapeHtml(item.nameKo)}</p>
                <p class="menu-title menu-title-alt name-en">${escapeHtml(item.nameEn)}</p>
                <p class="menu-desc desc">${escapeHtml(item.description)}</p>
                ${tagsSection}
              </div>
              <div class="menu-price price">${escapeHtml(formatPrice(item.price))}</div>
            </article>
          `;
        })
        .join("");
    }

    function getIngredientTagsForItem(item) {
      const values = Array.isArray(item.dietaryTags) ? item.dietaryTags : parseDietaryTagList(item.ingredient || "");
      return values
        .map((tag) => normalizeDietaryTag(tag))
        .filter((tag, index, arr) => tag && arr.indexOf(tag) === index);
    }

    function getVeganOptionTags(item) {
      const allowedTags = new Set(["vegetarian", "seafood", "egg", "dairy"]);
      return getIngredientTagsForItem(item).filter((tag) => allowedTags.has(tag));
    }

    function getDietaryTagsForItem(item) {
      return getVeganOptionTags(item);
    }

    function hasMenuTag(item, key) {
      return Array.isArray(item.tags) && item.tags.some((tag) => tag.key === key);
    }

    function getIngredientBadges(item) {
      const orderedTags = ["vegetarian", "seafood", "egg", "dairy", "chicken", "beef", "pork"];
      const labelMap = {
        vegetarian: "Vegetarian",
        seafood: "Seafood",
        dairy: "Dairy",
        egg: "Egg",
        chicken: "🍗 Chicken",
        beef: "🥩 Beef",
        pork: "🐷 Pork"
      };

      const colorMap = {
        vegetarian: "green",
        seafood: "blue",
        dairy: "blue",
        egg: "red",
        chicken: "orange",
        beef: "brown",
        pork: "purple"
      };

      return orderedTags
        .filter((tag) => getIngredientTagsForItem(item).includes(tag))
        .map((tag) => ({
          label: labelMap[tag] || formatDietaryTag(tag),
          color: colorMap[tag] || "gray"
        }));
    }

    function matchesAllowedIngredients(item, selectedTags) {
      const allTags = getVeganOptionTags(item);
      const compareTags = allTags.filter((tag) => tag !== "vegetarian");
      const selected = [...selectedTags].map((tag) => normalizeDietaryTag(tag));
      const hasVegetarianFallback = allTags.includes("vegetarian") && hasMenuTag(item, "ask-server");

      if (!selected.length) return true;
      if (!compareTags.length) return true;
      if (hasVegetarianFallback && selected.includes("vegetarian")) return true;

      return compareTags.every((tag) => selected.includes(tag));
    }

    function renderDietaryFilters() {
      // Intentionally unused in the current vegan-options flow.
    }

    function filterBySelectedCategory(menuItems, category) {
      const normalizedCategory = String(category || "").toLowerCase();

      if (normalizedCategory.includes("vegan")) {
        return menuItems.filter((item) =>
          item.tags.some((tag) => tag.key === "vegan" || tag.key === "ask-server")
        );
      }

      if (normalizedCategory.includes("spicy")) {
        return menuItems.filter((item) =>
          item.tags.some((tag) => tag.key === "spicy")
        );
      }

      if (normalizedCategory.includes("popular")) {
        return menuItems.filter((item) =>
          item.tags.some((tag) => tag.key === "popular")
        );
      }

      if (category === "All") return menuItems;

      return menuItems.filter((item) => item.category === category);
    }

    function getSubcategoriesByCategory(menuItems, category) {
      if (category === "All") return [];

      const scopedMenus = filterBySelectedCategory(menuItems, category);
      const normalizedCategory = String(category || "").toLowerCase();

      if (normalizedCategory.includes("spicy") || normalizedCategory.includes("popular")) {
        return [];
      }

      if (normalizedCategory.includes("vegan")) {
        return ["Vegetarian", "Seafood", "Egg", "Dairy"];
      }

      const options = scopedMenus
        .map((item) => getSubcategoryValue(item))
        .filter(Boolean);

      return [...new Set(options)];
    }

    function filterMenus(menuItems) {
      let filtered = filterBySelectedCategory(menuItems, selectedCategory);

      if (String(selectedCategory || "").toLowerCase().includes("vegan")) {
        if (selectedDietaryTags.size) {
          filtered = filtered.filter((item) => matchesAllowedIngredients(item, selectedDietaryTags));
        }
        return filtered;
      }

      if (selectedSubcategory !== "All") {
        filtered = filtered.filter((item) =>
          getSubcategoryValue(item).toLowerCase() === selectedSubcategory.toLowerCase()
        );
      }

      return filtered;
    }

    function renderSubtabs() {
      const subtabsEl = document.getElementById("subtabs");
      const subtabsWrapEl = document.getElementById("subtabsWrap");
      const subtabsContextEl = document.getElementById("subtabsContext");
      const subcategories = getSubcategoriesByCategory(allMenus, selectedCategory);
      const isVeganCategory = String(selectedCategory || "").toLowerCase().includes("vegan");

      if (!subcategories.length) {
        subtabsEl.innerHTML = "";
        subtabsWrapEl.classList.add("hidden");
        subtabsWrapEl.classList.remove("vegan-subtabs");
        subtabsContextEl.textContent = "";
        syncStickyHeaderMetrics();
        return;
      }

      subtabsWrapEl.classList.remove("hidden");
      subtabsWrapEl.classList.toggle("vegan-subtabs", isVeganCategory);
      subtabsContextEl.textContent = isVeganCategory ? "Allowed Ingredients" : selectedCategory;

      const options = isVeganCategory ? subcategories : ["All", ...subcategories];
      subtabsEl.innerHTML = options
        .map((sub) => {
          const value = isVeganCategory ? normalizeDietaryTag(sub) : sub;
          const activeClass = isVeganCategory
            ? (selectedDietaryTags.has(value) ? "active" : "")
            : (sub === selectedSubcategory ? "active" : "");
          return `<button class="subtab ${activeClass}" data-subcategory="${escapeHtml(value)}" type="button">${escapeHtml(sub)}</button>`;
        })
        .join("");

      subtabsEl.querySelectorAll(".subtab").forEach((button) => {
        button.addEventListener("click", () => {
          const value = button.dataset.subcategory || "";

          if (isVeganCategory) {
            if (!value) return;
            if (selectedDietaryTags.has(value)) {
              selectedDietaryTags.delete(value);
            } else {
              selectedDietaryTags.add(value);
            }
          } else {
            selectedSubcategory = value || "All";
          }

          renderSubtabs();
          renderMenu();
        });
      });

      syncStickyHeaderMetrics();
    }

    async function bootstrap() {
      try {
        allMenus = await fetchMenusFromGoogleSheet();
      } catch (error) {
        console.error(error);
        allMenus = SAMPLE_MENU;
      }

      renderTabs();
      renderSubtabs();
      renderMenu();
      setupStickyHeaderState();
      setupToTopButton();
    }

    bootstrap();
  </script>
</body>
