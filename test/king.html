<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EHWA Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/global.css?v=20260423-10" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
  <style>
    :root {
      --ink: #211813;
      --muted: #726355;
      --wine: #7b1f2f;
      --gold: #d4af37;
      --paper: rgba(255, 252, 247, 0.94);
      --paper-strong: rgba(255, 252, 247, 0.98);
      --line: rgba(112, 86, 58, 0.16);
      --shadow: 0 22px 48px rgba(29, 19, 12, 0.1);
      --radius-xl: 26px;
      --radius-lg: 18px;
      --radius-md: 13px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: "Noto Sans KR", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(212, 175, 55, 0.18), transparent 28%),
        radial-gradient(circle at 86% 12%, rgba(123, 31, 47, 0.12), transparent 24%),
        linear-gradient(180deg, rgba(251, 247, 241, 0.98) 0%, rgba(245, 239, 228, 0.98) 100%);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(255, 252, 247, 0.2), rgba(255, 252, 247, 0.08)),
        url("assets/pattern.webp") center / 760px auto;
      opacity: 0.16;
      pointer-events: none;
      z-index: -1;
    }

    button,
    input,
    select,
    textarea { font: inherit; }

    button { cursor: pointer; }
    a { color: inherit; text-decoration: none; }
    img { display: block; max-width: 100%; }

    .shell {
      width: min(100% - 18px, 1240px);
      margin: 0 auto;
      padding: 16px 0 44px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .logo-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 58px;
      height: 58px;
      border-radius: 999px;
      background: linear-gradient(180deg, rgba(255, 254, 250, 0.98), rgba(243, 231, 215, 0.94));
      border: 1px solid rgba(73, 53, 36, 0.12);
      box-shadow: 0 14px 28px rgba(42, 28, 18, 0.1);
      flex: none;
    }

    .logo-link img {
      width: 40px;
      height: 40px;
      object-fit: contain;
    }

    .brand-copy p {
      margin: 0 0 3px;
      color: var(--wine);
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .brand-copy h1 {
      margin: 0;
      font-size: clamp(1.36rem, 4.8vw, 2.35rem);
      letter-spacing: -0.05em;
      line-height: 1;
    }

    .pill-btn,
    .icon-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 0 14px;
      border-radius: 999px;
      border: 1px solid rgba(113, 88, 60, 0.16);
      background: rgba(255, 251, 245, 0.82);
      color: #2c2016;
      font-size: 0.92rem;
      font-weight: 800;
      white-space: nowrap;
      box-shadow: 0 10px 22px rgba(32, 20, 13, 0.05);
    }

    .pill-btn.primary,
    .icon-btn.primary {
      color: #fff;
      border-color: transparent;
      background: linear-gradient(135deg, var(--wine), #b9871f);
      box-shadow: 0 18px 30px rgba(123, 31, 47, 0.18);
    }

    .pill-btn.danger {
      color: #fff;
      border-color: transparent;
      background: linear-gradient(135deg, #8b1e2e, #c24646);
    }

    .icon-btn {
      width: 42px;
      padding: 0;
    }

    .hero {
      display: grid;
      gap: 14px;
      padding: 20px;
      border-radius: var(--radius-xl);
      background:
        linear-gradient(135deg, rgba(22, 15, 11, 0.96) 0%, rgba(37, 23, 16, 0.94) 45%, rgba(68, 24, 33, 0.92) 100%),
        url("assets/pattern.webp") center / 520px auto;
      color: #fff8f0;
      box-shadow: 0 28px 56px rgba(17, 11, 8, 0.18);
      margin-bottom: 16px;
    }

    .hero h2 {
      margin: 0;
      font-size: clamp(1.65rem, 5vw, 3rem);
      letter-spacing: -0.05em;
      line-height: 0.98;
    }

    .metric-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .metric-card {
      padding: 14px;
      border-radius: 18px;
      background: rgba(255, 250, 244, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .metric-card span,
    .metric-card strong { display: block; }

    .metric-card span {
      margin-bottom: 6px;
      color: rgba(255, 248, 240, 0.68);
      font-size: 0.82rem;
      font-weight: 700;
    }

    .metric-card strong {
      font-size: 1.35rem;
      line-height: 1.05;
    }

    .admin-tabs {
      display: flex;
      gap: 10px;
      margin: 0 0 16px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    .admin-tab {
      min-height: 46px;
      padding: 0 18px;
      border: 1px solid rgba(113, 88, 60, 0.16);
      border-radius: 999px;
      background: rgba(255, 251, 245, 0.86);
      color: #2c2016;
      font: inherit;
      font-weight: 800;
      white-space: nowrap;
      box-shadow: 0 10px 22px rgba(32, 20, 13, 0.05);
    }

    .admin-tab.is-active {
      color: #fff;
      border-color: transparent;
      background: linear-gradient(135deg, var(--wine), #b9871f);
      box-shadow: 0 18px 30px rgba(123, 31, 47, 0.18);
    }

    .admin-section { display: none; }
    .admin-section.is-active { display: block; }

    .dashboard-grid {
      display: grid;
      gap: 16px;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: var(--radius-xl);
      background:
        linear-gradient(180deg, rgba(255, 252, 247, 0.97), rgba(248, 241, 231, 0.96)),
        url("assets/pattern.webp") center / 440px auto;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 18px 18px 0;
    }

    .panel-head h3 {
      margin: 0;
      font-size: 1.16rem;
      letter-spacing: -0.03em;
    }

    .panel-head span {
      color: var(--muted);
      font-size: 0.88rem;
      font-weight: 800;
    }

    .toolbar {
      display: grid;
      gap: 12px;
      padding: 16px 18px 0;
    }

    .field-grid {
      display: grid;
      gap: 12px;
    }

    .field {
      display: grid;
      gap: 8px;
    }

    .field label {
      color: #2b1e14;
      font-size: 0.9rem;
      font-weight: 800;
    }

    input,
    select,
    textarea {
      width: 100%;
      padding: 13px 14px;
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      background: var(--paper-strong);
      color: #1f1712;
      outline: none;
      appearance: none;
      -webkit-appearance: none;
    }

    textarea {
      min-height: 112px;
      resize: vertical;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: rgba(123, 31, 47, 0.38);
      box-shadow: 0 0 0 4px rgba(123, 31, 47, 0.1);
      background: #fff;
    }

    input[type="checkbox"] {
      width: 20px;
      height: 20px;
      padding: 0;
      appearance: auto;
      -webkit-appearance: checkbox;
    }

    .segmented {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    .chip-btn {
      min-height: 40px;
      padding: 0 14px;
      border: 1px solid rgba(113, 88, 60, 0.16);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.8);
      color: #2a1d14;
      font: inherit;
      font-weight: 800;
      white-space: nowrap;
    }

    .chip-btn.is-active {
      background: linear-gradient(135deg, rgba(123, 31, 47, 0.14), rgba(212, 175, 55, 0.16));
      border-color: rgba(123, 31, 47, 0.3);
      color: #6b2230;
    }

    .status-line {
      min-height: 22px;
      color: var(--muted);
      font-size: 0.9rem;
      font-weight: 800;
    }

    .status-line.is-error { color: #a01f38; }
    .status-line.is-success { color: #2f6f38; }

    .reservation-list,
    .menu-list,
    .sort-list {
      display: grid;
      gap: 12px;
      padding: 18px;
    }

    .reservation-card,
    .menu-card,
    .sort-row {
      border: 1px solid rgba(113, 88, 60, 0.13);
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.76);
      box-shadow: 0 8px 20px rgba(32, 20, 13, 0.04);
    }

    .reservation-card {
      display: grid;
      gap: 12px;
      padding: 16px;
    }

    .reservation-top,
    .menu-card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }

    .reservation-top h4,
    .menu-title h4 {
      margin: 0 0 4px;
      font-size: 1.12rem;
      letter-spacing: -0.03em;
    }

    .reservation-top p,
    .menu-title p {
      margin: 0;
      color: var(--muted);
      font-size: 0.92rem;
      font-weight: 800;
    }

    .badge-row {
      display: inline-flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 0 10px;
      border-radius: 999px;
      background: rgba(44, 33, 22, 0.1);
      color: #4f3823;
      font-size: 0.78rem;
      font-weight: 900;
      white-space: nowrap;
    }

    .status-badge.downtown { background: rgba(123, 31, 47, 0.12); color: #792133; }
    .status-badge.uptown { background: rgba(47, 115, 187, 0.12); color: #255b94; }
    .status-badge.active { background: rgba(84, 139, 42, 0.14); color: #3d6f21; }
    .status-badge.hidden { background: rgba(120, 113, 108, 0.14); color: #5b514b; }

    .reservation-meta {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .meta-box {
      min-width: 0;
      padding: 12px;
      border-radius: 14px;
      background: rgba(248, 242, 234, 0.74);
      border: 1px solid rgba(113, 88, 60, 0.1);
    }

    .meta-box span,
    .meta-box strong { display: block; }

    .meta-box span {
      margin-bottom: 3px;
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 800;
    }

    .meta-box strong {
      overflow-wrap: anywhere;
      font-size: 0.98rem;
    }

    .reservation-notes {
      color: #3d2f24;
      font-size: 0.94rem;
      font-weight: 700;
      line-height: 1.45;
    }

    .menu-card {
      display: grid;
      gap: 14px;
      padding: 14px;
    }

    .menu-card.is-hidden { opacity: 0.66; }

    .menu-card-body {
      display: grid;
      grid-template-columns: 82px minmax(0, 1fr);
      gap: 12px;
      align-items: center;
    }

    .menu-thumb {
      width: 82px;
      height: 82px;
      border-radius: 16px;
      object-fit: cover;
      background: rgba(222, 214, 204, 0.9);
      border: 1px solid rgba(113, 88, 60, 0.12);
    }

    .menu-detail {
      display: grid;
      gap: 8px;
      min-width: 0;
    }

    .menu-detail p {
      margin: 0;
      color: var(--muted);
      font-size: 0.9rem;
      font-weight: 700;
      overflow-wrap: anywhere;
    }

    .menu-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      flex-wrap: wrap;
    }

    .sort-row {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 12px;
      padding: 12px;
    }

    .sort-handle {
      min-width: 48px;
      min-height: 48px;
      border-radius: 14px;
      border: 1px solid rgba(113, 88, 60, 0.14);
      background: rgba(255, 251, 245, 0.88);
      color: #4b3828;
      font-weight: 900;
      touch-action: none;
    }

    .sort-row-title {
      min-width: 0;
    }

    .sort-row-title strong,
    .sort-row-title span { display: block; }

    .sort-row-title strong {
      overflow-wrap: anywhere;
      font-size: 0.98rem;
    }

    .sort-row-title span {
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 800;
    }

    .sort-actions {
      display: flex;
      gap: 6px;
    }

    .empty-state {
      padding: 28px 18px;
      color: var(--muted);
      text-align: center;
      font-weight: 900;
    }

    .auth-card {
      display: grid;
      gap: 14px;
      padding: 18px;
    }

    .workspace[hidden],
    .auth-card[hidden] { display: none; }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 80;
      display: none;
      align-items: flex-end;
      justify-content: center;
      padding: 18px 10px;
      background: rgba(18, 12, 8, 0.52);
    }

    .modal-backdrop.is-open { display: flex; }

    .modal {
      width: min(100%, 940px);
      max-height: min(92vh, 980px);
      overflow: auto;
      border-radius: 24px;
      background:
        linear-gradient(180deg, rgba(255, 252, 247, 0.99), rgba(248, 241, 231, 0.98)),
        url("assets/pattern.webp") center / 440px auto;
      box-shadow: 0 32px 72px rgba(11, 7, 5, 0.32);
    }

    .modal-head {
      position: sticky;
      top: 0;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 16px 18px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 252, 247, 0.96);
      backdrop-filter: blur(8px);
    }

    .modal-head h3 {
      margin: 0;
      font-size: 1.15rem;
    }

    .modal-form {
      display: grid;
      gap: 16px;
      padding: 18px;
    }

    .form-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .toggle-field {
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 48px;
      color: #2b1e14;
      font-weight: 900;
    }

    .chip-btn.day-chip {
      min-width: 86px;
      min-height: 62px;
      padding: 10px 14px;
      border-radius: 18px;
      display: grid;
      align-content: center;
      justify-items: start;
      text-align: left;
      gap: 3px;
    }

    .chip-btn.day-chip span,
    .chip-btn.day-chip strong {
      display: block;
    }

    .chip-btn.day-chip span {
      color: var(--muted);
      font-size: 0.74rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .chip-btn.day-chip strong {
      font-size: 1.08rem;
      letter-spacing: -0.03em;
    }

    .branch-chip-row {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 2px;
      -webkit-overflow-scrolling: touch;
    }

    .branch-chip {
      min-height: 38px;
      padding: 0 14px;
      border-radius: 999px;
      border: 1px solid rgba(113, 88, 60, 0.16);
      background: rgba(255, 255, 255, 0.78);
      color: #2a1d14;
      font-weight: 900;
      white-space: nowrap;
    }

    .branch-chip.is-active {
      color: #fff;
      border-color: transparent;
      background: linear-gradient(135deg, var(--wine), #b9871f);
      box-shadow: 0 12px 24px rgba(123, 31, 47, 0.16);
    }

    .reservation-card {
      padding: 14px 18px 18px;
      border-radius: 22px;
      background:
        linear-gradient(180deg, rgba(255, 249, 240, 0.96), rgba(246, 236, 223, 0.94));
      border: 1px solid rgba(177, 132, 78, 0.14);
      box-shadow: 0 14px 28px rgba(42, 28, 18, 0.1);
    }

    .reservation-card.downtown {
      background:
        radial-gradient(circle at top right, rgba(123, 31, 47, 0.1), transparent 38%),
        linear-gradient(180deg, rgba(255, 249, 240, 0.97), rgba(247, 233, 225, 0.95));
      border-color: rgba(123, 31, 47, 0.18);
    }

    .reservation-card.uptown {
      background:
        radial-gradient(circle at top right, rgba(47, 115, 187, 0.1), transparent 38%),
        linear-gradient(180deg, rgba(248, 251, 255, 0.97), rgba(234, 241, 250, 0.95));
      border-color: rgba(47, 115, 187, 0.18);
    }

    .reservation-focus {
      display: grid;
      gap: 10px;
    }

    .reservation-pill-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .reservation-time-pill,
    .reservation-guests-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      padding: 0 18px;
      border-radius: 999px;
      font-size: 1.06rem;
      font-weight: 900;
      letter-spacing: 0.01em;
      width: fit-content;
    }

    .reservation-time-pill {
      background: linear-gradient(135deg, #5d1624, #a86b13);
      color: #fff7ed;
      box-shadow: 0 14px 26px rgba(87, 31, 18, 0.18);
    }

    .reservation-guests-pill {
      background: linear-gradient(135deg, #d7a236, #f4d488);
      color: #4c2600;
      box-shadow: 0 14px 24px rgba(167, 108, 14, 0.16);
    }

    .reservation-name-box {
      margin: 0;
      padding: 14px 16px;
      border-radius: 18px;
      background: linear-gradient(135deg, rgba(123, 31, 47, 0.08), rgba(255, 244, 224, 0.98));
      border: 1px solid rgba(123, 31, 47, 0.16);
      font-size: 1.36rem;
      line-height: 1.08;
      letter-spacing: -0.04em;
      color: #20150f;
      overflow-wrap: anywhere;
    }

    .reservation-card.uptown .reservation-name-box {
      background: linear-gradient(135deg, rgba(47, 115, 187, 0.09), rgba(245, 250, 255, 0.98));
      border-color: rgba(47, 115, 187, 0.16);
    }

    .status-badge.large {
      background: rgba(212, 175, 55, 0.18);
      color: #7a5a07;
    }

    .menu-mode-tabs {
      padding: 0 18px 16px;
    }

    .menu-mode-panel {
      display: none;
    }

    .menu-mode-panel.is-active {
      display: block;
    }

    .menu-category-chips {
      padding: 16px 18px 0;
    }

    .menu-preview-list {
      gap: 14px;
    }

    .menu-preview-card {
      display: grid;
      gap: 14px;
      padding: 14px;
      border-radius: 22px;
      border: 1px solid rgba(125, 98, 63, 0.14);
      background:
        linear-gradient(180deg, rgba(255, 252, 247, 0.94), rgba(249, 243, 233, 0.94)),
        url("assets/pattern.webp") center / 460px auto;
      box-shadow: 0 20px 36px rgba(45, 30, 17, 0.08);
    }

    .menu-preview-card.is-hidden {
      opacity: 0.62;
    }

    .menu-preview-main {
      display: grid;
      gap: 12px;
    }

    .menu-preview-visual {
      display: grid;
      grid-template-columns: 104px minmax(0, 1fr);
      gap: 13px;
      align-items: start;
    }

    .menu-preview-image {
      width: 104px;
      aspect-ratio: 1;
      border-radius: 18px;
      object-fit: cover;
      background: rgba(222, 214, 204, 0.9);
      box-shadow: 0 16px 28px rgba(39, 22, 11, 0.12);
    }

    .menu-preview-content {
      display: grid;
      gap: 7px;
      min-width: 0;
    }

    .menu-preview-name-ko,
    .menu-preview-name-en,
    .menu-preview-desc {
      margin: 0;
      overflow-wrap: anywhere;
    }

    .menu-preview-name-ko {
      color: #20150f;
      font-size: 1.18rem;
      font-weight: 900;
      letter-spacing: -0.04em;
      line-height: 1.05;
    }

    .menu-preview-name-en {
      color: #584434;
      font-size: 0.96rem;
      font-weight: 800;
      line-height: 1.2;
    }

    .menu-preview-desc {
      color: #756455;
      font-size: 0.9rem;
      font-weight: 700;
      line-height: 1.35;
    }

    .menu-preview-price {
      width: fit-content;
      min-height: 40px;
      padding: 0 14px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      background: linear-gradient(135deg, #5a1122, #d4af37);
      color: #fffaf3;
      font-size: 1rem;
      font-weight: 900;
      box-shadow: 0 12px 24px rgba(90, 17, 34, 0.16);
    }

    .menu-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
    }

    .menu-tag {
      display: inline-flex;
      align-items: center;
      min-height: 26px;
      padding: 0 9px;
      border-radius: 999px;
      background: rgba(44, 33, 22, 0.08);
      color: #4f3823;
      font-size: 0.76rem;
      font-weight: 900;
    }

    .menu-tag.popular { background: rgba(212, 175, 55, 0.18); color: #7a5a07; }
    .menu-tag.spicy { background: rgba(123, 31, 47, 0.13); color: #792133; }
    .menu-tag.vegan { background: rgba(84, 139, 42, 0.14); color: #3d6f21; }
    .menu-tag.seafood { background: rgba(47, 115, 187, 0.13); color: #255b94; }

    .option-picker {
      display: grid;
      gap: 9px;
    }

    .option-chip-row {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
    }

    .option-chip {
      min-height: 34px;
      padding: 0 11px;
      border-radius: 999px;
      border: 1px solid rgba(113, 88, 60, 0.16);
      background: rgba(255, 251, 245, 0.9);
      color: #4f3823;
      font-size: 0.78rem;
      font-weight: 900;
    }

    .option-chip.is-selected {
      border-color: rgba(123, 31, 47, 0.36);
      background: rgba(123, 31, 47, 0.12);
      color: var(--wine);
    }

    .custom-token-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
    }

    .preview-edit-grid {
      display: grid;
      gap: 10px;
      padding: 12px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.64);
      border: 1px solid rgba(113, 88, 60, 0.1);
    }

    .preview-field {
      display: grid;
      gap: 5px;
    }

    .preview-field label {
      color: var(--muted);
      font-size: 0.76rem;
      font-weight: 900;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .preview-field input,
    .preview-field textarea,
    .preview-field select {
      padding: 10px 11px;
      border-radius: 12px;
      font-size: 0.9rem;
    }

    .preview-field textarea {
      min-height: 82px;
    }

    .preview-actions,
    .order-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      flex-wrap: wrap;
    }

    .order-layout {
      display: grid;
      gap: 12px;
      padding: 18px;
    }

    .order-toolbar {
      display: grid;
      gap: 10px;
    }

    .order-box {
      display: grid;
      gap: 12px;
      padding: 14px;
      border-radius: 20px;
      border: 1px solid rgba(113, 88, 60, 0.13);
      background: rgba(255, 255, 255, 0.68);
    }

    .order-box h4 {
      margin: 0;
      font-size: 1rem;
      letter-spacing: -0.02em;
    }

    .all-order-list,
    .category-order-list,
    .menu-order-list {
      display: grid;
      gap: 10px;
    }

    .category-order-row,
    .menu-order-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 4px;
      align-items: center;
      padding: 8px 10px;
      border-radius: 13px;
      border: 1px solid rgba(113, 88, 60, 0.12);
      background: rgba(255, 252, 247, 0.86);
      cursor: grab;
      touch-action: none;
    }

    .category-order-row:active,
    .menu-order-row:active {
      cursor: grabbing;
    }

    .category-order-row strong,
    .menu-order-row strong {
      font-size: 0.92rem;
      line-height: 1.25;
    }

    .order-row-title {
      min-width: 0;
    }

    .order-row-title strong,
    .order-row-title span {
      display: block;
      overflow-wrap: anywhere;
    }

    .order-row-title span {
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 800;
    }

    @media (min-width: 720px) {
      .field-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .field.full { grid-column: 1 / -1; }
      .menu-preview-card {
        grid-template-columns: minmax(0, 1.08fr) minmax(320px, 0.92fr);
        align-items: start;
      }
      .preview-edit-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .preview-field.full { grid-column: 1 / -1; }
      .menu-card {
        grid-template-columns: minmax(0, 1fr) auto;
        align-items: center;
      }
      .menu-card-body { grid-template-columns: 96px minmax(0, 1fr); }
      .menu-thumb { width: 96px; height: 96px; }
      .reservation-meta { grid-template-columns: repeat(4, minmax(0, 1fr)); }
      .modal-backdrop { align-items: center; }
    }

    @media (min-width: 980px) {
      .dashboard-grid { grid-template-columns: 0.88fr 1.12fr; align-items: start; }
      .metric-grid { grid-template-columns: repeat(4, minmax(0, 1fr)); }
      .toolbar .field-grid { grid-template-columns: 1.2fr 0.8fr 0.8fr; }
      .order-layout { grid-template-columns: 0.75fr 1.25fr; align-items: start; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div class="brand">
        <a class="logo-link" href="./index.html" aria-label="EHWA home">
          <img src="assets/logo-dark.webp" alt="EHWA logo" />
        </a>
        <div class="brand-copy">
          <p>EHWA Admin</p>
          <h1>Operations</h1>
        </div>
      </div>
      <a class="pill-btn" href="./modify.html">Modify</a>
    </header>

    <section class="hero">
      <h2 id="todayHeading">Today</h2>
      <div class="metric-grid">
        <div class="metric-card">
          <span>Selected Day</span>
          <strong id="metricSelectedDate">-</strong>
        </div>
        <div class="metric-card">
          <span>Reservations</span>
          <strong id="metricReservations">0</strong>
        </div>
        <div class="metric-card">
          <span>Downtown</span>
          <strong id="metricDowntown">0</strong>
        </div>
        <div class="metric-card">
          <span>Uptown</span>
          <strong id="metricUptown">0</strong>
        </div>
      </div>
    </section>

    <nav class="admin-tabs" aria-label="Admin sections">
      <button class="admin-tab is-active" data-admin-tab="reservations" type="button">Reservations</button>
      <button class="admin-tab" data-admin-tab="menu" type="button">Menu Manager</button>
    </nav>

    <main class="admin-section is-active" id="reservationsAdminPanel">
      <section class="panel">
        <div class="panel-head">
          <h3>Reservations</h3>
          <span id="reservationDateLabel">Loading</span>
        </div>
        <div class="toolbar">
          <div class="segmented" id="reservationDayChips"></div>
          <div class="branch-chip-row" id="reservationBranchChips" aria-label="Reservation branch filter">
            <button class="branch-chip is-active" data-reservation-branch="all" type="button">Both</button>
            <button class="branch-chip" data-reservation-branch="downtown" type="button">Downtown</button>
            <button class="branch-chip" data-reservation-branch="uptown" type="button">Uptown</button>
          </div>
          <div class="segmented">
            <button class="pill-btn" id="reservationRefreshBtn" type="button">Refresh Reservations</button>
          </div>
          <div class="status-line" id="reservationStatus"></div>
        </div>
        <div class="reservation-list" id="reservationList"></div>
      </section>
    </main>

    <main class="admin-section" id="menuAdminPanel">
      <section class="panel">
        <div class="panel-head">
          <h3>Menu Manager</h3>
          <span id="menuSessionLabel">Sign in required</span>
        </div>

        <div class="auth-card" id="menuAuthCard">
          <div class="field-grid">
            <div class="field">
              <label for="menuAdminEmail">Email</label>
              <input id="menuAdminEmail" type="email" autocomplete="email" placeholder="Admin email" />
            </div>
            <div class="field">
              <label for="menuAdminPassword">Password</label>
              <input id="menuAdminPassword" type="password" autocomplete="current-password" placeholder="Password" />
            </div>
          </div>
          <div class="form-actions">
            <button class="pill-btn primary" id="menuSignInBtn" type="button">Sign In</button>
          </div>
          <div class="status-line" id="menuAuthStatus">Use your Supabase admin user.</div>
        </div>

        <div class="workspace" id="menuWorkspace" hidden>
          <div class="toolbar">
            <div class="field-grid">
              <div class="field">
                <label for="menuSearchInput">Search</label>
                <input id="menuSearchInput" type="search" placeholder="Name, category, tag, ingredient" />
              </div>
              <div class="field">
                <label for="menuCategoryFilter">Category</label>
                <select id="menuCategoryFilter"></select>
              </div>
              <div class="field">
                <label for="menuBranchFilter">Branch</label>
                <select id="menuBranchFilter">
                  <option value="all">All branches</option>
                  <option value="both">Both</option>
                  <option value="downtown">Downtown</option>
                  <option value="uptown">Uptown</option>
                </select>
              </div>
            </div>
            <div class="segmented">
              <button class="chip-btn" id="menuRefreshBtn" type="button">Refresh</button>
              <button class="chip-btn" id="menuAddBtn" type="button">Add Menu</button>
              <button class="chip-btn" id="menuSignOutBtn" type="button">Sign Out</button>
            </div>
            <div class="status-line" id="menuStatus"></div>
          </div>

          <div class="segmented menu-mode-tabs" id="menuModeTabs" aria-label="Menu edit mode">
            <button class="chip-btn is-active" data-menu-mode="visual" type="button">Edit</button>
            <button class="chip-btn" data-menu-mode="order" type="button">Order</button>
          </div>

          <section class="menu-mode-panel is-active" id="menuVisualPanel">
            <div class="segmented menu-category-chips" id="menuCategoryChips"></div>
            <div class="menu-list menu-preview-list" id="menuList"></div>
          </section>

          <section class="menu-mode-panel" id="menuOrderPanel">
            <div class="order-layout">
              <div class="order-toolbar">
                <div class="segmented menu-category-chips" id="menuOrderChips"></div>
                <div class="order-actions">
                  <button class="pill-btn" id="menuCategoryOrderBtn" type="button">Category Order</button>
                </div>
              </div>
              <div class="order-box">
                <h4 id="menuOrderHeading">All View Order</h4>
                <div class="menu-order-list" id="menuOrderList"></div>
                <div class="order-actions">
                  <button class="pill-btn primary" id="menuSaveMenuOrderBtn" type="button">Save Order</button>
                </div>
              </div>
            </div>
          </section>
        </div>
      </section>
    </main>
  </div>

  <div class="modal-backdrop" id="menuEditorModal" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="menuEditorTitle">
      <div class="modal-head">
        <h3 id="menuEditorTitle">Edit Menu</h3>
        <button class="icon-btn" id="menuEditorClose" type="button" aria-label="Close">X</button>
      </div>
      <form class="modal-form" id="menuEditorForm">
        <input id="menuEditId" type="hidden" />
        <div class="field-grid">
          <div class="field">
            <label for="menuEditNameKo">Korean Name</label>
            <input id="menuEditNameKo" name="name_ko" type="text" />
          </div>
          <div class="field">
            <label for="menuEditNameEn">English Name</label>
            <input id="menuEditNameEn" name="name_en" type="text" />
          </div>
          <div class="field">
            <label for="menuEditRomanizedName">Romanized Name</label>
            <input id="menuEditRomanizedName" name="romanized_name" type="text" />
          </div>
          <div class="field">
            <label for="menuEditPrice">Price</label>
            <input id="menuEditPrice" name="price" type="number" min="0" step="0.01" inputmode="decimal" />
          </div>
          <div class="field">
            <label for="menuEditCategory">Category</label>
            <input id="menuEditCategory" name="category" type="text" list="menuCategoryOptions" />
          </div>
          <div class="field">
            <label for="menuEditLabel">Label</label>
            <select id="menuEditLabel" name="label"></select>
          </div>
          <div class="field">
            <label for="menuEditBranch">Branch</label>
            <select id="menuEditBranch" name="branches">
              <option value="both">Both</option>
              <option value="downtown">Downtown</option>
              <option value="uptown">Uptown</option>
            </select>
          </div>
          <div class="field">
            <label for="menuEditSortOrder">Sort Order</label>
            <input id="menuEditSortOrder" name="sort_order" type="number" inputmode="numeric" />
          </div>
          <div class="field full">
            <label for="menuEditDescription">Description</label>
            <textarea id="menuEditDescription" name="description"></textarea>
          </div>
          <div class="field full">
            <label for="menuEditImageUrl">Image URL</label>
            <input id="menuEditImageUrl" name="image_url" type="url" />
          </div>
          <div class="field full">
            <label>Tags</label>
            <div id="menuEditTagsPicker"></div>
          </div>
          <div class="field full">
            <label>Ingredient</label>
            <div id="menuEditIngredientPicker"></div>
          </div>
          <label class="toggle-field" for="menuEditAvailable">
            <input id="menuEditAvailable" name="is_available" type="checkbox" />
            Available on menu
          </label>
        </div>
        <datalist id="menuCategoryOptions"></datalist>
        <div class="form-actions">
          <button class="pill-btn danger" id="menuDeleteBtn" type="button">Delete</button>
          <button class="pill-btn" id="menuEditorCancel" type="button">Cancel</button>
          <button class="pill-btn primary" type="submit">Save Menu</button>
        </div>
      </form>
    </div>
  </div>

  <div class="modal-backdrop" id="menuCategoryOrderModal" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="menuCategoryOrderTitle">
      <div class="modal-head">
        <h3 id="menuCategoryOrderTitle">Category Order</h3>
        <button class="icon-btn" id="menuCategoryOrderClose" type="button" aria-label="Close">X</button>
      </div>
      <div class="modal-form">
        <div class="category-order-list" id="menuCategoryOrderList"></div>
        <div class="form-actions">
          <button class="pill-btn" id="menuCategoryOrderCancel" type="button">Cancel</button>
          <button class="pill-btn primary" id="menuSaveCategoryOrderBtn" type="button">Save Category Order</button>
        </div>
      </div>
    </div>
  </div>

  <script src="../js/king-admin.js?v=20260511-3"></script>
</body>
</html>
