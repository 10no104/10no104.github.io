<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>EHWA | Main Landing</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />
  <style>
    body.home-page {
      margin: 0;
      background: #0d0b10;
      color: #f1ece6;
      font-family: "Noto Sans KR", system-ui, -apple-system, sans-serif;
    }

    .home-shell {
      max-width: 1120px;
      margin: 0 auto;
      padding: 20px 20px 56px;
    }

    .hero {
      position: relative;
      min-height: 88vh;
      border-radius: 20px;
      overflow: hidden;
      display: grid;
      place-items: center;
      padding: 30px 24px;
      isolation: isolate;
      background: #171220;
    }

    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background: url("assets/background수묵.webp") center / cover no-repeat;
      opacity: 0.42;
      z-index: -3;
    }

    .hero::after {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at top, rgba(108, 25, 45, 0.45), rgba(6, 6, 8, 0.88));
      z-index: -2;
    }

    .hero-inner {
      width: min(430px, 92%);
      display: grid;
      justify-items: center;
      gap: 22px;
      text-align: center;
    }

    .hero-logo {
      width: min(200px, 60vw);
      height: auto;
      object-fit: contain;
    }

    .hero-visual {
      width: 100%;
      aspect-ratio: 9 / 16;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 18px 48px rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.18);
      background: #121212;
    }

    .hero-visual img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      display: block;
    }

    .reserve-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 0 24px;
      border-radius: 999px;
      text-decoration: none;
      background: #d1b27a;
      color: #171219;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .locations {
      margin-top: 28px;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .location-card {
      background: #15121a;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 16px;
      overflow: hidden;
    }

    .location-image {
      width: 100%;
      height: 210px;
      object-fit: cover;
      display: block;
    }

    .location-body {
      padding: 18px;
      display: grid;
      gap: 10px;
    }

    .location-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .location-header h2 {
      margin: 0;
      font-size: 1.3rem;
      font-weight: 700;
    }

    .icon-btn {
      width: 36px;
      height: 36px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(255, 255, 255, 0.32);
      background: rgba(255, 255, 255, 0.06);
    }

    .icon-btn img {
      width: 18px;
      height: 18px;
      object-fit: contain;
    }

    .menu-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: fit-content;
      min-height: 40px;
      padding: 0 16px;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 700;
      background: #2b2236;
      border: 1px solid rgba(255, 255, 255, 0.24);
      color: #f7f2ec;
    }

    .location-list {
      list-style: none;
      margin: 0;
      padding: 0;
      display: grid;
      gap: 7px;
      color: #dfd8d1;
      font-size: 0.95rem;
      line-height: 1.45;
    }

    .location-list strong {
      color: #fff;
      font-weight: 700;
      margin-right: 6px;
    }

    .location-list a {
      color: #f7e9cb;
      text-decoration: none;
    }

    footer {
      text-align: center;
      margin-top: 30px;
      color: #9f95a8;
      font-size: 0.9rem;
    }

    @media (max-width: 860px) {
      .locations {
        grid-template-columns: 1fr;
      }

      .hero {
        min-height: 78vh;
      }
    }
  </style>
</head>
<body class="home-page">
  <main class="home-shell">
    <section class="hero" aria-label="Main hero">
      <div class="hero-inner">
        <!-- TODO: Replace with logo image path -->
        <img class="hero-logo" src="assets/logo-white.webp" alt="EHWA logo" />

        <div class="hero-visual">
          <!-- TODO: Replace with hero image path -->
          <img src="assets/woman.webp" alt="EHWA visual art" />
        </div>

        <!-- TODO: Replace with reservation page URL -->
        <a class="reserve-btn" href="https://example.com/reservation">Reserve</a>
      </div>
    </section>

    <section class="locations" aria-label="EHWA locations">
      <article class="location-card" aria-label="Uptown location card">
        <img class="location-image" src="assets/매장-scaled.webp" alt="Uptown interior" />
        <div class="location-body">
          <div class="location-header">
            <h2>Uptown</h2>
            <!-- TODO: Replace with Uptown Instagram URL -->
            <a class="icon-btn" href="https://www.instagram.com/" target="_blank" rel="noopener noreferrer" aria-label="Uptown Instagram">
              <img src="assets/Group-11863g.svg" alt="Instagram" />
            </a>
          </div>

          <!-- TODO: Replace with Uptown menu URL -->
          <a class="menu-btn" href="menu/uptown/index.html">Menu</a>

          <ul class="location-list">
            <li><strong>Hours:</strong> <!-- TODO: Replace with Uptown business hours text -->Mon-Sun 11:30 AM - 10:30 PM</li>
            <li><strong>Address:</strong> <!-- TODO: Replace with Uptown address text -->1234 Uptown Ave, City, ST 00000</li>
            <li><strong>Phone:</strong> <!-- TODO: Replace with Uptown phone number --> <a href="tel:+10000000001">+1 (000) 000-0001</a></li>
          </ul>
        </div>
      </article>

      <article class="location-card" aria-label="Downtown location card">
        <img class="location-image" src="assets/seats-scaled.webp" alt="Downtown interior" />
        <div class="location-body">
          <div class="location-header">
            <h2>Downtown</h2>
            <!-- TODO: Replace with Downtown Instagram URL -->
            <a class="icon-btn" href="https://www.instagram.com/" target="_blank" rel="noopener noreferrer" aria-label="Downtown Instagram">
              <img src="assets/Group-11863g.svg" alt="Instagram" />
            </a>
          </div>

          <!-- TODO: Replace with Downtown menu URL -->
          <a class="menu-btn" href="menu/downtown/index.html">Menu</a>

          <ul class="location-list">
            <li><strong>Hours:</strong> <!-- TODO: Replace with Downtown business hours text -->Mon-Sun 11:30 AM - 10:30 PM</li>
            <li><strong>Address:</strong> <!-- TODO: Replace with Downtown address text -->55 Downtown Street, City, ST 00000</li>
            <li><strong>Phone:</strong> <!-- TODO: Replace with Downtown phone number --> <a href="tel:+10000000002">+1 (000) 000-0002</a></li>
          </ul>
        </div>
      </article>
    </section>

    <footer>© EHWA Restaurant</footer>
  </main>
</body>
</html>
