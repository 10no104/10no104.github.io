<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Noble | EHWA Staff</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/global.css?v=20260423-10" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --ink: #231914;
      --muted: #75675d;
      --wine: #7b1f2f;
      --gold: #d4af37;
      --paper: rgba(255, 252, 247, 0.95);
      --paper-strong: rgba(255, 252, 247, 0.98);
      --line: rgba(116, 88, 58, 0.17);
      --shadow: 0 24px 54px rgba(30, 19, 12, 0.12);
      --radius-xl: 26px;
      --radius-lg: 18px;
      --radius-md: 12px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: "Noto Sans KR", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 10% 0%, rgba(212, 175, 55, 0.18), transparent 29%),
        radial-gradient(circle at 88% 14%, rgba(123, 31, 47, 0.14), transparent 24%),
        linear-gradient(180deg, #fbf7f1 0%, #f2eadf 100%);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -1;
      pointer-events: none;
      background:
        linear-gradient(180deg, rgba(255, 252, 247, 0.16), rgba(255, 252, 247, 0.06)),
        url("assets/pattern.webp") center / 760px auto;
      opacity: 0.16;
    }

    button,
    input { font: inherit; }

    button { cursor: pointer; }
    a { color: inherit; text-decoration: none; }

    .shell {
      width: min(100% - 18px, 1040px);
      margin: 0 auto;
      padding: 16px 0 42px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .logo-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 58px;
      height: 58px;
      flex: none;
      border-radius: 999px;
      border: 1px solid rgba(73, 53, 36, 0.12);
      background: linear-gradient(180deg, rgba(255, 254, 250, 0.98), rgba(243, 231, 215, 0.94));
      box-shadow: 0 14px 28px rgba(42, 28, 18, 0.1);
    }

    .logo-link img {
      width: 40px;
      height: 40px;
      object-fit: contain;
    }

    .brand-copy p {
      margin: 0 0 3px;
      color: var(--wine);
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .brand-copy h1 {
      margin: 0;
      font-size: clamp(1.42rem, 5vw, 2.35rem);
      letter-spacing: -0.04em;
      line-height: 1;
    }

    .pill-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 0 14px;
      border-radius: 999px;
      border: 1px solid rgba(113, 88, 60, 0.16);
      background: rgba(255, 251, 245, 0.84);
      color: #2c2016;
      font-size: 0.92rem;
      font-weight: 800;
      white-space: nowrap;
      box-shadow: 0 10px 22px rgba(32, 20, 13, 0.05);
    }

    .pill-btn.primary {
      color: #fff;
      border-color: transparent;
      background: linear-gradient(135deg, var(--wine), #b9871f);
      box-shadow: 0 18px 30px rgba(123, 31, 47, 0.18);
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1.08fr) minmax(300px, 0.92fr);
      gap: 16px;
      align-items: stretch;
      margin-bottom: 16px;
      padding: 16px;
      border-radius: var(--radius-xl);
      color: #fff8f0;
      background:
        linear-gradient(135deg, rgba(22, 15, 11, 0.96) 0%, rgba(37, 23, 16, 0.94) 46%, rgba(68, 24, 33, 0.92) 100%),
        url("assets/pattern.webp") center / 520px auto;
      box-shadow: 0 28px 56px rgba(17, 11, 8, 0.18);
    }

    .hero-copy {
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 8px;
      min-height: 0;
    }

    .hero-kicker {
      margin: 0;
      color: #e9bf69;
      font-size: 0.8rem;
      font-weight: 800;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .hero h2 {
      margin: 0;
      max-width: 620px;
      font-size: clamp(1.75rem, 5.2vw, 3rem);
      letter-spacing: -0.05em;
      line-height: 0.95;
    }

    .lookup-card {
      align-self: stretch;
      padding: 16px;
      border-radius: var(--radius-lg);
      border: 1px solid rgba(255, 230, 185, 0.16);
      background: rgba(255, 250, 244, 0.1);
      box-shadow: inset 0 1px 0 rgba(255, 247, 228, 0.12);
    }

    .lookup-card label {
      display: block;
      margin-bottom: 8px;
      color: rgba(255, 248, 240, 0.74);
      font-size: 0.88rem;
      font-weight: 800;
    }

    .lookup-row {
      display: flex;
      gap: 8px;
    }

    .lookup-row input {
      min-width: 0;
      width: 100%;
      min-height: 48px;
      padding: 0 14px;
      border-radius: 999px;
      border: 1px solid rgba(255, 230, 185, 0.18);
      background: rgba(255, 252, 247, 0.94);
      color: #211813;
      outline: none;
      font-weight: 800;
    }

    .lookup-row input:focus {
      border-color: rgba(233, 191, 105, 0.72);
      box-shadow: 0 0 0 3px rgba(233, 191, 105, 0.18);
    }

    .lookup-card .pill-btn {
      min-height: 48px;
      padding: 0 18px;
    }

    .lookup-status {
      min-height: 22px;
      margin: 12px 2px 0;
      color: rgba(255, 244, 222, 0.84);
      font-size: 0.88rem;
      font-weight: 700;
      line-height: 1.5;
    }

    .staff-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 14px;
    }

    .staff-chip {
      min-height: 34px;
      padding: 0 12px;
      border: 1px solid rgba(255, 230, 185, 0.16);
      border-radius: 999px;
      background: rgba(255, 248, 238, 0.12);
      color: #fff2dd;
      font-size: 0.84rem;
      font-weight: 800;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: var(--radius-xl);
      background: var(--paper);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .panel + .panel { margin-top: 14px; }

    .panel-head {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 18px 0;
    }

    .panel-head h3 {
      margin: 0;
      font-size: 1.35rem;
      letter-spacing: -0.04em;
    }

    .panel-head p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 0.92rem;
      line-height: 1.55;
    }

    .profile-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      padding: 14px 18px 16px;
    }

    .metric-card {
      min-height: 94px;
      padding: 12px;
      border: 1px solid rgba(113, 88, 60, 0.13);
      border-radius: var(--radius-lg);
      background: linear-gradient(180deg, rgba(255, 254, 250, 0.92), rgba(249, 241, 230, 0.88));
    }

    .metric-card span,
    .metric-card strong,
    .metric-card small { display: block; }

    .metric-card span {
      margin-bottom: 7px;
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 800;
    }

    .metric-card strong {
      font-size: 1.34rem;
      line-height: 1.08;
      letter-spacing: -0.03em;
    }

    .metric-card small {
      margin-top: 6px;
      color: #8b7d72;
      font-size: 0.78rem;
      line-height: 1.45;
    }

    .history-wrap {
      padding: 16px 18px 18px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    .history-table {
      width: 100%;
      min-width: 0;
      border-collapse: collapse;
      border-spacing: 0;
      overflow: hidden;
      border-radius: var(--radius-lg);
    }

    .history-table th,
    .history-table td {
      padding: 13px 12px;
      border-bottom: 1px solid rgba(113, 88, 60, 0.12);
      text-align: right;
      font-size: 0.93rem;
      white-space: nowrap;
    }

    .history-table th {
      color: #6f5b4b;
      background: rgba(240, 226, 208, 0.58);
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .history-table th:first-child,
    .history-table td:first-child {
      text-align: left;
    }

    .history-table tr:last-child td { border-bottom: 0; }

    .period-list {
      display: grid;
      gap: 10px;
      padding: 12px 18px 16px;
    }

    .period-card {
      border: 1px solid rgba(113, 88, 60, 0.14);
      border-radius: var(--radius-lg);
      background: linear-gradient(180deg, rgba(255, 254, 250, 0.94), rgba(249, 241, 230, 0.9));
      overflow: hidden;
      transition: border-color 160ms ease, box-shadow 160ms ease;
    }

    .period-card.is-open {
      border-color: rgba(123, 31, 47, 0.26);
      box-shadow: 0 16px 30px rgba(46, 29, 18, 0.08);
    }

    .period-toggle {
      width: 100%;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      align-items: center;
      padding: 12px;
      border: 0;
      background: transparent;
      color: var(--ink);
      text-align: left;
      transition: background 160ms ease;
    }

    .period-toggle:hover {
      background: rgba(123, 31, 47, 0.035);
    }

    .period-title {
      display: block;
      margin-bottom: 8px;
      font-size: 1rem;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .period-summary {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      color: #6f5b4b;
      font-size: 0.8rem;
      font-weight: 800;
    }

    .period-summary span {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 0 8px;
      border-radius: 999px;
      background: rgba(123, 31, 47, 0.06);
    }

    .period-chevron {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      border-radius: 999px;
      background: rgba(123, 31, 47, 0.1);
      color: var(--wine);
      transition: background 160ms ease, transform 160ms ease;
    }

    .period-chevron::before {
      content: "";
      width: 9px;
      height: 9px;
      margin-top: -4px;
      border-right: 2px solid currentColor;
      border-bottom: 2px solid currentColor;
      transform: rotate(45deg);
      transition: transform 160ms ease, margin 160ms ease;
    }

    .period-card.is-open .period-chevron {
      background: rgba(123, 31, 47, 0.16);
    }

    .period-card.is-open .period-chevron::before {
      margin-top: 4px;
      transform: rotate(225deg);
    }

    .period-details {
      display: none;
      padding: 0 14px 14px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    .period-card.is-open .period-details {
      display: block;
    }

    .empty-state {
      padding: 24px 18px 26px;
      color: var(--muted);
      font-size: 0.96rem;
      line-height: 1.65;
    }

    .is-hidden { display: none !important; }

    @media (max-width: 820px) {
      .hero {
        grid-template-columns: 1fr;
      }

      .hero-copy {
        min-height: auto;
      }

      .profile-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 560px) {
      .shell {
        width: min(100% - 12px, 1040px);
        padding-top: 10px;
      }

      .topbar {
        align-items: flex-start;
      }

      .logo-link {
        width: 52px;
        height: 52px;
      }

      .logo-link img {
        width: 36px;
        height: 36px;
      }

      .pill-btn.home-link {
        min-height: 38px;
        padding: 0 11px;
        font-size: 0.84rem;
      }

      .hero {
        padding: 14px;
        border-radius: 22px;
      }

      .lookup-row {
        flex-direction: column;
      }

      .lookup-card .pill-btn {
        width: 100%;
      }

      .profile-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
        padding: 12px;
      }

      .metric-card {
        min-height: 84px;
        padding: 10px;
      }

      .metric-card span {
        font-size: 0.76rem;
      }

      .metric-card strong {
        font-size: 1.12rem;
      }

      .metric-card small {
        display: none;
      }

      .panel-head {
        padding: 16px 14px 0;
      }

      .history-wrap {
        padding: 14px;
      }

      .period-list {
        padding: 14px;
      }

      .period-details {
        padding: 0 10px 12px;
        overflow-x: visible;
      }

      .history-table th,
      .history-table td {
        padding: 9px 5px;
        font-size: 0.78rem;
      }

      .history-table th {
        font-size: 0.64rem;
      }

      .period-title {
        font-size: 0.94rem;
      }

      .period-summary {
        gap: 5px;
        font-size: 0.74rem;
      }

      .period-summary span {
        min-height: 22px;
        padding: 0 6px;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div class="brand">
        <a class="logo-link" href="index.html" aria-label="EHWA home">
          <img src="assets/cropped-favicon-white-192x192.png" alt="" />
        </a>
        <div class="brand-copy">
          <p>EHWA Staff</p>
          <h1>Noble</h1>
        </div>
      </div>
      <a class="pill-btn home-link" href="index.html">Home</a>
    </header>

    <section class="hero" aria-labelledby="nobleTitle">
      <div class="hero-copy">
        <div>
          <p class="hero-kicker">Private lookup</p>
          <h2 id="nobleTitle">Noble</h2>
        </div>
      </div>

      <form class="lookup-card" id="lookupForm">
        <label for="staffIdInput">Reference Code</label>
        <div class="lookup-row">
          <input id="staffIdInput" name="staffId" type="text" autocomplete="off" placeholder="고유 번호 입력" />
          <button class="pill-btn primary" type="submit">조회</button>
        </div>
        <p class="lookup-status" id="lookupStatus">Loading...</p>
      </form>
    </section>

    <section class="panel is-hidden" id="profilePanel" aria-live="polite">
      <div class="panel-head">
        <div>
          <h3 id="profileTitle">직원 정보</h3>
          <p id="profileSubtitle">조회된 기록이 여기에 표시됩니다.</p>
        </div>
      </div>
      <div class="profile-grid">
        <article class="metric-card">
          <span>직무</span>
          <strong id="hourlyWageValue">-</strong>
          <small id="hourlyWageNote">-</small>
        </article>
        <article class="metric-card">
          <span>총 근무</span>
          <strong id="totalHoursValue">-</strong>
          <small>시간 합계</small>
        </article>
        <article class="metric-card">
          <span>총 팁</span>
          <strong id="totalTipValue">-</strong>
          <small>팁 합계</small>
        </article>
        <article class="metric-card">
          <span>시간당 팁</span>
          <strong id="tipPerHourValue">-</strong>
          <small>팁 / 시간</small>
        </article>
      </div>
    </section>

    <section class="panel is-hidden" id="historyPanel">
      <div class="panel-head">
        <div>
          <h3>정산 기록</h3>
          <p id="historySubtitle"></p>
        </div>
      </div>
      <div class="period-list" id="periodList"></div>
    </section>

    <section class="panel" id="emptyPanel">
      <div class="empty-state" id="emptyMessage">Reference code를 입력해주세요.</div>
    </section>
  </main>

  <script>
    (function () {
      "use strict";

      const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRNRIMOfYbtWYBKCmX3pq-1oA-a-XPBafNLjij_scpvXLoBbbdsJB9u03mrbYfNxQ/pub?gid=1128274968&single=true&output=csv";
      const SUPABASE_CONFIG = {
        url: "https://pzhzdjsjfdzbzkhnaxmc.supabase.co",
        anonKey: "sb_publishable_3Ox2JIQXVLwusT-xzIMJ4g_YXTR5q8e"
      };
      const SOURCE_BRANCH = "Downtown";
      const BASE_COLUMN_COUNT = 7;
      const MONEY_FORMAT = new Intl.NumberFormat("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
      const HOUR_FORMAT = new Intl.NumberFormat("en-US", { minimumFractionDigits: 1, maximumFractionDigits: 1 });

      const refs = {};
      const supabaseClient = window.supabase?.createClient(SUPABASE_CONFIG.url, SUPABASE_CONFIG.anonKey);
      const state = {
        rows: [],
        staff: [],
        periods: [],
        openPeriodKey: null,
        loaded: false
      };

      function byId(id) {
        return document.getElementById(id);
      }

      function cacheRefs() {
        [
          "lookupForm",
          "staffIdInput",
          "lookupStatus",
          "profilePanel",
          "profileTitle",
          "profileSubtitle",
          "hourlyWageValue",
          "hourlyWageNote",
          "totalHoursValue",
          "totalTipValue",
          "tipPerHourValue",
          "historyPanel",
          "historySubtitle",
          "periodList",
          "emptyPanel",
          "emptyMessage"
        ].forEach((id) => {
          refs[id] = byId(id);
        });
      }

      function normalizeKey(value = "") {
        return String(value).trim().toLowerCase().replace(/\s+/g, "");
      }

      function parseNumber(value = "") {
        const number = Number.parseFloat(String(value).replace(/,/g, "").trim());
        return Number.isFinite(number) ? number : 0;
      }

      function formatMoney(value) {
        return `$${MONEY_FORMAT.format(value || 0)}`;
      }

      function formatHours(value) {
        return `${HOUR_FORMAT.format(value || 0)}h`;
      }

      function parseCsv(text = "") {
        const rows = [];
        let row = [];
        let cell = "";
        let inQuotes = false;

        for (let index = 0; index < text.length; index += 1) {
          const char = text[index];
          const next = text[index + 1];

          if (char === '"') {
            if (inQuotes && next === '"') {
              cell += '"';
              index += 1;
            } else {
              inQuotes = !inQuotes;
            }
            continue;
          }

          if (char === "," && !inQuotes) {
            row.push(cell);
            cell = "";
            continue;
          }

          if ((char === "\n" || char === "\r") && !inQuotes) {
            if (char === "\r" && next === "\n") index += 1;
            row.push(cell);
            rows.push(row);
            row = [];
            cell = "";
            continue;
          }

          cell += char;
        }

        if (cell || row.length) {
          row.push(cell);
          rows.push(row);
        }

        return rows.filter((cells) => cells.some((value) => String(value).trim()));
      }

      function buildStaff(header = []) {
        const staff = [];

        for (let index = BASE_COLUMN_COUNT; index < header.length; index += 2) {
          const name = String(header[index] || "").trim();
          if (!name) continue;
          staff.push({
            id: name,
            name,
            key: normalizeKey(name),
            hoursIndex: index,
            tipIndex: index + 1
          });
        }

        return staff;
      }

      function findStaffByKey(staffKey = "") {
        const key = normalizeKey(staffKey);
        if (!key) return null;

        return state.staff.find((item) => item.key === key || normalizeKey(item.id) === key) || null;
      }

      async function lookupReference(input = "") {
        const refCode = String(input || "").trim();
        if (!refCode) return null;
        if (!supabaseClient) throw new Error("Supabase client is not available.");

        const { data, error } = await supabaseClient.rpc("lookup_employee_ref", { input_ref: refCode });
        if (error) throw error;
        return Array.isArray(data) ? data[0] : data;
      }

      function isPeriodSummaryRow(row = []) {
        const day = String(row[0] || "").trim();
        const date = String(row[1] || "").trim();
        return !day && !date && (parseNumber(row[2]) > 0 || parseNumber(row[3]) > 0);
      }

      function parseKoreanMonthDay(value = "") {
        const match = String(value).trim().match(/(\d{1,2})\s*월\s*(\d{1,2})\s*일/);
        if (!match) return null;
        return {
          month: Number(match[1]),
          day: Number(match[2])
        };
      }

      function createDateTracker() {
        const today = new Date();
        const firstDateRow = state.rows.slice(1).find((row) => parseKoreanMonthDay(row[1]));
        const firstDate = firstDateRow ? parseKoreanMonthDay(firstDateRow[1]) : null;
        return {
          year: firstDate && firstDate.month > today.getMonth() + 1 ? today.getFullYear() - 1 : today.getFullYear(),
          lastMonth: null
        };
      }

      function resolveRecordDate(value, tracker) {
        const parsed = parseKoreanMonthDay(value);
        if (!parsed) return null;
        if (tracker.lastMonth && parsed.month < tracker.lastMonth && tracker.lastMonth >= 11 && parsed.month <= 2) {
          tracker.year += 1;
        }
        tracker.lastMonth = parsed.month;
        return new Date(tracker.year, parsed.month - 1, parsed.day);
      }

      function formatPeriodDate(date) {
        if (!date) return "";
        return new Intl.DateTimeFormat("ko-KR", {
          month: "numeric",
          day: "numeric"
        }).format(date);
      }

      function formatCompactRecordDate(record) {
        const parsed = parseKoreanMonthDay(record.date);
        const dateLabel = parsed ? `${parsed.month}/${parsed.day}` : record.date;
        return [record.day, dateLabel].filter(Boolean).join(" ");
      }

      function formatRecordBranch(record) {
        return record.branch || SOURCE_BRANCH;
      }

      function getDailyRecords(staff) {
        const tracker = createDateTracker();

        return state.rows.slice(1).map((row) => {
          if (isPeriodSummaryRow(row)) return { isSummary: true };

          const dateObj = resolveRecordDate(row[1], tracker);
          const hours = parseNumber(row[staff.hoursIndex]);
          const tip = parseNumber(row[staff.tipIndex]);
          return {
            day: String(row[0] || "").trim(),
            date: String(row[1] || "").trim(),
            dateObj,
            branch: SOURCE_BRANCH,
            hallTip: parseNumber(row[3]),
            hourlyTip: parseNumber(row[6]),
            hours,
            tip,
            isSummary: false
          };
        });
      }

      function summarizePeriod(records, index) {
        const visibleRecords = records.filter((record) => record.hours > 0 || record.tip > 0);
        const allDates = records.filter((record) => record.dateObj);
        const startDate = allDates[0]?.dateObj || null;
        const endDate = allDates[allDates.length - 1]?.dateObj || null;
        const totalHours = visibleRecords.reduce((sum, record) => sum + record.hours, 0);
        const totalTip = visibleRecords.reduce((sum, record) => sum + record.tip, 0);
        const totalHallTip = records.reduce((sum, record) => sum + record.hallTip, 0);

        return {
          id: `period-${index}`,
          records: visibleRecords,
          startDate,
          endDate,
          totalHours,
          totalTip,
          totalHallTip,
          workedDays: visibleRecords.length,
          label: startDate && endDate ? `${formatPeriodDate(startDate)} - ${formatPeriodDate(endDate)}` : `Period ${index + 1}`
        };
      }

      function getPeriods(staff) {
        const sourceRecords = getDailyRecords(staff);
        const periods = [];
        let current = [];

        sourceRecords.forEach((record) => {
          if (record.isSummary) {
            if (current.length) {
              periods.push(summarizePeriod(current, periods.length));
              current = [];
            }
            return;
          }

          current.push(record);
        });

        if (current.length) {
          periods.push(summarizePeriod(current, periods.length));
        }

        return periods.reverse();
      }

      function setStatus(message) {
        refs.lookupStatus.textContent = message;
      }

      function setEmpty(message) {
        state.periods = [];
        state.openPeriodKey = null;
        refs.emptyPanel.classList.remove("is-hidden");
        refs.profilePanel.classList.add("is-hidden");
        refs.historyPanel.classList.add("is-hidden");
        refs.emptyMessage.textContent = message;
      }

      function getRoleLabel(value = "") {
        return {
          server: "서버",
          kitchen: "주방",
          manager: "매니저"
        }[value] || value || "직원";
      }

      function getBranchLabel(value = "") {
        return {
          uptown: "Uptown",
          downtown: "Downtown",
          both: "Uptown + Downtown"
        }[value] || value || "EHWA";
      }

      function getMostRecentWorkedPeriod(periods = []) {
        return periods.find((period) => period.records.length > 0) || periods[0] || null;
      }

      function renderPeriodCards(periods = []) {
        if (!periods.length) {
          refs.periodList.innerHTML = `<div class="empty-state">표시할 정산 기간이 없습니다.</div>`;
          return;
        }

        refs.periodList.innerHTML = periods.map((period) => {
          const isOpen = state.openPeriodKey === period.id;
          const detailRows = period.records.map((record) => {
            return `
              <tr>
                <td>${escapeHtml(formatCompactRecordDate(record))}</td>
                <td>${escapeHtml(formatRecordBranch(record))}</td>
                <td>${formatHours(record.hours)}</td>
                <td>${formatMoney(record.tip)}</td>
                <td>${formatMoney(record.hours > 0 ? record.tip / record.hours : 0)}</td>
              </tr>
            `;
          }).join("");

          return `
            <article class="period-card ${isOpen ? "is-open" : ""}">
              <button class="period-toggle" type="button" data-period-id="${period.id}" aria-expanded="${isOpen ? "true" : "false"}">
                <span>
                  <span class="period-title">${escapeHtml(period.label)}</span>
                  <span class="period-summary">
                    <span>${period.workedDays}일</span>
                    <span>${formatHours(period.totalHours)}</span>
                    <span>${formatMoney(period.totalTip)}</span>
                    <span>${formatMoney(period.totalHours > 0 ? period.totalTip / period.totalHours : 0)}/h</span>
                  </span>
                </span>
                <span class="period-chevron" aria-hidden="true"></span>
              </button>
              <div class="period-details">
                <table class="history-table">
                  <thead>
                    <tr>
                      <th>날짜</th>
                      <th>지점</th>
                      <th>근무</th>
                      <th>팁</th>
                      <th>팁/h</th>
                    </tr>
                  </thead>
                  <tbody>${detailRows || `<tr><td colspan="5">기록 없음</td></tr>`}</tbody>
                </table>
              </div>
            </article>
          `;
        }).join("");
      }

      function renderProfile(staff, access = {}) {
        const periods = getPeriods(staff);
        const defaultOpenPeriod = getMostRecentWorkedPeriod(periods);
        state.periods = periods;
        state.openPeriodKey = defaultOpenPeriod ? defaultOpenPeriod.id : null;
        const records = periods.flatMap((period) => period.records);
        const totalHours = periods.reduce((sum, period) => sum + period.totalHours, 0);
        const totalTip = periods.reduce((sum, period) => sum + period.totalTip, 0);
        const tipPerHour = totalHours > 0 ? totalTip / totalHours : 0;

        refs.emptyPanel.classList.add("is-hidden");
        refs.profilePanel.classList.remove("is-hidden");
        refs.historyPanel.classList.remove("is-hidden");
        refs.profileTitle.textContent = staff.name;
        refs.profileSubtitle.textContent = `${getBranchLabel(access.branch_scope)} · ${getRoleLabel(access.job_role)}`;
        refs.hourlyWageValue.textContent = getRoleLabel(access.job_role);
        refs.hourlyWageNote.textContent = getBranchLabel(access.branch_scope);
        refs.totalHoursValue.textContent = formatHours(totalHours);
        refs.totalTipValue.textContent = formatMoney(totalTip);
        refs.tipPerHourValue.textContent = formatMoney(tipPerHour);
        refs.historySubtitle.textContent = periods.length ? `${periods.length} periods` : "";
        renderPeriodCards(periods);

        setStatus("Ready");
      }

      function escapeHtml(value = "") {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

      async function loadData() {
        try {
          const response = await fetch(CSV_URL, { cache: "no-store" });
          if (!response.ok) throw new Error(`CSV request failed: ${response.status}`);

          const text = await response.text();
          state.rows = parseCsv(text);
          state.staff = buildStaff(state.rows[0] || []);
          state.loaded = true;
          setStatus("Ready");

          const params = new URLSearchParams(window.location.search);
          const initialId = params.get("id");
          if (initialId) {
            refs.staffIdInput.value = initialId;
            handleLookup(initialId);
          }
        } catch (error) {
          console.error(error);
          setStatus("Load failed");
          setEmpty("정산표 연결 실패");
        }
      }

      async function handleLookup(input) {
        if (!state.loaded) {
          setStatus("Loading...");
          return;
        }

        setStatus("Checking...");

        try {
          const access = await lookupReference(input);
          if (!access?.staff_key) {
            setStatus("Not found");
            setEmpty("Reference code를 확인해주세요.");
            return;
          }

          const staff = findStaffByKey(access.staff_key);
          if (!staff) {
            setStatus("No sheet column");
            setEmpty(`시트 헤더에 "${access.staff_key}" 직원 컬럼이 있는지 확인해주세요.`);
            return;
          }

          renderProfile(staff, access);
        } catch (error) {
          console.error(error);
          setStatus("Lookup failed");
          setEmpty("조회 실패");
        }
      }

      function submitLookup() {
        const value = refs.staffIdInput.value;
        if (!String(value).trim()) {
          setStatus("Enter reference code");
          setEmpty("Reference code를 입력해주세요.");
          return;
        }
        handleLookup(value);
      }

      function bindEvents() {
        refs.lookupForm.addEventListener("submit", (event) => {
          event.preventDefault();
          submitLookup();
        });

        refs.periodList.addEventListener("click", (event) => {
          const button = event.target.closest("[data-period-id]");
          if (!button) return;
          const periodId = button.dataset.periodId;
          state.openPeriodKey = state.openPeriodKey === periodId ? null : periodId;
          renderPeriodCards(state.periods);
        });
      }

      cacheRefs();
      bindEvents();
      loadData();
    }());
  </script>
</body>
</html>
