<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Noble | EHWA Staff</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Noto+Sans+KR:wght@400;500;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/global.css?v=20260423-10" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg-top: #140d0d;
      --bg-bottom: #241414;
      --panel: rgba(255, 249, 242, 0.97);
      --panel-soft: rgba(255, 244, 232, 0.72);
      --line: rgba(113, 67, 50, 0.16);
      --line-strong: rgba(196, 142, 74, 0.26);
      --text: #2a1b18;
      --muted: #7f655c;
      --accent: #8f2438;
      --accent-strong: #661322;
      --gold: #e0b15f;
      --mint: #2e7c67;
      --rose: #c8686f;
      --rose-soft: rgba(200, 104, 111, 0.12);
      --shadow-lg: 0 28px 66px rgba(22, 12, 9, 0.24);
      --shadow-md: 0 16px 34px rgba(39, 19, 14, 0.14);
      --radius-2xl: 34px;
      --radius-xl: 26px;
      --radius-lg: 20px;
      --radius-md: 14px;
      --nav-height: 84px;
    }

    * { box-sizing: border-box; }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      padding-bottom: calc(var(--nav-height) + 26px + env(safe-area-inset-bottom, 0px));
      color: #fff4ec;
      font-family: "Noto Sans KR", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 12% 0%, rgba(224, 177, 95, 0.16), transparent 26%),
        radial-gradient(circle at 86% 10%, rgba(143, 36, 56, 0.28), transparent 24%),
        linear-gradient(180deg, var(--bg-top) 0%, #1b1110 40%, var(--bg-bottom) 100%);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(255, 249, 242, 0.06), rgba(255, 249, 242, 0.015)),
        url("assets/pattern.webp") center / 760px auto;
      opacity: 0.18;
      pointer-events: none;
      z-index: -1;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button,
    input {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .shell {
      width: min(100% - 18px, 1160px);
      margin: 0 auto;
      padding: 18px 0 38px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 16px;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }

    .logo-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 60px;
      height: 60px;
      flex: none;
      border-radius: 999px;
      border: 1px solid rgba(255, 223, 171, 0.28);
      background: linear-gradient(180deg, rgba(255, 251, 246, 0.3), rgba(255, 239, 218, 0.18));
      box-shadow: 0 16px 30px rgba(0, 0, 0, 0.22);
    }

    .logo-link img {
      width: 40px;
      height: 40px;
      object-fit: contain;
    }

    .brand-copy p {
      margin: 0 0 4px;
      color: #efc571;
      font-size: 0.76rem;
      font-weight: 800;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    .brand-copy h1 {
      margin: 0;
      font-size: clamp(1.8rem, 5vw, 2.65rem);
      line-height: 0.95;
      letter-spacing: -0.05em;
      color: #fff7ef;
    }

    .home-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 0 16px;
      border-radius: 999px;
      border: 1px solid rgba(255, 235, 204, 0.24);
      background: rgba(255, 247, 237, 0.12);
      color: #fff6ea;
      font-size: 0.92rem;
      font-weight: 800;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.18);
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1.05fr) minmax(320px, 0.95fr);
      gap: 16px;
      margin-bottom: 20px;
      padding: 18px;
      border-radius: var(--radius-2xl);
      background:
        linear-gradient(135deg, rgba(22, 13, 12, 0.96) 0%, rgba(55, 27, 25, 0.94) 52%, rgba(103, 27, 42, 0.92) 100%),
        url("assets/pattern.webp") center / 520px auto;
      box-shadow: var(--shadow-lg);
      overflow: hidden;
      position: relative;
    }

    .hero::after {
      content: "";
      position: absolute;
      inset: auto -80px -120px auto;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(224, 177, 95, 0.28), transparent 70%);
      pointer-events: none;
    }

    .hero-copy {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 18px;
      min-height: 0;
      padding: 6px 6px 6px 2px;
    }

    .hero-copy p {
      margin: 0;
    }

    .hero-kicker {
      color: #efc571;
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .hero-title {
      margin: 6px 0 10px;
      font-family: "Cormorant Garamond", Georgia, serif;
      font-size: clamp(3rem, 9vw, 5.4rem);
      line-height: 0.84;
      letter-spacing: -0.04em;
      color: #fff8f0;
    }

    .hero-desc {
      max-width: 620px;
      color: rgba(255, 243, 231, 0.8);
      font-size: 0.98rem;
      line-height: 1.7;
    }

    .hero-points {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .hero-point {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 38px;
      padding: 0 14px;
      border-radius: 999px;
      border: 1px solid rgba(255, 228, 186, 0.18);
      background: rgba(255, 248, 238, 0.1);
      color: #fff0de;
      font-size: 0.84rem;
      font-weight: 700;
    }

    .hero-point::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: linear-gradient(135deg, #fff3dc, #efc571);
      box-shadow: 0 0 18px rgba(239, 197, 113, 0.6);
    }

    .lookup-card {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 18px;
      border-radius: 28px;
      border: 1px solid rgba(255, 232, 195, 0.18);
      background: rgba(255, 249, 242, 0.1);
      box-shadow: inset 0 1px 0 rgba(255, 248, 236, 0.15);
    }

    .lookup-label {
      margin: 0;
      color: rgba(255, 243, 231, 0.76);
      font-size: 0.9rem;
      font-weight: 800;
    }

    .lookup-title {
      margin: 0;
      color: #fff7ef;
      font-size: 1.65rem;
      font-weight: 800;
      letter-spacing: -0.03em;
    }

    .lookup-copy {
      margin: 0;
      color: rgba(255, 243, 231, 0.72);
      font-size: 0.92rem;
      line-height: 1.65;
    }

    .lookup-row {
      display: flex;
      gap: 10px;
    }

    .lookup-row input {
      width: 100%;
      min-width: 0;
      min-height: 52px;
      padding: 0 16px;
      border: 1px solid rgba(255, 229, 194, 0.18);
      border-radius: 18px;
      background: rgba(255, 252, 247, 0.96);
      color: var(--text);
      font-weight: 800;
      outline: none;
      box-shadow: 0 12px 26px rgba(12, 6, 4, 0.08);
    }

    .lookup-row input:focus {
      border-color: rgba(224, 177, 95, 0.72);
      box-shadow: 0 0 0 4px rgba(224, 177, 95, 0.16);
    }

    .lookup-button {
      min-width: 110px;
      min-height: 52px;
      border: none;
      border-radius: 18px;
      background: linear-gradient(135deg, var(--accent) 0%, #c08931 100%);
      color: #fffaf2;
      font-size: 0.95rem;
      font-weight: 800;
      box-shadow: 0 18px 32px rgba(143, 36, 56, 0.3);
    }

    .lookup-status {
      min-height: 22px;
      margin: 0;
      color: rgba(255, 245, 232, 0.82);
      font-size: 0.9rem;
      font-weight: 700;
      line-height: 1.55;
    }

    .stage {
      display: block;
    }

    .app-frame {
      position: relative;
      min-height: 760px;
      padding: 18px;
      border: 1px solid rgba(255, 225, 182, 0.12);
      border-radius: 34px;
      background:
        linear-gradient(180deg, rgba(255, 253, 250, 0.12), rgba(255, 248, 241, 0.06)),
        rgba(31, 18, 16, 0.72);
      box-shadow: var(--shadow-lg);
      backdrop-filter: blur(18px);
      overflow: hidden;
    }

    .app-frame::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at top right, rgba(224, 177, 95, 0.16), transparent 24%),
        radial-gradient(circle at left 24%, rgba(143, 36, 56, 0.16), transparent 24%);
      pointer-events: none;
    }

    .app-head {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
      padding: 4px 2px 0;
    }

    .identity {
      min-width: 0;
    }

    .identity small {
      display: block;
      margin-bottom: 4px;
      color: rgba(255, 230, 195, 0.68);
      font-size: 0.74rem;
      font-weight: 800;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    .identity strong {
      display: block;
      color: #fff6ea;
      font-size: clamp(1.4rem, 4vw, 2rem);
      letter-spacing: -0.04em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .identity span {
      display: block;
      margin-top: 4px;
      color: rgba(255, 241, 224, 0.72);
      font-size: 0.9rem;
      font-weight: 600;
    }

    .app-status-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 40px;
      padding: 0 14px;
      border-radius: 999px;
      border: 1px solid rgba(255, 230, 195, 0.16);
      background: rgba(255, 247, 236, 0.08);
      color: #fff2de;
      font-size: 0.84rem;
      font-weight: 700;
      white-space: nowrap;
      flex: none;
    }

    .app-status-badge::before {
      content: "";
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: linear-gradient(135deg, #efc571, #fff4de);
      box-shadow: 0 0 12px rgba(239, 197, 113, 0.6);
      flex: none;
    }

    .view-stack {
      position: relative;
      z-index: 1;
    }

    .app-view {
      display: none;
      gap: 16px;
    }

    .app-view.is-active {
      display: grid;
    }

    .glass-card,
    .surface-card {
      border-radius: 26px;
      overflow: hidden;
    }

    .glass-card {
      border: 1px solid rgba(255, 227, 190, 0.16);
      background: linear-gradient(180deg, rgba(255, 250, 244, 0.15), rgba(255, 246, 235, 0.08));
      box-shadow: 0 18px 34px rgba(8, 5, 4, 0.12);
    }

    .surface-card {
      border: 1px solid var(--line);
      background:
        linear-gradient(180deg, rgba(255, 252, 248, 0.98), rgba(248, 240, 231, 0.96)),
        url("assets/pattern.webp") center / 420px auto;
      color: var(--text);
      box-shadow: var(--shadow-md);
    }

    .view-hero {
      padding: 18px;
      color: #fff7ef;
      background:
        linear-gradient(140deg, rgba(94, 28, 36, 0.9) 0%, rgba(191, 135, 56, 0.72) 100%),
        url("assets/pattern.webp") center / 320px auto;
    }

    .view-hero p,
    .view-hero h2 {
      margin: 0;
    }

    .view-hero p {
      color: rgba(255, 244, 230, 0.76);
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    .view-hero h2 {
      margin-top: 6px;
      font-size: clamp(1.8rem, 4vw, 2.4rem);
      line-height: 0.95;
      letter-spacing: -0.05em;
    }

    .view-hero span {
      display: block;
      margin-top: 10px;
      color: rgba(255, 244, 230, 0.84);
      font-size: 0.94rem;
      line-height: 1.65;
    }

    .card-body {
      padding: 16px;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }

    .metric-card {
      min-width: 0;
      padding: 14px;
      border-radius: 16px;
      background: rgba(255, 249, 242, 0.82);
      border: 1px solid rgba(191, 147, 84, 0.18);
      box-shadow: 0 10px 24px rgba(57, 32, 23, 0.08);
    }

    .metric-card span,
    .metric-card small {
      display: block;
    }

    .metric-card span {
      color: var(--muted);
      font-size: 0.72rem;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .metric-card strong {
      display: block;
      margin: 8px 0 0;
      color: #211310;
      font-size: 1.34rem;
      font-weight: 800;
      letter-spacing: 0;
      line-height: 1.05;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .metric-card small {
      color: var(--muted);
      font-size: 0.76rem;
      font-weight: 700;
      line-height: 1.55;
    }

    .section-head {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .section-head h3,
    .section-head p {
      margin: 0;
    }

    .section-head h3 {
      font-size: 1.2rem;
      letter-spacing: -0.03em;
      color: #231613;
    }

    .section-head p {
      color: var(--muted);
      font-size: 0.92rem;
    }

    .period-list {
      display: grid;
      gap: 10px;
    }

    .period-card {
      border-radius: 14px;
      border: 1px solid rgba(191, 147, 84, 0.16);
      background: rgba(255, 251, 246, 0.92);
      overflow: hidden;
    }

    .period-toggle {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px;
      border: none;
      background: transparent;
      color: inherit;
      text-align: left;
    }

    .period-title {
      display: block;
      color: #2a1b18;
      font-size: 0.92rem;
      font-weight: 800;
      letter-spacing: 0;
      white-space: nowrap;
    }

    .period-summary {
      display: grid;
      grid-template-columns: 0.9fr 1fr 1.15fr 1.15fr 1fr;
      gap: 6px;
      margin-top: 8px;
      width: min(100%, 620px);
    }

    .period-summary span {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 0;
      min-height: 28px;
      padding: 0 8px;
      border-radius: 8px;
      background: rgba(143, 36, 56, 0.08);
      color: #6f2433;
      font-size: 0.78rem;
      font-weight: 800;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .period-chevron {
      width: 14px;
      height: 14px;
      border-right: 2px solid rgba(103, 58, 44, 0.84);
      border-bottom: 2px solid rgba(103, 58, 44, 0.84);
      transform: rotate(45deg);
      transition: transform 0.2s ease;
      flex: none;
      margin-right: 4px;
    }

    .period-card.is-open .period-chevron {
      transform: rotate(225deg);
      margin-top: 6px;
    }

    .period-details {
      display: none;
      overflow-x: auto;
      padding: 0 14px 14px;
    }

    .period-card.is-open .period-details {
      display: block;
    }

    .history-table {
      width: 100%;
      min-width: 560px;
      border-collapse: collapse;
      background: rgba(255, 249, 242, 0.76);
      border-radius: 12px;
      overflow: hidden;
      table-layout: fixed;
    }

    .history-table th,
    .history-table td {
      padding: 10px 8px;
      border-bottom: 1px solid rgba(113, 67, 50, 0.1);
      text-align: left;
      font-size: 0.82rem;
      white-space: nowrap;
    }

    .history-table th {
      color: var(--muted);
      font-size: 0.7rem;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .history-table tbody tr:last-child td {
      border-bottom: none;
    }

    .schedule-list {
      overflow-x: auto;
      padding-bottom: 2px;
    }

    .schedule-table {
      width: 100%;
      min-width: 720px;
      border-collapse: collapse;
      table-layout: fixed;
      border: 1px solid #1f1b19;
      background: #fffdf9;
      color: #16110f;
    }

    .schedule-table th,
    .schedule-table td {
      height: 52px;
      border: 1px solid #1f1b19;
      padding: 6px;
      text-align: center;
      vertical-align: middle;
      font-size: 0.92rem;
      font-weight: 800;
      line-height: 1.25;
    }

    .schedule-table thead th {
      background: #cfe4f4;
      color: #0f161c;
      font-size: 0.86rem;
      white-space: nowrap;
    }

    .schedule-table .branch-cell {
      width: 88px;
      background: #f8f0e7;
      color: #3b211b;
    }

    .schedule-table td.is-work {
      background: #ffe5a8;
      color: #321c10;
      box-shadow: inset 0 0 0 2px rgba(143, 36, 56, 0.24);
    }

    .schedule-table td.is-unavailable {
      background: #f4d6da;
      color: #7b1f2f;
    }

    .calendar-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }

    .calendar-legend {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 700;
    }

    .legend-swatch {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex: none;
    }

    .legend-swatch.today {
      background: var(--gold);
      box-shadow: 0 0 0 4px rgba(224, 177, 95, 0.16);
    }

    .legend-swatch.blocked {
      background: var(--rose);
      box-shadow: 0 0 0 4px rgba(200, 104, 111, 0.16);
    }

    .calendar-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .calendar-nav {
      width: 42px;
      height: 42px;
      border: 1px solid rgba(113, 67, 50, 0.14);
      border-radius: 14px;
      background: rgba(255, 251, 246, 0.94);
      color: #2a1b18;
      font-size: 1.15rem;
      font-weight: 800;
      box-shadow: 0 10px 20px rgba(52, 29, 22, 0.08);
    }

    .calendar-label {
      color: #221512;
      font-size: 1rem;
      font-weight: 800;
      letter-spacing: -0.03em;
    }

    .calendar-weekdays,
    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 8px;
    }

    .calendar-weekdays {
      margin-bottom: 10px;
    }

    .calendar-weekdays span {
      color: var(--muted);
      text-align: center;
      font-size: 0.76rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .calendar-day {
      position: relative;
      min-height: 88px;
      padding: 12px 10px;
      border: 1px solid rgba(113, 67, 50, 0.1);
      border-radius: 18px;
      background: rgba(255, 251, 246, 0.92);
      color: #211310;
      text-align: left;
      box-shadow: 0 10px 18px rgba(52, 29, 22, 0.06);
      transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
    }

    .calendar-day:hover {
      transform: translateY(-2px);
      border-color: rgba(143, 36, 56, 0.24);
      box-shadow: 0 16px 24px rgba(52, 29, 22, 0.08);
    }

    .calendar-day.is-empty {
      visibility: hidden;
      pointer-events: none;
    }

    .calendar-day.is-disabled {
      opacity: 0.5;
      cursor: default;
    }

    .calendar-day.is-today {
      border-color: rgba(224, 177, 95, 0.58);
      background: linear-gradient(180deg, rgba(255, 250, 242, 0.96), rgba(255, 245, 225, 0.98));
    }

    .calendar-day.is-blocked {
      border-color: rgba(200, 104, 111, 0.36);
      background: linear-gradient(180deg, rgba(255, 245, 245, 0.98), rgba(255, 236, 238, 0.98));
    }

    .calendar-day strong {
      display: block;
      font-size: 1rem;
      line-height: 1;
      letter-spacing: -0.04em;
    }

    .calendar-day small {
      display: block;
      margin-top: 10px;
      color: var(--muted);
      font-size: 0.76rem;
      font-weight: 700;
      line-height: 1.45;
    }

    .calendar-day em {
      position: absolute;
      right: 10px;
      bottom: 10px;
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 0 8px;
      border-radius: 999px;
      background: rgba(200, 104, 111, 0.14);

  <script>
    (function () {
      "use strict";

      const SHEET_SOURCES = [
        {
          key: "downtown",
          branch: "Downtown",
          csvUrl: "https://docs.google.com/spreadsheets/d/e/2PACX-1vRNRIMOfYbtWYBKCmX3pq-1oA-a-XPBafNLjij_scpvXLoBbbdsJB9u03mrbYfNxQ/pub?gid=1128274968&single=true&output=csv"
        },
        {
          key: "uptown",
          branch: "Uptown",
          csvUrl: "https://docs.google.com/spreadsheets/d/e/2PACX-1vRyxvWzpEOBMt3j30NR9omQJ7ShrLCVsyZldSnTshwhw9f5aHAN6dYTknnRAOCIs2omY2ZS5JeZMzBS/pub?gid=624949641&single=true&output=csv"
        }
      ];
      const SUPABASE_CONFIG = {
        url: "https://pzhzdjsjfdzbzkhnaxmc.supabase.co",
        anonKey: "sb_publishable_3Ox2JIQXVLwusT-xzIMJ4g_YXTR5q8e"
      };
      const DEFAULT_BRANCH = "Downtown";
      const SAVED_REF_KEY = "ehwa:noble:ref-code";
      const CALENDAR_KEY_PREFIX = "ehwa:noble:calendar:";
      const BASE_COLUMN_COUNT = 7;
      const TAB_ORDER = ["wage", "schedule", "calendar"];
      const MONEY_FORMAT = new Intl.NumberFormat("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
      const HOUR_FORMAT = new Intl.NumberFormat("en-US", { minimumFractionDigits: 1, maximumFractionDigits: 1 });

      const refs = {};
      const supabaseClient = window.supabase?.createClient(SUPABASE_CONFIG.url, SUPABASE_CONFIG.anonKey);
      const state = {
        rows: [],
        sources: [],
        sourceErrors: {},
        staff: [],
        periods: [],
        openPeriodKey: null,
        loaded: false,
        activeTab: "wage",
        currentStaff: null,
        currentAccess: null,
        calendarCursor: startOfMonth(new Date()),
        unavailableDates: new Set()
      };

      function byId(id) {
        return document.getElementById(id);
      }

      function cacheRefs() {
        [
          "lookupForm",
          "staffIdInput",
          "lookupStatus",
          "appUserName",
          "appUserMeta",
          "appStatus",
          "viewStack",
          "payHeadlineValue",
          "payHeadlineNote",
          "totalHoursValue",
          "totalTipValue",
          "tipPerHourValue",
          "historySubtitle",
          "periodList",
          "weekRangeLabel",
          "scheduleList",
          "calendarSummary",
          "calendarLabel",
          "calendarPrev",
          "calendarNext",
          "calendarGrid"
        ].forEach((id) => {
          refs[id] = byId(id);
        });

        refs.navTabs = Array.from(document.querySelectorAll("[data-tab]"));
        refs.views = Array.from(document.querySelectorAll("[data-view]"));
      }

      function normalizeKey(value = "") {
        return String(value).trim().toLowerCase().replace(/\s+/g, "");
      }

      function parseNumber(value = "") {
        const number = Number.parseFloat(String(value).replace(/,/g, "").trim());
        return Number.isFinite(number) ? number : 0;
      }

      function formatMoney(value) {
        return `$${MONEY_FORMAT.format(value || 0)}`;
      }

      function formatHours(value) {
        return `${HOUR_FORMAT.format(value || 0)}h`;
      }

      function formatDecimal(value) {
        return HOUR_FORMAT.format(value || 0);
      }

      function parseCsv(text = "") {
        const rows = [];
        let row = [];
        let cell = "";
        let inQuotes = false;

        for (let index = 0; index < text.length; index += 1) {
          const char = text[index];
          const next = text[index + 1];

          if (char === '"') {
            if (inQuotes && next === '"') {
              cell += '"';
              index += 1;
            } else {
              inQuotes = !inQuotes;
            }
            continue;
          }

          if (char === "," && !inQuotes) {
            row.push(cell);
            cell = "";
            continue;
          }

          if ((char === "\n" || char === "\r") && !inQuotes) {
            if (char === "\r" && next === "\n") index += 1;
            row.push(cell);
            rows.push(row);
            row = [];
            cell = "";
            continue;
          }

          cell += char;
        }

        if (cell || row.length) {
          row.push(cell);
          rows.push(row);
        }

        return rows.filter((cells) => cells.some((value) => String(value).trim()));
      }

      function buildStaff(header = [], source = {}) {
        const staff = [];

        for (let index = BASE_COLUMN_COUNT; index < header.length; index += 2) {
          const name = String(header[index] || "").trim();
          if (!name) continue;
          staff.push({
            id: name,
            name,
            key: normalizeKey(name),
            sourceKey: source.key || "",
            branch: source.branch || DEFAULT_BRANCH,
            rows: source.rows || state.rows,
            hoursIndex: index,
            tipIndex: index + 1
          });
        }

        return staff;
      }

      function findStaffByKey(staffKey = "", access = {}) {
        const key = normalizeKey(staffKey);
        if (!key) return null;

        const branchScope = normalizeKey(access.branch_scope);
        const matches = state.staff.filter((item) => item.key === key || normalizeKey(item.id) === key);
        if (!matches.length) return null;

        if (branchScope && branchScope !== "both") {
          return matches.find((item) => normalizeKey(item.sourceKey) === branchScope) || null;
        }

        if (branchScope === "both" && matches.length > 1) {
          return {
            ...matches[0],
            sourceKey: "both",
            branch: "Uptown + Downtown",
            sources: matches
          };
        }

        return matches[0];
      }

      async function lookupReference(input = "") {
        const refCode = String(input || "").trim();
        if (!refCode) return null;
        if (!supabaseClient) throw new Error("Supabase client is not available.");

        const { data, error } = await supabaseClient.rpc("lookup_employee_ref", { input_ref: refCode });
        if (error) throw error;
        return Array.isArray(data) ? data[0] : data;
      }

      function isPeriodSummaryRow(row = []) {
        const day = String(row[0] || "").trim();
        const date = String(row[1] || "").trim();
        return !day && !date && (parseNumber(row[2]) > 0 || parseNumber(row[3]) > 0);
      }

      function parseKoreanMonthDay(value = "") {
        const match = String(value).trim().match(/(\d{1,2})\s*월\s*(\d{1,2})\s*일/);
        if (!match) return null;
        return {
          month: Number(match[1]),
          day: Number(match[2])
        };
      }

      function createDateTracker(rows = state.rows) {
        const today = new Date();
        const firstDateRow = rows.slice(1).find((row) => parseKoreanMonthDay(row[1]));
        const firstDate = firstDateRow ? parseKoreanMonthDay(firstDateRow[1]) : null;
        return {
          year: firstDate && firstDate.month > today.getMonth() + 1 ? today.getFullYear() - 1 : today.getFullYear(),
          lastMonth: null
        };
      }

      function resolveRecordDate(value, tracker) {
        const parsed = parseKoreanMonthDay(value);
        if (!parsed) return null;
        if (tracker.lastMonth && parsed.month < tracker.lastMonth && tracker.lastMonth >= 11 && parsed.month <= 2) {
          tracker.year += 1;
        }
        tracker.lastMonth = parsed.month;
        return new Date(tracker.year, parsed.month - 1, parsed.day);
      }

      function formatPeriodDate(date) {
        if (!date) return "";
        return new Intl.DateTimeFormat("ko-KR", {
          month: "numeric",
          day: "numeric"
        }).format(date);
      }

      function formatLongDate(date) {
        if (!date) return "";
        return new Intl.DateTimeFormat("ko-KR", {
          month: "long",
          day: "numeric",
          weekday: "short"
        }).format(date);
      }

      function formatCompactRecordDate(record) {
        const parsed = parseKoreanMonthDay(record.date);
        const dateLabel = parsed ? `${parsed.month}/${parsed.day}` : record.date;
        return [record.day, dateLabel].filter(Boolean).join(" ");
      }

      function formatRecordBranch(record) {
        return record.branch || DEFAULT_BRANCH;
      }

      function getDailyRecords(staff) {
        const rows = staff.rows || state.rows;
        const tracker = createDateTracker(rows);

        return rows.slice(1).map((row) => {
          if (isPeriodSummaryRow(row)) return { isSummary: true };

          const dateObj = resolveRecordDate(row[1], tracker);
          const hours = parseNumber(row[staff.hoursIndex]);
          const tip = parseNumber(row[staff.tipIndex]);
          return {
            day: String(row[0] || "").trim(),
            date: String(row[1] || "").trim(),
            dateObj,
            branch: staff.branch || DEFAULT_BRANCH,
            hallTip: parseNumber(row[3]),
            hourlyTip: parseNumber(row[6]),
            hours,
            tip,
            isSummary: false
          };
        });
      }

      function summarizePeriod(records, index) {
        const visibleRecords = records.filter((record) => record.hours > 0 || record.tip > 0);
        const allDates = records.filter((record) => record.dateObj);
        const startDate = allDates[0]?.dateObj || null;
        const endDate = allDates[allDates.length - 1]?.dateObj || null;
        const totalHours = visibleRecords.reduce((sum, record) => sum + record.hours, 0);
        const totalTip = visibleRecords.reduce((sum, record) => sum + record.tip, 0);
        const totalHallTip = records.reduce((sum, record) => sum + record.hallTip, 0);

        return {
          id: `period-${index}`,
          records: visibleRecords,
          startDate,
          endDate,
          totalHours,
          totalTip,
          totalHallTip,
          workedDays: visibleRecords.length,
          branch: visibleRecords[0]?.branch || records[0]?.branch || DEFAULT_BRANCH,
          label: startDate && endDate ? `${formatPeriodDate(startDate)} - ${formatPeriodDate(endDate)}` : `Period ${index + 1}`
        };
      }

      function getSingleSourcePeriods(staff) {
        const sourceRecords = getDailyRecords(staff);
        const periods = [];
        let current = [];

        sourceRecords.forEach((record) => {
          if (record.isSummary) {
            if (current.length) {
              periods.push(summarizePeriod(current, periods.length));
              current = [];
            }
            return;
          }

          current.push(record);
        });

        if (current.length) {
          periods.push(summarizePeriod(current, periods.length));
        }

        return periods.reverse();
      }

      function getPeriodKey(period) {
        return [
          period.startDate?.getTime() || "",
          period.endDate?.getTime() || "",
          period.label
        ].join(":");
      }

      function mergePeriods(periods = []) {
        const groups = new Map();

        periods.forEach((period) => {
          const key = getPeriodKey(period);
          if (!groups.has(key)) {
            groups.set(key, {
              ...period,
              records: [],
              sourcePeriodIds: []
            });
          }

          const group = groups.get(key);
          group.records.push(...period.records);
          group.sourcePeriodIds.push(period.id);
        });

        return Array.from(groups.values()).map((period, index) => {
          const records = period.records.sort((a, b) => {
            const dateA = a.dateObj?.getTime() || 0;
            const dateB = b.dateObj?.getTime() || 0;
            if (dateA !== dateB) return dateA - dateB;
            return formatRecordBranch(a).localeCompare(formatRecordBranch(b));
          });
          const totalHours = records.reduce((sum, record) => sum + record.hours, 0);
          const totalTip = records.reduce((sum, record) => sum + record.tip, 0);
          const totalHallTip = records.reduce((sum, record) => sum + record.hallTip, 0);

          return {
            ...period,
            id: `both-period-${index}`,
            records,
            totalHours,
            totalTip,
            totalHallTip,
            workedDays: records.length,
            branch: "Uptown + Downtown"
          };
        });
      }

      function getPeriods(staff) {
        if (Array.isArray(staff.sources) && staff.sources.length) {
          const sourcePeriods = staff.sources.flatMap((sourceStaff) => getSingleSourcePeriods(sourceStaff).map((period) => ({
              ...period,
              id: `${sourceStaff.sourceKey}-${period.id}`
            })));

          return mergePeriods(sourcePeriods)
            .sort((a, b) => (b.endDate?.getTime() || 0) - (a.endDate?.getTime() || 0));
        }

        return getSingleSourcePeriods(staff);
      }

      function getRoleLabel(value = "") {
        return {
          server: "Server",
          kitchen: "Kitchen",
          manager: "Manager"
        }[value] || value || "Staff";
      }

      function getBranchLabel(value = "") {
        return {
          uptown: "Uptown",
          downtown: "Downtown",
          both: "Uptown + Downtown"
        }[value] || value || "EHWA";
      }

      function getMostRecentWorkedPeriod(periods = []) {
        return periods.find((period) => period.records.length > 0) || periods[0] || null;
      }

      function getAllRecords(periods = []) {
        return periods
          .flatMap((period) => period.records)
          .filter((record) => record.dateObj instanceof Date && !Number.isNaN(record.dateObj.getTime()))
          .sort((a, b) => (a.dateObj?.getTime() || 0) - (b.dateObj?.getTime() || 0));
      }

      function startOfMonth(date) {
        return new Date(date.getFullYear(), date.getMonth(), 1);
      }

      function startOfDay(date) {
        return new Date(date.getFullYear(), date.getMonth(), date.getDate());
      }

      function startOfWeek(date) {
        const result = startOfDay(date);
        const day = result.getDay();
        const diff = day === 0 ? -6 : 1 - day;
        result.setDate(result.getDate() + diff);
        return result;
      }

      function endOfWeek(date) {
        const result = startOfWeek(date);
        result.setDate(result.getDate() + 6);
        return result;
      }

      function addDays(date, amount) {
        const next = new Date(date);
        next.setDate(next.getDate() + amount);
        return next;
      }

      function isSameDate(a, b) {
        return a instanceof Date &&
          b instanceof Date &&
          a.getFullYear() === b.getFullYear() &&
          a.getMonth() === b.getMonth() &&
          a.getDate() === b.getDate();
      }

      function toIsoDate(date) {
        const year = date.getFullYear();
        const month = String(date.getMonth() + 1).padStart(2, "0");
        const day = String(date.getDate()).padStart(2, "0");
        return `${year}-${month}-${day}`;
      }

      function escapeHtml(value = "") {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

      function setStatus(message) {
        refs.lookupStatus.textContent = message;
        refs.appStatus.textContent = message;
      }

      function getSavedRefCode() {
        try {
          return window.localStorage.getItem(SAVED_REF_KEY) || "";
        } catch (error) {
          return "";
        }
      }

      function saveRefCode(value = "") {
        try {
          window.localStorage.setItem(SAVED_REF_KEY, String(value).trim());
        } catch (error) {
          // Local storage can be unavailable.
        }
      }

      function getUnavailableStorageKey() {
        if (!state.currentAccess?.staff_key && !state.currentStaff?.name) return "";
        return `${CALENDAR_KEY_PREFIX}${normalizeKey(state.currentAccess?.staff_key || state.currentStaff?.name)}`;
      }

      function loadUnavailableDates() {
        const key = getUnavailableStorageKey();
        state.unavailableDates = new Set();
        if (!key) return;

        try {
          const raw = window.localStorage.getItem(key);
          const parsed = raw ? JSON.parse(raw) : [];
          if (Array.isArray(parsed)) {
            parsed
              .filter((value) => /^\d{4}-\d{2}-\d{2}$/.test(String(value)))
              .forEach((value) => state.unavailableDates.add(String(value)));
          }
        } catch (error) {
          state.unavailableDates = new Set();
        }
      }

      function saveUnavailableDates() {
        const key = getUnavailableStorageKey();
        if (!key) return;

        try {
          const values = Array.from(state.unavailableDates).sort();
          window.localStorage.setItem(key, JSON.stringify(values));
        } catch (error) {
          // Ignore storage errors.
        }
      }

      function resetProfileState(message) {
        state.currentStaff = null;
        state.currentAccess = null;
        state.periods = [];
        state.openPeriodKey = null;
        state.unavailableDates = new Set();
        renderIdentity();
        renderWageView();
        renderScheduleView();
        renderCalendar();
        setStatus(message);
      }

      function renderIdentity() {
        if (!state.currentStaff || !state.currentAccess) {
          refs.appUserName.textContent = "Noble App";
          refs.appUserMeta.textContent = "";
          return;
        }

        refs.appUserName.textContent = state.currentStaff.name;
        refs.appUserMeta.textContent = `${getBranchLabel(state.currentAccess.branch_scope)} · ${getRoleLabel(state.currentAccess.job_role)}`;
      }

      function getPayHeadline(access = {}) {
        const wageKeys = ["hourly_wage", "hourly_rate", "pay_rate", "wage"];

        for (const key of wageKeys) {
          const amount = parseNumber(access[key]);
          if (amount > 0) {
            return {
              value: `${formatMoney(amount)}/h`,
              note: ""
            };
          }
        }

        return {
          value: getRoleLabel(access.job_role),
          note: ""
        };
      }

      function renderPeriodCards(periods = []) {
        if (!periods.length) {
          refs.periodList.innerHTML = `<div class="empty-state">데이터 없음</div>`;
          return;
        }

        refs.periodList.innerHTML = periods.map((period) => {
          const isOpen = state.openPeriodKey === period.id;
          const detailRows = period.records.map((record) => `
            <tr>
              <td>${escapeHtml(formatCompactRecordDate(record))}</td>
              <td>${formatHours(record.hours)}</td>
              <td>${formatMoney(record.tip)}</td>
              <td>${formatMoney(record.hours > 0 ? record.tip / record.hours : 0)}</td>
              <td>${escapeHtml(formatRecordBranch(record))}</td>
            </tr>
          `).join("");

          return `
            <article class="period-card ${isOpen ? "is-open" : ""}">
              <button class="period-toggle" type="button" data-period-id="${period.id}" aria-expanded="${isOpen ? "true" : "false"}">
                <span>
                  <span class="period-title">${escapeHtml(period.label)}</span>
                  <span class="period-summary">
                    <span>${escapeHtml(period.branch || "")}</span>
                    <span>${period.workedDays} days</span>
                    <span>${formatHours(period.totalHours)}</span>
                    <span>${formatMoney(period.totalTip)}</span>
                    <span>${formatMoney(period.totalHours > 0 ? period.totalTip / period.totalHours : 0)}/h</span>
                  </span>
                </span>
                <span class="period-chevron" aria-hidden="true"></span>
              </button>
              <div class="period-details">
                <table class="history-table">
                  <colgroup>
                    <col style="width: 20%;" />
                    <col style="width: 15%;" />
                    <col style="width: 21%;" />
                    <col style="width: 20%;" />
                    <col style="width: 24%;" />
                  </colgroup>
                  <thead>
                    <tr>
                      <th>Date</th>
                      <th>Hours</th>
                      <th>Tips</th>
                      <th>Tip/h</th>
                      <th>Branch</th>
                    </tr>
                  </thead>
                  <tbody>${detailRows || `<tr><td colspan="5">No records</td></tr>`}</tbody>
                </table>
              </div>
            </article>
          `;
        }).join("");
      }

      function renderWageView() {
        if (!state.currentStaff || !state.currentAccess) {
          refs.payHeadlineValue.textContent = "-";
          refs.payHeadlineNote.textContent = "";
          refs.totalHoursValue.textContent = "-";
          refs.totalTipValue.textContent = "-";
          refs.tipPerHourValue.textContent = "-";
          refs.historySubtitle.textContent = "";
          renderPeriodCards([]);
          return;
        }

        const periods = state.periods;
        const totalHours = periods.reduce((sum, period) => sum + period.totalHours, 0);
        const totalTip = periods.reduce((sum, period) => sum + period.totalTip, 0);
        const tipPerHour = totalHours > 0 ? totalTip / totalHours : 0;
        const payHeadline = getPayHeadline(state.currentAccess);

        refs.payHeadlineValue.textContent = payHeadline.value;
        refs.payHeadlineNote.textContent = payHeadline.note;
        refs.totalHoursValue.textContent = formatHours(totalHours);
        refs.totalTipValue.textContent = formatMoney(totalTip);
        refs.tipPerHourValue.textContent = formatMoney(tipPerHour);
        refs.historySubtitle.textContent = periods.length ? `${periods.length} periods` : "";
        renderPeriodCards(periods);
      }

      function getCurrentWeekCards(records = []) {
        const today = new Date();
        const weekStart = startOfWeek(today);
        const weekEnd = endOfWeek(today);
        const cards = [];

        for (let offset = 0; offset < 7; offset += 1) {
          const date = addDays(weekStart, offset);
          const dayRecords = records.filter((record) => isSameDate(record.dateObj, date));
          const totalHours = dayRecords.reduce((sum, record) => sum + record.hours, 0);
          const totalTip = dayRecords.reduce((sum, record) => sum + record.tip, 0);
          const branches = Array.from(new Set(dayRecords.map((record) => formatRecordBranch(record)).filter(Boolean)));
          const isoDate = toIsoDate(date);
          const blocked = state.unavailableDates.has(isoDate);

          cards.push({
            date,
            isoDate,
            records: dayRecords,
            totalHours,
            totalTip,
            branches,
            blocked
          });
        }

        return {
          weekStart,
          weekEnd,
          cards
        };
      }

      function formatScheduleHeaderDate(date) {
        const weekday = ["일", "월", "화", "수", "목", "금", "토"][date.getDay()];
        const month = String(date.getMonth() + 1).padStart(2, "0");
        const day = String(date.getDate()).padStart(2, "0");
        return `${weekday}(${month}/${day})`;
      }

      function getBranchScheduleCell(card, branchKey) {
        const branchRecords = card.records.filter((record) => normalizeKey(formatRecordBranch(record)) === branchKey);
        const worked = branchRecords.some((record) => record.hours > 0 || record.tip > 0);
        return {
          name: worked ? state.currentStaff?.name || "" : "",
          worked,
          blocked: card.blocked
        };
      }

      function renderScheduleView() {
        if (!state.currentStaff || !state.currentAccess) {
          refs.weekRangeLabel.textContent = "";
          refs.scheduleList.innerHTML = `<div class="empty-state">데이터 없음</div>`;
          return;
        }

        const allRecords = getAllRecords(state.periods);
        const week = getCurrentWeekCards(allRecords);
        const branchRows = [
          { key: "uptown", label: "업타운" },
          { key: "downtown", label: "다운타운" }
        ];

        refs.weekRangeLabel.textContent = `${formatLongDate(week.weekStart)} - ${formatLongDate(week.weekEnd)}`;

        const headerCells = week.cards.map((card) => `<th scope="col">${escapeHtml(formatScheduleHeaderDate(card.date))}</th>`).join("");
        const bodyRows = branchRows.map((branch) => {
          const cells = week.cards.map((card) => {
            const cell = getBranchScheduleCell(card, branch.key);
            const classes = [
              cell.worked ? "is-work" : "",
              !cell.worked && cell.blocked ? "is-unavailable" : ""
            ].filter(Boolean).join(" ");
            return `<td class="${classes}">${escapeHtml(cell.name)}</td>`;
          }).join("");

          return `
            <tr>
              <th class="branch-cell" scope="row">${branch.label}</th>
              ${cells}
            </tr>
          `;
        }).join("");

        refs.scheduleList.innerHTML = `
          <table class="schedule-table">
            <thead>
              <tr>
                <th class="branch-cell" scope="col">지점</th>
                ${headerCells}
              </tr>
            </thead>
            <tbody>${bodyRows}</tbody>
          </table>
        `;
      }

      function renderCalendar() {
        const cursor = state.calendarCursor;
        const today = startOfDay(new Date());
        const monthStart = startOfMonth(cursor);
        const monthEnd = new Date(cursor.getFullYear(), cursor.getMonth() + 1, 0);
        const leadingBlanks = (monthStart.getDay() + 6) % 7;
        const totalDays = monthEnd.getDate();
        const cells = [];
        const hasProfile = Boolean(state.currentStaff && state.currentAccess);

        refs.calendarLabel.textContent = new Intl.DateTimeFormat("ko-KR", {
          year: "numeric",
          month: "long"
        }).format(cursor);

        if (hasProfile) {
          refs.calendarSummary.textContent = `${state.currentStaff.name} 기준 안되는 날 ${state.unavailableDates.size}일 저장됨`;
        } else {
          refs.calendarSummary.textContent = "";
        }

        for (let index = 0; index < leadingBlanks; index += 1) {
          cells.push('<div class="calendar-day is-empty" aria-hidden="true"></div>');
        }

        for (let day = 1; day <= totalDays; day += 1) {
          const date = new Date(cursor.getFullYear(), cursor.getMonth(), day);
          const isoDate = toIsoDate(date);
          const isToday = isSameDate(date, today);
          const isBlocked = state.unavailableDates.has(isoDate);
          const classes = ["calendar-day"];
          if (!hasProfile) classes.push("is-disabled");
          if (isToday) classes.push("is-today");
          if (isBlocked) classes.push("is-blocked");

          cells.push(`
            <button
              class="${classes.join(" ")}"
              type="button"
              data-date="${isoDate}"
              ${hasProfile ? "" : "disabled"}
              aria-pressed="${isBlocked ? "true" : "false"}"
            >
              <strong>${day}</strong>
              <small>${escapeHtml(formatLongDate(date))}</small>
              ${isBlocked ? "<em>Blocked</em>" : ""}
            </button>
          `);
        }

        refs.calendarGrid.innerHTML = cells.join("");
      }

      function renderAll() {
        renderIdentity();
        renderWageView();
        renderScheduleView();
        renderCalendar();
      }

      function animateViewChange(view, direction) {
        if (!view?.animate) return;

        view.animate(
          [
            {
              opacity: 0,
              transform: `translateX(${direction === "forward" ? "24px" : "-24px"}) translateY(6px) scale(0.985)`
            },
            {
              opacity: 1,
              transform: "translateX(0) translateY(0) scale(1)"
            }
          ],
          {
            duration: 260,
            easing: "cubic-bezier(.22,.78,.18,1)",
            fill: "both"
          }
        );
      }

      function setActiveTab(tabId) {
        if (!TAB_ORDER.includes(tabId)) return;

        const previousIndex = TAB_ORDER.indexOf(state.activeTab);
        const nextIndex = TAB_ORDER.indexOf(tabId);
        const direction = nextIndex >= previousIndex ? "forward" : "backward";
        state.activeTab = tabId;

        refs.navTabs.forEach((button) => {
          const isActive = button.dataset.tab === tabId;
          button.classList.toggle("is-active", isActive);
          button.setAttribute("aria-pressed", isActive ? "true" : "false");
        });

        refs.views.forEach((view) => {
          const isActive = view.dataset.view === tabId;
          view.classList.toggle("is-active", isActive);
          if (isActive) animateViewChange(view, direction);
        });
      }

      async function fetchSheetSource(sourceConfig) {
        const response = await fetch(sourceConfig.csvUrl, { cache: "no-store" });
        if (!response.ok) throw new Error(`${sourceConfig.branch} CSV request failed: ${response.status}`);

        const text = await response.text();
        const rows = parseCsv(text);
        return {
          ...sourceConfig,
          rows,
          staff: buildStaff(rows[0] || [], { ...sourceConfig, rows })
        };
      }

      async function loadData() {
        try {
          const settledSources = await Promise.allSettled(SHEET_SOURCES.map(fetchSheetSource));
          const sources = settledSources
            .filter((result) => result.status === "fulfilled")
            .map((result) => result.value);
          const sourceErrors = {};

          settledSources.forEach((result, index) => {
            if (result.status === "rejected") {
              const source = SHEET_SOURCES[index];
              sourceErrors[source.key] = result.reason;
              console.warn(`${source.branch} sheet failed`, result.reason);
            }
          });

          if (!sources.length) throw new Error("No sheets loaded.");

          state.sources = sources;
          state.sourceErrors = sourceErrors;
          state.rows = sources[0]?.rows || [];
          state.staff = sources.flatMap((source) => source.staff);
          state.loaded = true;
          setStatus("Ready");

          const params = new URLSearchParams(window.location.search);
          const initialId = params.get("id") || getSavedRefCode();
          if (initialId) {
            refs.staffIdInput.value = initialId;
            handleLookup(initialId);
            return;
          }

          renderAll();
        } catch (error) {
          console.error(error);
          state.loaded = false;
          resetProfileState("Could not load the sheet.");
        }
      }

      async function handleLookup(input) {
        if (!state.loaded) {
          setStatus("Loading...");
          return;
        }

        setStatus("Checking...");

        try {
          const access = await lookupReference(input);
          if (!access?.staff_key) {
            resetProfileState("Check your reference code.");
            return;
          }

          const branchScope = normalizeKey(access.branch_scope);
          if (branchScope && branchScope !== "both" && state.sourceErrors[branchScope]) {
            resetProfileState(`${getBranchLabel(branchScope)} sheet unavailable`);
            return;
          }

          if (branchScope === "both") {
            const missingBranches = SHEET_SOURCES
              .filter((source) => state.sourceErrors[source.key])
              .map((source) => source.branch);
            if (missingBranches.length) {
              resetProfileState(`${missingBranches.join(" + ")} sheet unavailable`);
              return;
            }
          }

          const staff = findStaffByKey(access.staff_key, access);
          if (!staff) {
            resetProfileState(`No sheet column for ${access.staff_key}`);
            return;
          }

          const periods = getPeriods(staff);
          const defaultOpenPeriod = getMostRecentWorkedPeriod(periods);

          state.currentStaff = staff;
          state.currentAccess = access;
          state.periods = periods;
          state.openPeriodKey = defaultOpenPeriod ? defaultOpenPeriod.id : null;
          state.calendarCursor = startOfMonth(new Date());
          saveRefCode(input);
          loadUnavailableDates();
          renderAll();
          setStatus("Ready");
        } catch (error) {
          console.error(error);
          resetProfileState("Lookup failed.");
        }
      }

      function submitLookup() {
        const value = refs.staffIdInput.value;
        if (!String(value).trim()) {
          resetProfileState("Enter reference code.");
          return;
        }

        handleLookup(value);
      }

      function toggleUnavailableDate(isoDate) {
        if (!state.currentStaff || !state.currentAccess) return;

        if (state.unavailableDates.has(isoDate)) {
          state.unavailableDates.delete(isoDate);
        } else {
          state.unavailableDates.add(isoDate);
        }

        saveUnavailableDates();
        renderScheduleView();
        renderCalendar();
        setStatus("Unavailable dates updated");
      }

      function bindEvents() {
        refs.lookupForm.addEventListener("submit", (event) => {
          event.preventDefault();
          submitLookup();
        });

        refs.navTabs.forEach((button) => {
          button.addEventListener("click", () => {
            setActiveTab(button.dataset.tab);
          });
        });

        refs.periodList.addEventListener("click", (event) => {
          const button = event.target.closest("[data-period-id]");
          if (!button) return;
          const periodId = button.dataset.periodId;
          state.openPeriodKey = state.openPeriodKey === periodId ? null : periodId;
          renderPeriodCards(state.periods);
        });

        refs.calendarPrev.addEventListener("click", () => {
          state.calendarCursor = new Date(state.calendarCursor.getFullYear(), state.calendarCursor.getMonth() - 1, 1);
          renderCalendar();
        });

        refs.calendarNext.addEventListener("click", () => {
          state.calendarCursor = new Date(state.calendarCursor.getFullYear(), state.calendarCursor.getMonth() + 1, 1);
          renderCalendar();
        });

        refs.calendarGrid.addEventListener("click", (event) => {
          const button = event.target.closest("[data-date]");
          if (!button || button.disabled) return;
          toggleUnavailableDate(button.dataset.date);
        });
      }

      cacheRefs();
      renderAll();
      bindEvents();
      loadData();
    }());
  </script>
</body>
</html>
